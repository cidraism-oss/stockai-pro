<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d4a5c">
<meta name="mobile-web-app-capable" content="yes">
<title>StockAI-Pro Hub</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{--primary:#1a8ba8;--primary-dark:#0d4a5c;--primary-light:#4dbdd5;--bg:#f0f7f9;--bg-card:#fff;--text:#0d4a5c;--text-mid:#2a5f70;--text-light:#5a8a96;--text-muted:#8aabb5;--gold:#f59e0b;--gold-dark:#d97706;--success:#2ea871;--danger:#c94545;--warning:#d4a017;--info:#2b8eb3;--border:#c4dde4;--shadow:0 2px 12px rgba(13,74,92,.08);--shadow-lg:0 8px 30px rgba(13,74,92,.15);--r:14px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#0a1a1f;--bg-card:#0f2a33;--text:#e0f0f4;--text-mid:#a0c8d4;--text-light:#6a9aaa;--text-muted:#4a7a8a;--border:#1a3a44;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 30px rgba(0,0,0,.4)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:14px;user-select:none;-webkit-user-select:none}
.hidden{display:none!important}

/* SPLASH */
.hub-splash{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s}
.hub-splash-logo{width:90px;height:90px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;color:var(--primary-dark);font-size:2.5rem;margin-bottom:18px;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:splashPulse 2s ease-in-out infinite}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.hub-splash h1{color:#fff;font-size:1.8rem;font-weight:900;letter-spacing:2px}
.hub-splash p{color:rgba(255,255,255,.8);font-size:.82rem;margin-top:4px}
.hub-splash-loader{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-top:30px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.hub-login{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:9999}
.hub-login-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
.hub-login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;margin:0 auto 16px;box-shadow:0 6px 20px rgba(26,139,168,.3)}
.hub-login-card h2{font-size:1.4rem;font-weight:900;color:var(--text);margin-bottom:3px}
.hub-login-card .sub{font-size:.82rem;color:var(--text-light);margin-bottom:28px}
.hub-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;color:var(--text);margin-bottom:12px;background:var(--bg);transition:.2s}
.hub-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,139,168,.12)}
.hub-btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s}
.hub-btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.hub-btn-primary:active{transform:scale(.97)}
.hub-btn-primary:disabled{opacity:.6;transform:none}
.hub-forgot{color:var(--primary);font-size:.82rem;text-decoration:none;font-weight:500;display:block;margin-top:14px;cursor:pointer}
.hub-install-btn{margin-top:18px;padding-top:18px;border-top:1px solid #e4f1f5}
.hub-install-btn button{width:100%;padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}

/* HUB APP SHELL */
.hub-app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

/* HUB HEADER */
.hub-header{height:56px;background:linear-gradient(90deg,var(--primary-dark),var(--primary));display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:100}
.hub-header-logo{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem}
.hub-header-info{flex:1;color:#fff}
.hub-header-info .hub-user-name{font-size:.92rem;font-weight:700}
.hub-header-info .hub-entity-name{font-size:.65rem;color:rgba(255,255,255,.7);font-weight:400}
.hub-header-time{font-size:.72rem;color:rgba(255,255,255,.7);text-align:right}
.hub-header-time strong{display:block;font-size:.82rem;color:#fff}
.hub-header-btn{width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:var(--rs);color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px}

/* HUB DASHBOARD */
.hub-dashboard{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center}
.hub-welcome{width:100%;max-width:600px;background:var(--bg-card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;align-items:center;gap:16px;border-left:4px solid var(--gold)}
.hub-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;font-weight:800;flex-shrink:0}
.hub-welcome-text h3{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:2px}
.hub-welcome-text p{font-size:.78rem;color:var(--text-light)}
.hub-welcome-text .hub-shift{font-size:.72rem;color:var(--primary);font-weight:600;margin-top:4px}

/* APP GRID */
.hub-section-title{width:100%;max-width:600px;font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:8px 0;padding-left:4px}
.hub-apps-grid{width:100%;max-width:600px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.hub-app-card{background:var(--bg-card);border-radius:var(--r);padding:24px 12px;box-shadow:var(--shadow);text-align:center;cursor:pointer;transition:.3s;border:2px solid transparent;position:relative}
.hub-app-card:active{transform:scale(.95);border-color:var(--primary)}
.hub-app-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.hub-app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin:0 auto 10px}
.hub-app-name{font-size:.82rem;font-weight:700;color:var(--text)}
.hub-app-desc{font-size:.65rem;color:var(--text-muted);margin-top:3px;line-height:1.3}
.hub-app-card.disabled{opacity:.35;pointer-events:none}
.hub-app-card.disabled::after{content:'🔒';position:absolute;top:8px;right:8px;font-size:.7rem}


/* TOAST */
.hub-toast-wrap{position:fixed;top:66px;right:16px;z-index:500;display:flex;flex-direction:column;gap:8px}
.hub-toast{padding:12px 16px;border-radius:var(--rs);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:.85rem;font-weight:500;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.hub-toast.success{background:#d1fae5;color:#065f46;border-left:3px solid var(--success)}
.hub-toast.error{background:#fee2e2;color:#991b1b;border-left:3px solid var(--danger)}
.hub-toast.info{background:#d4f0f7;color:#0d4a5c;border-left:3px solid var(--info)}

/* REMEMBER ME */
.hub-remember{position:fixed;inset:0;background:rgba(13,74,92,.8);backdrop-filter:blur(8px);z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px}
.hub-remember-card{background:#fff;border-radius:20px;width:100%;max-width:380px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.hub-remember-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));padding:28px 24px;text-align:center;color:#fff}
.hub-remember-body{padding:24px}

/* INSTALL GUIDE */
.hub-install-overlay{position:fixed;inset:0;background:rgba(13,74,92,.9);backdrop-filter:blur(10px);z-index:99998;display:flex;align-items:center;justify-content:center;padding:20px}

@media(min-width:768px){
.hub-apps-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:380px){
.hub-apps-grid{grid-template-columns:repeat(2,1fr);gap:10px}
.hub-app-card{padding:18px 8px}
.hub-app-icon{width:48px;height:48px;font-size:1.2rem}
}
/* ══════════════════════════════════════ */
/* ANIMATED WELCOME SCREEN               */
/* ══════════════════════════════════════ */
.hub-welcome-screen{position:fixed;inset:0;z-index:99999;overflow:hidden}
.welcome-bg{position:absolute;inset:0;background:linear-gradient(135deg,#071a22 0%,#0d4a5c 30%,#1a8ba8 60%,#0d4a5c 100%);display:flex;align-items:center;justify-content:center}
.welcome-content{text-align:center;position:relative;z-index:10;padding:24px}

/* PARTICLES */
.welcome-particles{position:absolute;inset:0;overflow:hidden;z-index:1}
.particle{position:absolute;border-radius:50%;opacity:0;animation:particleFloat 8s infinite}
.p1{width:6px;height:6px;background:#f59e0b;top:10%;left:15%;animation-delay:0s}
.p2{width:4px;height:4px;background:#4dbdd5;top:20%;right:20%;animation-delay:1s}
.p3{width:8px;height:8px;background:#f59e0b;bottom:30%;left:10%;animation-delay:2s}
.p4{width:5px;height:5px;background:#4dbdd5;top:40%;right:15%;animation-delay:3s}
.p5{width:3px;height:3px;background:#fff;bottom:20%;right:25%;animation-delay:1.5s}
.p6{width:7px;height:7px;background:#f59e0b;top:60%;left:25%;animation-delay:4s}
.p7{width:4px;height:4px;background:#4dbdd5;bottom:40%;right:10%;animation-delay:2.5s}
.p8{width:6px;height:6px;background:#fff;top:15%;right:35%;animation-delay:3.5s}
@keyframes particleFloat{
    0%{opacity:0;transform:translateY(100px) scale(0)}
    20%{opacity:.8;transform:translateY(0) scale(1)}
    80%{opacity:.6;transform:translateY(-80px) scale(.8)}
    100%{opacity:0;transform:translateY(-150px) scale(0)}
}

/* LOGO */
.welcome-logo-container{position:relative;width:120px;height:120px;margin:0 auto 30px}
.welcome-logo{width:100px;height:100px;background:#fff;border-radius:24px;display:flex;align-items:center;justify-content:center;color:#0d4a5c;font-size:2.8rem;margin:10px auto;box-shadow:0 15px 50px rgba(0,0,0,.3);animation:logoEntry 1s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0;transform:scale(0) rotate(-180deg);position:relative;z-index:5}
@keyframes logoEntry{
    0%{opacity:0;transform:scale(0) rotate(-180deg)}
    60%{transform:scale(1.15) rotate(10deg)}
    80%{transform:scale(.95) rotate(-5deg)}
    100%{opacity:1;transform:scale(1) rotate(0deg)}
}
.welcome-ring{position:absolute;border-radius:50%;border:2px solid rgba(77,189,213,.3);animation:ringExpand 2s ease-out infinite}
.ring1{inset:-10px;animation-delay:0s}
.ring2{inset:-25px;animation-delay:.5s;border-color:rgba(245,158,11,.2)}
.ring3{inset:-40px;animation-delay:1s;border-color:rgba(255,255,255,.1)}
@keyframes ringExpand{
    0%{transform:scale(.8);opacity:1}
    100%{transform:scale(1.3);opacity:0}
}

/* WELCOME TEXT */
.welcome-text-container{margin-bottom:16px}
.welcome-word{display:flex;justify-content:center;gap:2px;margin-bottom:4px}
.welcome-letter{color:rgba(255,255,255,.9);font-size:1.6rem;font-weight:600;display:inline-block;opacity:0;animation:letterBounceIn .5s cubic-bezier(.175,.885,.32,1.275) forwards}
.wl-1{animation-delay:.8s}
.wl-2{animation-delay:.85s}
.wl-3{animation-delay:.9s}
.wl-4{animation-delay:.95s}
.wl-5{animation-delay:1s}
.wl-6{animation-delay:1.05s}
.wl-7{animation-delay:1.1s}
.wl-space{width:10px}
.wl-8{animation-delay:1.2s}
.wl-9{animation-delay:1.25s}

/* BRAND LETTERS */
.welcome-brand{display:flex;justify-content:center;gap:2px;margin-bottom:12px}
.brand-letter{color:#f59e0b;font-size:2.8rem;font-weight:900;letter-spacing:3px;display:inline-block;opacity:0;text-shadow:0 4px 20px rgba(245,158,11,.4)}
.bl-1{animation:letterRiseUp .6s cubic-bezier(.175,.885,.32,1.275) 1.4s forwards}
.bl-2{animation:letterDropDown .6s cubic-bezier(.175,.885,.32,1.275) 1.5s forwards}
.bl-3{animation:letterRiseUp .6s cubic-bezier(.175,.885,.32,1.275) 1.6s forwards}
.bl-4{animation:letterSlideLeft .6s cubic-bezier(.175,.885,.32,1.275) 1.7s forwards}
.bl-5{animation:letterSlideRight .6s cubic-bezier(.175,.885,.32,1.275) 1.8s forwards}
.bl-6{animation:letterDropDown .6s cubic-bezier(.175,.885,.32,1.275) 1.95s forwards}
.bl-7{animation:letterRiseUp .6s cubic-bezier(.175,.885,.32,1.275) 2.05s forwards}
.bl-8{animation:letterFadeIn .4s ease 2.15s forwards}
.bl-9{animation:letterSlideLeft .6s cubic-bezier(.175,.885,.32,1.275) 2.25s forwards}
.bl-10{animation:letterDropDown .6s cubic-bezier(.175,.885,.32,1.275) 2.35s forwards}
.bl-11{animation:letterRiseUp .6s cubic-bezier(.175,.885,.32,1.275) 2.45s forwards}

@keyframes letterBounceIn{
    0%{opacity:0;transform:translateY(-40px) scale(0)}
    60%{transform:translateY(5px) scale(1.1)}
    100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes letterRiseUp{
    0%{opacity:0;transform:translateY(60px) scale(0) rotate(15deg)}
    60%{transform:translateY(-8px) scale(1.1) rotate(-3deg)}
    100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
@keyframes letterDropDown{
    0%{opacity:0;transform:translateY(-60px) scale(0) rotate(-15deg)}
    60%{transform:translateY(8px) scale(1.1) rotate(3deg)}
    100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
@keyframes letterSlideLeft{
    0%{opacity:0;transform:translateX(-50px) scale(0)}
    60%{transform:translateX(5px) scale(1.1)}
    100%{opacity:1;transform:translateX(0) scale(1)}
}
@keyframes letterSlideRight{
    0%{opacity:0;transform:translateX(50px) scale(0)}
    60%{transform:translateX(-5px) scale(1.1)}
    100%{opacity:1;transform:translateX(0) scale(1)}
}
@keyframes letterFadeIn{
    0%{opacity:0;transform:scale(0)}
    100%{opacity:1;transform:scale(1)}
}

/* TAGLINE */
.welcome-tagline{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.tagline-word{color:rgba(255,255,255,.7);font-size:.95rem;font-weight:500;font-style:italic;opacity:0;animation:taglineFade .6s ease forwards}
.tw-1{animation-delay:2.8s}
.tw-2{animation-delay:3s}
.tw-3{animation-delay:3.2s}
.tw-4{animation-delay:3.4s}
@keyframes taglineFade{
    0%{opacity:0;transform:translateY(10px)}
    100%{opacity:1;transform:translateY(0)}
}

/* FEATURES */
.welcome-features{display:flex;justify-content:center;gap:14px;margin-bottom:36px;flex-wrap:wrap}
.welcome-feature{padding:8px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:24px;color:rgba(255,255,255,.8);font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:6px;opacity:0;animation:featureSlideUp .5s ease forwards;backdrop-filter:blur(4px)}
.wf-1{animation-delay:3.5s}
.wf-2{animation-delay:3.7s}
.wf-3{animation-delay:3.9s}
.welcome-feature i{color:#f59e0b;font-size:.8rem}
@keyframes featureSlideUp{
    0%{opacity:0;transform:translateY(20px)}
    100%{opacity:1;transform:translateY(0)}
}

/* ENTER BUTTON */
.welcome-enter-btn{display:inline-flex;align-items:center;gap:14px;padding:16px 40px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:2px solid rgba(255,255,255,.3);border-radius:50px;color:#fff;cursor:pointer;font-family:inherit;transition:.3s;opacity:0;animation:enterBtnAppear .6s ease 4.2s forwards;position:relative;overflow:hidden}
.welcome-enter-btn::before{content:'';position:absolute;inset:-2px;background:linear-gradient(135deg,#f59e0b,#4dbdd5,#f59e0b);border-radius:50px;z-index:-1;opacity:0;transition:opacity .3s}
.welcome-enter-btn:hover{transform:scale(1.05);border-color:transparent;background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.1))}
.welcome-enter-btn:hover::before{opacity:1}
.welcome-enter-btn:active{transform:scale(.97)}
.enter-text{font-size:1rem;font-weight:800;letter-spacing:6px}
.enter-arrow{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:arrowPulse 2s ease-in-out infinite 4.5s}
@keyframes enterBtnAppear{
    0%{opacity:0;transform:translateY(30px)}
    100%{opacity:1;transform:translateY(0)}
}
@keyframes arrowPulse{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(6px)}
}

/* VERSION */
.welcome-version{color:rgba(255,255,255,.3);font-size:.68rem;margin-top:20px;letter-spacing:2px;opacity:0;animation:taglineFade .5s ease 4.5s forwards}

/* WELCOME EXIT */
.hub-welcome-screen.exit{animation:welcomeExit .8s ease forwards}
@keyframes welcomeExit{
    0%{opacity:1;transform:scale(1)}
    50%{opacity:.5;transform:scale(1.05)}
    100%{opacity:0;transform:scale(1.1);pointer-events:none}
}

@media(max-width:480px){
    .brand-letter{font-size:2rem;letter-spacing:1px}
    .welcome-letter{font-size:1.2rem}
    .welcome-enter-btn{padding:14px 32px}
    .enter-text{font-size:.88rem;letter-spacing:4px}
    .welcome-features{gap:8px}
    .welcome-feature{padding:6px 12px;font-size:.7rem}
}
.welcome-enter-btn{z-index:20;position:relative}
</style>
</head>
<body>

<!-- ANIMATED WELCOME -->
<div class="hub-welcome-screen" id="hub-welcome-screen">
    <div class="welcome-bg">
        <div class="welcome-particles">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
            <div class="particle p7"></div>
            <div class="particle p8"></div>
        </div>
        <div class="welcome-content">
            <div class="welcome-logo-container">
                <div class="welcome-logo" id="welcome-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="welcome-ring ring1"></div>
                <div class="welcome-ring ring2"></div>
                <div class="welcome-ring ring3"></div>
            </div>
            <div class="welcome-text-container">
                <div class="welcome-word">
                    <span class="welcome-letter wl-1">W</span>
                    <span class="welcome-letter wl-2">e</span>
                    <span class="welcome-letter wl-3">l</span>
                    <span class="welcome-letter wl-4">c</span>
                    <span class="welcome-letter wl-5">o</span>
                    <span class="welcome-letter wl-6">m</span>
                    <span class="welcome-letter wl-7">e</span>
                    <span class="welcome-letter wl-space"> </span>
                    <span class="welcome-letter wl-8">t</span>
                    <span class="welcome-letter wl-9">o</span>
                </div>
                <div class="welcome-brand">
                    <span class="brand-letter bl-1">S</span>
                    <span class="brand-letter bl-2">t</span>
                    <span class="brand-letter bl-3">o</span>
                    <span class="brand-letter bl-4">c</span>
                    <span class="brand-letter bl-5">k</span>
                    <span class="brand-letter bl-6">A</span>
                    <span class="brand-letter bl-7">I</span>
                    <span class="brand-letter bl-8">-</span>
                    <span class="brand-letter bl-9">P</span>
                    <span class="brand-letter bl-10">r</span>
                    <span class="brand-letter bl-11">o</span>
                </div>
            </div>
            <div class="welcome-tagline" id="welcome-tagline">
                <span class="tagline-word tw-1">Intelligence</span>
                <span class="tagline-word tw-2">a</span>
                <span class="tagline-word tw-3">click</span>

function hubLogin(e){

// ============================================================
// FIND ACCOUNT
// ============================================================
function findHubAccount(email,cb){
    db.collection('accounts').get().then(function(snap){
        var found=false;
        snap.forEach(function(doc){
            if(found)return;var data=doc.data();

            // Check owner
            if(data.owner&&data.owner.email&&data.owner.email.toLowerCase()===email){
                HUB.accountId=doc.id;HUB.accountData=data;
                HUB.user={name:data.owner.name||email,email:email,role:'Owner'};
                var ents=data.entities||[];
                if(ents.length>0){HUB.entity=ents[0];HUB.entityId=ents[0].id;HUB.entityName=ents[0].name;}
                // Owner gets all apps
                HUB.allowedApps=ROLE_DEFAULTS['Owner'].slice();
                // Check for custom app access
                if(data.owner.appAccess){HUB.allowedApps=data.owner.appAccess;}
                found=true;return;
            }

            // Check entity users
            var users=data.users||{};
            Object.keys(users).forEach(function(eid){
                if(found)return;
                (users[eid]||[]).forEach(function(u){
                    if(found)return;
                    if(u.email&&u.email.toLowerCase()===email){
                        HUB.accountId=doc.id;HUB.accountData=data;HUB.entityId=eid;
                        HUB.user={name:u.name||email,email:email,role:u.role||'Staff'};
                        var ents=data.entities||[];
                        HUB.entity=ents.find(function(e){return e.id===eid;})||ents[0]||null;
                        HUB.entityName=HUB.entity?HUB.entity.name:'';
                        // Get allowed apps — custom first, then role defaults
                        HUB.allowedApps=u.appAccess||ROLE_DEFAULTS[u.role||'Staff']||['mobile'];
                        found=true;
                    }
                });
            });
        });
        if(cb)cb(found);
    }).catch(function(){if(cb)cb(false);});
}

        var h=Math.floor(diff/3600000);var m=Math.floor((diff%3600000)/60000);var s=Math.floor((diff%60000)/1000);
        var timeStr=('0'+h).slice(-2)+':'+('0'+m).slice(-2)+':'+('0'+s).slice(-2);

        var headerTime=document.getElementById('hub-header-time');
        if(headerTime){
            var now=new Date();
            headerTime.innerHTML='<strong>'+timeStr+'</strong>'+
                '<span>'+now.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})+'</span>';

        if(shiftDisplay)shiftDisplay.textContent=('0'+h).slice(-2)+':'+('0'+m).slice(-2);
    },1000);
}

// ============================================================
// COLOR HELPER
// ============================================================
function adjustColor(hex,amount){
    hex=hex.replace('#','');
    var r=Math.max(0,Math.min(255,parseInt(hex.substring(0,2),16)+amount));
    var g=Math.max(0,Math.min(255,parseInt(hex.substring(2,4),16)+amount));
    var b=Math.max(0,Math.min(255,parseInt(hex.substring(4,6),16)+amount));
    return'#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2);
}

        '<div style="background:linear-gradient(135deg,#0d4a5c,#1a8ba8);padding:28px 24px;text-align:center;color:#fff">'+
        '<div style="width:64px;height:64px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#0d4a5c;font-size:1.8rem;margin:0 auto 12px;box-shadow:0 6px 20px rgba(0,0,0,.2)"><i class="fas fa-chart-line"></i></div>'+
        '<h2 style="font-size:1.2rem;font-weight:800;margin-bottom:4px">Install StockAI-Pro Hub</h2>'+
        '<p style="font-size:.82rem;opacity:.9">Add to your home screen</p></div>'+
        '<div style="padding:20px 24px">'+steps+
        '<button onclick="copyHubLink()" style="width:100%;padding:12px;background:#1a8ba8;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px"><i class="fas fa-copy"></i> Copy App Link</button>'+
        '<button onclick="document.getElementById(\'hub-install-overlay\').remove()" style="width:100%;padding:12px;background:#f0f7f9;color:#5a8a96;border:none;border-radius:8px;font-weight:600;font-size:.88rem;cursor:pointer;font-family:inherit">Close</button>'+
        '</div></div>';
    document.body.appendChild(overlay);
}

function copyHubLink(){
    var link=window.location.href;
    if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(link).then(function(){hubToast('success','✅ Link copied!');}).catch(function(){fallbackCopyHub(link);});
    }else{fallbackCopyHub(link);}
}
function fallbackCopyHub(text){
    var input=document.createElement('input');input.value=text;
    document.body.appendChild(input);input.select();input.setSelectionRange(0,99999);
    document.execCommand('copy');document.body.removeChild(input);
    hubToast('success','✅ Link copied!');
}

var lastTouch=0;
document.addEventListener('touchend',function(e){
    var now=Date.now();if(now-lastTouch<=300)e.preventDefault();lastTouch=now;
},{passive:false});

if('serviceWorker'in navigator){
    window.addEventListener('load',function(){
        navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
}
