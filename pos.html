============================================================ */
function showWaiterCashup() {
    var shiftStart   = POS.clockInTime ? POS.clockInTime.toISOString() : null;
    var waiterName   = POS.user ? POS.user.name : '';

    var closedOrders = Object.values(POS.orders).filter(function(o) {
        return o.status     === 'closed' &&
               o.waiterName === waiterName &&
               (!shiftStart || (o.closedAt && o.closedAt >= shiftStart));
    });

    var cashTotal  = closedOrders
        .filter(function(o) { return o.paymentMethod === 'cash'; })
        .reduce(function(s, o) { return s + (o.total||0); }, 0);
    var cardTotal  = closedOrders
        .filter(function(o) { return o.paymentMethod === 'card'; })
        .reduce(function(s, o) { return s + (o.total||0); }, 0);
    var promoTotal = closedOrders
        .filter(function(o) { return o.isPromotion; })
        .reduce(function(s, o) { return s + (o.total||0); }, 0);
    var tipTotal   = closedOrders
        .reduce(function(s, o) { return s + (o.gratuity||0); }, 0);
    var totalSales = cashTotal + cardTotal;

    var voidedItems = [];
    Object.values(POS.orders).forEach(function(o) {
        (o.items || []).forEach(function(i) {
            if (i.voided && i.voidBy === waiterName &&
                (!shiftStart || (i.voidedAt && i.voidedAt >= shiftStart))) {
                voidedItems.push({
                    name:     i.name,
                    price:    (i.price||0) * (i.qty||1),
                    reason:   i.voidReason,
                    voidedAt: i.voidedAt,
                    table:    o.tableNumber
                });
            }
        });
    });

    POS._pendingCashup = {
        waiterName:    waiterName,
        waiterId:      POS.user ? POS.user.uid : '',
        shiftStart:    shiftStart,
        submittedAt:   new Date().toISOString(),
        entityId:      POS.entityId,
        status:        'pending',
        tablesServed:  closedOrders.length,
        totalSales:    totalSales,
        cashTotal:     cashTotal,
        cardTotal:     cardTotal,
        promoTotal:    promoTotal,
        gratuityTotal: tipTotal,
        cashToHandIn:  cashTotal,
        voids:         voidedItems,
        orders: closedOrders.map(function(o) {
            return {
                tableNumber:   o.tableNumber,
                total:         o.total,
                paymentMethod: o.paymentMethod,
                gratuity:      o.gratuity || 0,
                closedAt:      o.closedAt
            };
        })
    };

    var screen = document.createElement('div');
    screen.className = 'cashup-screen';
    screen.id        = 'cashup-screen';
    screen.innerHTML =
        '<div class="order-header">' +
        '<button class="pos-header-btn" onclick="removeModal(\'cashup-screen\')">' +
        '<i class="fas fa-arrow-left"></i></button>' +
        '<h3><i class="fas fa-calculator"></i> My Cash Up</h3>' +
        '</div>' +
        '<div class="cashup-content">' +
        '<div class="cashup-card">' +
        '<h3 style="font-size:1rem;font-weight:700;margin-bottom:12px">' +
        '<i class="fas fa-chart-bar" style="color:var(--primary)"></i>' +
        ' Shift Summary</h3>' +
        '<div class="cashup-row"><span>Waiter</span>' +
        '<strong>' + escHtml(waiterName) + '</strong></div>' +
        '<div class="cashup-row"><span>Tables Served</span>' +
        '<strong>' + closedOrders.length + '</strong></div>' +
        '<div class="cashup-row"><span>Total Sales</span>' +
        '<strong>R' + totalSales.toFixed(2) + '</strong></div>' +
        '<div class="cashup-row"><span>Card Payments</span>' +
        '<strong>R' + cardTotal.toFixed(2) + '</strong></div>' +
        '<div class="cashup-row"><span>Cash Payments</span>' +
        '<strong>R' + cashTotal.toFixed(2) + '</strong></div>' +
        '<div class="cashup-row"><span>Tips / Gratuity</span>' +
        '<strong style="color:var(--success)">R' + tipTotal.toFixed(2) +
        '</strong></div>' +
        (promoTotal > 0
            ? '<div class="cashup-row"><span>Promotions</span>' +
              '<strong>R' + promoTotal.toFixed(2) + '</strong></div>'
            : '') +
        (voidedItems.length > 0
            ? '<div class="cashup-row"><span>Voids</span>' +
              '<strong style="color:var(--danger)">' +
              voidedItems.length + ' item(s)</strong></div>'
            : '') +
        '<div class="cashup-total"><span>Cash to Hand In</span>' +
        '<strong style="color:var(--danger)">R' +
        cashTotal.toFixed(2) + '</strong></div>' +
        '</div>' +

        (voidedItems.length > 0
            ? '<div class="cashup-card">' +
              '<h3 style="font-size:.88rem;font-weight:700;margin-bottom:10px">' +
              '<i class="fas fa-times-circle" style="color:var(--danger)"></i>' +
              ' Voided Items</h3>' +
              voidedItems.map(function(v) {

        '<button class="bill-send-btn" onclick="submitWaiterCashup()" ' +
        'style="max-width:100%;margin:0 0 24px">' +
        '<i class="fas fa-check"></i> Submit Cash Up</button>' +
        '</div>';

    document.body.appendChild(screen);
}

function submitWaiterCashup() {
    if (!POS._pendingCashup) return;
    if (!confirm('Submit your cash up? ' +
                 'This will be sent to your manager for review.')) return;

    var uid  = POS.user ? POS.user.uid : 'unknown';
    var data = POS._pendingCashup;
    data.submittedAt = new Date().toISOString();

    var update = {};
    update['posCashups.' + POS.entityId + '.' + uid] = data;

    posSave(update).then(function() {
        removeModal('cashup-screen');
        posToast('success', '✅ Cash up submitted for manager review');
        sendCashupEmail(data);
        POS._pendingCashup = null;
    }).catch(function() {
        posToast('error', 'Failed to submit. Please try again.');
    });
}

        '<button style="width:100%;padding:12px;background:var(--bg);' +
        'color:var(--text-light);border:none;border-radius:var(--rs);' +
        'cursor:pointer;font-family:inherit" ' +
        'onclick="removeModal(\'install-modal\')">Close</button>' +
        '</div>';
    document.body.appendChild(modal);
}

/* ============================================================
   HELPERS
============================================================ */
function removeModal(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
}

/* ============================================================
   SERVICE WORKER
============================================================ */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
    });
}

console.log('✅ StockAI-Pro POS loaded');
</script>
