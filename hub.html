function procurePageOrders() {
    var purchases = mGetPurchases();
    var pending   = mGetPendingPOs();
    var inTransit = purchases.filter(function(p) {
        return p.status === 'In Transit' || p.status === 'Processing' || p.status === 'Pending';
    });
    var received = purchases.filter(function(p) {
        return p.status === 'Received' || p.status === 'Delivered';
    });

    var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">' +
        mobileStatCard('Pending', pending.length + inTransit.length, 'var(--gold)') +
        mobileStatCard('Received', received.length, 'var(--success)') +
        mobileStatCard('Total', purchases.length, 'var(--primary)') +
        '</div>';

    // Pending AI POs
    if (pending.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);' +
            'text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">🤖 AI Pending</div>';
        pending.forEach(function(po) {
            html += procurePOCard(po, 'pending');
        });
    }

    // In Transit
    if (inTransit.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);' +
            'text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">🚚 In Transit</div>';
        inTransit.forEach(function(po) {
            html += procurePOCard(po, 'transit');
        });
    }

    // Received
    if (received.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);' +
            'text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">✅ Received</div>';
        received.slice(0, 10).forEach(function(po) {
            html += procurePOCard(po, 'received');
        });
    }

    if (purchases.length === 0 && pending.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-clock"></i>' +
            '<h3>No Orders Yet</h3><p>Create a new order to get started</p></div>';
    }

    return html;
}

function procurePOCard(po, type) {
    var borderColor = type === 'received' ? 'var(--success)' :
        type === 'pending' ? 'var(--gold)' : 'var(--primary)';
    var badgeClass = type === 'received' ? 'badge-green' :
        type === 'pending' ? 'badge-orange' : 'badge-blue';
    var badgeText = type === 'received' ? 'Received' :
        type === 'pending' ? 'Pending' : 'In Transit';

    var items = Array.isArray(po.items) ? po.items : [];
    var itemsPreview = items.slice(0, 3).map(function(i) {
        return '<div style="display:flex;justify-content:space-between;padding:3px 0;' +
            'font-size:.75rem;color:var(--text-mid);border-bottom:1px solid var(--border)">' +
            '<span>' + (i.name || 'Item') + '</span>' +
            '<span style="font-weight:600">' + (i.qty || '') + ' ' + (i.unit || '') + '</span></div>';
    }).join('');

    var actionBtn = '';
    if (type === 'transit') {
        actionBtn = '<button class="btn btn-sm btn-success" onclick="procureMarkReceived(\'' + po.id + '\')">' +
            '<i class="fas fa-check"></i> Mark Received</button>';
    }

    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px;' +
        'margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid ' + borderColor + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
        '<div><div style="font-size:.88rem;font-weight:700;color:var(--text)">' + po.id + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + po.supplier + ' • ' +
        new Date(po.createdAt || po.date).toLocaleDateString('en-ZA') + '</div></div>' +
        '<span class="badge ' + badgeClass + '">' + badgeText + '</span></div>' +
        (itemsPreview ? '<div style="background:var(--bg);border-radius:var(--rs);padding:8px 10px;margin-bottom:8px">' +
        itemsPreview + '</div>' : '') +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div style="font-size:1rem;font-weight:800;color:var(--primary)">R' +
        (po.total || 0).toFixed(2) + '</div>' +
        actionBtn + '</div></div>';
}

function procureMarkReceived(poId) {
    if (!confirm('Mark this order as received?')) return;
    var purchases = mGetPurchases();
    var updated = purchases.map(function(po) {
        if (po.id === poId) {
            return Object.assign({}, po, {
                status:       'Received',
                receivedDate: new Date().toISOString(),
                receivedBy:   HUB.user ? HUB.user.name : 'ProcureAI'
            });
        }
        return po;
    });

    var update = {};
    update['purchases.' + HUB.entityId] = updated;
    update.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();

    db.collection('accounts').doc(HUB.accountId)
        .set(update, { merge: true })
        .then(function() {
            if (HUB.accountData) HUB.accountData.purchases[HUB.entityId] = updated;
            procureNavigate('orders');
            hubToast('success', '✅ Order received — sent to GRV queue');
        });
}

            'display:flex;align-items:center;justify-content:center;' +

    if (suppliers.length === 0) {

            '<h3>No Suppliers</h3><p>Add suppliers in the web app first</p></div>';

    html += '<div id="proc-sup-list">';
    suppliers.forEach(function(sup) {
        var deliveryDays = '';
        if (sup.deliveryDays && sup.deliveryDays.length > 0) {
            var dayShort = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            var daysOfWeek = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            deliveryDays = sup.deliveryDays.map(function(d) {
                return dayShort[daysOfWeek.indexOf(d)] || d;
            }).join(', ');
        }

        html += '<div data-sname="' + sup.name.toLowerCase() + '" ' +
            'style="background:var(--bg-card);border-radius:var(--r);padding:16px;' +
            'margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--primary)">' +
            '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">' +
            '<div style="width:44px;height:44px;border-radius:12px;' +
            'background:linear-gradient(135deg,var(--primary),var(--primary-dark));' +
            'display:flex;align-items:center;justify-content:center;color:#fff;' +
            'font-size:1.1rem;font-weight:700;flex-shrink:0">' + sup.name.charAt(0).toUpperCase() + '</div>' +
            '<div style="flex:1"><div style="font-size:.92rem;font-weight:700;color:var(--text)">' +
            sup.name + '</div>' +
            '<div style="font-size:.7rem;color:var(--text-light)">' + (sup.type || 'General') + '</div>' +
            (deliveryDays ? '<div style="font-size:.65rem;color:var(--info);font-weight:600;margin-top:2px">' +
            '<i class="fas fa-truck" style="font-size:.6rem"></i> ' + deliveryDays + '</div>' : '') +
            (sup.paymentTerms ? '<div style="font-size:.65rem;color:var(--gold-dark);font-weight:600;margin-top:1px">' +
            '<i class="fas fa-calendar-check" style="font-size:.6rem"></i> ' + sup.paymentTerms + '</div>' : '') +
            '</div></div>' +

            // Contact buttons
            '<div style="display:flex;gap:8px">' +
            (sup.phone ? '<a href="tel:' + sup.phone + '" class="btn btn-sm btn-outline" style="flex:1;justify-content:center;text-decoration:none">' +
            '<i class="fas fa-phone"></i> Call</a>' : '') +
            (sup.email ? '<a href="mailto:' + sup.email + '" class="btn btn-sm btn-outline" style="flex:1;justify-content:center;text-decoration:none">' +
            '<i class="fas fa-envelope"></i> Email</a>' : '') +
            (sup.phone ? '<a href="https://wa.me/' + sup.phone.replace(/[^0-9]/g, '') + '" target="_blank" ' +
            'class="btn btn-sm btn-outline" style="flex:1;justify-content:center;text-decoration:none;color:#25D366;border-color:#25D366">' +
            '<i class="fab fa-whatsapp"></i> WhatsApp</a>' : '') +
            '</div></div>';
    });
    html += '</div>';

    return html;
}

function procureFilterSuppliers() {
    var q = (document.getElementById('proc-sup-search').value || '').toLowerCase();
    document.querySelectorAll('#proc-sup-list [data-sname]').forEach(function(el) {
        el.style.display = (el.dataset.sname || '').includes(q) ? '' : 'none';
    });
}

console.log('✅ StockAI-Pro 2.0 Hub — ProcureAI loaded');
</script>

<script>
// ============================================================
// EMBEDDED APP: MENU MASTER
// ============================================================
function getMenuMasterHTML() {
    return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)">' +

        // Header
        '<header class="hub-header" style="background:linear-gradient(90deg,#6b21a8,#8b5cf6)">' +
        '<button class="return-hub-btn" onclick="closeEmbeddedApp()">' +
        '<i class="fas fa-arrow-left"></i> Hub</button>' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;color:#fff">' +
        '<i class="fas fa-utensils"></i>' +
        '<div><div style="font-size:.88rem;font-weight:700">Menu Master</div>' +
        '<div style="font-size:.62rem;color:rgba(255,255,255,.7)">' +
        (HUB.entityName || 'Entity') + '</div></div></div>' +
        '<button class="hub-hbtn" onclick="menuMasterRefresh()" style="background:rgba(255,255,255,.15)">' +
        '<i class="fas fa-sync-alt"></i></button>' +
        '</header>' +

        // Content
        '<div id="menu-master-content" style="flex:1;overflow-y:auto;padding:16px;' +
        'padding-bottom:80px;-webkit-overflow-scrolling:touch"></div>' +

        // Bottom Nav
        '<nav style="height:var(--nav-h);background:var(--bg-card);border-top:1px solid var(--border);' +
        'display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding:0 8px 8px;' +
        'box-shadow:0 -2px 12px rgba(0,0,0,.05);z-index:50">' +
        menuNavItem('mm-dashboard', 'fa-chart-pie', 'Dashboard', true) +
        menuNavItem('mm-items', 'fa-utensils', 'Menu Items', false) +
        menuNavItem('mm-create', 'fa-plus-circle', 'Create', false) +
        menuNavItem('mm-stock', 'fa-box', 'Stock', false) +
        '</nav></div>';
}

function menuNavItem(page, icon, label, active) {
    return '<div data-mmpage="' + page + '" onclick="menuMasterNavigate(\'' + page + '\')" ' +
        'style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;' +
        'border-radius:var(--rs);cursor:pointer;min-width:56px;' +
        'color:' + (active ? '#8b5cf6' : 'var(--text-light)') + ';' +
        'background:' + (active ? 'rgba(139,92,246,.08)' : 'transparent') + '">' +
        '<i class="fas ' + icon + '" style="font-size:1.1rem"></i>' +
        '<span style="font-size:.6rem;font-weight:600">' + label + '</span></div>';
}

function initMenuMasterApp() {
    menuMasterNavigate('mm-dashboard');
}

function menuMasterNavigate(page) {
    document.querySelectorAll('[data-mmpage]').forEach(function(item) {
        var isActive = item.dataset.mmpage === page;
        item.style.color = isActive ? '#8b5cf6' : 'var(--text-light)';
        item.style.background = isActive ? 'rgba(139,92,246,.08)' : 'transparent';
    });

    var content = document.getElementById('menu-master-content');
    if (!content) return;
    content.scrollTop = 0;

    if      (page === 'mm-dashboard') content.innerHTML = mmPageDashboard();
    else if (page === 'mm-items')     content.innerHTML = mmPageItems();
    else if (page === 'mm-create')    content.innerHTML = mmPageCreate();
    else if (page === 'mm-stock')     content.innerHTML = mmPageStock();
}

function menuMasterRefresh() {
    if (!HUB.accountId || HUB.accountId === 'master') return;
    hubToast('info', '🔄 Refreshing...');
    db.collection('accounts').doc(HUB.accountId).get()
        .then(function(doc) {
            if (doc.exists) {
                HUB.accountData = doc.data();
                menuMasterNavigate('mm-dashboard');
                hubToast('success', '✅ Refreshed');
            }
        });
}

function mmGetMenuItems() {
    if (!HUB.accountData || !HUB.entityId) return [];
    return (HUB.accountData.menuItems || {})[HUB.entityId] || [];
}

// ============================================================
// MENU MASTER — DASHBOARD
// ============================================================
function mmPageDashboard() {
    var ent      = HUB.entity || {};
    var inv      = mGetInventory();
    var menu     = mmGetMenuItems();
    var stockVal = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);

    // Live food cost
    var openingStock = ent.openingStockValue || stockVal;
    var totalPurch   = mGetPurchases().reduce(function(s, p) { return s + (p.total || 0); }, 0);
    var closingStock = stockVal;
    var cashups      = (HUB.accountData || {}).cashups || {};
    var entCashups   = cashups[HUB.entityId] || {};
    var totalSales   = 0;
    Object.values(entCashups).forEach(function(cu) { totalSales += (cu.total || 0); });
    var salesExVat   = totalSales / (1 + VAT_RATE);
    var purchExVat   = totalPurch / (1 + VAT_RATE);
    var liveFoodCost = salesExVat > 0
        ? ((openingStock + purchExVat - closingStock) / salesExVat * 100)
        : 0;
    var targetFC     = ent.foodCostTarget || 28;
    var fcColor      = liveFoodCost > targetFC ? 'var(--danger)' : 'var(--success)';

    var html = '';

    // Food Cost Comparison Card
    html += '<div style="background:var(--bg-card);border-radius:var(--r);padding:20px;' +
        'box-shadow:var(--shadow);margin-bottom:16px;border-left:4px solid #8b5cf6">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
        '<div style="width:44px;height:44px;border-radius:12px;' +
        'background:linear-gradient(135deg,#8b5cf6,#6b21a8);display:flex;align-items:center;' +
        'justify-content:center;color:#fff;font-size:1.2rem"><i class="fas fa-chart-line"></i></div>' +
        '<div><div style="font-size:1rem;font-weight:800;color:var(--text)">Food Cost Analysis</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + (HUB.entityName || '') + '</div></div></div>' +

        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
        '<div style="text-align:center;padding:16px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:4px">Live Food Cost</div>' +
        '<div style="font-size:2rem;font-weight:900;color:' + fcColor + '">' + liveFoodCost.toFixed(1) + '%</div>' +
        '<div style="font-size:.68rem;color:var(--text-muted);margin-top:4px">Calculated live</div></div>' +

        '<div style="text-align:center;padding:16px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:4px">Target Food Cost</div>' +
        '<div style="font-size:2rem;font-weight:900;color:var(--primary)">' + targetFC + '%</div>' +
        '<div style="font-size:.68rem;color:var(--text-muted);margin-top:4px">Set at entity creation</div></div>' +
        '</div>' +

        // Variance bar
        '<div style="margin-top:14px;padding:12px;background:' +
        (liveFoodCost > targetFC ? 'rgba(201,69,69,.08)' : 'rgba(46,168,113,.08)') + ';' +
        'border-radius:var(--rs);text-align:center;font-size:.85rem;font-weight:600;' +
        'color:' + fcColor + '">' +
        (liveFoodCost > targetFC
            ? '⚠️ ' + (liveFoodCost - targetFC).toFixed(1) + '% ABOVE target'
            : '✅ ' + (targetFC - liveFoodCost).toFixed(1) + '% BELOW target') +
        '</div></div>';

    // Stats
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">' +
        mobileStatCard('Menu Items', menu.length, '#8b5cf6') +
        mobileStatCard('Stock Items', inv.length, 'var(--primary)') +
        mobileStatCard('Stock Value', 'R' + mFmt(stockVal), 'var(--gold)') +
        '</div>';

    // Top menu items by cost
    if (menu.length > 0) {
        var sorted = menu.slice().sort(function(a, b) {
            return (b.actualFC || 0) - (a.actualFC || 0);
        });
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);' +
            'text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">📊 Menu Cost Analysis</div>';
        sorted.slice(0, 8).forEach(function(m) {
            var fc = m.actualFC || 0;
            var fcBadge = fc > targetFC ? 'badge-red' : fc > targetFC - 5 ? 'badge-orange' : 'badge-green';
            html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;' +
                'background:var(--bg-card);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="flex:1;min-width:0">' +
                '<div style="font-size:.85rem;font-weight:600;color:var(--text)">' + m.name + '</div>' +
                '<div style="font-size:.68rem;color:var(--text-light)">Cost: R' +
                (m.costPerPortion || m.totalCost || 0).toFixed(2) +
                ' • Price: R' + (m.setPrice || 0).toFixed(2) + '</div></div>' +
                '<span class="badge ' + fcBadge + '">' + fc.toFixed(1) + '%</span></div>';
        });
    }

    return html;
}

// ============================================================
// MENU MASTER — VIEW ITEMS
// ============================================================
function mmPageItems() {
    var menu = mmGetMenuItems();

    var html = '<div class="search-bar"><i class="fas fa-search"></i>' +
        '<input type="text" id="mm-search" placeholder="Search menu items..." ' +
        'oninput="mmFilterItems()"></div>';

    if (menu.length === 0) {
        return html + '<div class="empty-state"><i class="fas fa-utensils"></i>' +
            '<h3>No Menu Items</h3><p>Tap "Create" to add your first dish</p></div>';
    }

    html += '<div id="mm-items-list">';
    menu.forEach(function(m, idx) {
        var fc = m.actualFC || 0;
        var targetFC = (HUB.entity || {}).foodCostTarget || 28;
        var fcBadge  = fc > targetFC ? 'badge-red' : 'badge-green';

        html += '<div data-mmname="' + m.name.toLowerCase() + '" ' +
            'style="background:var(--bg-card);border-radius:var(--r);padding:14px;' +
            'margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid #8b5cf6">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
            '<div><div style="font-size:.92rem;font-weight:700;color:var(--text)">' + m.name + '</div>' +
            '<div style="font-size:.7rem;color:var(--text-light)">' +
            (m.ingredients ? m.ingredients.length : 0) + ' ingredients • Yield: ' +
            (m.yield || 1) + '</div></div>' +
            '<span class="badge ' + fcBadge + '">FC: ' + fc.toFixed(1) + '%</span></div>' +

            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)">' +
            '<div style="font-size:.6rem;color:var(--text-light)">Cost</div>' +
            '<div style="font-size:.88rem;font-weight:700;color:var(--text)">R' +
            (m.costPerPortion || m.totalCost || 0).toFixed(2) + '</div></div>' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)">' +
            '<div style="font-size:.6rem;color:var(--text-light)">Price</div>' +
            '<div style="font-size:.88rem;font-weight:700;color:var(--primary)">R' +
            (m.setPrice || 0).toFixed(2) + '</div></div>' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)">' +
            '<div style="font-size:.6rem;color:var(--text-light)">GP%</div>' +
            '<div style="font-size:.88rem;font-weight:700;color:var(--success)">' +
            (m.setPrice ? (100 - fc).toFixed(1) : '0') + '%</div></div></div>' +

            '<div style="display:flex;gap:8px;margin-top:10px">' +
            '<button class="btn btn-sm btn-outline" onclick="mmEditItem(' + idx + ')" style="flex:1">' +
            '<i class="fas fa-edit"></i> Edit</button>' +
            '<button class="btn btn-sm btn-danger" onclick="mmDeleteItem(' + idx + ')" style="flex:1">' +
            '<i class="fas fa-trash"></i> Delete</button></div></div>';
    });
    html += '</div>';

    return html;
}

function mmFilterItems() {
    var q = (document.getElementById('mm-search').value || '').toLowerCase();
    document.querySelectorAll('#mm-items-list [data-mmname]').forEach(function(el) {
        el.style.display = (el.dataset.mmname || '').includes(q) ? '' : 'none';
    });
}

function mmDeleteItem(idx) {
    if (!confirm('Delete this menu item?')) return;
    var menu = mmGetMenuItems();
    menu.splice(idx, 1);
    mmSaveMenuItems(menu);
    menuMasterNavigate('mm-items');
    hubToast('success', 'Menu item deleted');
}

// ============================================================
// MENU MASTER — CREATE ITEM
// ============================================================
function mmPageCreate() {
    var inv = mGetInventory();
    var ent = HUB.entity || {};

    var invOptions = inv.length === 0
        ? '<option value="">No stock items — add in web app</option>'
        : '<option value="">Select ingredient</option>' +
          inv.map(function(i) {
              return '<option value="' + i.id + '" data-name="' + i.name + '" ' +
                  'data-cost="' + (i.cost || 0) + '" data-unit="' + (i.unit || 'each') + '">' +
                  i.name + ' (R' + (i.cost || 0).toFixed(2) + '/' + (i.unit || 'each') + ')</option>';
          }).join('');

    var html = '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;' +
        'box-shadow:var(--shadow);margin-bottom:14px;border-left:4px solid #8b5cf6">' +
        '<div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:14px">' +
        '<i class="fas fa-plus-circle" style="color:#8b5cf6"></i> Create Menu Item</div>' +

        '<div class="form-group"><label>Menu Item Name *</label>' +
        '<input type="text" class="form-input" id="mm-name" placeholder="e.g. Grilled Chicken Burger"></div>' +

        '<div class="form-row">' +
        '<div class="form-group"><label>Yield (Portions)</label>' +
        '<input type="number" class="form-input" id="mm-yield" value="1" min="1" ' +
        'oninput="mmCalcCost()"></div>' +
        '<div class="form-group"><label>Selling Price (R) *</label>' +
        '<input type="number" class="form-input" id="mm-price" placeholder="0.00" step="0.01" ' +
        'oninput="mmCalcCost()"></div></div>' +

        '<div style="font-size:.88rem;font-weight:700;color:var(--text);margin:16px 0 8px">' +
        '<i class="fas fa-list"></i> Ingredients</div>' +
        '<div id="mm-ingredients"></div>' +
        '<button class="btn btn-outline btn-sm" onclick="mmAddIngredient()" style="margin-top:8px;width:100%">' +
        '<i class="fas fa-plus"></i> Add Ingredient</button>' +

        // Cost summary
        '<div style="background:var(--bg);border-radius:var(--rs);padding:14px;margin-top:16px">' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)">' +
        '<span>Total Recipe Cost:</span><strong id="mm-total-cost">R 0.00</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)">' +
        '<span>÷ Yield:</span><strong id="mm-yield-disp">1</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;' +
        'border-top:1px solid var(--border);margin-top:4px;padding-top:10px;color:var(--primary)">' +
        '<span><strong>Cost per Portion:</strong></span><strong id="mm-per-portion" style="font-size:1rem">R 0.00</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)">' +
        '<span>Target FC %:</span><strong>' + (ent.foodCostTarget || 28) + '%</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;' +
        'color:var(--primary);font-weight:700">' +
        '<span>Suggested Price:</span><strong id="mm-suggested">R 0.00</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:1rem;' +
        'border-top:2px solid var(--primary);margin-top:4px;padding-top:10px;font-weight:800">' +
        '<span style="color:var(--text)">Actual FC %:</span>' +
        '<strong id="mm-actual-fc" style="color:var(--primary)">—</strong></div></div>' +

        '<button class="btn btn-primary btn-block" onclick="mmSaveItem()" style="margin-top:14px;' +
        'background:linear-gradient(135deg,#8b5cf6,#6b21a8)">' +
        '<i class="fas fa-save"></i> Save Menu Item</button></div>';

    return html;
}

function mmAddIngredient() {
    var inv = mGetInventory();
    var invOptions = inv.length === 0
        ? '<option value="">No stock items</option>'
        : '<option value="">Select</option>' +
          inv.map(function(i) {
              return '<option value="' + i.id + '" data-cost="' + (i.cost || 0) + '" ' +
                  'data-unit="' + (i.unit || 'each') + '" data-name="' + i.name + '">' +
                  i.name + '</option>';
          }).join('');

    var row = document.createElement('div');
    row.className = 'mm-ing-row';
    row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center';
    row.innerHTML = '<select class="form-input mm-ing-item" onchange="mmCalcCost()" style="padding:8px;font-size:.82rem">' +
        invOptions + '</select>' +
        '<input type="number" class="form-input mm-ing-qty" placeholder="Qty" step="0.001" ' +
        'oninput="mmCalcCost()" style="padding:8px;font-size:.82rem">' +
        '<button onclick="this.parentElement.remove();mmCalcCost()" ' +
        'style="width:30px;height:30px;border-radius:50%;background:rgba(201,69,69,.1);border:none;' +
        'color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center">' +
        '<i class="fas fa-times"></i></button>';

    var container = document.getElementById('mm-ingredients');
    if (container) container.appendChild(row);
}

function mmCalcCost() {
    var totalCost = 0;
    document.querySelectorAll('.mm-ing-row').forEach(function(row) {
        var sel = row.querySelector('.mm-ing-item');
        var qty = parseFloat(row.querySelector('.mm-ing-qty').value) || 0;
        if (sel && sel.selectedIndex > 0) {
            var cost = parseFloat(sel.options[sel.selectedIndex].dataset.cost) || 0;
            totalCost += qty * cost;
        }
    });

    var yieldVal = parseFloat(document.getElementById('mm-yield').value) || 1;
    var costPerPortion = totalCost / yieldVal;
    var setPrice = parseFloat(document.getElementById('mm-price').value) || 0;
    var targetFC = (HUB.entity || {}).foodCostTarget || 28;
    var suggested = costPerPortion / (targetFC / 100);
    var actualFC = setPrice > 0 ? (costPerPortion / setPrice * 100) : 0;

    var el;
    el = document.getElementById('mm-total-cost');  if (el) el.textContent = 'R ' + totalCost.toFixed(2);
    el = document.getElementById('mm-yield-disp');   if (el) el.textContent = yieldVal;
    el = document.getElementById('mm-per-portion');  if (el) el.textContent = 'R ' + costPerPortion.toFixed(2);
    el = document.getElementById('mm-suggested');    if (el) el.textContent = 'R ' + suggested.toFixed(2);
    el = document.getElementById('mm-actual-fc');    if (el) {
        el.textContent = setPrice > 0 ? actualFC.toFixed(1) + '%' : '—';
        el.style.color = actualFC > targetFC ? 'var(--danger)' : 'var(--success)';
    }
}

function mmSaveItem() {
    var name = (document.getElementById('mm-name').value || '').trim();
    if (!name) { hubToast('error', 'Enter menu item name'); return; }
    var yieldVal = parseFloat(document.getElementById('mm-yield').value) || 1;
    var setPrice = parseFloat(document.getElementById('mm-price').value) || 0;
    if (setPrice <= 0) { hubToast('error', 'Enter a selling price'); return; }

    var ingredients = [];
    var totalCost = 0;
    document.querySelectorAll('.mm-ing-row').forEach(function(row) {
        var sel = row.querySelector('.mm-ing-item');
        var qty = parseFloat(row.querySelector('.mm-ing-qty').value) || 0;
        if (sel && sel.selectedIndex > 0 && qty > 0) {
            var opt  = sel.options[sel.selectedIndex];
            var cost = parseFloat(opt.dataset.cost) || 0;
            var lineCost = qty * cost;
            totalCost += lineCost;
            ingredients.push({
                itemId: sel.value,
                item:   opt.dataset.name || sel.value,
                qty:    qty,
                unit:   opt.dataset.unit || 'each',
                cost:   cost,
                total:  parseFloat(lineCost.toFixed(2))
            });
        }
    });

    if (ingredients.length === 0) { hubToast('error', 'Add at least one ingredient'); return; }

    var costPerPortion = totalCost / yieldVal;
    var targetFC = (HUB.entity || {}).foodCostTarget || 28;
    var suggestedPrice = costPerPortion / (targetFC / 100);
    var actualFC = setPrice > 0 ? (costPerPortion / setPrice * 100) : 0;

    var menuItem = {
        id:              'MI-' + Date.now(),
        name:            name,
        ingredients:     ingredients,
        yield:           yieldVal,
        totalCost:       parseFloat(totalCost.toFixed(2)),
        costPerPortion:  parseFloat(costPerPortion.toFixed(2)),
        suggestedPrice:  parseFloat(suggestedPrice.toFixed(2)),
        setPrice:        setPrice,
        actualFC:        parseFloat(actualFC.toFixed(2)),
        sold:            0,
        createdBy:       HUB.user ? HUB.user.name : 'Menu Master',
        createdAt:       new Date().toISOString()
    };

    var menu = mmGetMenuItems();
    menu.push(menuItem);
    mmSaveMenuItems(menu);

    hubToast('success', '✅ ' + name + ' added to menu!');
    menuMasterNavigate('mm-items');
}

function mmEditItem(idx) {
    // For now, show item details — full edit in future update
    var menu = mmGetMenuItems();
    var m    = menu[idx];
    if (!m) return;

    var ingList = (m.ingredients || []).map(function(i) {
        return '<div style="display:flex;justify-content:space-between;padding:6px 0;' +
            'border-bottom:1px solid var(--border);font-size:.82rem">' +
            '<span>' + i.item + '</span>' +
            '<span>' + i.qty + ' ' + i.unit + ' • R' + (i.total || 0).toFixed(2) + '</span></div>';
    }).join('');

    showHubModal(m.name,
        '<div style="margin-bottom:14px">' + ingList + '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
        '<div style="text-align:center;padding:12px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light)">Cost/Portion</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">R' +
        (m.costPerPortion || 0).toFixed(2) + '</div></div>' +
        '<div style="text-align:center;padding:12px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light)">Selling Price</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--primary)">R' +
        (m.setPrice || 0).toFixed(2) + '</div></div>' +
        '<div style="text-align:center;padding:12px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light)">Food Cost %</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:' +
        ((m.actualFC || 0) > ((HUB.entity || {}).foodCostTarget || 28) ? 'var(--danger)' : 'var(--success)') + '">' +
        (m.actualFC || 0).toFixed(1) + '%</div></div>' +
        '<div style="text-align:center;padding:12px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.65rem;color:var(--text-light)">GP %</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--success)">' +
        (100 - (m.actualFC || 0)).toFixed(1) + '%</div></div></div>',
        '<button class="btn btn-outline" onclick="closeHubModal()">Close</button>'
    );
}

// ============================================================
// MENU MASTER — STOCK VIEW
// ============================================================
function mmPageStock() {
    var inv = mGetInventory();

    var html = '<div class="search-bar"><i class="fas fa-search"></i>' +
        '<input type="text" id="mm-stock-search" placeholder="Search stock..." ' +
        'oninput="mmFilterStock()"></div>';

    html += '<div id="mm-stock-list">';
    inv.forEach(function(item) {
        var badgeClass = item.status === 'in-stock' ? 'badge-green' :
            item.status === 'low-stock' ? 'badge-orange' : 'badge-red';

        html += '<div data-stkname="' + item.name.toLowerCase() + '" ' +
            'style="display:flex;align-items:center;gap:10px;padding:10px 14px;' +
            'background:var(--bg-card);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
            '<div style="width:36px;height:36px;border-radius:10px;background:rgba(139,92,246,.1);' +
            'display:flex;align-items:center;justify-content:center;color:#8b5cf6;flex-shrink:0">' +
            '<i class="fas fa-box"></i></div>' +
            '<div style="flex:1;min-width:0">' +
            '<div style="font-size:.85rem;font-weight:600;color:var(--text)">' + item.name + '</div>' +
            '<div style="font-size:.68rem;color:var(--text-light)">' +
            item.category + ' • ' + (item.quantity || 0) + ' ' + item.unit +
            ' • R' + (item.cost || 0).toFixed(2) + '/' + item.unit + '</div></div>' +
            '<span class="badge ' + badgeClass + '">' + mStatusText(item.status) + '</span></div>';
    });
    html += '</div>';

    if (inv.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-box"></i>' +
            '<h3>No Stock Items</h3><p>Add items in the web app</p></div>';
    }

    return html;
}

function mmFilterStock() {
    var q = (document.getElementById('mm-stock-search').value || '').toLowerCase();
    document.querySelectorAll('#mm-stock-list [data-stkname]').forEach(function(el) {
        el.style.display = (el.dataset.stkname || '').includes(q) ? '' : 'none';
    });
}

// ============================================================
// MENU MASTER — SAVE HELPER
// ============================================================
function mmSaveMenuItems(menuArray) {
    if (!HUB.accountId || !HUB.entityId) return;

    var update = {};
    update['menuItems.' + HUB.entityId] = menuArray;
    update.lastUpdated      = firebase.firestore.FieldValue.serverTimestamp();
    update.lastUpdatedBy    = HUB.user ? HUB.user.name : 'Menu Master';
    update.lastUpdatedDevice = 'Menu Master';

    db.collection('accounts').doc(HUB.accountId)
        .set(update, { merge: true })
        .then(function() {
            if (HUB.accountData) {
                if (!HUB.accountData.menuItems) HUB.accountData.menuItems = {};
                HUB.accountData.menuItems[HUB.entityId] = menuArray;
            }
        })
        .catch(function(err) {
            hubToast('error', 'Save error: ' + err.message);
        });
}

console.log('✅ StockAI-Pro 2.0 Hub — Menu Master loaded');
