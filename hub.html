<style>
:root{--primary:#1a8ba8;--primary-dark:#0d4a5c;--primary-light:#4dbdd5;--bg:#f0f7f9;--bg-card:#fff;--text:#0d4a5c;--text-mid:#2a5f70;--text-light:#5a8a96;--text-muted:#8aabb5;--gold:#f59e0b;--gold-dark:#d97706;--success:#2ea871;--danger:#c94545;--warning:#d4a017;--info:#2b8eb3;--border:#c4dde4;--shadow:0 2px 12px rgba(13,74,92,.08);--shadow-lg:0 8px 30px rgba(13,74,92,.15);--r:14px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#0a1a1f;--bg-card:#0f2a33;--text:#e0f0f4;--text-mid:#a0c8d4;--text-light:#6a9aaa;--text-muted:#4a7a8a;--border:#1a3a44;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 30px rgba(0,0,0,.4)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:14px;user-select:none;-webkit-user-select:none}
.hidden{display:none!important}

/* ═══════════════════════════════════ */
/* WELCOME SCREEN                      */
/* ═══════════════════════════════════ */
#welcome-screen{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#071a22 0%,#0d4a5c 30%,#1a8ba8 60%,#0d4a5c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}

/* Floating particles */
.w-particle{position:absolute;border-radius:50%;opacity:0;pointer-events:none}
.wp1{width:6px;height:6px;background:#f59e0b;top:10%;left:15%;animation:wpFloat 7s ease-in-out infinite 0s}
.wp2{width:4px;height:4px;background:#4dbdd5;top:20%;right:20%;animation:wpFloat 8s ease-in-out infinite 1s}
.wp3{width:8px;height:8px;background:#f59e0b;bottom:30%;left:10%;animation:wpFloat 6s ease-in-out infinite 2s}
.wp4{width:5px;height:5px;background:#4dbdd5;top:40%;right:15%;animation:wpFloat 9s ease-in-out infinite .5s}
.wp5{width:3px;height:3px;background:#fff;bottom:20%;right:25%;animation:wpFloat 7s ease-in-out infinite 1.5s}
.wp6{width:7px;height:7px;background:#f59e0b;top:60%;left:25%;animation:wpFloat 8s ease-in-out infinite 3s}
@keyframes wpFloat{0%{opacity:0;transform:translateY(60px)}20%{opacity:.7}80%{opacity:.4}100%{opacity:0;transform:translateY(-100px)}}

/* Logo animation */
.w-logo{width:100px;height:100px;background:#fff;border-radius:24px;display:flex;align-items:center;justify-content:center;color:#0d4a5c;font-size:2.8rem;margin-bottom:30px;box-shadow:0 15px 50px rgba(0,0,0,.3);opacity:0;transform:scale(0) rotate(-180deg);animation:wLogoIn 1s cubic-bezier(.175,.885,.32,1.275) .5s forwards;position:relative;z-index:10}
@keyframes wLogoIn{0%{opacity:0;transform:scale(0) rotate(-180deg)}60%{transform:scale(1.15) rotate(10deg)}80%{transform:scale(.95) rotate(-5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

/* Ring pulses around logo */
.w-ring{position:absolute;border-radius:50%;border:2px solid rgba(77,189,213,.3);pointer-events:none}
.w-ring1{width:130px;height:130px;top:50%;left:50%;margin-top:-65px;margin-left:-65px;animation:wRing 2.5s ease-out infinite .5s}
.w-ring2{width:170px;height:170px;top:50%;left:50%;margin-top:-85px;margin-left:-85px;animation:wRing 2.5s ease-out infinite 1s;border-color:rgba(245,158,11,.2)}
.w-ring3{width:210px;height:210px;top:50%;left:50%;margin-top:-105px;margin-left:-105px;animation:wRing 2.5s ease-out infinite 1.5s;border-color:rgba(255,255,255,.1)}
@keyframes wRing{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.3);opacity:0}}

/* Welcome text */
.w-welcome-text{color:rgba(255,255,255,.9);font-size:1.5rem;font-weight:600;margin-bottom:6px;opacity:0;animation:wFadeUp .6s ease 1.2s forwards}
.w-brand-text{font-size:2.6rem;font-weight:900;color:#f59e0b;letter-spacing:3px;text-shadow:0 4px 20px rgba(245,158,11,.4);margin-bottom:8px;opacity:0;animation:wBrandIn .8s cubic-bezier(.175,.885,.32,1.275) 1.6s forwards}
@keyframes wBrandIn{0%{opacity:0;transform:scale(0) translateY(30px)}60%{transform:scale(1.1) translateY(-5px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.w-tagline{color:rgba(255,255,255,.6);font-size:.88rem;font-style:italic;margin-bottom:28px;opacity:0;animation:wFadeUp .6s ease 2.2s forwards}
@keyframes wFadeUp{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}

/* Feature badges */
.w-features{display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap;justify-content:center}
.w-feature{padding:7px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:rgba(255,255,255,.8);font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:6px;opacity:0;backdrop-filter:blur(4px)}
.w-feature i{color:#f59e0b}
.wf1{animation:wFadeUp .5s ease 2.5s forwards}
.wf2{animation:wFadeUp .5s ease 2.7s forwards}
.wf3{animation:wFadeUp .5s ease 2.9s forwards}

/* ENTER button */
#welcome-enter{display:inline-flex;align-items:center;gap:14px;padding:18px 48px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.4);border-radius:50px;color:#fff;font-size:1rem;font-weight:800;letter-spacing:6px;cursor:pointer;font-family:inherit;opacity:0;animation:wFadeUp .6s ease 3.3s forwards;transition:all .3s;position:relative;z-index:100}
#welcome-enter:hover{background:rgba(255,255,255,.2);border-color:#f59e0b;transform:scale(1.05)}
#welcome-enter:active{transform:scale(.97)}
#welcome-enter .enter-arrow{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:wArrow 2s ease-in-out infinite 3.5s}
@keyframes wArrow{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

.w-version{color:rgba(255,255,255,.25);font-size:.65rem;letter-spacing:2px;margin-top:24px;opacity:0;animation:wFadeUp .5s ease 3.6s forwards}

/* ═══════════════════════════════════ */
/* LOGIN                               */
/* ═══════════════════════════════════ */
.hub-login{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:9999}
.hub-login-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
.hub-login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;margin:0 auto 16px;box-shadow:0 6px 20px rgba(26,139,168,.3)}
.hub-login-card h2{font-size:1.4rem;font-weight:900;color:var(--text);margin-bottom:3px}
.hub-login-card .sub{font-size:.82rem;color:var(--text-light);margin-bottom:28px}
.hub-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;color:var(--text);margin-bottom:12px;background:var(--bg);transition:.2s}
.hub-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,139,168,.12)}
.hub-btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s}
.hub-btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.hub-btn-primary:active{transform:scale(.97)}
.hub-btn-primary:disabled{opacity:.6;transform:none}
.hub-forgot{color:var(--primary);font-size:.82rem;text-decoration:none;font-weight:500;display:block;margin-top:14px;cursor:pointer}
.hub-install-section{margin-top:18px;padding-top:18px;border-top:1px solid #e4f1f5}
.hub-install-section button{width:100%;padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}

/* ═══════════════════════════════════ */
/* HUB APP                             */
/* ═══════════════════════════════════ */
.hub-app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.hub-header{height:56px;background:linear-gradient(90deg,var(--primary-dark),var(--primary));display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:100}
.hub-header-logo{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem}
.hub-header-info{flex:1;color:#fff}
.hub-header-info .hub-user-name{font-size:.92rem;font-weight:700}
.hub-header-info .hub-entity-name{font-size:.65rem;color:rgba(255,255,255,.7);font-weight:400}
.hub-header-time{font-size:.72rem;color:rgba(255,255,255,.7);text-align:right}
.hub-header-time strong{display:block;font-size:.82rem;color:#fff}
.hub-header-btn{width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:var(--rs);color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px}
.hub-dashboard{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center}
.hub-welcome-card{width:100%;max-width:600px;background:var(--bg-card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;align-items:center;gap:16px;border-left:4px solid var(--gold)}
.hub-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;font-weight:800;flex-shrink:0}
.hub-section-title{width:100%;max-width:600px;font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:8px 0;padding-left:4px}
.hub-apps-grid{width:100%;max-width:600px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.hub-app-card{background:var(--bg-card);border-radius:var(--r);padding:24px 12px;box-shadow:var(--shadow);text-align:center;cursor:pointer;transition:.3s;border:2px solid transparent;position:relative}
.hub-app-card:active{transform:scale(.95);border-color:var(--primary)}
.hub-app-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.hub-app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin:0 auto 10px}
.hub-app-name{font-size:.82rem;font-weight:700;color:var(--text)}
.hub-app-desc{font-size:.65rem;color:var(--text-muted);margin-top:3px;line-height:1.3}
.hub-app-card.disabled{opacity:.35;pointer-events:none}
.hub-app-card.disabled::after{content:'🔒';position:absolute;top:8px;right:8px;font-size:.7rem}

/* REMEMBER ME */
.hub-remember-overlay{position:fixed;inset:0;background:rgba(13,74,92,.8);backdrop-filter:blur(8px);z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px}

/* TOAST */
.hub-toast-wrap{position:fixed;top:66px;right:16px;z-index:500;display:flex;flex-direction:column;gap:8px}
.hub-toast{padding:12px 16px;border-radius:var(--rs);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:.85rem;font-weight:500;animation:hubSlideIn .3s ease}
@keyframes hubSlideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.hub-toast.success{background:#d1fae5;color:#065f46;border-left:3px solid var(--success)}
.hub-toast.error{background:#fee2e2;color:#991b1b;border-left:3px solid var(--danger)}
.hub-toast.info{background:#d4f0f7;color:#0d4a5c;border-left:3px solid var(--info)}

/* INSTALL */
.hub-install-overlay{position:fixed;inset:0;background:rgba(13,74,92,.9);backdrop-filter:blur(10px);z-index:99998;display:flex;align-items:center;justify-content:center;padding:20px}

@media(min-width:768px){.hub-apps-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:380px){
.hub-apps-grid{grid-template-columns:repeat(2,1fr);gap:10px}
.hub-app-card{padding:18px 8px}
.hub-app-icon{width:48px;height:48px;font-size:1.2rem}
.w-brand-text{font-size:1.8rem}
.w-welcome-text{font-size:1.2rem}
}
</style>
</head>

<script>

// FIREBASE INIT
// ============================================================
var firebaseConfig={apiKey:"AIzaSyBRwGda3Q-ibT8CgAo0tJXNJ4EOzy4gEs0",authDomain:"stockai-pro-b232e.firebaseapp.com",projectId:"stockai-pro-b232e",storageBucket:"stockai-pro-b232e.firebasestorage.app",messagingSenderId:"424200946359",appId:"1:424200946359:web:4c638eccd4e422ccc94332"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();
var db=firebase.firestore();

// Remember me check
var hubRemember=localStorage.getItem('stockai_remember_hub');
auth.setPersistence(hubRemember==='yes'?firebase.auth.Auth.Persistence.LOCAL:firebase.auth.Auth.Persistence.NONE);

// ============================================================
// STATE
// ============================================================
var HUB={
    user:null,accountId:null,entityId:null,entityName:null,
    entity:null,accountData:null,allowedApps:[],clockInTime:null
};

// All available apps
var ALL_APPS=[
    {id:'mobile',   name:'MobileAI',  icon:'fa-mobile-alt',     color:'#1a8ba8',url:'mobile.html',      desc:'Stock control on mobile'},
    {id:'procure',  name:'ProcureAI', icon:'fa-shopping-basket', color:'#f59e0b',url:'procurement.html', desc:'Smart supplier ordering'},
    {id:'pos',      name:'POS',       icon:'fa-cash-register',   color:'#2ea871',url:'pos.html',         desc:'Point of sale system'},
    {id:'kitchen',  name:'Kitchen',   icon:'fa-fire-alt',        color:'#d97706',url:'kitchen.html',     desc:'Kitchen order display'},

    'General Manager':['mobile','procure','pos','kitchen','config','boh','portal','menu'],
    'Area Manager':['mobile','procure','boh','portal'],
    'Operations Manager':['mobile','procure','boh','portal'],
    'Manager':['mobile','procure','pos','kitchen','boh'],
    'Stock Controller':['mobile','procure'],
    'Kitchen Manager':['mobile','procure','kitchen','menu'],
    'Bar Manager':['mobile','pos','kitchen'],
    'Chef':['procure','kitchen','menu'],
    'Waiter':['pos'],
    'Cashier':['pos'],
    'Floor Supervisor':['mobile','pos'],
    'Bar Supervisor':['pos','kitchen']
};

// ============================================================
// WELCOME SCREEN — ENTER BUTTON
// ============================================================
document.addEventListener('DOMContentLoaded',function(){

    // ENTER button click
    var enterBtn=document.getElementById('welcome-enter');
    if(enterBtn){
        enterBtn.onclick=function(){
            var screen=document.getElementById('welcome-screen');
            screen.style.transition='opacity 0.8s ease';
            screen.style.opacity='0';
            screen.style.pointerEvents='none';

            setTimeout(function(){
                screen.style.display='none';
                checkAuthState();
            },800);
        };
    }

    // Login form submit
    var loginForm=document.getElementById('hub-login-form');
    if(loginForm){
        loginForm.onsubmit=function(e){
            e.preventDefault();
            hubLogin();
        };
    }

    // Forgot password
    var forgotLink=document.getElementById('hub-forgot-link');
    if(forgotLink){
        forgotLink.onclick=function(){hubForgotPw();};
    }

    // Install button
    var installBtn=document.getElementById('hub-install-btn');
    if(installBtn){
        installBtn.onclick=function(){showHubInstallGuide();};
    }

    // Logout button
    var logoutBtn=document.getElementById('hub-logout-btn');
    if(logoutBtn){
        logoutBtn.onclick=function(){hubLogout();};
    }
});

// ============================================================
// AUTH CHECK
// ============================================================
function checkAuthState(){
    var hubRemember=localStorage.getItem('stockai_remember_hub');

    if(hubRemember==='yes'){
        auth.onAuthStateChanged(function(firebaseUser){
            if(firebaseUser){
                hubToast('info','🔄 Loading...');
                findHubAccount(firebaseUser.email,function(found){
                    if(found){
                        document.getElementById('hub-login').classList.add('hidden');
                        enterHub();
                    }else{
                        auth.signOut();
                        document.getElementById('hub-login').classList.remove('hidden');
                    }
                });
            }else{
                document.getElementById('hub-login').classList.remove('hidden');
            }
        });
    }else{
        auth.signOut().then(function(){
            document.getElementById('hub-login').classList.remove('hidden');
        }).catch(function(){
            document.getElementById('hub-login').classList.remove('hidden');
        });
    }
}

// ============================================================
// LOGIN
// ============================================================
function hubLogin(){
    var email=(document.getElementById('hub-email').value||'').trim().toLowerCase();
    var pw=(document.getElementById('hub-password').value||'').trim();
    if(!email){hubToast('error','Enter your email');return;}
    if(!pw){hubToast('error','Enter your password');return;}

    var btn=document.getElementById('hub-login-btn');
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';

    auth.signInWithEmailAndPassword(email,pw)
        .then(function(){
            hubToast('info','🔄 Loading your apps...');
            findHubAccount(email,function(found){
                btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Sign In';
                if(found){
                    document.getElementById('hub-login').classList.add('hidden');
                    enterHub();
                    if(!localStorage.getItem('stockai_remember_hub')){
                        showRememberMePopup();
                    }
                }else{
                    hubToast('error','Account not found. Contact your manager.');
                    auth.signOut();
                }
            });
        })
        .catch(function(err){
            btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Sign In';
            if(err.code==='auth/invalid-credential'||err.code==='auth/wrong-password'||err.code==='auth/user-not-found'){
                hubToast('error','Incorrect email or password');
            }else if(err.code==='auth/too-many-requests'){
                hubToast('error','Too many attempts. Try later.');
            }else{hubToast('error',err.message);}
        });
}

// ============================================================
// FIND ACCOUNT
// ============================================================
function findHubAccount(email,cb){
    db.collection('accounts').get().then(function(snap){
        var found=false;
        snap.forEach(function(doc){
            if(found)return;
            var data=doc.data();
            if(data.owner&&data.owner.email&&data.owner.email.toLowerCase()===email){
                HUB.accountId=doc.id;HUB.accountData=data;
                HUB.user={name:data.owner.name||email,email:email,role:'Owner'};
                var ents=data.entities||[];
                if(ents.length>0){HUB.entity=ents[0];HUB.entityId=ents[0].id;HUB.entityName=ents[0].name;}
                HUB.allowedApps=data.owner.appAccess||ROLE_DEFAULTS['Owner'].slice();
                found=true;return;
            }
            var users=data.users||{};
            Object.keys(users).forEach(function(eid){
                if(found)return;
                (users[eid]||[]).forEach(function(u){
                    if(found)return;
                    if(u.email&&u.email.toLowerCase()===email){
                        HUB.accountId=doc.id;HUB.accountData=data;HUB.entityId=eid;
                        HUB.user={name:u.name||email,email:email,role:u.role||'Staff'};
                        var ents=data.entities||[];
                        HUB.entity=ents.find(function(e){return e.id===eid;})||ents[0]||null;
                        HUB.entityName=HUB.entity?HUB.entity.name:'';
                        HUB.allowedApps=u.appAccess||ROLE_DEFAULTS[u.role||'Staff']||['mobile'];
                        found=true;
                    }
                });
            });
        });
        if(cb)cb(found);
    }).catch(function(){if(cb)cb(false);});
}

// ============================================================
// ENTER HUB
// ============================================================
function enterHub(){
    document.getElementById('hub-app').classList.remove('hidden');
    document.getElementById('hub-user-name').textContent=HUB.user?HUB.user.name:'User';
    document.getElementById('hub-entity-name').textContent=
        (HUB.user?HUB.user.role:'')+' • '+(HUB.entityName||'');
    HUB.clockInTime=new Date();
    startHubTimer();
    renderHubDashboard();
    hubToast('success','Welcome '+(HUB.user?HUB.user.name:'')+'! 👋');
}

        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">Apps</div>'+
        '<div style="font-size:1.3rem;font-weight:800;color:var(--text)">'+HUB.allowedApps.length+'</div></div>'+
        '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);text-align:center;border-left:3px solid var(--gold)">'+
        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">Entity</div>'+
        '<div style="font-size:.78rem;font-weight:700;color:var(--text)">'+(HUB.entityName||'N/A')+'</div></div>'+
        '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);text-align:center;border-left:3px solid var(--success)">'+
        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">Role</div>'+
        '<div style="font-size:.78rem;font-weight:700;color:var(--text)">'+(HUB.user?HUB.user.role:'')+'</div></div></div>';

    dash.innerHTML=html;
}

// ============================================================
// OPEN APP — Direct redirect
// ============================================================
function openHubApp(appId){
    var app=ALL_APPS.find(function(a){return a.id===appId;});
    if(!app)return;
    sessionStorage.setItem('hub_return','true');
    window.location.href=app.url;
}

// ============================================================
// LOGOUT
// ============================================================
function hubLogout(){
    localStorage.removeItem('stockai_remember_hub');
    auth.signOut().then(function(){
        HUB.user=null;HUB.accountId=null;HUB.allowedApps=[];HUB.clockInTime=null;
        document.getElementById('hub-app').classList.add('hidden');
        document.getElementById('hub-login').classList.remove('hidden');
        document.getElementById('hub-email').value='';
        document.getElementById('hub-password').value='';
        hubToast('info','Logged out');
    });
}

// ============================================================
// FORGOT PASSWORD
// ============================================================
function hubForgotPw(){
    var email=prompt('Enter your email address:');
    if(!email)return;
    auth.sendPasswordResetEmail(email.trim().toLowerCase())
        .then(function(){hubToast('success','📧 Reset link sent');})
        .catch(function(err){hubToast('error',err.message);});
}

console.log('✅ Hub — Auth & Core loaded');
</script>
<script>
// ============================================================
// TIMER
// ============================================================
function startHubTimer(){
    setInterval(function(){
        if(!HUB.clockInTime)return;
        var diff=Date.now()-HUB.clockInTime.getTime();
        var h=Math.floor(diff/3600000);
        var m=Math.floor((diff%3600000)/60000);
        var s=Math.floor((diff%60000)/1000);
        var timeStr=('0'+h).slice(-2)+':'+('0'+m).slice(-2)+':'+('0'+s).slice(-2);

        var headerTime=document.getElementById('hub-header-time');
        if(headerTime){
            var now=new Date();
            headerTime.innerHTML='<strong>'+timeStr+'</strong>'+
                '<span>'+now.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})+'</span>';
        }
        var shiftDisplay=document.getElementById('hub-shift-display');
        if(shiftDisplay)shiftDisplay.textContent=('0'+h).slice(-2)+':'+('0'+m).slice(-2);
    },1000);
}

// ============================================================
// COLOR HELPER
// ============================================================
function adjustColor(hex,amount){
    hex=hex.replace('#','');
    var r=Math.max(0,Math.min(255,parseInt(hex.substring(0,2),16)+amount));
    var g=Math.max(0,Math.min(255,parseInt(hex.substring(2,4),16)+amount));
    var b=Math.max(0,Math.min(255,parseInt(hex.substring(4,6),16)+amount));
    return'#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2);
}

// ============================================================
// REMEMBER ME POPUP
// ============================================================
function showRememberMePopup(){

        '<h3 style="font-size:1.1rem;font-weight:800;margin-bottom:4px">Remember Me?</h3>'+
        '<p style="font-size:.82rem;opacity:.85">Stay logged in on this device?</p></div>'+
        '<div style="padding:24px">'+
        '<div style="background:#f0f7f9;border-radius:10px;padding:16px;margin-bottom:16px">'+
        '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">'+
        '<i class="fas fa-check-circle" style="color:#2ea871;margin-top:3px"></i>'+
        '<div style="font-size:.85rem;color:#0d4a5c;line-height:1.5"><strong>Yes, remember me</strong><br>'+
        '<span style="color:#5a8a96;font-size:.78rem">Best for your personal device.</span></div></div>'+
        '<div style="display:flex;align-items:flex-start;gap:10px">'+
        '<i class="fas fa-lock" style="color:#1a8ba8;margin-top:3px"></i>'+
        '<div style="font-size:.85rem;color:#0d4a5c;line-height:1.5"><strong>No, always ask</strong><br>'+
        '<span style="color:#5a8a96;font-size:.78rem">Best for shared devices.</span></div></div></div>'+
        '<div style="display:flex;flex-direction:column;gap:10px">'+
        '<button onclick="setHubRemember(true)" style="width:100%;padding:14px;background:linear-gradient(135deg,#2ea871,#1a7a4a);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-check"></i> Yes, Remember Me</button>'+
        '<button onclick="setHubRemember(false)" style="width:100%;padding:14px;background:#f0f7f9;color:#5a8a96;border:none;border-radius:10px;font-size:.92rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-lock"></i> No, Always Ask</button>'+
        '</div></div></div>';

    document.body.appendChild(overlay);
}

function setHubRemember(remember){
    localStorage.setItem('stockai_remember_hub',remember?'yes':'no');
    var popup=document.getElementById('hub-remember-overlay');
    if(popup)popup.remove();
    if(remember){
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        hubToast('success','✅ You will stay logged in');
    }else{
        hubToast('info','🔒 You will need to log in each time');
    }
}

// ============================================================
// TOAST
// ============================================================
function hubToast(type,msg){
    var icons={success:'check-circle',error:'times-circle',info:'info-circle'};
    var t=document.createElement('div');
    t.className='hub-toast '+type;
    t.innerHTML='<i class="fas fa-'+(icons[type]||'info-circle')+'"></i><span>'+msg+'</span>';
    document.getElementById('hub-toast-wrap').appendChild(t);
    setTimeout(function(){if(t.parentElement)t.remove();},4000);
}

function copyHubLink(){
    var link=window.location.href;
    if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(link).then(function(){hubToast('success','✅ Link copied!');}).catch(function(){fallbackCopyHub(link);});
    }else{fallbackCopyHub(link);}
}
function fallbackCopyHub(text){
    var input=document.createElement('input');input.value=text;
    document.body.appendChild(input);input.select();input.setSelectionRange(0,99999);
    document.execCommand('copy');document.body.removeChild(input);
    hubToast('success','✅ Link copied!');
}
