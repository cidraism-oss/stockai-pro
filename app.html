<style>
/* ============================================================
   STOCKAI-PRO 2.0 — WEB APP STYLESHEET
   ============================================================ */
:root {
    --teal-dark:#0d4a5c;--teal-mid:#1a8ba8;--teal-light:#4dbdd5;--teal-pale:#d4f0f7;
    --bg:#f5f9fa;--bg-card:#fff;--bg-hover:#e8f4f7;
    --text:#0d4a5c;--text-mid:#2a5f70;--text-light:#5a8a96;--text-muted:#8aabb5;
    --accent:#1a8ba8;--accent-dark:#0d4a5c;
    --success:#2ea871;--warning:#d4a017;--danger:#c94545;--info:#2b8eb3;
    --gold:#f59e0b;--gold-dark:#d97706;
    --border:#c4dde4;--border-light:#e0eff3;
    --shadow:0 4px 20px rgba(13,74,92,.08);--shadow-lg:0 8px 40px rgba(13,74,92,.15);
    --sidebar-w:240px;--header-h:60px;--r:14px;--rs:8px;
    --vat:0.15;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; min-height:100vh; font-size:14px; }
.hidden { display:none !important; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:var(--teal-light); border-radius:3px; }

/* ── APP LAYOUT ── */
.app-container { display:flex; min-height:100vh; background:var(--bg); }

/* ── SIDEBAR ── */
.sidebar {
    width:var(--sidebar-w); background:#fff; border-right:1px solid var(--border);
    height:100vh; position:fixed; left:0; top:0; display:flex; flex-direction:column;
    z-index:100; overflow-y:auto; box-shadow:2px 0 12px rgba(13,74,92,.04);
}
.sidebar-brand {
    padding:18px 16px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border);
}
.sidebar-logo {
    width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:1.1rem; flex-shrink:0;
}
.brand-text { font-size:1.1rem; font-weight:900; color:var(--text); letter-spacing:1px; }
.sidebar-user { padding:14px 16px; border-bottom:1px solid var(--border); }
.sidebar-user-name { font-size:.95rem; font-weight:700; color:var(--text); }
.sidebar-user-role { font-size:.72rem; color:var(--text-light); }
.sidebar-entity {
    padding:10px 16px; border-bottom:1px solid var(--border);
    font-size:.75rem; color:var(--accent); font-weight:600;
    display:flex; align-items:center; gap:6px; cursor:pointer;
}
.sidebar-entity:hover { background:var(--bg-hover); }
.sidebar-nav { flex:1; padding:12px 10px; display:flex; flex-direction:column; gap:3px; overflow-y:auto; }
.nav-link {
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-radius:var(--rs); color:var(--text-mid); font-size:.85rem;
    font-weight:500; cursor:pointer; transition:.2s; text-decoration:none;
    border:1px solid transparent;
}
.nav-link i { width:18px; text-align:center; color:var(--accent); font-size:.88rem; }
.nav-link:hover { background:var(--bg-hover); color:var(--text); }
.nav-link.active {
    background:rgba(26,139,168,.1); color:var(--text); font-weight:600;
    border-color:rgba(26,139,168,.2);
}
.sidebar-bottom {
    padding:12px; border-top:1px solid var(--border);
    display:flex; flex-direction:column; gap:6px;
}
.sidebar-ai-btn {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:var(--rs); border:none; cursor:pointer; font-size:.85rem;
    font-weight:600; font-family:inherit;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff;
}
.sidebar-ai-btn:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(26,139,168,.3); }
.sidebar-logout {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:var(--rs); border:none; cursor:pointer; font-size:.85rem;
    font-weight:600; font-family:inherit; background:transparent; color:var(--text-mid);
}
.sidebar-logout:hover { background:rgba(201,69,69,.08); color:var(--danger); }

/* Hub return button for sidebar */
.sidebar-hub-btn {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:var(--rs); border:none; cursor:pointer; font-size:.85rem;
    font-weight:600; font-family:inherit;
    background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#fff;
    text-decoration:none; margin-bottom:6px;
}
.sidebar-hub-btn:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(245,158,11,.3); }

/* ── MAIN CONTENT ── */
.main {
    flex:1; margin-left:var(--sidebar-w); min-height:100vh;
    display:flex; flex-direction:column;
}

/* ── TOP HEADER ── */
.top-header {
    height:var(--header-h); background:#fff; border-bottom:1px solid var(--border);
    padding:0 24px; display:flex; align-items:center; gap:16px;
    position:sticky; top:0; z-index:50; box-shadow:0 2px 8px rgba(13,74,92,.04);
}
.mobile-toggle {
    display:none; background:none; border:none; font-size:1.3rem;
    color:var(--text); cursor:pointer;
}
.entity-badge {
    display:flex; align-items:center; gap:8px; padding:6px 14px;
    background:rgba(26,139,168,.08); border:1px solid var(--border);
    border-radius:var(--r); cursor:pointer; margin-right:8px;
}
.entity-badge:hover { background:rgba(26,139,168,.15); border-color:var(--accent); }
.entity-badge i { color:var(--accent); font-size:.82rem; }
.entity-badge span { font-size:.8rem; font-weight:600; color:var(--text); }
.header-search {
    flex:1; max-width:380px; display:flex; align-items:center; gap:10px;
    background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:8px 16px;
}
.header-search i { color:var(--text-muted); }
.header-search input {
    background:none; border:none; flex:1; outline:none;
    color:var(--text); font-size:.88rem; font-family:inherit;
}
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.header-icon-btn {
    width:38px; height:38px; border-radius:var(--r); background:#fff;
    border:1px solid var(--border); color:var(--text-mid); cursor:pointer;
    display:flex; align-items:center; justify-content:center; position:relative;
    transition:.2s;
}
.header-icon-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.notif-badge {
    position:absolute; top:-3px; right:-3px; background:var(--danger); color:#fff;
    font-size:.55rem; font-weight:700; width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
}
.header-datetime {
    padding-left:16px; border-left:1px solid var(--border);
    color:var(--text); font-size:.82rem; font-weight:600;
}

/* ── PAGES ── */
.page {
    display:none; padding:28px 32px; position:relative;
    min-height:calc(100vh - var(--header-h));
}
.page.active { display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.page-watermark {
    position:fixed; top:50%; left:60%; transform:translate(-50%,-50%);
    font-size:9rem; font-weight:900; color:var(--accent); opacity:.03;
    pointer-events:none; z-index:0; letter-spacing:6px;
}
.page-heading {
    font-size:1.8rem; font-weight:700; color:var(--text);
    margin-bottom:24px; position:relative; z-index:1;
}

/* ── STAT CARDS ── */
.stats-row {
    display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
    margin-bottom:18px; position:relative; z-index:1;
}
.stat-card {
    background:#fff; border-radius:var(--r); padding:18px 22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); position:relative; transition:.3s;
    border-left:4px solid var(--accent);
}
.stat-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
.stat-card-title {
    font-size:.78rem; color:var(--text-mid); font-weight:600;
    margin-bottom:8px;
}
.stat-card-value {
    font-size:1.5rem; font-weight:800; color:var(--text); line-height:1;
}
.stat-card.gold { border-left-color:var(--gold); }
.stat-card.green { border-left-color:var(--success); }
.stat-card.red { border-left-color:var(--danger); }

/* ── CHARTS ── */
.charts-row {
    display:grid; grid-template-columns:2fr 1fr; gap:18px;
    margin:22px 0; position:relative; z-index:1;
}
.chart-block {
    background:#fff; border-radius:var(--r); padding:22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
}
.block-title {
    font-size:1rem; font-weight:700; color:var(--text); margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
}
.chart-area { height:260px; position:relative; }

/* ── BOTTOM ROW ── */
.bottom-row {
    display:grid; grid-template-columns:repeat(3,1fr); gap:18px;
    position:relative; z-index:1; margin-bottom:18px;
}
.info-block {
    background:#fff; border-radius:var(--r); padding:22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
}
.activity-list,.insights-list,.alerts-list {
    display:flex; flex-direction:column; gap:10px; max-height:320px; overflow-y:auto;
}
.activity-item {
    display:flex; gap:10px; padding:10px; background:var(--bg);
    border-radius:var(--rs); align-items:flex-start;
}
.activity-icon {
    width:32px; height:32px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-size:.75rem; flex-shrink:0;
}
.activity-icon.add { background:rgba(46,168,113,.15); color:var(--success); }
.activity-icon.update { background:rgba(43,142,179,.15); color:var(--info); }
.activity-icon.order { background:rgba(26,139,168,.15); color:var(--accent); }
.activity-text { flex:1; }
.activity-text p { font-size:.8rem; color:var(--text-mid); margin-bottom:2px; }
.activity-time { font-size:.68rem; color:var(--text-muted); }
.insight-item {
    padding:12px; background:var(--bg); border-radius:var(--rs);
    border-left:3px solid var(--accent);
}
.insight-item h4 { font-size:.82rem; font-weight:600; margin-bottom:4px; color:var(--text); }
.insight-item p { font-size:.75rem; color:var(--text-mid); line-height:1.5; }
.alert-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px; background:var(--bg); border-radius:var(--rs);
    border-left:3px solid var(--warning);
}
.alert-name { font-weight:600; font-size:.82rem; color:var(--text); display:block; }
.alert-detail { font-size:.7rem; color:var(--text-mid); }
.alert-btn {
    padding:5px 12px; background:var(--accent); color:#fff; border:none;
    border-radius:14px; font-size:.72rem; font-weight:600; cursor:pointer; font-family:inherit;
}

/* ── ACTION BAR ── */
.action-bar {
    display:flex; gap:12px; align-items:center; margin-bottom:18px;
    flex-wrap:wrap; position:relative; z-index:1;
}
.search-mini {
    display:flex; align-items:center; gap:8px; background:#fff;
    border:1px solid var(--border); border-radius:var(--rs); padding:8px 14px;
}
.search-mini i { color:var(--text-muted); }
.search-mini input {
    background:none; border:none; outline:none; width:200px;
    font-size:.85rem; font-family:inherit; color:var(--text);
}
.select-mini {
    padding:8px 14px; background:#fff; border:1px solid var(--border);
    border-radius:var(--rs); color:var(--text); font-size:.82rem;
    cursor:pointer; font-family:inherit;
}
.btn-primary {
    padding:9px 18px; background:var(--accent); color:#fff; border:none;
    border-radius:var(--rs); font-size:.85rem; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; font-family:inherit; transition:.2s;
}
.btn-primary:hover { background:var(--accent-dark); transform:translateY(-2px); }
.btn-outline {
    padding:9px 18px; background:transparent; color:var(--text-mid);
    border:1px solid var(--border); border-radius:var(--rs); font-size:.85rem;
    font-weight:600; cursor:pointer; display:inline-flex; align-items:center;
    gap:8px; font-family:inherit; transition:.2s;
}
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.btn-success {
    padding:9px 18px; background:var(--success); color:#fff; border:none;
    border-radius:var(--rs); font-size:.85rem; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; font-family:inherit;
}
.btn-danger {
    padding:9px 18px; background:var(--danger); color:#fff; border:none;
    border-radius:var(--rs); font-size:.85rem; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; font-family:inherit;
}

/* ── TABLE ── */
.table-wrap {
    background:#fff; border-radius:var(--r); overflow-x:auto;
    box-shadow:0 2px 8px rgba(13,74,92,.06); position:relative; z-index:1;
}
.data-table { width:100%; border-collapse:collapse; }
.data-table th {
    padding:11px 16px; text-align:left; font-size:.72rem; font-weight:700;
    color:var(--text-mid); background:var(--bg); border-bottom:2px solid var(--border);
    text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
}
.data-table td {
    padding:10px 16px; font-size:.82rem; color:var(--text);
    border-bottom:1px solid var(--border-light); white-space:nowrap;
}
.data-table tbody tr:hover { background:var(--bg-hover); }
.status-badge {
    display:inline-block; padding:3px 10px; border-radius:12px;
    font-size:.68rem; font-weight:600;
}
.status-badge.in-stock { background:rgba(46,168,113,.12); color:var(--success); }
.status-badge.low-stock { background:rgba(212,160,23,.12); color:var(--warning); }
.status-badge.out-of-stock { background:rgba(201,69,69,.12); color:var(--danger); }
.row-actions { display:flex; gap:4px; }
.row-btn {
    width:28px; height:28px; border-radius:6px; border:1px solid var(--border);
    background:#fff; color:var(--text-mid); cursor:pointer; font-size:.72rem; transition:.2s;
    display:flex; align-items:center; justify-content:center;
}
.row-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.row-btn.del:hover { background:var(--danger); border-color:var(--danger); }

/* ── FORMS ── */
.form-card {
    background:#fff; border-radius:var(--r); padding:24px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
    margin-bottom:18px; max-width:900px; position:relative; z-index:1;
}
.form-row {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px; margin-bottom:14px;
}
.form-field { display:flex; flex-direction:column; gap:5px; }
.form-field.full { grid-column:1/-1; }
.form-field label { font-size:.78rem; color:var(--text-mid); font-weight:600; }
.form-field input, .form-field select, .form-field textarea {
    padding:10px 12px; border:1px solid var(--border); border-radius:var(--rs);
    color:var(--text); font-size:.88rem; font-family:inherit; transition:.2s;
    background:#fff;
}
.form-field input:focus, .form-field select:focus {
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(26,139,168,.1);
}
.form-actions {
    display:flex; justify-content:flex-end; gap:10px; margin-top:18px;
    padding-top:18px; border-top:1px solid var(--border-light);
}

/* ── CASHUP ── */
.cashup-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.cashup-card {
    background:#fff; border-radius:var(--r); padding:22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
}
.cashup-input-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; border-bottom:1px solid var(--border-light);
}
.cashup-input-row label {
    font-size:.88rem; color:var(--text-mid); font-weight:600;
    display:flex; align-items:center; gap:8px;
}
.cashup-input-row label i { width:22px; text-align:center; color:var(--accent); }
.cashup-input-row input {
    width:140px; padding:8px 12px; border:1px solid var(--border);
    border-radius:var(--rs); text-align:right; font-family:inherit;
    font-size:.92rem; font-weight:600; color:var(--text);
}
.cashup-total {
    display:flex; justify-content:space-between; padding:16px 0;
    border-top:2px solid var(--accent); margin-top:8px;
    font-size:1.1rem; font-weight:800; color:var(--accent);
}
.summary-row {
    display:flex; justify-content:space-between; padding:10px 0;
    border-bottom:1px solid var(--border-light); font-size:.88rem; color:var(--text-mid);
}
.summary-row strong { color:var(--text); font-weight:700; }
.summary-row.total {
    border-bottom:none; margin-top:8px; padding-top:14px;
    border-top:2px solid var(--accent); font-size:1rem;
}
.summary-row.total strong { color:var(--accent); font-size:1.2rem; }
.negative { color:var(--danger) !important; }

/* ── MENU BUILDER ── */
.menu-builder {
    background:#fff; border-radius:var(--r); padding:22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
}
.ingredient-row {
    display:grid; grid-template-columns:2.5fr 1fr auto; gap:8px;
    padding:8px; background:var(--bg); border-radius:var(--rs);
    margin-bottom:6px; align-items:center;
}
.ingredient-row select, .ingredient-row input {
    padding:8px; border:1px solid var(--border); border-radius:var(--rs);
    font-family:inherit; font-size:.82rem;
}
.cost-summary {
    padding:14px; background:var(--bg); border-radius:var(--rs); margin-top:14px;
}
.cost-row {
    display:flex; justify-content:space-between; padding:6px 0;
    font-size:.88rem; color:var(--text-mid);
}
.cost-row strong { color:var(--text); }
.cost-row.highlight {
    border-top:2px solid var(--accent); margin-top:8px;
    padding-top:12px; font-size:1rem; font-weight:700; color:var(--accent);
}

/* ── GRV ── */
.grv-section {
    background:#fff; border-radius:var(--r); padding:20px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); margin-bottom:18px;
    border-left:4px solid var(--gold);
}
.grv-badge {
    display:inline-flex; align-items:center; gap:6px; padding:4px 12px;
    border-radius:14px; font-size:.7rem; font-weight:700; letter-spacing:.5px;
    text-transform:uppercase; background:rgba(245,158,11,.1); color:var(--gold-dark);
    margin-bottom:10px;
}

/* ── TRANSFERS ── */
.transfer-section {
    background:#fff; border-radius:var(--r); padding:20px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); margin-bottom:18px;
}
.transfer-section::before {
    content:''; position:absolute; left:0; top:16px; bottom:16px;
    width:4px; border-radius:0 4px 4px 0;
}
.section-tag-badge {
    display:inline-flex; align-items:center; gap:6px; padding:4px 12px;
    border-radius:14px; font-size:.7rem; font-weight:700;
    letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px;
}
.section-tag-badge.pending-tag { background:rgba(212,160,23,.1); color:var(--warning); }
.section-tag-badge.received-tag { background:rgba(46,168,113,.1); color:var(--success); }
.section-tag-badge.transit-tag { background:rgba(43,142,179,.1); color:var(--info); }

/* ── DAY END ── */
.dayend-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.dayend-card {
    background:#fff; border-radius:var(--r); padding:22px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
}
.action-btn-big {
    width:100%; display:flex; align-items:center; gap:14px; padding:14px;
    margin-bottom:10px; background:var(--bg); border:1px solid var(--border);
    border-radius:var(--rs); cursor:pointer; text-align:left; transition:.2s;
    font-family:inherit;
}
.action-btn-big:hover { background:#fff; border-color:var(--accent); transform:translateX(4px); }
.action-btn-big i {
    width:40px; height:40px; background:var(--accent); color:#fff;
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:1rem; flex-shrink:0;
}
.action-btn-big strong { display:block; color:var(--text); font-size:.92rem; }
.action-btn-big small { color:var(--text-light); font-size:.75rem; }

/* ── USERS & SUPPLIERS ── */
.users-grid, .suppliers-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px; position:relative; z-index:1;
}
.user-card, .supplier-card {
    background:#fff; border-radius:var(--r); padding:20px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); border-left:4px solid var(--accent);
    transition:.3s;
}
.user-card:hover, .supplier-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
.user-head, .supplier-head {
    display:flex; align-items:center; gap:12px; margin-bottom:14px;
}
.user-avatar, .supplier-avatar {
    width:46px; height:46px; border-radius:50%; background:var(--accent);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; font-weight:700;
}
.user-name, .supplier-name { font-weight:700; color:var(--text); font-size:.92rem; }
.user-role, .supplier-type { font-size:.72rem; color:var(--text-light); }
.card-actions { display:flex; gap:8px; }
.card-actions button { flex:1; padding:8px; font-size:.78rem; }

/* ── REPORTS ── */
.reports-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px; position:relative; z-index:1;
}
.report-tile {
    background:#fff; border-radius:var(--r); padding:24px;
    box-shadow:0 2px 8px rgba(13,74,92,.06); cursor:pointer;
    border-left:4px solid var(--accent); transition:.3s;
}
.report-tile:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
.report-tile i {
    width:46px; height:46px; background:rgba(26,139,168,.1); color:var(--accent);
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; margin-bottom:12px;
}
.report-tile h3 { font-size:.92rem; color:var(--text); margin-bottom:4px; }
.report-tile p { font-size:.75rem; color:var(--text-light); }

/* ── MONTH END ── */
.month-end-option {
    display:flex; align-items:center; gap:14px; padding:18px;
    background:var(--bg); border-radius:var(--r); cursor:pointer;
    border:2px solid var(--border); margin-bottom:12px; transition:.3s;
}
.month-end-option:hover { border-color:var(--accent); background:var(--bg-hover); }
.month-end-option.completed { border-color:var(--success); background:rgba(46,168,113,.05); opacity:.7; pointer-events:none; }
.month-end-option i {
    width:52px; height:52px; border-radius:14px; display:flex;
    align-items:center; justify-content:center; font-size:1.3rem; color:#fff; flex-shrink:0;
}
.flash-submit {
    animation:flashBtn 1s ease-in-out infinite;
}
@keyframes flashBtn {
    0%,100% { box-shadow:0 0 0 0 rgba(46,168,113,.5); }
    50% { box-shadow:0 0 20px 6px rgba(46,168,113,.3); }
}

/* ── AI PANEL ── */
.ai-panel {
    position:fixed; right:-400px; top:0; bottom:0; width:380px;
    background:#fff; border-left:1px solid var(--border); z-index:200;
    display:flex; flex-direction:column; transition:right .3s ease;
    box-shadow:var(--shadow-lg);
}
.ai-panel.open { right:0; }
.ai-head {
    padding:16px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff;
}
.ai-messages {
    flex:1; overflow-y:auto; padding:16px;
    display:flex; flex-direction:column; gap:12px; background:var(--bg);
}
.ai-msg { max-width:90%; }
.ai-msg.bot { align-self:flex-start; }
.ai-msg.user { align-self:flex-end; }
.bubble {
    padding:12px 16px; border-radius:var(--r); font-size:.85rem; line-height:1.5;
}
.ai-msg.bot .bubble {
    background:#fff; color:var(--text); border-bottom-left-radius:4px;
    box-shadow:0 2px 8px rgba(13,74,92,.06);
}
.ai-msg.user .bubble {
    background:var(--accent); color:#fff; border-bottom-right-radius:4px;
}
.ai-input-bar {
    padding:14px 16px; border-top:1px solid var(--border);
    display:flex; gap:8px; align-items:center; background:#fff;
}
#ai-input {
    flex:1; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
    border-radius:22px; outline:none; font-size:.85rem; font-family:inherit; color:var(--text);
}
.ai-send {
    width:38px; height:38px; border-radius:50%; border:none; cursor:pointer;
    background:var(--accent); color:#fff; display:flex; align-items:center;
    justify-content:center;
}

/* ── VOICE ── */
.voice-overlay {
    position:fixed; inset:0; background:rgba(13,74,92,.85); z-index:10000;
    display:flex; align-items:center; justify-content:center;
}
.voice-modal { text-align:center; color:#fff; max-width:500px; padding:20px; }
.v-anim { position:relative; width:140px; height:140px; margin:0 auto 24px; }
.v-ring {
    position:absolute; inset:0; border:2px solid var(--teal-pale);
    border-radius:50%; animation:vring 2s ease-out infinite;
}
.v-ring:nth-child(2) { animation-delay:.5s; }
.v-ring:nth-child(3) { animation-delay:1s; }
@keyframes vring { 0% { transform:scale(.5); opacity:1; } 100% { transform:scale(1.5); opacity:0; } }
.v-icon {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:76px; height:76px; background:linear-gradient(135deg,var(--teal-light),var(--accent));
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem;
}

/* ── NOTIFICATION PANEL ── */
.notif-panel {
    position:fixed; top:var(--header-h); right:24px; width:360px;
    max-height:500px; background:#fff; border:1px solid var(--border);
    border-radius:var(--r); box-shadow:var(--shadow-lg); z-index:300; overflow:hidden;
}
.notif-head {
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
}
.notif-item {
    padding:12px 18px; border-bottom:1px solid var(--border-light);
    display:flex; gap:10px; cursor:pointer; transition:.2s;
}
.notif-item:hover { background:var(--bg-hover); }
.notif-item.unread { border-left:3px solid var(--accent); }

/* ── MODAL ── */
.modal {
    position:fixed; inset:0; z-index:1000;
    display:flex; align-items:center; justify-content:center;
}
.modal-bg { position:absolute; inset:0; background:rgba(13,74,92,.5); }
.modal-window {
    position:relative; background:#fff; border-radius:var(--r);
    width:700px; max-width:95vw; max-height:90vh; overflow-y:auto;
    box-shadow:var(--shadow-lg); animation:modIn .3s ease;
}
@keyframes modIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.modal-top {
    padding:18px 20px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
}
.modal-top h2 { font-size:1.05rem; color:var(--text); }
.modal-top button {
    background:none; border:none; color:var(--text-mid); cursor:pointer;
    font-size:1rem; padding:8px;
}
.modal-mid { padding:20px; }
.modal-bot {
    padding:14px 20px; border-top:1px solid var(--border);
    display:flex; justify-content:flex-end; gap:10px;
}

/* ── TOAST ── */
.toast-wrap {
    position:fixed; bottom:100px; right:24px; z-index:10000;
    display:flex; flex-direction:column; gap:8px;
}
.toast {
    background:#fff; padding:12px 18px; border-radius:var(--rs);
    box-shadow:var(--shadow-lg); display:flex; align-items:center;
    gap:10px; min-width:280px; animation:tIn .3s ease;
    border-left:4px solid var(--accent);
}
@keyframes tIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
.toast.success { border-left-color:var(--success); }
.toast.error { border-left-color:var(--danger); }
.toast.warning { border-left-color:var(--warning); }
.toast i { font-size:1rem; }
.toast.success i { color:var(--success); }
.toast.error i { color:var(--danger); }
.toast.warning i { color:var(--warning); }
.toast span { flex:1; font-size:.85rem; color:var(--text); }
.toast button { background:none; border:none; color:var(--text-muted); cursor:pointer; }

/* ── TAB NAVIGATION (for inventory add item) ── */
.tab-nav-app { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
.tab-btn-app {
    padding:10px 20px; border:none; background:transparent; color:var(--text-light);
    font-size:.85rem; font-weight:600; cursor:pointer; font-family:inherit;
    border-bottom:2px solid transparent; margin-bottom:-2px; transition:.2s;
}
.tab-btn-app.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-panel { display:none; }
.tab-panel.active { display:block; animation:fadeIn .3s ease; }

/* ── TOGGLE SWITCH ── */
.toggle-switch { display:flex; align-items:center; gap:10px; }
.toggle-track {
    position:relative; width:46px; height:26px; cursor:pointer;
}
.toggle-track input { opacity:0; width:0; height:0; }
.toggle-slider-app {
    position:absolute; inset:0; background:var(--border); border-radius:26px;
    transition:.3s; cursor:pointer;
}
.toggle-slider-app::before {
    content:''; position:absolute; width:20px; height:20px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.3s; box-shadow:0 2px 4px rgba(0,0,0,.2);
}
.toggle-track input:checked + .toggle-slider-app { background:var(--accent); }
.toggle-track input:checked + .toggle-slider-app::before { transform:translateX(20px); }

/* ── WHATSAPP ── */
.wa-support {
    position:fixed; bottom:24px; right:24px; width:60px; height:60px;
    background:linear-gradient(135deg,#25d366,#128c7e); border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:#fff;
    font-size:1.8rem; cursor:pointer; box-shadow:0 6px 20px rgba(37,211,102,.4);
    z-index:9000; border:none; text-decoration:none;
}
.wa-support:hover { transform:scale(1.1); }

/* ── RESPONSIVE ── */
@media(max-width:1100px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .charts-row, .bottom-row, .dayend-grid, .cashup-grid { grid-template-columns:1fr; }
}
@media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.mobile-open { transform:translateX(0); }
    .main { margin-left:0; }
    .mobile-toggle { display:block; }
    .header-search, .header-datetime { display:none; }
    .page { padding:16px; }
}
@media(max-width:480px) {
    .stats-row { grid-template-columns:1fr; }
    .ai-panel { width:100%; right:-100%; }
}
@media print {
    .sidebar, .top-header, .wa-support, .ai-panel, .voice-overlay,
    .notif-panel, .toast-wrap { display:none !important; }
    .main { margin-left:0; }
    .page { padding:20px; }
    .page-watermark { display:none; }
}
</style>
</head>

// ============================================================
// LOAD USER ACCOUNT
// ============================================================
function loadUserAccount(email, callback) {
    db.collection('accounts').get()
        .then(function(snap) {
            var found = false;
            snap.forEach(function(doc) {
                if (found) return;
                var data = doc.data();

                // Check owner
                if (data.owner && data.owner.email &&
                    data.owner.email.toLowerCase() === email.toLowerCase()) {
                    S._accountId = doc.id;
                    S.owner      = data.owner;
                    S.user       = {
                        name:  data.owner.name || email,
                        email: email,
                        role:  'Owner'
                    };
                    loadAllData(data);
                    found = true;
                    return;
                }

                // Check entity users
                var users = data.users || {};
                Object.keys(users).forEach(function(eid) {
                    if (found) return;
                    (users[eid] || []).forEach(function(u) {
                        if (found) return;
                        if (u.email && u.email.toLowerCase() === email.toLowerCase()) {
                            S._accountId = doc.id;
                            S.owner      = data.owner;
                            S.user = {
                                name:  u.name || email,
                                email: email,
                                role:  u.role || 'Staff',
                                assignedEntity: u.assignedEntity || 0
                            };
                            loadAllData(data);
                            found = true;
                        }
                    });
                });
            });
            if (callback) callback(found);
        })
        .catch(function(err) {
            console.warn('loadUserAccount error:', err);
            if (callback) callback(false);
        });
}

function loadAllData(data) {
    S.entities          = data.entities          || [];
    S.inventory         = data.inventory         || {};
    S.purchases         = data.purchases         || {};
    S.wastage           = data.wastage           || {};
    S.suppliers         = data.suppliers         || {};
    S.users             = data.users             || {};
    S.menuItems         = data.menuItems         || {};
    S.cashups           = data.cashups           || {};
    S.activities        = data.activities        || {};
    S.pendingPOs        = data.pendingPOs        || {};
    S.userLogs          = data.userLogs          || {};
    S.dayEnds           = data.dayEnds           || {};
    S.invoices          = data.invoices          || {};
    S.internalTransfers = data.internalTransfers || [];
    S.notifs            = data.notifs            || [];
    S.billing           = data.billing           || null;
    S.grvQueue          = data.grvQueue          || {};
    S.departments       = data.departments       || {};
    S.categories        = data.categories        || {};
    S.clientInvoices    = data.clientInvoices    || {};
}

// ============================================================
function saveToCloud(extraFields) {
    if (!S._accountId) return Promise.resolve();

    var data = {
        inventory:          S.inventory,
        purchases:          S.purchases,
        wastage:            S.wastage,
        suppliers:          S.suppliers,
        users:              S.users,
        menuItems:          S.menuItems,
        cashups:            S.cashups,
        activities:         S.activities,
        pendingPOs:         S.pendingPOs,
        userLogs:           S.userLogs,
        dayEnds:            S.dayEnds,
        invoices:           S.invoices,
        internalTransfers:  S.internalTransfers,
        notifs:             S.notifs,
        grvQueue:           S.grvQueue,
        departments:        S.departments,
        categories:         S.categories,
        clientInvoices:     S.clientInvoices || {},
        entities:           S.entities,
        owner:              S.owner,
        billing:            S.billing,
        accountStatus:      'active',
        lastUpdated:        firebase.firestore.FieldValue.serverTimestamp(),
        lastUpdatedBy:      S.user ? S.user.name : 'Web App',
        lastUpdatedDevice:  'Web App'
    };

    if (extraFields) {
        Object.keys(extraFields).forEach(function(k) { data[k] = extraFields[k]; });
    }

    return db.collection('accounts').doc(S._accountId)
        .set(data, { merge: true })
        .then(function() { console.log('☁️ Saved'); })
        .catch(function(err) { console.warn('Save error:', err); });
}

// Debounced save
var _saveTimer = null;
function debouncedSave() {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(saveToCloud, 2000);
}

var cloudSyncListener = null;

function startCloudSync() {
    if (!S._accountId) return;
    if (cloudSyncListener) cloudSyncListener();

    cloudSyncListener = db.collection('accounts').doc(S._accountId)
        .onSnapshot(function(doc) {
            if (!doc.exists) return;
            var data   = doc.data();
            var device = data.lastUpdatedDevice || '';

            // Only update if change came from another device
            if (device === 'Web App') return;

            loadAllData(data);
            renderPages();
            renderNotifs();
            toast('info', '🔄 Data updated from ' + device);
        }, function(err) {
            console.warn('Sync error:', err);
        });
}

// ============================================================
// LIVE FOOD COST CALCULATION
// (Opening + Purchases - Closing) / Sales — All excl. VAT
// ============================================================
function calcLiveFoodCost() {
    if (!eid()) return 0;
    var ent = S.entities[S.activeEntity];
    if (!ent) return 0;

    var inv          = getInv();
    var closingStock = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);
    var openingStock = ent.openingStockValue || closingStock;

    // Total purchases excl. VAT
    var totalPurch = getPurch().reduce(function(s, p) {
        var val = p.grvTotal || p.total || 0;
        return s + val;
    }, 0);
    var purchExVat = totalPurch / (1 + VAT_RATE);

    // Total sales excl. VAT
    var cashups    = S.cashups[eid()] || {};
    var totalSales = 0;
    Object.values(cashups).forEach(function(cu) {
        totalSales += (cu.total || 0);
    });
    var salesExVat = totalSales / (1 + VAT_RATE);

    if (salesExVat <= 0) return 0;

    return ((openingStock + purchExVat - closingStock) / salesExVat) * 100;
}

// ============================================================
// FORMAT HELPERS
// ============================================================
function fmtNum(n) {
    n = n || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Number(n).toFixed(0);
}

function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-ZA', { day:'2-digit', month:'short', year:'numeric' });
}

function statusText(s) {
    if (!s) return '';
    return s.split('-').map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

function toast(type, msg) {
    var ic = { success:'check-circle', error:'times-circle', warning:'exclamation-triangle', info:'info-circle' };
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = '<i class="fas fa-' + (ic[type] || 'info-circle') + '"></i>' +
        '<span>' + msg + '</span>' +
        '<button onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
    document.getElementById('toast-wrap').appendChild(t);
    setTimeout(function() {
        t.style.opacity = '0';
        t.style.transition = 'opacity .3s';
        setTimeout(function() { if (t.parentElement) t.remove(); }, 300);
    }, 4000);
}

function pageStockTake() {
    var ent = S.entities[S.activeEntity];
    if (!ent) return '';
    var sections = ent.sections || ['Main Store'];
    var secOpts = '<option value="all">All Sections</option>' +
        sections.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');

    return '<div class="page-watermark">STOCKAI-PRO</div>' +
        '<h1 class="page-heading">Stock Take</h1>' +
        '<div class="action-bar">' +
        '<label style="font-size:.82rem;color:var(--text-mid);font-weight:600">Section:</label>' +
        '<select class="select-mini" id="st-section" onchange="renderStockTake()">' + secOpts + '</select>' +
        '<button class="btn-outline" onclick="startVoiceStockCount()"><i class="fas fa-microphone"></i> Voice Count</button>' +
        '<button class="btn-outline" onclick="printStockTake()"><i class="fas fa-print"></i> Print Sheet</button>' +
        '<button class="btn-primary" onclick="submitStockCount()"><i class="fas fa-save"></i> Submit Count</button>' +
        '</div>' +
        '<div class="table-wrap"><table class="data-table">' +
        '<thead><tr><th>Item</th><th>Department</th><th>Section</th><th>Expected</th>' +
        '<th>Counted</th><th>Variance</th></tr></thead>' +
        '<tbody id="stocktake-body"></tbody></table></div>';
}

function renderStockTake() {
    var inv = getInv();
    var secFilter = document.getElementById('st-section');
    var sec = secFilter ? secFilter.value : 'all';
    var items = sec === 'all' ? inv : inv.filter(function(i) { return i.location === sec; });
    var tb = document.getElementById('stocktake-body');
    if (!tb) return;

    if (items.length === 0) {
        tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-light)">' +
            'No items in this section</td></tr>';
        return;
    }

    tb.innerHTML = items.map(function(i) {
        return '<tr><td><strong>' + i.name + '</strong></td>' +
            '<td>' + (i.department || '—') + '</td>' +
            '<td>' + (i.location || '—') + '</td>' +
            '<td>' + (i.quantity || 0) + ' ' + i.unit + '</td>' +
            '<td><input type="number" value="' + (i.quantity || 0) + '" ' +
            'id="count-' + i.id + '" min="0" step="0.1" ' +
            'onchange="updateVariance(\'' + i.id + '\')" ' +
            'style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;' +
            'font-family:inherit;font-size:.85rem;text-align:center"></td>' +
            '<td><span class="status-badge" id="var-' + i.id + '">0</span></td></tr>';
    }).join('');
}

function updateVariance(id) {
    var item = getInv().find(function(x) { return x.id === id; });
    if (!item) return;
    var counted = parseFloat(document.getElementById('count-' + id).value) || 0;
    var v = parseFloat((counted - (item.quantity || 0)).toFixed(2));
    var el = document.getElementById('var-' + id);
    if (el) {
        el.className = 'status-badge ' + (v === 0 ? '' : v > 0 ? 'in-stock' : 'out-of-stock');
        el.textContent = (v > 0 ? '+' : '') + v;
    }
}

function submitStockCount() {
    var inv = getInv();
    var changed = 0;
    inv.forEach(function(item) {
        var input = document.getElementById('count-' + item.id);
        if (!input) return;
        var newQty = parseFloat(input.value);
        if (isNaN(newQty)) return;
        if (newQty !== item.quantity) changed++;
        item.quantity = newQty;
        item.value = newQty * (item.cost || 0);
        item.status = newQty === 0 ? 'out-of-stock' :
            newQty <= (item.parLevel || item.reorder || 0) ? 'low-stock' : 'in-stock';
    });
    S.inventory[eid()] = inv;
    logAction('Stock Count', changed + ' items updated');
    debouncedSave();
    toast('success', '✅ Stock count submitted — ' + changed + ' items updated');
}

function printStockTake() {
    var ent = S.entities[S.activeEntity];
    var inv = getInv();
    var sec = document.getElementById('st-section');
    var secVal = sec ? sec.value : 'all';
    var items = secVal === 'all' ? inv : inv.filter(function(i) { return i.location === secVal; });

    // Group by department
    var byDept = {};
    items.forEach(function(i) {
        var dept = i.department || 'Uncategorized';
        if (!byDept[dept]) byDept[dept] = [];
        byDept[dept].push(i);
    });

    var rows = '';
    Object.keys(byDept).sort().forEach(function(dept) {
        rows += '<tr style="background:var(--accent);color:#fff"><td colspan="6" style="padding:10px;font-weight:700">' +
            dept + '</td></tr>';
        byDept[dept].forEach(function(i) {
            rows += '<tr><td>' + i.name + '</td><td>' + (i.location || '') + '</td>' +
                '<td>' + i.unit + '</td><td>' + (i.quantity || 0) + '</td>' +
                '<td>_____</td><td>_____</td></tr>';
        });
    });

    var html = '<html><head><title>Stock Take — ' + ent.name + '</title>' +
        '<style>body{font-family:Arial;padding:20px;color:#0d4a5c}' +
        'table{width:100%;border-collapse:collapse;margin-top:20px}' +
        'th,td{border:1px solid #ccc;padding:8px;text-align:left;font-size:12px}' +
        'th{background:#1a8ba8;color:#fff}</style></head><body>' +
        '<h1>' + ent.name + ' — Stock Take Sheet</h1>' +
        '<p>Date: ' + new Date().toLocaleDateString('en-ZA') + ' | Section: ' +
        (secVal === 'all' ? 'All' : secVal) + ' | Printed by: ' + (S.user ? S.user.name : '') + '</p>' +
        '<table><thead><tr><th>Item</th><th>Section</th><th>Unit</th><th>Expected</th>' +
        '<th>Counted</th><th>Notes</th></tr></thead><tbody>' + rows + '</tbody></table></body></html>';

    var w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(function() { w.print(); }, 500);
}

function cashupRow(icon, label, id) {
    return '<div class="cashup-input-row"><label><i class="fas ' + icon + '"></i> ' + label + '</label>' +
        '<input type="number" id="' + id + '" step="0.01" placeholder="0.00" oninput="calcCashup()"></div>';
}

function loadCashup() {
    var dateEl = document.getElementById('cu-date');
    var date = dateEl ? dateEl.value : S.selectedDate;
    S.selectedDate = date;
    var cu = (S.cashups[eid()] || {})[date] || { cash:0, cards:0, vouchers:0, float:0, total:0 };
    ['cu-cash','cu-cards','cu-vouchers','cu-float'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = cu[id.replace('cu-','')] || '';
    });
    calcCashup();
    renderWaiterCashups();
}

function calcCashup() {
    var cash     = parseFloat(document.getElementById('cu-cash').value) || 0;
    var cards    = parseFloat(document.getElementById('cu-cards').value) || 0;
    var vouchers = parseFloat(document.getElementById('cu-vouchers').value) || 0;
    var flt      = parseFloat(document.getElementById('cu-float').value) || 0;

    // All values entered are excl. VAT
    var total = cash + cards + vouchers + flt;

    var el;
    el = document.getElementById('cu-total');        if (el) el.textContent = 'R ' + total.toFixed(2);
    el = document.getElementById('cu-disp-cash');    if (el) el.textContent = 'R ' + cash.toFixed(2);
    el = document.getElementById('cu-disp-cards');   if (el) el.textContent = 'R ' + cards.toFixed(2);
    el = document.getElementById('cu-disp-vouchers');if (el) el.textContent = 'R ' + vouchers.toFixed(2);
    el = document.getElementById('cu-disp-float');   if (el) el.textContent = 'R ' + flt.toFixed(2);
    el = document.getElementById('cu-disp-total');   if (el) el.textContent = 'R ' + total.toFixed(2);
    el = document.getElementById('cu-disp-date');    if (el) el.textContent = S.selectedDate;
}

function saveCashup() {
    var date = document.getElementById('cu-date').value;
    var cash     = parseFloat(document.getElementById('cu-cash').value) || 0;
    var cards    = parseFloat(document.getElementById('cu-cards').value) || 0;
    var vouchers = parseFloat(document.getElementById('cu-vouchers').value) || 0;
    var flt      = parseFloat(document.getElementById('cu-float').value) || 0;
    var total    = cash + cards + vouchers + flt;

    if (!S.cashups[eid()]) S.cashups[eid()] = {};
    S.cashups[eid()][date] = {
        cash: cash, cards: cards, vouchers: vouchers, float: flt,
        total: total, by: S.user ? S.user.name : 'Unknown',
        timestamp: new Date().toISOString()
    };
    logAction('Cash-up', date + ': R' + total.toFixed(2));
    debouncedSave();
    toast('success', '✅ Cash-up saved for ' + date);
}

// Waiter cashups from POS
function renderWaiterCashups() {
    var section = document.getElementById('waiter-cashups-section');
    if (!section) return;

    var posCashups = ((S.cashups || {})[eid()] || {}).posWaiters || {};
    var waiters = Object.keys(posCashups);

    if (waiters.length === 0) {
        section.innerHTML = '';
        return;
    }

    var html = '<div class="form-card" style="border-left-color:var(--gold)">' +
        '<h3 class="block-title"><i class="fas fa-user-clock" style="color:var(--gold)"></i> ' +
        'Waiter Cash-ups from POS (' + waiters.length + ')</h3>';

    waiters.forEach(function(waiterName) {
        var wc = posCashups[waiterName];
        var reviewed = wc.managerReviewed || false;
        html += '<div style="display:flex;align-items:center;gap:14px;padding:12px;' +
            'background:var(--bg);border-radius:var(--rs);margin-bottom:8px;' +
            'border-left:3px solid ' + (reviewed ? 'var(--success)' : 'var(--warning)') + '">' +
            '<div style="flex:1"><strong style="font-size:.88rem;color:var(--text)">' + waiterName + '</strong>' +
            '<div style="font-size:.72rem;color:var(--text-light)">Submitted: ' +
            (wc.submittedAt ? fmtDate(wc.submittedAt) : '—') + '</div></div>' +
            '<div style="text-align:right"><div style="font-size:1rem;font-weight:800;color:var(--accent)">' +
            'R' + fmtNum(wc.total || 0) + '</div></div>' +
            (reviewed
                ? '<span class="status-badge in-stock">Reviewed ✓</span>'
                : '<button class="btn-primary" style="padding:6px 14px;font-size:.75rem" ' +
                  'onclick="reviewWaiterCashup(\'' + waiterName + '\')">' +
                  '<i class="fas fa-check"></i> Review</button>') +
            '</div>';
    });

    html += '</div>';
    section.innerHTML = html;
}

function reviewWaiterCashup(waiterName) {
    if (!confirm('Confirm review of ' + waiterName + '\'s cash-up?')) return;
    if (!S.cashups[eid()]) S.cashups[eid()] = {};
    if (!S.cashups[eid()].posWaiters) S.cashups[eid()].posWaiters = {};
    if (S.cashups[eid()].posWaiters[waiterName]) {
        S.cashups[eid()].posWaiters[waiterName].managerReviewed = true;
        S.cashups[eid()].posWaiters[waiterName].reviewedBy = S.user ? S.user.name : 'Manager';
        S.cashups[eid()].posWaiters[waiterName].reviewedAt = new Date().toISOString();
    }
    logAction('Cashup Reviewed', waiterName + '\'s cashup reviewed');
    debouncedSave();
    renderWaiterCashups();
    toast('success', '✅ ' + waiterName + '\'s cashup reviewed');
}

function loadDayEnd() {
    var dateEl = document.getElementById('de-date');
    var date = dateEl ? dateEl.value : S.selectedDate;
    S.selectedDate = date;

    var cu = (S.cashups[eid()] || {})[date] || {};
    var salesExVat = (cu.total || 0); // Already excl VAT since we save excl

    var el;
    el = document.getElementById('de-sales');    if (el) el.textContent = 'R' + fmtNum(salesExVat);
    el = document.getElementById('de-cash');     if (el) el.textContent = 'R' + fmtNum(cu.cash || 0);
    el = document.getElementById('de-cards');    if (el) el.textContent = 'R' + fmtNum(cu.cards || 0);
    el = document.getElementById('de-pax');      if (el) el.textContent = cu.pax || '0';
    el = document.getElementById('de-avg');      if (el) el.textContent = 'R' + ((cu.pax && cu.pax > 0) ? (salesExVat / cu.pax).toFixed(2) : '0');
    el = document.getElementById('de-promos');   if (el) el.textContent = 'R' + fmtNum(cu.promotions || 0);
    el = document.getElementById('de-discounts');if (el) el.textContent = '-R' + fmtNum(cu.discounts || 0);

    var inv = getInv();
    var stockVal = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);
    el = document.getElementById('de-stock'); if (el) el.textContent = 'R' + fmtNum(stockVal);

    var todayWaste = getWastage().filter(function(w) {
        return fmtDate(w.date) === fmtDate(date);
    }).reduce(function(s, w) { return s + (w.value || 0); }, 0);
    el = document.getElementById('de-wastage'); if (el) el.textContent = '-R' + fmtNum(todayWaste);

    var todayPurch = getPurch().filter(function(p) {
        return p.grvDate && fmtDate(p.grvDate) === fmtDate(date);
    }).reduce(function(s, p) { return s + (p.grvTotal || p.total || 0); }, 0) / (1 + VAT_RATE);
    el = document.getElementById('de-purchases'); if (el) el.textContent = 'R' + fmtNum(todayPurch);

    // Top/Bottom sellers (from POS data if available)
    renderDayEndSellers();
}

function renderDayEndSellers() {
    var topEl = document.getElementById('de-top-sellers');
    var botEl = document.getElementById('de-bottom-sellers');
    var waiterEl = document.getElementById('de-top-waiter');

    var menu = getMenu();
    if (menu.length > 0) {
        var sorted = menu.slice().sort(function(a, b) { return (b.sold || 0) - (a.sold || 0); });
        var top3 = sorted.slice(0, 3);
        var bot3 = sorted.slice(-3).reverse();

        if (topEl) topEl.innerHTML = top3.map(function(m, i) {
            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.82rem">' +
                '<span style="width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;' +
                'display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700">' +
                (i + 1) + '</span>' + m.name + '<span style="margin-left:auto;font-weight:700">' +
                (m.sold || 0) + ' sold</span></div>';
        }).join('') || '<p style="font-size:.78rem;color:var(--text-light)">No data</p>';

        if (botEl) botEl.innerHTML = bot3.map(function(m, i) {
            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.82rem">' +
                '<span style="width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;' +
                'display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700">' +
                (i + 1) + '</span>' + m.name + '<span style="margin-left:auto;font-weight:700">' +
                (m.sold || 0) + ' sold</span></div>';
        }).join('') || '<p style="font-size:.78rem;color:var(--text-light)">No data</p>';
    } else {
        if (topEl) topEl.innerHTML = '<p style="font-size:.78rem;color:var(--text-light)">No menu items yet</p>';
        if (botEl) botEl.innerHTML = '<p style="font-size:.78rem;color:var(--text-light)">No menu items yet</p>';
    }

    // Top waiter from POS
    if (waiterEl) {
        var posWaiters = ((S.cashups || {})[eid()] || {}).posWaiters || {};
        var waiterList = Object.keys(posWaiters).map(function(name) {
            return { name: name, total: posWaiters[name].total || 0 };
        }).sort(function(a, b) { return b.total - a.total; });

        if (waiterList.length > 0) {
            var top = waiterList[0];
            waiterEl.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:10px;' +
                'background:rgba(245,158,11,.08);border-radius:var(--rs);border-left:3px solid var(--gold)">' +
                '<i class="fas fa-star" style="color:var(--gold);font-size:1.2rem"></i>' +
                '<div style="flex:1"><strong>' + top.name + '</strong>' +
                '<div style="font-size:.72rem;color:var(--text-light)">Highest sales today</div></div>' +
                '<strong style="color:var(--gold);font-size:1.1rem">R' + fmtNum(top.total) + '</strong></div>';
        } else {
            waiterEl.innerHTML = '<p style="font-size:.78rem;color:var(--text-light)">No POS data</p>';
        }
    }
}

function runDayEnd() {
    // Check outstanding cashups
    var posWaiters = ((S.cashups || {})[eid()] || {}).posWaiters || {};
    var unreviewed = Object.keys(posWaiters).filter(function(name) {
        return !posWaiters[name].managerReviewed;
    });

    if (unreviewed.length > 0) {
        showModal('⚠️ Outstanding Cash-ups',
            '<div style="background:rgba(212,160,23,.08);border-left:3px solid var(--warning);' +
            'padding:14px;border-radius:var(--rs);margin-bottom:14px;font-size:.85rem;color:var(--text)">' +
            '<strong>' + unreviewed.length + ' waiter cash-up(s) still need manager review:</strong></div>' +
            '<ul style="padding-left:20px;margin-bottom:14px">' +
            unreviewed.map(function(name) { return '<li style="margin-bottom:4px">' + name + '</li>'; }).join('') +
            '</ul>' +
            '<p style="font-size:.82rem;color:var(--text-light)">Please review all waiter cash-ups before running Day End.</p>',
            '<button class="btn-outline" onclick="closeModal()">Cancel</button>' +
            '<button class="btn-primary" onclick="closeModal();navigate(\'cashup\')">Go to Cash-up</button>'
        );
        return;
    }

    if (!confirm('Run Day End for ' + S.selectedDate + '?\n\nThis will lock today\'s data.')) return;

    var date = S.selectedDate;
    var ent = S.entities[S.activeEntity];
    if (!S.dayEnds[eid()]) S.dayEnds[eid()] = {};

    var inv = getInv();
    var cu = (S.cashups[eid()] || {})[date] || {};

    S.dayEnds[eid()][date] = {
        date: date,
        sales: cu.total || 0,
        cash: cu.cash || 0,
        cards: cu.cards || 0,
        pax: cu.pax || 0,
        promotions: cu.promotions || 0,
        discounts: cu.discounts || 0,
        wastage: getWastage().filter(function(w) {
            return fmtDate(w.date) === fmtDate(date);
        }).reduce(function(s, w) { return s + (w.value || 0); }, 0),
        stockValue: inv.reduce(function(s, i) { return s + (i.value || 0); }, 0),
        foodCost: calcLiveFoodCost(),
        closedBy: S.user ? S.user.name : 'Unknown',
        timestamp: new Date().toISOString()
    };

    logAction('Day End', date + ' closed by ' + (S.user ? S.user.name : ''));
    debouncedSave();
    toast('success', '✅ Day End completed for ' + date);
    generateAutoPOs();
}

function viewDayEndReport() {
    toast('info', '📊 Opening Day End Report...');
    // Use email template logic for consistency
    var date = S.selectedDate;
    var cu = (S.cashups[eid()] || {})[date] || {};
    var ent = S.entities[S.activeEntity] || {};

    showModal('📊 Day End Report — ' + date,

        '<p style="font-size:.82rem;color:var(--text-light)">' + date + '</p></div>' +
        '<div class="summary-row"><span>Total Sales (excl.)</span><strong>R' + (cu.total || 0).toFixed(2) + '</strong></div>' +
        '<div class="summary-row"><span>Cash</span><strong>R' + (cu.cash || 0).toFixed(2) + '</strong></div>' +
        '<div class="summary-row"><span>Cards</span><strong>R' + (cu.cards || 0).toFixed(2) + '</strong></div>' +
        '<div class="summary-row"><span>Food Cost</span><strong style="color:' +
        (calcLiveFoodCost() > (ent.foodCostTarget || 28) ? 'var(--danger)' : 'var(--success)') + '">' +
        calcLiveFoodCost().toFixed(1) + '%</strong></div>' +
        '<div class="summary-row total"><span>Stock Value</span><strong>R' +
        fmtNum(getInv().reduce(function(s, i) { return s + (i.value || 0); }, 0)) + '</strong></div>',

        '<button class="btn-outline" onclick="window.print()"><i class="fas fa-print"></i> Print</button>'
    );
}

function emailDayEndReport() {
    var ent = S.entities[S.activeEntity] || {};
    var cu = (S.cashups[eid()] || {})[S.selectedDate] || {};

    var recipients = [];
    if (S.owner && S.owner.email) recipients.push(S.owner.email);
    var users = getUsers();
    users.forEach(function(u) {
        if (u.email && (u.role === 'General Manager' || u.role === 'Area Manager')) {
            if (recipients.indexOf(u.email) === -1) recipients.push(u.email);
        }
    });

    emailDayEndReport({
        entityName: ent.name,
        date: S.selectedDate,
        submittedBy: S.user ? S.user.name : 'Unknown',
        totalSales: cu.total || 0,
        cashSales: cu.cash || 0,
        cardSales: cu.cards || 0,
        pax: cu.pax || 0,
        avgSpend: cu.pax > 0 ? ((cu.total || 0) / cu.pax) : 0,
        promotions: cu.promotions || 0,
        discounts: cu.discounts || 0,
        purchases: getPurch().reduce(function(s, p) { return s + (p.total || 0); }, 0) / (1 + VAT_RATE),
        foodCostPercent: calcLiveFoodCost(),
        foodCostTarget: ent.foodCostTarget || 28,
        recipients: recipients
    });

    toast('success', '📧 Day End Report emailed');
    logAction('Email', 'Day End Report emailed');
}

function generateAutoPOs() {
    var inv = getInv();
    var lowItems = inv.filter(function(i) {
        return i.status === 'low-stock' || i.status === 'out-of-stock';
    });

    if (lowItems.length === 0) {
        toast('info', 'No items need reordering');
        return;
    }

    var bySupplier = {};
    lowItems.forEach(function(i) {
        var supName = i.supplier || 'Unknown Supplier';
        if (!bySupplier[supName]) bySupplier[supName] = [];
        bySupplier[supName].push(Object.assign({}, i, {
            orderQty: (i.parLevel || i.reorder || 5) * 3
        }));
    });

    if (!S.pendingPOs[eid()]) S.pendingPOs[eid()] = [];

    Object.keys(bySupplier).forEach(function(supName) {
        var items = bySupplier[supName];
        var total = items.reduce(function(s, i) { return s + (i.orderQty * i.cost); }, 0);
        S.pendingPOs[eid()].push({
            id: 'APO-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
            supplier: supName,
            items: items,
            total: total,
            date: new Date().toISOString(),
            status: 'Pending Approval',
            generatedBy: 'AI'
        });
    });

    addNotif('info', 'AI POs Generated', Object.keys(bySupplier).length + ' POs awaiting approval');
    logAction('AI POs', Object.keys(bySupplier).length + ' POs generated');
    debouncedSave();
    toast('success', '🤖 ' + Object.keys(bySupplier).length + ' AI PO(s) generated — check Purchases');
}

function renderPOSPreview() {
    var posDepts = (S.posDepartments || {})[eid()] || [];

    if (posDepts.length === 0 && posItems.length === 0) {
        return '<p style="text-align:center;color:rgba(255,255,255,.4);padding:30px">Add departments and items to see preview</p>';
    }

    var html = '';

    // Department tabs
    html += '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto">';
    posDepts.forEach(function(d) {
        html += '<div style="padding:8px 16px;background:' + (d.color || '#1a8ba8') + ';' +
            'color:#fff;border-radius:20px;font-size:.78rem;font-weight:600;white-space:nowrap;cursor:pointer">' +
            d.name + '</div>';
    });
    html += '</div>';

    // Items grid
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px">';
    posItems.forEach(function(item) {
        var dept = posDepts.find(function(d) { return d.name === item.department; });
        var color = dept ? dept.color : item.color || '#1a8ba8';
        html += '<div style="background:' + color + ';color:#fff;border-radius:10px;padding:14px 8px;' +
            'text-align:center;cursor:pointer;transition:.2s">' +
            '<div style="font-size:.82rem;font-weight:600;margin-bottom:4px">' + item.name + '</div>' +
            '<div style="font-size:.92rem;font-weight:800">R' + (item.price || 0).toFixed(0) + '</div></div>';
    });
    html += '</div>';

    return html;
}

function renderPOSItems() {

    if (!tb) return;

    tb.innerHTML = posItems.map(function(item, idx) {
        var dept = ((S.posDepartments || {})[eid()] || []).find(function(d) { return d.name === item.department; });

        return '<tr><td><div style="width:40px;height:40px;background:' + color + ';border-radius:8px;' +
            'display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700">' +
            item.name.substring(0, 2).toUpperCase() + '</div></td>' +
            '<td><strong>' + item.name + '</strong></td>' +
            '<td>R' + (item.price || 0).toFixed(2) + '</td>' +
            '<td><span style="padding:3px 10px;background:' + color + ';color:#fff;border-radius:12px;font-size:.68rem;font-weight:600">' +

            '<td>' + (item.linkedMenuName || '<span style="color:var(--text-muted)">Not linked</span>') + '</td>' +
            '<td><div class="row-actions">' +
            '<button class="row-btn del" onclick="deletePOSItem(' + idx + ')"><i class="fas fa-trash"></i></button>' +

function showCreatePOSDept() {
    var colors = ['#1a8ba8','#0d4a5c','#2ea871','#f59e0b','#d97706','#c94545',
        '#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#64748b'];

    showModal('<i class="fas fa-palette" style="color:var(--accent)"></i> Create POS Department',
        '<div class="form-group"><label>Department Name *</label>' +
        '<input type="text" class="form-input" id="posd-name" placeholder="e.g. Starters, Mains, Drinks"></div>' +
        '<div class="form-group"><label>Color *</label>' +
        '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">' +
        colors.map(function(c, i) {
            return '<div onclick="selectPOSColor(this,\'' + c + '\')" ' +
                'style="width:36px;height:36px;background:' + c + ';border-radius:8px;cursor:pointer;' +
                'border:3px solid ' + (i === 0 ? '#fff' : 'transparent') + ';' +
                'box-shadow:' + (i === 0 ? '0 0 0 2px var(--text)' : 'none') + '" ' +
                'class="pos-color-swatch" data-color="' + c + '"></div>';
        }).join('') +
        '</div><input type="hidden" id="posd-color" value="' + colors[0] + '"></div>',
        '<button class="btn-outline" onclick="closeModal()">Cancel</button>' +
        '<button class="btn-primary" onclick="savePOSDept()"><i class="fas fa-save"></i> Save</button>'
    );
}

function selectPOSColor(el, color) {
    document.querySelectorAll('.pos-color-swatch').forEach(function(s) {
        s.style.border = '3px solid transparent';
        s.style.boxShadow = 'none';
    });
    el.style.border = '3px solid #fff';
    el.style.boxShadow = '0 0 0 2px var(--text)';
    document.getElementById('posd-color').value = color;
}

function savePOSDept() {
    var name = (document.getElementById('posd-name').value || '').trim();
    var color = document.getElementById('posd-color').value || '#1a8ba8';
    if (!name) { toast('error', 'Enter department name'); return; }

    if (!S.posDepartments) S.posDepartments = {};
    if (!S.posDepartments[eid()]) S.posDepartments[eid()] = [];

    var exists = S.posDepartments[eid()].find(function(d) { return d.name === name; });
    if (exists) { toast('warning', 'Department already exists'); return; }

    S.posDepartments[eid()].push({ name: name, color: color, createdAt: new Date().toISOString() });
    debouncedSave();
    closeModal();
    renderPages();
    navigate('pos-builder');
    toast('success', '✅ Department "' + name + '" created');
}

function deletePOSDept(idx) {
    if (!confirm('Delete this department?')) return;
    S.posDepartments[eid()].splice(idx, 1);
    debouncedSave();
    renderPages();
    navigate('pos-builder');
    toast('info', 'Department deleted');
}

function showCreatePOSItem() {
    var posDepts = (S.posDepartments || {})[eid()] || [];
    var menu = getMenu();

    if (posDepts.length === 0) {
        toast('warning', 'Create at least one POS department first');
        return;
    }

    var deptOpts = posDepts.map(function(d) {
        return '<option value="' + d.name + '" data-color="' + d.color + '">' + d.name + '</option>';
    }).join('');

    var menuOpts = '<option value="">Not linked (manual item)</option>' +
        menu.map(function(m) {
            return '<option value="' + m.id + '" data-name="' + m.name + '" data-price="' + (m.setPrice || 0) + '">' +
                m.name + ' (R' + (m.setPrice || 0).toFixed(2) + ')</option>';
        }).join('');

    showModal('<i class="fas fa-plus" style="color:var(--accent)"></i> Add Selling Item',
        '<div class="form-row">' +
        '<div class="form-field"><label>Button Name *</label>' +
        '<input type="text" class="form-input" id="posi-name" placeholder="e.g. Chicken Burger"></div>' +
        '<div class="form-field"><label>Selling Price (R) *</label>' +
        '<input type="number" class="form-input" id="posi-price" step="0.01" placeholder="0.00"></div></div>' +
        '<div class="form-row">' +
        '<div class="form-field"><label>POS Department *</label>' +
        '<select class="form-input" id="posi-dept">' + deptOpts + '</select></div>' +
        '<div class="form-field"><label>Link to Menu Item</label>' +
        '<select class="form-input" id="posi-menu" onchange="posItemMenuLink()">' + menuOpts + '</select>' +
        '<div style="font-size:.68rem;color:var(--text-muted);margin-top:4px">' +
        'Links stock deduction to this menu item\'s ingredients</div></div></div>',
        '<button class="btn-outline" onclick="closeModal()">Cancel</button>' +
        '<button class="btn-primary" onclick="savePOSItem()"><i class="fas fa-save"></i> Save Item</button>'
    );
}

function posItemMenuLink() {
    var menuSel = document.getElementById('posi-menu');
    var nameSel = document.getElementById('posi-name');
    var priceSel = document.getElementById('posi-price');
    if (menuSel && menuSel.selectedIndex > 0) {
        var opt = menuSel.options[menuSel.selectedIndex];
        if (!nameSel.value) nameSel.value = opt.dataset.name || '';
        if (!priceSel.value) priceSel.value = opt.dataset.price || '';
    }
}

function savePOSItem() {
    var name  = (document.getElementById('posi-name').value || '').trim();
    var price = parseFloat(document.getElementById('posi-price').value) || 0;
    var dept  = document.getElementById('posi-dept').value;
    var menuSel = document.getElementById('posi-menu');
    var linkedMenuId   = menuSel ? menuSel.value : '';
    var linkedMenuName = '';
    if (menuSel && menuSel.selectedIndex > 0) {
        linkedMenuName = menuSel.options[menuSel.selectedIndex].dataset.name || '';
    }

    if (!name) { toast('error', 'Enter item name'); return; }
    if (price <= 0) { toast('error', 'Enter a price'); return; }
    if (!dept) { toast('error', 'Select a department'); return; }

    var posDepts = (S.posDepartments || {})[eid()] || [];
    var deptObj = posDepts.find(function(d) { return d.name === dept; });

    if (!S.posSellingItems) S.posSellingItems = {};
    if (!S.posSellingItems[eid()]) S.posSellingItems[eid()] = [];

    S.posSellingItems[eid()].push({
        id: 'POSI-' + Date.now(),
        name: name,
        price: price,
        department: dept,
        color: deptObj ? deptObj.color : '#1a8ba8',
        linkedMenuId: linkedMenuId,
        linkedMenuName: linkedMenuName,
        createdAt: new Date().toISOString()
    });

    logAction('POS Item Created', name + ' — R' + price.toFixed(2));
    debouncedSave();
    closeModal();
    renderPages();
    navigate('pos-builder');
    toast('success', '✅ "' + name + '" added to POS');
}

function deletePOSItem(idx) {
    if (!confirm('Delete this selling item?')) return;
    S.posSellingItems[eid()].splice(idx, 1);
    debouncedSave();
    renderPages();
    navigate('pos-builder');
    toast('info', 'Item removed');
}

function submitToPOS() {
    var posDepts = (S.posDepartments || {})[eid()] || [];
    var posItems = (S.posSellingItems || {})[eid()] || [];

    if (posItems.length === 0) {
        toast('warning', 'Add selling items before submitting to POS');
        return;
    }

    // Convert to POS format and save
    var posMenuTabs = posDepts.map(function(d) {
        return {
            id: 'TAB-' + d.name.replace(/\s/g, '-').toLowerCase(),
            name: d.name,
            color: d.color,
            icon: 'tag',
            sectionId: '',
            subCategories: []
        };
    });

    var posMenuItems = posItems.map(function(item) {
        var dept = posDepts.find(function(d) { return d.name === item.department; });
        var tabId = dept ? 'TAB-' + dept.name.replace(/\s/g, '-').toLowerCase() : '';

        return {
            id: item.id,
            name: item.name,
            price: item.price,
            tabId: tabId,
            sectionId: null,
            linkedInventoryItems: [],
            linkedMenuId: item.linkedMenuId || null,
            prepTime: null,
            portionsPerUnit: 1,
            specialActive: false,
            specialPercent: 0,
            specialPrice: null,
            happyHourPrice: null,
            status: 'active'
        };
    });

    // Save to Firestore POS collections
    var update = {};
    update['posMenuTabs.' + eid()] = posMenuTabs;
    update['posMenuItems.' + eid()] = posMenuItems;
    update['posDepartments.' + eid()] = posDepts;
    update['posSellingItems.' + eid()] = posItems;
    update.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
    update.lastUpdatedBy = S.user ? S.user.name : 'Web App';

    db.collection('accounts').doc(S._accountId)
        .set(update, { merge: true })
        .then(function() {
            toast('success', '✅ Menu submitted to POS! ' + posItems.length + ' items live.');
            logAction('POS Submit', posItems.length + ' items sent to POS');
        })
        .catch(function(err) {
            toast('error', 'Error: ' + err.message);
        });
}

function renderPurchasesTable() {
    var ps = getPurch();
    var pending   = getPending();
    var transit   = ps.filter(function(p) { return p.status === 'In Transit' || p.status === 'Processing'; });
    var delivered = ps.filter(function(p) { return (p.status === 'Received' || p.status === 'Delivered') && !p.grvCompleted; });
    var complete  = ps.filter(function(p) { return p.grvCompleted; });
    var unpaid    = complete.filter(function(p) { return p.paymentStatus !== 'Paid'; });

    // Stats
    var el;
    el = document.getElementById('po-pending-count'); if (el) el.textContent = pending.length;
    el = document.getElementById('po-transit-count'); if (el) el.textContent = transit.length;
    el = document.getElementById('po-grv-count');     if (el) el.textContent = delivered.length;
    el = document.getElementById('po-unpaid-count');  if (el) el.textContent = unpaid.length;

    // Transit table
    var tbTransit = document.getElementById('po-transit-body');
    if (tbTransit) {
        tbTransit.innerHTML = transit.length === 0
            ? '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-light)">No orders in transit</td></tr>'
            : transit.map(function(p) {
                var totalExVat = (p.total || 0) / (1 + VAT_RATE);
                return '<tr><td><strong>' + p.id + '</strong></td>' +
                    '<td>' + p.supplier + '</td>' +
                    '<td>' + (typeof p.items === 'number' ? p.items : (p.items || []).length) + '</td>' +
                    '<td>R' + fmtNum(totalExVat) + '</td>' +
                    '<td>' + fmtDate(p.createdAt || p.date) + '</td>' +
                    '<td><button class="btn-success" style="padding:5px 12px;font-size:.75rem" ' +
                    'onclick="markDelivered(\'' + p.id + '\')">' +
                    '<i class="fas fa-check"></i> Mark Delivered</button></td></tr>';
            }).join('');
    }

    // Delivered table
    var tbDelivered = document.getElementById('po-delivered-body');
    if (tbDelivered) {
        tbDelivered.innerHTML = delivered.length === 0
            ? '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-light)">No deliveries awaiting GRV</td></tr>'
            : delivered.map(function(p) {
                return '<tr><td><strong>' + p.id + '</strong></td>' +
                    '<td>' + p.supplier + '</td>' +
                    '<td>' + (p.receivedDate ? fmtDate(p.receivedDate) : '—') + '</td>' +
                    '<td>R' + fmtNum(p.total || 0) + '</td>' +
                    '<td><button class="btn-primary" style="padding:5px 12px;font-size:.75rem" ' +
                    'onclick="navigate(\'grv\')">' +
                    '<i class="fas fa-clipboard-check"></i> Process GRV</button></td></tr>';
            }).join('');
    }

    // Complete table
    var tbComplete = document.getElementById('po-complete-body');
    if (tbComplete) {
        tbComplete.innerHTML = complete.length === 0
            ? '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-light)">No completed GRVs yet</td></tr>'
            : complete.slice(0, 20).map(function(p) {
                var grvExVat = (p.grvTotal || 0) / (1 + VAT_RATE);
                var payClass = p.paymentStatus === 'Paid' ? 'in-stock' : 'out-of-stock';
                return '<tr><td><strong>' + p.id + '</strong></td>' +
                    '<td>' + p.supplier + '</td>' +
                    '<td>R' + fmtNum(grvExVat) + '</td>' +
                    '<td><span class="status-badge ' + payClass + '">' + (p.paymentStatus || 'Unpaid') + '</span></td>' +
                    '<td>' + (p.paymentDueDate || '—') + '</td>' +
                    '<td><div class="row-actions">' +
                    (p.paymentStatus !== 'Paid' ?
                        '<button class="row-btn" onclick="markPaid(\'' + p.id + '\')" title="Mark Paid" style="background:var(--success);color:#fff;border-color:var(--success)"><i class="fas fa-check"></i></button>' : '') +
                    '<button class="row-btn" onclick="viewGRVDetail(\'' + p.id + '\')"><i class="fas fa-eye"></i></button>' +
                    '</div></td></tr>';
            }).join('');
    }

    // Unpaid table
    var tbUnpaid = document.getElementById('po-unpaid-body');
    if (tbUnpaid) {
        var today = new Date().toISOString().split('T')[0];
        tbUnpaid.innerHTML = unpaid.length === 0
            ? '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--success)"><i class="fas fa-check-circle"></i> No unpaid invoices</td></tr>'
            : unpaid.map(function(p) {
                var isOverdue = p.paymentDueDate && p.paymentDueDate < today;
                var daysOver = 0;
                if (isOverdue) {
                    daysOver = Math.ceil((new Date(today) - new Date(p.paymentDueDate)) / 86400000);
                }
                return '<tr style="' + (isOverdue ? 'background:rgba(201,69,69,.04)' : '') + '">' +
                    '<td><strong>' + p.id + '</strong>' +
                    (isOverdue ? ' <span class="status-badge out-of-stock" style="font-size:.6rem">OVERDUE</span>' : '') + '</td>' +
                    '<td>' + p.supplier + '</td>' +
                    '<td>R' + fmtNum((p.grvTotal || p.total || 0) / (1 + VAT_RATE)) + '</td>' +
                    '<td>' + (p.paymentTerms || 'COD') + '</td>' +
                    '<td>' + (p.paymentDueDate || '—') + '</td>' +
                    '<td>' + (isOverdue ? '<span style="color:var(--danger);font-weight:700">' + daysOver + ' days</span>' : '—') + '</td>' +
                    '<td><button class="row-btn" onclick="markPaid(\'' + p.id + '\')" title="Mark Paid" ' +
                    'style="background:var(--success);color:#fff;border-color:var(--success)"><i class="fas fa-check"></i></button></td></tr>';
            }).join('');
    }

    renderAIPOs();
}

function markDelivered(poId) {
    if (!confirm('Mark PO ' + poId + ' as delivered?')) return;
    var ps = getPurch();
    var po = ps.find(function(p) { return p.id === poId; });
    if (!po) return;
    po.status = 'Delivered';
    po.receivedDate = new Date().toISOString();
    po.receivedBy = S.user ? S.user.name : 'Unknown';
    S.purchases[eid()] = ps;
    logAction('PO Delivered', poId);
    debouncedSave();
    renderPurchasesTable();
    toast('success', '✅ ' + poId + ' marked as delivered — process GRV now');
}

function markPaid(poId) {
    var perms = PERMS[S.user ? S.user.role : ''] || {};
    if (S.user.role !== 'Owner' && S.user.role !== 'General Manager') {
        toast('error', 'Only Owner and GM can mark invoices as paid');
        return;
    }
    var ps = getPurch();
    var po = ps.find(function(p) { return p.id === poId; });
    if (!po) return;
    po.paymentStatus = 'Paid';
    po.paidDate = new Date().toISOString();
    po.paidBy = S.user ? S.user.name : 'Unknown';
    S.purchases[eid()] = ps;
    logAction('Invoice Paid', poId + ' paid by ' + (S.user ? S.user.name : ''));
    debouncedSave();
    renderPurchasesTable();
    toast('success', '✅ ' + poId + ' marked as paid');
}

}

                '<p style="font-size:.82rem;color:var(--text-mid);margin-bottom:10px">' +
                po.supplier + ' • ' + (po.items ? po.items.length : 0) + ' items • R' + fmtNum(po.total) + '</p>' +
                '<div style="display:flex;gap:8px">' +
                '<button class="btn-success" style="font-size:.78rem" onclick="approvePO(\'' + po.id + '\')">' +
