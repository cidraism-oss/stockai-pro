<script>
function getProcureAppHTML() {
    return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)">' +
        '<header class="hub-header">' +
        '<button class="return-hub-btn" onclick="closeEmbeddedApp()"><i class="fas fa-arrow-left"></i> Hub</button>' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;color:#fff">' +
        '<i class="fas fa-shopping-basket"></i>' +
        '<div><div style="font-size:.88rem;font-weight:700">ProcureAI</div>' +
        '<div style="font-size:.62rem;color:rgba(255,255,255,.7)">' + (HUB.entityName||'Entity') + '</div></div></div>' +
        '<button class="hub-hbtn" onclick="procRefresh()"><i class="fas fa-sync-alt"></i></button></header>' +
        '<div id="proc-content" style="flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;-webkit-overflow-scrolling:touch"></div>' +
        '<nav style="height:var(--nav-h);background:var(--bg-card);border-top:1px solid var(--border);' +
        'display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding:0 8px 8px;z-index:50">' +
        pNavBtn('proc-dash',   'fa-chart-pie',           'Dashboard', true)  +
        pNavBtn('proc-new',    'fa-plus-circle',         'New Order', false) +
        pNavBtn('proc-orders', 'fa-clock',               'Orders',    false) +
        pNavBtn('proc-low',    'fa-exclamation-triangle','Low Stock', false) +
        pNavBtn('proc-sups',   'fa-truck',               'Suppliers', false) +
        '</nav></div>';
}

function pNavBtn(page, icon, label, active) {
    return '<div data-ppage="' + page + '" onclick="procNav(\'' + page + '\')" ' +
        'style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 8px;' +
        'border-radius:var(--rs);cursor:pointer;min-width:50px;' +
        'color:' + (active ? 'var(--gold)' : 'var(--text-light)') + ';' +
        'background:' + (active ? 'rgba(245,158,11,.08)' : 'transparent') + '">' +
        '<i class="fas ' + icon + '" style="font-size:1rem"></i>' +
        '<span style="font-size:.55rem;font-weight:600">' + label + '</span></div>';
}

var procCart = [];

function initProcureApp() { procCart = []; procNav('proc-dash'); }

function procRefresh() {
    if (!HUB.accountId) return;
    hubToast('info', '🔄 Refreshing...');
    db.collection('accounts').doc(HUB.accountId).get().then(function(doc) {
        if (doc.exists) { HUB.accountData = doc.data(); procNav('proc-dash'); hubToast('success', '✅ Done'); }
    });
}

function procNav(page) {
    document.querySelectorAll('[data-ppage]').forEach(function(item) {
        var isActive = item.dataset.ppage === page;
        item.style.color      = isActive ? 'var(--gold)' : 'var(--text-light)';
        item.style.background = isActive ? 'rgba(245,158,11,.08)' : 'transparent';
    });
    var c = document.getElementById('proc-content');
    if (!c) return;
    c.scrollTop = 0;
    if      (page === 'proc-dash')   c.innerHTML = procDash();
    else if (page === 'proc-new')    c.innerHTML = procNewOrder();
    else if (page === 'proc-orders') c.innerHTML = procOrders();
    else if (page === 'proc-low')    c.innerHTML = procLowStock();
    else if (page === 'proc-sups')   c.innerHTML = procSuppliers();
}

function pGetInv()     { return HUB.accountData && HUB.entityId ? (HUB.accountData.inventory ||{})[HUB.entityId]||[] : []; }
function pGetPurch()   { return HUB.accountData && HUB.entityId ? (HUB.accountData.purchases  ||{})[HUB.entityId]||[] : []; }
function pGetPending() { return HUB.accountData && HUB.entityId ? (HUB.accountData.pendingPOs ||{})[HUB.entityId]||[] : []; }
function pGetSups()    { return HUB.accountData && HUB.entityId ? (HUB.accountData.suppliers  ||{})[HUB.entityId]||[] : []; }
function pFmt(n) { n=n||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toFixed(0); }

function pStat(l,v,c) {
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px 10px;box-shadow:var(--shadow);' +
        'border-left:3px solid ' + c + ';text-align:center">' +
        '<div style="font-size:.58rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">' + l + '</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">' + v + '</div></div>';
}

function pStatusText(s) {
    if (!s) return '';
    return s.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}

function procAction(icon, color, title, desc, onclick) {
    return '<button onclick="' + onclick + '" style="display:flex;align-items:center;gap:14px;padding:16px;width:100%;' +
        'text-align:left;background:var(--bg-card);border-radius:var(--r);box-shadow:var(--shadow);cursor:pointer;' +
        'border:none;font-family:inherit;margin-bottom:10px;border-left:4px solid ' + color + '">' +
        '<div style="width:44px;height:44px;border-radius:12px;background:' + color + ';display:flex;align-items:center;' +
        'justify-content:center;color:#fff;font-size:1.2rem;flex-shrink:0"><i class="fas ' + icon + '"></i></div>' +
        '<div style="flex:1"><div style="font-size:.92rem;font-weight:700;color:var(--text)">' + title + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + desc + '</div></div>' +
        '<i class="fas fa-chevron-right" style="color:var(--text-muted)"></i></button>';
}

function procDash() {
    var inv     = pGetInv();
    var low     = inv.filter(function(i) { return i.status==='low-stock'||i.status==='out-of-stock'; });
    var pending = pGetPending();
    var transit = pGetPurch().filter(function(p) { return p.status==='In Transit'||p.status==='Processing'; });

    var html = '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);' +
        'margin-bottom:14px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--gold)">' +
        '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem"><i class="fas fa-user"></i></div>' +
        '<div><div style="font-size:.92rem;font-weight:700;color:var(--text)">Welcome, ' + (HUB.user?HUB.user.name:'User') + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + (HUB.entityName||'') + '</div></div></div>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">' +
        pStat('Low Stock', low.length,                    'var(--danger)') +
        pStat('Pending',   pending.length+transit.length, 'var(--gold)')   +
        pStat('Items',     inv.length,                    'var(--success)')+
        '</div>';

    html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">Quick Actions</div>';
    html += procAction('fa-plus-circle',         'var(--primary)', 'Create New Order',  'Place a stock order',               "procNav('proc-new')");
    html += procAction('fa-clock',               'var(--gold)',    'Orders Placed',      (pending.length+transit.length)+' orders pending', "procNav('proc-orders')");
    html += procAction('fa-exclamation-triangle','var(--danger)',  'Low Stock',          low.length+' items need attention',  "procNav('proc-low')");
    html += procAction('fa-truck',               'var(--info)',    'Suppliers',          'View & contact suppliers',          "procNav('proc-sups')");

    if (low.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">⚠️ Top Low Stock</div>';
        low.slice(0,5).forEach(function(item) {
            var bc = item.status==='out-of-stock' ? 'var(--danger)' : 'var(--gold)';
            html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-card);' +
                'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="width:36px;height:36px;border-radius:10px;background:rgba(26,139,168,.1);display:flex;' +
                'align-items:center;justify-content:center;color:var(--primary);flex-shrink:0">' +
                '<i class="fas fa-exclamation-triangle"></i></div>' +
                '<div style="flex:1;min-width:0"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + item.name + '</div>' +
                '<div style="font-size:.7rem;color:var(--text-light)">' + (item.quantity||0) + ' ' + item.unit +
                ' • Reorder: ' + (item.parLevel||item.reorder||0) + '</div></div>' +
                '<span style="padding:3px 10px;border-radius:12px;font-size:.65rem;font-weight:600;background:rgba(0,0,0,.15);color:' + bc + '">' +
                pStatusText(item.status) + '</span></div>';
        });
    }
    return html;
}

function procNewOrder() {
    var inv  = pGetInv();
    var html = '';
    if (procCart.length > 0) {
        html += '<div style="background:rgba(46,168,113,.1);border-left:3px solid var(--success);padding:12px 14px;' +
            'border-radius:var(--rs);margin-bottom:12px;font-size:.82rem;color:var(--text)">' +
            '<strong>' + procCart.length + ' item(s)</strong> in your order</div>';
    }
    html += '<div style="display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1.5px solid var(--border);' +
        'border-radius:var(--r);padding:10px 14px;margin-bottom:12px">' +
        '<i class="fas fa-search" style="color:var(--text-muted)"></i>' +
        '<input type="text" id="proc-search" placeholder="Search items..." oninput="procFilterItems()" ' +
        'style="flex:1;border:none;outline:none;font-size:.88rem;font-family:inherit;color:var(--text);background:transparent"></div>';

    html += '<div id="proc-items-list">';
    inv.forEach(function(item) {
        var inCart = procCart.find(function(c) { return c.id === item.id; });
        var bc     = item.status==='in-stock' ? 'var(--success)' : item.status==='low-stock' ? 'var(--gold)' : 'var(--danger)';
        html += '<div class="proc-item" data-name="' + item.name.toLowerCase() + '" ' +
            'style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);' +
            'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
            '<div style="width:36px;height:36px;border-radius:10px;background:' +
            (inCart ? 'rgba(46,168,113,.15)' : 'rgba(26,139,168,.1)') +
            ';display:flex;align-items:center;justify-content:center;color:' +
            (inCart ? 'var(--success)' : 'var(--primary)') + ';flex-shrink:0">' +
            '<i class="fas ' + (inCart ? 'fa-check' : 'fa-box') + '"></i></div>' +
            '<div style="flex:1;min-width:0"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + item.name + '</div>' +
            '<div style="font-size:.68rem;color:var(--text-light)">' + (item.quantity||0) + ' ' + item.unit + ' in stock</div></div>' +
            '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">' +
            '<span style="padding:3px 10px;border-radius:12px;font-size:.62rem;font-weight:600;background:rgba(0,0,0,.1);color:' + bc + '">' +
            pStatusText(item.status) + '</span>' +
            (inCart
                ? '<button onclick="procRemoveFromCart(\'' + item.id + '\')" style="padding:3px 8px;background:rgba(201,69,69,.1);' +
                  'color:var(--danger);border:none;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit">' +
                  '<i class="fas fa-minus"></i> Remove</button>'
                : '<button onclick="procAddToCart(\'' + item.id + '\')" style="padding:3px 8px;background:var(--primary);' +
                  'color:#fff;border:none;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit">' +
                  '<i class="fas fa-plus"></i> Add</button>'
            ) + '</div></div>';
    });
    html += '</div>';

    if (procCart.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">📋 Your Order</div>';
        procCart.forEach(function(ci) {
            html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);' +
                'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="flex:1"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + ci.name + '</div>' +
                '<div style="font-size:.68rem;color:var(--text-light)">' + ci.unit + '</div></div>' +
                '<input type="number" value="' + ci.qty + '" min="0.1" step="0.1" id="pcqty-' + ci.id + '" ' +
                'onchange="procUpdateQty(\'' + ci.id + '\')" ' +
                'style="width:60px;padding:8px 4px;text-align:center;border:2px solid var(--border);border-radius:var(--rs);' +
                'font-size:.95rem;font-weight:700;color:var(--text);background:var(--bg-dark);font-family:inherit">' +
                '<button onclick="procRemoveFromCart(\'' + ci.id + '\')" ' +
                'style="width:30px;height:30px;border-radius:50%;background:rgba(201,69,69,.1);border:none;' +
                'color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0">' +
                '<i class="fas fa-times"></i></button></div>';
        });

        var total = procCart.reduce(function(s,c) { return s + (c.qty * c.cost); }, 0);
        html += '<div style="position:sticky;bottom:0;padding:12px 0;background:var(--bg);border-top:1px solid var(--border);margin-top:12px">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.82rem;color:var(--text-light)">' +
            '<span><strong>' + procCart.length + ' item(s)</strong></span>' +
            '<span>Est: <strong style="color:var(--primary)">R' + total.toFixed(2) + '</strong></span></div>' +
            '<button onclick="procPlaceOrder()" style="width:100%;padding:16px;background:linear-gradient(135deg,var(--success),#1a7a4a);' +
            'color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;' +
            'display:flex;align-items:center;justify-content:center;gap:10px">' +
            '<i class="fas fa-paper-plane"></i> Place Order</button></div>';
    }
    return html;
}

function procFilterItems() {
    var q = (document.getElementById('proc-search').value||'').toLowerCase();
    document.querySelectorAll('.proc-item').forEach(function(el) {
        el.style.display = (el.dataset.name||'').includes(q) ? '' : 'none';
    });
}

function procAddToCart(itemId) {
    var inv  = pGetInv();
    var item = inv.find(function(i) { return i.id === itemId; });
    if (!item) return;
    if (procCart.find(function(c) { return c.id === itemId; })) { hubToast('info','Already in order'); return; }
    procCart.push({ id:item.id, name:item.name, unit:item.unit, cost:item.cost||0,
        qty:Math.max((item.parLevel||5)*2,1), supplier:item.supplier||'' });
    hubToast('success','✅ ' + item.name + ' added');
    procNav('proc-new');
}

function procRemoveFromCart(itemId) { procCart = procCart.filter(function(c){return c.id!==itemId;}); procNav('proc-new'); }

function procUpdateQty(itemId) {
    var input = document.getElementById('pcqty-' + itemId);
    if (!input) return;
    var ci = procCart.find(function(c){return c.id===itemId;});
    if (ci) ci.qty = parseFloat(input.value)||0;
}

function procPlaceOrder() {
    if (procCart.length===0) { hubToast('error','Cart empty'); return; }
    procCart.forEach(function(ci) {
        var input = document.getElementById('pcqty-' + ci.id);
        if (input) ci.qty = parseFloat(input.value)||ci.qty;
    });
    hubToast('info','🔄 Generating POs...');
    var groups = {};
    procCart.forEach(function(ci) {
        var supName = ci.supplier||'Unknown Supplier';
        if (!groups[supName]) groups[supName] = {name:supName,items:[]};
        groups[supName].items.push({id:ci.id,name:ci.name,qty:ci.qty,unit:ci.unit,
            cost:ci.cost,total:parseFloat((ci.qty*ci.cost).toFixed(2))});
    });
    var purchases = pGetPurch();
    var newPOs    = [];
    Object.keys(groups).forEach(function(supName) {
        var group = groups[supName];
        var total = group.items.reduce(function(s,i){return s+i.total;},0);
        newPOs.push({id:'PO-'+Date.now()+'-'+Math.floor(Math.random()*1000),
            supplier:supName,items:group.items,total:parseFloat(total.toFixed(2)),
            status:'In Transit',type:'Procurement',createdBy:HUB.user?HUB.user.name:'ProcureAI',
            createdAt:new Date().toISOString(),lineItems:group.items});
    });
    var updated = newPOs.concat(purchases);
    var update  = {};
    update['purchases.'+HUB.entityId] = updated;
    update.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('accounts').doc(HUB.accountId).set(update,{merge:true}).then(function() {
        if (HUB.accountData) { if(!HUB.accountData.purchases)HUB.accountData.purchases={}; HUB.accountData.purchases[HUB.entityId]=updated; }
        procCart = [];
        hubToast('success','✅ '+newPOs.length+' PO(s) created!');
        setTimeout(function(){procNav('proc-orders');},1000);
    }).catch(function(err){hubToast('error','Error: '+err.message);});
}

function procOrders() {
    var purchases = pGetPurch();
    var pending   = pGetPending();
    var transit   = purchases.filter(function(p){return p.status==='In Transit'||p.status==='Processing';});
    var received  = purchases.filter(function(p){return p.status==='Received'||p.status==='Delivered';});

    var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">' +
        pStat('Pending',  pending.length+transit.length, 'var(--gold)')   +
        pStat('Received', received.length,               'var(--success)')+
        pStat('Total',    purchases.length,              'var(--primary)')+
        '</div>';

    if (transit.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">🚚 In Transit</div>';
        transit.forEach(function(p) {
            html += '<div style="background:var(--bg-card);border-radius:var(--rs);padding:14px;margin-bottom:8px;' +
                'box-shadow:var(--shadow);border-left:4px solid var(--primary)">' +
                '<div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
                '<strong style="font-size:.85rem">' + p.id + '</strong>' +
                '<span style="padding:3px 10px;border-radius:12px;font-size:.62rem;font-weight:600;' +
                'background:rgba(26,139,168,.1);color:var(--primary)">Transit</span></div>' +
                '<div style="font-size:.72rem;color:var(--text-light)">' + p.supplier + ' • ' +
                (Array.isArray(p.items)?p.items.length:p.items) + ' items • R' + pFmt(p.total||0) + '</div>' +
                '<button onclick="procMarkReceived(\'' + p.id + '\')" ' +
                'style="margin-top:8px;padding:8px 14px;background:var(--success);color:#fff;border:none;' +
                'border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;width:100%">' +
                '<i class="fas fa-check"></i> Mark Received</button></div>';
        });
    }
    if (purchases.length===0 && pending.length===0) {
        html += '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
            '<i class="fas fa-clock" style="font-size:2rem;opacity:.3;display:block;margin-bottom:10px"></i>' +
            '<h3 style="color:var(--text)">No Orders</h3><p>Create an order to get started</p></div>';
    }
    return html;
}

function procMarkReceived(poId) {
    if (!confirm('Mark as received?')) return;
    var purchases = pGetPurch().map(function(p) {
        if (p.id===poId) return Object.assign({},p,{status:'Received',
            receivedDate:new Date().toISOString(),receivedBy:HUB.user?HUB.user.name:''});
        return p;
    });
    var update = {};
    update['purchases.'+HUB.entityId] = purchases;
    update.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
    db.collection('accounts').doc(HUB.accountId).set(update,{merge:true}).then(function() {
        if (HUB.accountData) HUB.accountData.purchases[HUB.entityId] = purchases;
        procNav('proc-orders');
        hubToast('success','✅ Received — sent to GRV queue');
    });
}

function procLowStock() {
    var inv = pGetInv();
    var low = inv.filter(function(i){return i.status==='low-stock'||i.status==='out-of-stock';})
        .sort(function(a,b){
            if(a.status==='out-of-stock'&&b.status!=='out-of-stock')return -1;
            if(b.status==='out-of-stock'&&a.status!=='out-of-stock')return 1;
            return (a.quantity||0)-(b.quantity||0);
        }).slice(0,25);

    if (low.length===0) return '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
        '<i class="fas fa-check-circle" style="color:var(--success);font-size:2rem;display:block;margin-bottom:10px"></i>' +
        '<h3 style="color:var(--text)">All Good!</h3><p>No items need attention</p></div>';

    var html = '<div style="background:rgba(26,139,168,.1);border-left:3px solid var(--info);padding:12px 14px;' +
        'border-radius:var(--rs);margin-bottom:12px;font-size:.82rem;color:var(--text)">' +
        '<strong>' + low.length + '</strong> items need attention. Tap "Order" to add to cart.</div>';

    low.forEach(function(item) {
        var bc = item.status==='out-of-stock' ? 'var(--danger)' : 'var(--gold)';
        html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);' +
            'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
            '<div style="width:36px;height:36px;border-radius:10px;background:rgba(201,69,69,.1);display:flex;' +
            'align-items:center;justify-content:center;color:' + bc + ';flex-shrink:0">' +
            '<i class="fas fa-exclamation-triangle"></i></div>' +
            '<div style="flex:1;min-width:0"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + item.name + '</div>' +
            '<div style="font-size:.68rem;color:var(--text-light)">' + (item.quantity||0) + ' ' + item.unit + ' left</div></div>' +
            '<button onclick="procAddToCart(\'' + item.id + '\');procNav(\'proc-new\')" ' +
            'style="padding:3px 8px;background:var(--primary);color:#fff;border:none;border-radius:6px;' +
            'font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit"><i class="fas fa-plus"></i> Order</button></div>';
    });
    return html;
}

function procSuppliers() {
    var sups = pGetSups();
    if (sups.length===0) return '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
        '<i class="fas fa-truck" style="font-size:2rem;opacity:.3;display:block;margin-bottom:10px"></i>' +
        '<h3 style="color:var(--text)">No Suppliers</h3><p>Add suppliers in Web App</p></div>';

    var DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var html = '';

    sups.forEach(function(sup) {
        var dd = (sup.deliveryDays||[]).map(function(d){
            return DAYS_SHORT[DAYS_FULL.indexOf(d)]||d;
        }).join(', ')||'Not set';

        html += '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;margin-bottom:12px;' +
            'box-shadow:var(--shadow);border-left:4px solid var(--primary)">' +
            '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">' +
            '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));' +
            'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;flex-shrink:0">' +
            sup.name.charAt(0).toUpperCase() + '</div>' +
            '<div style="flex:1"><div style="font-size:.92rem;font-weight:700;color:var(--text)">' + sup.name + '</div>' +
            '<div style="font-size:.7rem;color:var(--text-light)">' + (sup.type||'General') + '</div>' +
            '<div style="font-size:.65rem;color:var(--info);font-weight:600;margin-top:2px">' +
            '<i class="fas fa-truck" style="font-size:.6rem"></i> ' + dd + '</div>' +
            (sup.paymentTerms?'<div style="font-size:.65rem;color:var(--gold-dark);font-weight:600;margin-top:1px">' +
            '<i class="fas fa-calendar-check" style="font-size:.6rem"></i> ' + sup.paymentTerms + '</div>':'') +
            '</div></div>' +
            '<div style="display:flex;gap:8px">' +
            (sup.phone?'<a href="tel:'+sup.phone+'" style="flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);' +
            'border-radius:var(--rs);text-align:center;text-decoration:none;font-size:.78rem;font-weight:600;color:var(--text-mid);font-family:inherit">' +
            '<i class="fas fa-phone"></i> Call</a>':'') +
            (sup.email?'<a href="mailto:'+sup.email+'" style="flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);' +
            'border-radius:var(--rs);text-align:center;text-decoration:none;font-size:.78rem;font-weight:600;color:var(--text-mid);font-family:inherit">' +
            '<i class="fas fa-envelope"></i> Email</a>':'') +
            (sup.phone?'<a href="https://wa.me/'+sup.phone.replace(/[^0-9]/g,'')+'" target="_blank" ' +
            'style="flex:1;padding:8px;background:var(--bg);border:1px solid #25D366;border-radius:var(--rs);' +
            'text-align:center;text-decoration:none;font-size:.78rem;font-weight:600;color:#25D366;font-family:inherit">' +
            '<i class="fab fa-whatsapp"></i> WhatsApp</a>':'') +
            '</div></div>';
    });
    return html;
}

console.log('✅ ProcureAI embedded');
</script>

<script>
function getMenuMasterHTML() {
    return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)">' +
        '<header class="hub-header" style="background:linear-gradient(90deg,#6b21a8,#8b5cf6)">' +
        '<button class="return-hub-btn" onclick="closeEmbeddedApp()"><i class="fas fa-arrow-left"></i> Hub</button>' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;color:#fff"><i class="fas fa-utensils"></i>' +
        '<div><div style="font-size:.88rem;font-weight:700">Menu Master</div>' +
        '<div style="font-size:.62rem;color:rgba(255,255,255,.7)">' + (HUB.entityName||'Entity') + '</div></div></div>' +
        '<button class="hub-hbtn" onclick="mmRefresh()" style="background:rgba(255,255,255,.15)"><i class="fas fa-sync-alt"></i></button></header>' +
        '<div id="mm-content" style="flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;-webkit-overflow-scrolling:touch"></div>' +
        '<nav style="height:var(--nav-h);background:var(--bg-card);border-top:1px solid var(--border);' +
        'display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding:0 8px 8px;z-index:50">' +
        mmNavBtn('mm-dash',   'fa-chart-pie',   'Dashboard', true)  +
        mmNavBtn('mm-items',  'fa-utensils',    'Items',     false) +
        mmNavBtn('mm-create', 'fa-plus-circle', 'Create',    false) +
        mmNavBtn('mm-stock',  'fa-box',         'Stock',     false) +
        '</nav></div>';
}

function mmNavBtn(page, icon, label, active) {
    return '<div data-mmpage="' + page + '" onclick="mmNav(\'' + page + '\')" ' +
        'style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;' +
        'border-radius:var(--rs);cursor:pointer;min-width:56px;' +
        'color:' + (active?'#8b5cf6':'var(--text-light)') + ';' +
        'background:' + (active?'rgba(139,92,246,.08)':'transparent') + '">' +
        '<i class="fas ' + icon + '" style="font-size:1.1rem"></i>' +
        '<span style="font-size:.6rem;font-weight:600">' + label + '</span></div>';
}

function initMenuMasterApp() { mmNav('mm-dash'); }

function mmRefresh() {
    if (!HUB.accountId) return;
    hubToast('info','🔄 Refreshing...');
    db.collection('accounts').doc(HUB.accountId).get().then(function(doc) {
        if (doc.exists) { HUB.accountData = doc.data(); mmNav('mm-dash'); hubToast('success','✅ Done'); }
    });
}

function mmNav(page) {
    document.querySelectorAll('[data-mmpage]').forEach(function(item) {
        var isActive = item.dataset.mmpage === page;
        item.style.color      = isActive ? '#8b5cf6' : 'var(--text-light)';
        item.style.background = isActive ? 'rgba(139,92,246,.08)' : 'transparent';
    });
    var content = document.getElementById('mm-content');
    if (!content) return;
    content.scrollTop = 0;
    if      (page==='mm-dash')   content.innerHTML = mmPageDash();
    else if (page==='mm-items')  content.innerHTML = mmPageItems();
    else if (page==='mm-create') content.innerHTML = mmPageCreate();
    else if (page==='mm-stock')  content.innerHTML = mmPageStock();
}

function mmGetMenuItems() {
    if (!HUB.accountData||!HUB.entityId) return [];
    return (HUB.accountData.menuItems||{})[HUB.entityId]||[];
}
function mmGetInv() {
    if (!HUB.accountData||!HUB.entityId) return [];
    return (HUB.accountData.inventory||{})[HUB.entityId]||[];
}
function mmSaveMenuItems(menuArray) {
    if (!HUB.accountId||!HUB.entityId) return;
    var update = {};
    update['menuItems.'+HUB.entityId] = menuArray;
    update.lastUpdated   = firebase.firestore.FieldValue.serverTimestamp();
    update.lastUpdatedBy = HUB.user ? HUB.user.name : 'Menu Master';
    db.collection('accounts').doc(HUB.accountId).set(update,{merge:true}).then(function() {
        if (HUB.accountData) {
            if (!HUB.accountData.menuItems) HUB.accountData.menuItems = {};
            HUB.accountData.menuItems[HUB.entityId] = menuArray;
        }
    }).catch(function(err){hubToast('error','Save error: '+err.message);});
}
function mmFmt(n) { n=n||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toFixed(0); }
function mmStat(l,v,c) {
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px 10px;box-shadow:var(--shadow);' +
        'border-left:3px solid '+c+';text-align:center">' +
        '<div style="font-size:.58rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">'+l+'</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">'+v+'</div></div>';
}

function mmPageDash() {
    var ent      = HUB.entity||{};
    var inv      = mmGetInv();
    var menu     = mmGetMenuItems();
    var stockVal = inv.reduce(function(s,i){return s+(i.value||0);},0);
    var openingStock = ent.openingStockValue||stockVal;
    var totalPurch   = ((HUB.accountData||{}).purchases||{})[HUB.entityId]||[];
    var purchTotal   = totalPurch.reduce(function(s,p){return s+(p.grvTotal||p.total||0);},0);
    var cashups      = ((HUB.accountData||{}).cashups||{})[HUB.entityId]||{};
    var totalSales   = 0;
    Object.values(cashups).forEach(function(cu){if(typeof cu==='object'&&cu.total)totalSales+=cu.total;});
    var salesExVat   = totalSales/1.15;
    var purchExVat   = purchTotal/1.15;
    var liveFoodCost = salesExVat>0?((openingStock+purchExVat-stockVal)/salesExVat*100):0;
    var targetFC     = ent.foodCostTarget||28;
    var fcColor      = liveFoodCost>targetFC?'var(--danger)':'var(--success)';
    var html = '';

    html += '<div style="background:var(--bg-card);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;border-left:4px solid #8b5cf6">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
        '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#6b21a8);' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem"><i class="fas fa-chart-line"></i></div>' +
        '<div><div style="font-size:1rem;font-weight:800;color:var(--text)">Food Cost Analysis</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">'+(HUB.entityName||'')+'</div></div></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
        '<div style="text-align:center;padding:16px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:4px">Live Food Cost</div>' +
        '<div style="font-size:2rem;font-weight:900;color:'+fcColor+'">'+liveFoodCost.toFixed(1)+'%</div></div>' +
        '<div style="text-align:center;padding:16px;background:var(--bg);border-radius:var(--rs)">' +
        '<div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:4px">Target</div>' +
        '<div style="font-size:2rem;font-weight:900;color:#8b5cf6">'+targetFC+'%</div></div></div>' +
        '<div style="margin-top:14px;padding:12px;background:'+(liveFoodCost>targetFC?'rgba(201,69,69,.08)':'rgba(46,168,113,.08)')+';' +
        'border-radius:var(--rs);text-align:center;font-size:.85rem;font-weight:600;color:'+fcColor+'">' +
        (liveFoodCost>targetFC?'⚠️ '+(liveFoodCost-targetFC).toFixed(1)+'% ABOVE target':'✅ '+(targetFC-liveFoodCost).toFixed(1)+'% BELOW target')+'</div></div>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">' +
        mmStat('Menu Items',  menu.length,         '#8b5cf6')    +

        mmStat('Stock Value', 'R'+mmFmt(stockVal),  'var(--gold)') + '</div>';

    if (menu.length > 0) {
        var sorted = menu.slice().sort(function(a,b){return (b.actualFC||0)-(a.actualFC||0);});
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">📊 Menu Cost Analysis</div>';
        sorted.slice(0,8).forEach(function(m) {
            var fc      = m.actualFC||0;
            var fcBadge = fc>targetFC?'rgba(201,69,69,.1)':'rgba(46,168,113,.1)';
            var fcCol   = fc>targetFC?'var(--danger)':'var(--success)';

        });
    }
    return html;
}

        html += '<div data-mmname="'+m.name.toLowerCase()+'" style="background:var(--bg-card);border-radius:var(--r);' +

            '<div style="flex:1"><div style="font-size:.92rem;font-weight:700;color:var(--text)">'+m.name+'</div>' +
            '<div style="font-size:.7rem;color:var(--text-light);margin-top:2px">'+(m.ingredients?m.ingredients.length:0)+' ingredients • Yield: '+(m.yield||1)+'</div></div>' +
            '<span style="padding:3px 10px;border-radius:12px;font-size:.65rem;font-weight:600;background:'+fcBg+';color:'+fcColor+'">FC: '+fc.toFixed(1)+'%</span></div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)"><div style="font-size:.58rem;color:var(--text-muted)">Cost</div><div style="font-size:.85rem;font-weight:700">R'+(m.costPerPortion||0).toFixed(2)+'</div></div>' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)"><div style="font-size:.58rem;color:var(--text-muted)">Price</div><div style="font-size:.85rem;font-weight:700;color:#8b5cf6">R'+(m.setPrice||0).toFixed(2)+'</div></div>' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)"><div style="font-size:.58rem;color:var(--text-muted)">FC%</div><div style="font-size:.85rem;font-weight:700;color:'+fcColor+'">'+fc.toFixed(1)+'%</div></div>' +
            '<div style="text-align:center;padding:8px;background:var(--bg);border-radius:var(--rs)"><div style="font-size:.58rem;color:var(--text-muted)">GP%</div><div style="font-size:.85rem;font-weight:700;color:var(--success)">'+(m.setPrice?(100-fc).toFixed(1):'0')+'%</div></div></div>' +
            '<div style="display:flex;gap:8px">' +
            '<button onclick="showRecipeScaler(\''+m.id+'\')" style="flex:1;padding:8px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:var(--rs);color:#8b5cf6;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="fas fa-calculator"></i> Scale</button>' +
            '<button onclick="mmViewItem(\''+m.id+'\')" style="flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-mid);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="fas fa-eye"></i> View</button>' +
            '<button onclick="mmDeleteItemById(\''+m.id+'\')" style="flex:1;padding:8px;background:rgba(201,69,69,.1);border:1px solid rgba(201,69,69,.3);border-radius:var(--rs);color:var(--danger);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="fas fa-trash"></i> Delete</button></div></div>';
    });

    return html;
}

function mmFilterItems() {
    var q = (document.getElementById('mm-search').value||'').toLowerCase();
    document.querySelectorAll('#mm-items-list [data-mmname]').forEach(function(el) {
        el.style.display = (el.dataset.mmname||'').includes(q)?'':'none';
    });
}

function mmViewItem(id) {
    var m = mmGetMenuItems().find(function(x){return x.id===id;});
    if (!m) return;
    var ingList = (m.ingredients||[]).map(function(i) {
        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem">' +
            '<span style="color:var(--text)">'+i.item+' ('+i.qty+' '+i.unit+')</span>' +
            '<span style="font-weight:600;color:#8b5cf6">R'+(i.total||0).toFixed(2)+'</span></div>';
    }).join('');
    var fc      = m.actualFC||0;
    var fcColor = fc>((HUB.entity||{}).foodCostTarget||28)?'var(--danger)':'var(--success)';
    showHubModal(m.name,
        ingList +
        '<div style="background:var(--bg);border-radius:var(--rs);padding:14px;margin-top:14px">' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem"><span>Cost/Portion:</span><strong style="color:#8b5cf6">R'+(m.costPerPortion||0).toFixed(2)+'</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem"><span>Price:</span><strong>R'+(m.setPrice||0).toFixed(2)+'</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:1rem;font-weight:800;border-top:2px solid #8b5cf6;padding-top:10px;margin-top:4px"><span>FC%:</span><strong style="color:'+fcColor+'">'+fc.toFixed(1)+'%</strong></div></div>' +
        '<button onclick="closeHubModal();showRecipeScaler(\''+m.id+'\')" style="width:100%;margin-top:14px;padding:12px;background:linear-gradient(135deg,#8b5cf6,#6b21a8);color:#fff;border:none;border-radius:var(--rs);font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit"><i class="fas fa-calculator"></i> Scale This Recipe</button>',
        '<button onclick="closeHubModal()" style="flex:1;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:600;color:var(--text-mid)">Close</button>'
    );
}

function mmDeleteItemById(id) {
    if (!confirm('Delete this menu item?')) return;
    var menu = mmGetMenuItems().filter(function(m){return m.id!==id;});
    mmSaveMenuItems(menu);
    mmNav('mm-items');
    hubToast('success','Deleted');
}

function mmPageCreate() {
    var ent = HUB.entity||{};
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:14px;border-left:4px solid #8b5cf6">' +
        '<div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:14px"><i class="fas fa-plus-circle" style="color:#8b5cf6"></i> Create Menu Item</div>' +
        '<div style="margin-bottom:10px"><label style="font-size:.75rem;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Menu Item Name *</label>' +
        '<input type="text" id="mm-name" placeholder="e.g. Grilled Chicken Burger" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit;font-size:.85rem"></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">' +
        '<div><label style="font-size:.75rem;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Yield (Portions)</label>' +
        '<input type="number" id="mm-yield" value="1" min="1" oninput="mmCalcCost()" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit"></div>' +
        '<div><label style="font-size:.75rem;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Selling Price (R) *</label>' +
        '<input type="number" id="mm-price" placeholder="0.00" step="0.01" oninput="mmCalcCost()" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit"></div></div>' +
        '<div style="font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:8px"><i class="fas fa-list"></i> Ingredients</div>' +
        '<p style="font-size:.72rem;color:var(--text-light);margin-bottom:10px">Prices pulled from system automatically</p>' +
        '<div id="mm-ingredients"></div>' +
        '<button onclick="mmAddIngredient()" style="width:100%;padding:10px;background:var(--bg);border:1px dashed #8b5cf6;border-radius:var(--rs);color:#8b5cf6;cursor:pointer;font-family:inherit;font-size:.82rem;margin-bottom:14px"><i class="fas fa-plus"></i> Add Ingredient</button>' +
        '<div style="background:var(--bg);border-radius:var(--rs);padding:14px;margin-bottom:14px">' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)"><span>Recipe Cost:</span><strong id="mm-total">R 0.00</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)"><span>÷ Yield:</span><strong id="mm-ydisp">1</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;border-top:1px solid var(--border);padding-top:8px;color:#8b5cf6"><span><strong>Cost/Portion:</strong></span><strong id="mm-pp" style="font-size:1rem">R 0.00</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:.85rem;color:var(--text-mid)"><span>Target FC:</span><strong>'+(ent.foodCostTarget||28)+'%</strong></div>' +
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:1rem;font-weight:800;border-top:2px solid #8b5cf6;padding-top:10px;margin-top:4px"><span style="color:var(--text)">Actual FC%:</span><strong id="mm-fc" style="color:#8b5cf6">—</strong></div></div>' +
        '<button onclick="mmSaveItem()" style="width:100%;padding:16px;background:linear-gradient(135deg,#8b5cf6,#6b21a8);color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit"><i class="fas fa-save"></i> Save Menu Item</button></div>';
}

function mmAddIngredient() {
    var inv  = mmGetInv();
    var opts = inv.length===0 ? '<option value="">No stock items</option>' :
        '<option value="">Select</option>' + inv.map(function(i) {
            return '<option value="'+i.id+'" data-cost="'+(i.cost||0)+'" data-unit="'+(i.unit||'each')+'" data-name="'+i.name+'">'+i.name+'</option>';
        }).join('');
    var row = document.createElement('div');
    row.className = 'mm-ing-row';
    row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr auto;gap:8px;margin-bottom:6px;align-items:center;padding:8px;background:var(--bg);border-radius:var(--rs)';
    row.innerHTML =
        '<select class="mm-sel" onchange="mmCalcCost()" style="padding:8px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit;font-size:.82rem">'+opts+'</select>' +
        '<input type="number" class="mm-qty" placeholder="Qty" step="0.001" oninput="mmCalcCost()" style="padding:8px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit;font-size:.82rem">' +
        '<button onclick="this.parentElement.remove();mmCalcCost()" style="width:28px;height:28px;border-radius:50%;background:rgba(201,69,69,.1);border:none;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-times"></i></button>';
    var container = document.getElementById('mm-ingredients');
    if (container) container.appendChild(row);
}

function mmCalcCost() {
    var totalCost = 0;
    document.querySelectorAll('.mm-ing-row').forEach(function(row) {
        var sel = row.querySelector('.mm-sel');
        var qty = parseFloat(row.querySelector('.mm-qty').value)||0;
        if (sel&&sel.selectedIndex>0) totalCost += qty*(parseFloat(sel.options[sel.selectedIndex].dataset.cost)||0);
    });
    var yieldVal = parseFloat(document.getElementById('mm-yield').value)||1;
    var costPP   = totalCost/yieldVal;
    var setPrice = parseFloat(document.getElementById('mm-price').value)||0;
    var targetFC = (HUB.entity||{}).foodCostTarget||28;
    var actualFC = setPrice>0?(costPP/setPrice*100):0;
    var el;
    el=document.getElementById('mm-total');  if(el)el.textContent='R '+totalCost.toFixed(2);
    el=document.getElementById('mm-ydisp'); if(el)el.textContent=yieldVal;
    el=document.getElementById('mm-pp');    if(el)el.textContent='R '+costPP.toFixed(2);
    el=document.getElementById('mm-fc');    if(el){el.textContent=setPrice>0?actualFC.toFixed(1)+'%':'—';el.style.color=actualFC>targetFC?'var(--danger)':'var(--success)';}
}

function mmSaveItem() {
    var name = (document.getElementById('mm-name').value||'').trim();
    if (!name) { hubToast('error','Enter name'); return; }
    var yieldVal = parseFloat(document.getElementById('mm-yield').value)||1;
    var setPrice = parseFloat(document.getElementById('mm-price').value)||0;
    if (setPrice<=0) { hubToast('error','Enter selling price'); return; }
    var ingredients=[]; var totalCost=0;
    document.querySelectorAll('.mm-ing-row').forEach(function(row) {
        var sel=row.querySelector('.mm-sel'); var qty=parseFloat(row.querySelector('.mm-qty').value)||0;
        if (sel&&sel.selectedIndex>0&&qty>0) {
            var opt=sel.options[sel.selectedIndex]; var cost=parseFloat(opt.dataset.cost)||0; var lc=qty*cost; totalCost+=lc;
            ingredients.push({itemId:sel.value,item:opt.dataset.name,qty:qty,unit:opt.dataset.unit,cost:cost,total:parseFloat(lc.toFixed(2))});
        }
    });
    if (ingredients.length===0) { hubToast('error','Add ingredients'); return; }
    var costPP=totalCost/yieldVal; var targetFC=(HUB.entity||{}).foodCostTarget||28;
    var suggested=costPP/(targetFC/100); var actualFC=(costPP/setPrice*100);
    var menu=mmGetMenuItems();
    menu.push({id:'MN-'+Date.now(),name:name,ingredients:ingredients,yield:yieldVal,
        totalCost:parseFloat(totalCost.toFixed(2)),costPerPortion:parseFloat(costPP.toFixed(2)),
        suggestedPrice:parseFloat(suggested.toFixed(2)),setPrice:setPrice,
        actualFC:parseFloat(actualFC.toFixed(2)),sold:0,
        createdBy:HUB.user?HUB.user.name:'Menu Master',createdAt:new Date().toISOString()});
    mmSaveMenuItems(menu);
    hubToast('success','✅ '+name+' added!');
    mmNav('mm-items');
}

function mmPageStock() {
    var inv  = mmGetInv();
    var html = '<div style="display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px">' +
        '<i class="fas fa-search" style="color:var(--text-muted)"></i>' +
        '<input type="text" id="mm-stock-search" placeholder="Search stock..." oninput="mmFilterStock()" ' +
        'style="flex:1;border:none;outline:none;font-size:.88rem;font-family:inherit;color:var(--text);background:transparent"></div>';
    html += '<div id="mm-stock-list">';
    inv.forEach(function(item) {
        var bc = item.status==='in-stock'?'var(--success)':item.status==='low-stock'?'var(--gold)':'var(--danger)';
        var st = (item.status||'').split('-').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
        html += '<div data-stkname="'+item.name.toLowerCase()+'" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
            '<div style="width:36px;height:36px;border-radius:10px;background:rgba(139,92,246,.1);display:flex;align-items:center;justify-content:center;color:#8b5cf6;flex-shrink:0"><i class="fas fa-box"></i></div>' +
            '<div style="flex:1;min-width:0"><div style="font-size:.85rem;font-weight:600;color:var(--text)">'+item.name+'</div>' +
            '<div style="font-size:.68rem;color:var(--text-light)">'+(item.category||'')+' • '+(item.quantity||0)+' '+item.unit+' • R'+(item.cost||0).toFixed(2)+'/'+item.unit+'</div></div>' +
            '<span style="padding:3px 10px;border-radius:12px;font-size:.65rem;font-weight:600;background:rgba(0,0,0,.1);color:'+bc+'">'+st+'</span></div>';
    });
    html += '</div>';
    if (inv.length===0) html += '<div style="text-align:center;padding:40px;color:var(--text-light)"><i class="fas fa-box" style="font-size:2rem;opacity:.3;display:block;margin-bottom:10px"></i><p>No stock items — add in Web App</p></div>';
    return html;
}

function mmFilterStock() {
    var q = (document.getElementById('mm-stock-search').value||'').toLowerCase();
    document.querySelectorAll('#mm-stock-list [data-stkname]').forEach(function(el) {
        el.style.display=(el.dataset.stkname||'').includes(q)?'':'none';
    });
}

console.log('✅ Menu Master embedded');
</script>

        'background:'+(active?'rgba(236,72,153,.08)':'transparent')+'">' +

function initFunctionsApp() {
    HUB.functionsData = HUB.accountData ? ((HUB.accountData.functions||{})[HUB.entityId]||[]) : [];
    funcNavigate('func-dash');
}

function funcRefresh() {
    if (!HUB.accountId) return;
    hubToast('info','🔄 Refreshing...');
    db.collection('accounts').doc(HUB.accountId).get().then(function(doc) {
        if (doc.exists) {
            HUB.accountData   = doc.data();
            HUB.functionsData = (doc.data().functions||{})[HUB.entityId]||[];
            funcNavigate('func-dash');
            hubToast('success','✅ Refreshed');
        }
    });
}

function funcNavigate(page) {
    document.querySelectorAll('[data-fpage]').forEach(function(item) {
        var isActive = item.dataset.fpage===page;
        item.style.color      = isActive?'#ec4899':'var(--text-light)';
        item.style.background = isActive?'rgba(236,72,153,.08)':'transparent';
    });
    var content = document.getElementById('func-content');
    if (!content) return;
    content.scrollTop = 0;
    if      (page==='func-dash')   content.innerHTML = funcDashboard();
    else if (page==='func-create') content.innerHTML = funcCreate();
    else if (page==='func-list')   content.innerHTML = funcList();
}

function funcFmt(n)    { n=n||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toFixed(0); }
function funcFmtDate(d){ if(!d)return'—'; return new Date(d).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}); }

function funcStat(label,value,color) {
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px 10px;box-shadow:var(--shadow);border-left:3px solid '+color+';text-align:center">' +
        '<div style="font-size:.58rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">'+label+'</div>' +
        '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">'+value+'</div></div>';
}

function funcInput(label,id,type,placeholder,value) {
    return '<div><label style="font-size:.75rem;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">'+label+'</label>' +
        '<input type="'+type+'" id="'+id+'" '+(placeholder?'placeholder="'+placeholder+'" ':'')+
        (value!==undefined?'value="'+value+'" ':'')+
        'style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-dark);font-family:inherit;font-size:.85rem"></div>';
}

function funcDashboard() {
    var funcs      = HUB.functionsData||[];
    var now        = new Date();
    var upcoming   = funcs.filter(function(f){return new Date(f.functionDate)>=now;});
    var past       = funcs.filter(function(f){return new Date(f.functionDate)<now;});
    var totalRev   = funcs.reduce(function(s,f){return s+(f.totalExVat||0);},0);
    var html       = '';

    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">';
    html += funcStat('Total Events', funcs.length,    '#ec4899');
    html += funcStat('Upcoming',     upcoming.length, 'var(--success)');
    html += funcStat('Past',         past.length,     'var(--text-muted)');
    html += funcStat('Revenue (excl.)','R'+funcFmt(totalRev),'var(--gold)');
    html += '</div>';

    if (upcoming.length>0) {
        upcoming.sort(function(a,b){return new Date(a.functionDate)-new Date(b.functionDate);});
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">🎉 Upcoming Events</div>';
        upcoming.forEach(function(f) {
            var daysUntil   = Math.ceil((new Date(f.functionDate)-now)/86400000);
            var urgentColor = daysUntil<=3?'var(--danger)':daysUntil<=7?'var(--warning)':'#ec4899';
            html += '<div onclick="funcViewDetail(\''+f.id+'\')" style="background:var(--bg-card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid #ec4899;cursor:pointer">' +
                '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
                '<div><div style="font-size:.92rem;font-weight:700;color:var(--text)">'+f.functionName+'</div>' +
                '<div style="font-size:.72rem;color:var(--text-light)">'+f.clientName+(f.contactPerson?' • '+f.contactPerson:'')+'</div></div>' +
                '<span style="padding:3px 10px;border-radius:12px;font-size:.65rem;font-weight:700;background:rgba(236,72,153,.1);color:'+urgentColor+'">'+daysUntil+' day'+(daysUntil!==1?'s':'')+'</span></div>' +
                '<div style="display:flex;gap:14px;font-size:.72rem;color:var(--text-light);flex-wrap:wrap">' +
                '<span><i class="fas fa-calendar"></i> '+funcFmtDate(f.functionDate)+'</span>' +
                '<span><i class="fas fa-users"></i> '+(f.pax||0)+' guests</span>' +
                '<span><i class="fas fa-tag"></i> R'+funcFmt(f.totalExVat||0)+' excl.</span>' +
                (f.theme?'<span><i class="fas fa-paint-brush"></i> '+f.theme+'</span>':'') +
                '</div></div>';
        });
    } else {
        html += '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
            '<i class="fas fa-glass-cheers" style="font-size:3rem;opacity:.3;display:block;margin-bottom:14px"></i>' +
            '<h3 style="color:var(--text);margin-bottom:6px">No Upcoming Events</h3><p>Create your first event to get started</p>' +
            '<button onclick="funcNavigate(\'func-create\')" style="margin-top:14px;padding:12px 24px;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;border:none;border-radius:var(--r);font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit"><i class="fas fa-plus"></i> Create Event</button></div>';
    }

    if (past.length>0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">📁 Recent Past Events</div>';
        past.slice(0,3).forEach(function(f) {
            html += '<div onclick="funcViewDetail(\''+f.id+'\')" style="background:var(--bg-card);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border-left:4px solid var(--text-muted);cursor:pointer;opacity:.7">' +
                '<div style="display:flex;justify-content:space-between;align-items:center">' +
                '<div><div style="font-size:.85rem;font-weight:600;color:var(--text)">'+f.functionName+'</div>' +
                '<div style="font-size:.7rem;color:var(--text-light)">'+f.clientName+' • '+funcFmtDate(f.functionDate)+'</div></div>' +
                '<span style="font-size:.82rem;font-weight:700;color:var(--text-muted)">R'+funcFmt(f.totalExVat||0)+'</span></div></div>';
        });
    }
    return html;
}

function funcMenuSel(sel) {
    var row   = sel.closest('.fc-menu-row');
    var desc  = row.querySelector('.fc-menu-desc');
    var price = row.querySelector('.fc-menu-price');
    if (sel.value==='custom') { desc.value=''; desc.focus(); }
    else if (sel.selectedIndex>0) {
        var opt = sel.options[sel.selectedIndex];
        desc.value  = opt.dataset.name||'';
        price.value = opt.dataset.price||'';
        funcCalcTotals();

        '<div><label style="font-size:.65rem;color:var(--text-muted);display:block;margin-bottom:2px">Price (excl.)</label>' +

        '<div class="fc-bev-lt" style="text-align:right;font-size:.78rem;font-weight:700;color:#ec4899;margin-top:4px">R 0.00</div>';

function funcBevSel(sel) {
    var row   = sel.closest('.fc-bev-row');
    var desc  = row.querySelector('.fc-bev-desc');
    var price = row.querySelector('.fc-bev-price');
    if (sel.value==='custom') { desc.value=''; desc.focus(); }
    else if (sel.selectedIndex>0) {
        var opt = sel.options[sel.selectedIndex];
        desc.value  = opt.dataset.name||'';
        price.value = opt.dataset.price||'';
        funcCalcTotals();
    }
}

function funcCalcTotals() {
    var menuTotal = 0;
    document.querySelectorAll('.fc-menu-row').forEach(function(row) {
        var qty=parseFloat(row.querySelector('.fc-menu-qty').value)||0;
        var price=parseFloat(row.querySelector('.fc-menu-price').value)||0;
        var lt=qty*price; var ltEl=row.querySelector('.fc-menu-lt');
        if(ltEl)ltEl.textContent='R '+lt.toFixed(2); menuTotal+=lt;
    });
    var bevTotal = 0;
    document.querySelectorAll('.fc-bev-row').forEach(function(row) {
        var qty=parseFloat(row.querySelector('.fc-bev-qty').value)||0;
        var price=parseFloat(row.querySelector('.fc-bev-price').value)||0;
        var lt=qty*price; var ltEl=row.querySelector('.fc-bev-lt');
        if(ltEl)ltEl.textContent='R '+lt.toFixed(2); bevTotal+=lt;
    });
    var subtotal=menuTotal+bevTotal, vat=parseFloat((subtotal*0.15).toFixed(2)), total=parseFloat((subtotal+vat).toFixed(2));
    var el;
    el=document.getElementById('fc-menu-total'); if(el)el.textContent='R '+menuTotal.toFixed(2);
    el=document.getElementById('fc-bev-total');  if(el)el.textContent='R '+bevTotal.toFixed(2);
    el=document.getElementById('fc-subtotal');   if(el)el.textContent='R '+subtotal.toFixed(2);
    el=document.getElementById('fc-vat-amt');    if(el)el.textContent='R '+vat.toFixed(2);
    el=document.getElementById('fc-total');      if(el)el.textContent='R '+total.toFixed(2);
}

function funcSubmit() {
    var clientName = (document.getElementById('fc-client').value||'').trim();
    var contact    = (document.getElementById('fc-contact').value||'').trim();
    var phone      = (document.getElementById('fc-phone').value||'').trim();
    var funcName   = (document.getElementById('fc-name').value||'').trim();
    var funcDate   = document.getElementById('fc-date').value;
    var pax        = parseInt(document.getElementById('fc-pax').value)||0;
    if (!clientName){ hubToast('error','Enter client/company name'); return; }
    if (!contact)   { hubToast('error','Enter contact person');      return; }
    if (!phone)     { hubToast('error','Enter phone number');         return; }
    if (!funcName)  { hubToast('error','Enter function name');        return; }
    if (!funcDate)  { hubToast('error','Select function date');       return; }
    if (pax<=0)     { hubToast('error','Enter number of guests');     return; }

    var menuItems=[];
    document.querySelectorAll('.fc-menu-row').forEach(function(row){
        var sel=row.querySelector('.fc-menu-sel');
        var desc=(row.querySelector('.fc-menu-desc').value||'').trim();
        var qty=parseFloat(row.querySelector('.fc-menu-qty').value)||0;
        var price=parseFloat(row.querySelector('.fc-menu-price').value)||0;
        if(desc&&qty>0&&price>=0){
            var cost=0; if(sel&&sel.selectedIndex>0)cost=parseFloat(sel.options[sel.selectedIndex].dataset.cost||0);
            menuItems.push({menuItemId:sel?sel.value:'',name:desc,qty:qty,price:price,cost:cost,total:parseFloat((qty*price).toFixed(2))});
        }
    });

    var beverages=[];
    document.querySelectorAll('.fc-bev-row').forEach(function(row){
        var desc=(row.querySelector('.fc-bev-desc').value||'').trim();
        var qty=parseFloat(row.querySelector('.fc-bev-qty').value)||0;
        var price=parseFloat(row.querySelector('.fc-bev-price').value)||0;
        if(desc&&qty>0)beverages.push({name:desc,qty:qty,price:price,total:parseFloat((qty*price).toFixed(2))});
    });

    if(menuItems.length===0&&beverages.length===0){hubToast('error','Add at least one menu item or beverage');return;}

    var menuTotal=menuItems.reduce(function(s,i){return s+i.total;},0);
    var bevTotal =beverages.reduce(function(s,i){return s+i.total;},0);
    var subtotal =menuTotal+bevTotal;
    var vat      =parseFloat((subtotal*0.15).toFixed(2));
    var totalIncl=parseFloat((subtotal+vat).toFixed(2));
    var funcId   ='FUNC-'+Date.now();
    var invNum   ='FI-'+new Date().getFullYear()+(new Date().getMonth()+1<10?'0':'')+(new Date().getMonth()+1)+'-'+Math.floor(Math.random()*10000);

    var functionData={id:funcId,invoiceNumber:invNum,clientName:clientName,contactPerson:contact,
        phone:phone,email:(document.getElementById('fc-email').value||'').trim(),
        functionName:funcName,functionDate:funcDate,
        theme:(document.getElementById('fc-theme').value||'').trim(),
        purpose:(document.getElementById('fc-purpose').value||'').trim(),
        pax:pax,notes:(document.getElementById('fc-notes').value||'').trim(),
        menuItems:menuItems,beverages:beverages,
        menuTotal:parseFloat(menuTotal.toFixed(2)),bevTotal:parseFloat(bevTotal.toFixed(2)),
        totalExVat:parseFloat(subtotal.toFixed(2)),vat:vat,totalIncl:totalIncl,
        status:'confirmed',createdAt:new Date().toISOString(),
        createdBy:HUB.user?HUB.user.name:'Unknown',entityId:HUB.entityId,entityName:HUB.entityName};

    var invoiceItems=menuItems.map(function(m){return{description:m.name,quantity:m.qty,unitPrice:m.price,total:m.total};})
        .concat(beverages.map(function(b){return{description:b.name,quantity:b.qty,unitPrice:b.price,total:b.total};}));

    var clientInvoice={id:'CINV-FUNC-'+Date.now(),invoiceNumber:invNum,
        invoiceDate:new Date().toISOString().split('T')[0],
        clientName:clientName,clientCompany:clientName,contactPerson:contact,
        clientEmail:(document.getElementById('fc-email').value||'').trim(),clientPhone:phone,
        items:invoiceItems,subtotal:subtotal,vat:vat,totalIncl:totalIncl,
        notes:'Function: '+funcName+' | Date: '+funcDate+' | Guests: '+pax,
        status:'unpaid',createdAt:new Date().toISOString(),
        createdBy:HUB.user?HUB.user.name:'Unknown',functionId:funcId};

    hubToast('info','🔄 Creating function & invoice...');
    if(!Array.isArray(HUB.functionsData))HUB.functionsData=[];
    HUB.functionsData.unshift(functionData);
    var existingInvoices=((HUB.accountData||{}).clientInvoices||{})[HUB.entityId]||[];
    existingInvoices.unshift(clientInvoice);

    var update={};
    update['functions.'+HUB.entityId]      = HUB.functionsData;
    update['clientInvoices.'+HUB.entityId] = existingInvoices;
    update.lastUpdated   = firebase.firestore.FieldValue.serverTimestamp();
    update.lastUpdatedBy = HUB.user?HUB.user.name:'FunctionsAI';

    db.collection('accounts').doc(HUB.accountId).set(update,{merge:true}).then(function(){
        if(HUB.accountData){
            if(!HUB.accountData.functions)HUB.accountData.functions={};
            HUB.accountData.functions[HUB.entityId]=HUB.functionsData;
            if(!HUB.accountData.clientInvoices)HUB.accountData.clientInvoices={};
            HUB.accountData.clientInvoices[HUB.entityId]=existingInvoices;
        }
        hubToast('success','✅ "'+funcName+'" created! Invoice '+invNum+' generated.');
        funcNavigate('func-list');
    }).catch(function(err){hubToast('error','Error: '+err.message);});
}

            '<tr><td style="padding:8px;color:#be185d;font-size:12px">Invoice</td><td style="padding:8px;font-weight:700">'+f.invoiceNumber+'</td></tr>' +
            '<tr style="background:#fff5f9"><td style="padding:8px;color:#be185d;font-size:12px">Total</td><td style="padding:8px;font-weight:700;color:#be185d;font-size:1.1rem">R'+(f.totalIncl||0).toFixed(2)+'</td></tr>' +
            '</table>' +
            (f.notes?'<div style="background:#fff5f9;border-left:3px solid #ec4899;padding:12px;border-radius:4px;margin:14px 0;font-size:12px"><strong>Notes:</strong><br>'+f.notes+'</div>':'')+
            '<p style="color:#5a8a96;font-size:12px">Please contact us if you have any questions.</p>' +
            '<p style="color:#5a8a96;font-size:11px;margin-top:20px;padding-top:14px;border-top:1px solid #f0d0e0">Generated by StockAI-Pro FunctionsAI</p>' +
            '</div></div>'
        );
        hubToast('success','✅ Function sheet emailed to '+f.email);
    } catch(e) { hubToast('error','Email failed: '+e.message); }
}

console.log('✅ FunctionsAI — Fully loaded');
</script>

<!-- MULTI-CURRENCY SYSTEM               -->
<!-- ═══════════════════════════════════ -->
<script>
var CURRENCIES = {
    ZAR:{ code:'ZAR', symbol:'R',   name:'South African Rand', flag:'🇿🇦', rate:1     },
    USD:{ code:'USD', symbol:'$',   name:'US Dollar',          flag:'🇺🇸', rate:0.055 },
    GBP:{ code:'GBP', symbol:'£',   name:'British Pound',      flag:'🇬🇧', rate:0.044 },
    EUR:{ code:'EUR', symbol:'€',   name:'Euro',               flag:'🇪🇺', rate:0.051 },
    ZWL:{ code:'ZWL', symbol:'ZWL', name:'Zimbabwe Dollar',    flag:'🇿🇼', rate:18.5  },
    MZN:{ code:'MZN', symbol:'MT',  name:'Mozambique Metical', flag:'🇲🇿', rate:3.5   },
    BWP:{ code:'BWP', symbol:'P',   name:'Botswana Pula',      flag:'🇧🇼', rate:0.75  },
    NAD:{ code:'NAD', symbol:'N$',  name:'Namibian Dollar',    flag:'🇳🇦', rate:1     },
    KES:{ code:'KES', symbol:'KSh', name:'Kenyan Shilling',    flag:'🇰🇪', rate:8.5   },
    NGN:{ code:'NGN', symbol:'₦',   name:'Nigerian Naira',     flag:'🇳🇬', rate:85    }
};

var APP_CURRENCY     = 'ZAR';
var DISPLAY_CURRENCY = 'ZAR';
var RATES_LAST_UPDATED = null;
var RATES_LOADING    = false;

function fetchLiveRates() {
    if (RATES_LOADING) return;
    var lastFetch = localStorage.getItem('stockai_rates_date');
    var today     = new Date().toISOString().split('T')[0];
    if (lastFetch === today) {
        try {
            var cached = localStorage.getItem('stockai_rates_cache');
            if (cached) { applyRates(JSON.parse(cached)); console.log('💱 Rates from cache'); return; }
        } catch(e) {}
    }
    RATES_LOADING = true;
    fetch('https://api.exchangerate-api.com/v4/latest/ZAR')
        .then(function(r){ if(!r.ok)throw new Error('Rate fetch failed'); return r.json(); })
        .then(function(data){
            RATES_LOADING = false;
            if (data.rates) {
                applyRates(data.rates);
                localStorage.setItem('stockai_rates_cache', JSON.stringify(data.rates));
                localStorage.setItem('stockai_rates_date',  today);
                RATES_LAST_UPDATED = new Date().toLocaleTimeString('en-ZA');
                console.log('✅ Live rates updated — ' + RATES_LAST_UPDATED);
            }
        })
        .catch(function(err){ RATES_LOADING=false; console.warn('⚠️ Live rates unavailable:', err.message); });
}

function applyRates(rates) {
    Object.keys(CURRENCIES).forEach(function(code) {
        if (code==='ZAR') return;
        if (rates[code]) CURRENCIES[code].rate = rates[code];
    });
}

// Refresh every 6 hours
setInterval(function(){
    localStorage.removeItem('stockai_rates_date');
    try { fetchLiveRates(); } catch(e) {}
}, 6*60*60*1000);

function setCurrency(code) {
    if (!CURRENCIES[code]) return;
    DISPLAY_CURRENCY = code;
    localStorage.setItem('stockai_currency', code);
    hubToast('success', CURRENCIES[code].flag + ' Currency: ' + CURRENCIES[code].name);
}

function formatCurrency(amountInZAR) {
    var curr = CURRENCIES[DISPLAY_CURRENCY]||CURRENCIES['ZAR'];
    var c    = amountInZAR * curr.rate;
    if(c>=1e6)return curr.symbol+(c/1e6).toFixed(1)+'M';
    if(c>=1e3)return curr.symbol+(c/1e3).toFixed(1)+'K';
    return curr.symbol+c.toFixed(2);
}

function formatCurrencyFull(amountInZAR) {
    var curr = CURRENCIES[DISPLAY_CURRENCY]||CURRENCIES['ZAR'];
    return curr.symbol+(amountInZAR*curr.rate).toFixed(2);
}

function showCurrencySelector() {
    var options = Object.keys(CURRENCIES).map(function(code) {
        var c = CURRENCIES[code], isActive = DISPLAY_CURRENCY===code;
        return '<div onclick="setCurrency(\''+code+'\');closeHubModal()" ' +
            'style="display:flex;align-items:center;gap:10px;padding:12px;' +
            'background:'+(isActive?'rgba(26,139,168,.15)':'var(--bg)')+';' +
            'border:1px solid '+(isActive?'var(--primary)':'var(--border)')+';' +
            'border-radius:var(--rs);margin-bottom:6px;cursor:pointer">' +
            '<span style="font-size:1.2rem">'+c.flag+'</span>' +
            '<div style="flex:1"><div style="font-size:.88rem;font-weight:700;color:var(--text)">'+c.symbol+' — '+c.name+'</div>' +
            '<div style="font-size:.72rem;color:var(--text-light)">'+c.code+(code!=='ZAR'?' (1 ZAR = '+c.rate+' '+code+')':' (Base Currency)')+'</div></div>' +
            (isActive?'<i class="fas fa-check-circle" style="color:var(--primary)"></i>':'')+'</div>';
    }).join('');
    showHubModal('<i class="fas fa-coins" style="color:var(--primary)"></i> Display Currency',
        '<p style="font-size:.82rem;color:var(--text-light);margin-bottom:14px">All values stored in ZAR and converted for display.</p>' +
        '<div style="max-height:400px;overflow-y:auto">'+options+'</div>',
        '<button onclick="closeHubModal()" style="flex:1;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:600;color:var(--text-mid)">Close</button>'
    );
}

console.log('💱 Multi-Currency loaded — '+Object.keys(CURRENCIES).length+' currencies');
</script>
