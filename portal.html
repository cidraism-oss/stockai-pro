<style>
:root{
    --teal-dark:#0d4a5c;--teal-mid:#1a8ba8;--teal-light:#4dbdd5;--teal-pale:#a0e9f8;
    --bg:#f0f7f9;--bg-alt:#e4f1f5;--white:#fff;
    --text-dark:#0d4a5c;--text-mid:#2a5f70;--text-light:#5a8a96;--text-muted:#8aabb5;
    --gold:#f59e0b;--gold-dark:#d97706;--success:#2ea871;--danger:#c94545;--warning:#d4a017;--info:#2b8eb3;
    --border:#c4dde4;--border-light:#e0eff3;
    --shadow:0 4px 20px rgba(13,74,92,.08);--shadow-lg:0 12px 50px rgba(13,74,92,.15);
    --radius:14px;--radius-sm:8px
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh}
.hidden{display:none!important}

.portal-header{background:linear-gradient(90deg,var(--teal-dark),var(--teal-mid));padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.15)}
.portal-logo{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-size:1.2rem;font-weight:900;letter-spacing:1px}
.portal-logo-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.header-user{display:flex;align-items:center;gap:12px}
.header-user-name{color:rgba(255,255,255,.9);font-size:.88rem;font-weight:600}
.header-user-role{color:rgba(255,255,255,.6);font-size:.75rem}
.btn-header{padding:8px 16px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:.3s}
.btn-header.logout{background:rgba(255,255,255,.15);color:#fff}
.btn-header.logout:hover{background:rgba(255,255,255,.25)}
.btn-header.app{background:var(--gold);color:#fff}
.btn-header.app:hover{background:var(--gold-dark)}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d4a5c 0%,#1a8ba8 50%,#0d4a5c 100%);padding:40px 20px;position:fixed;inset:0;z-index:9999}
.login-card{background:#fff;border-radius:24px;padding:48px;width:440px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,var(--teal-mid),var(--teal-dark));border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;margin:0 auto 20px;box-shadow:0 8px 24px rgba(26,139,168,.3)}
.login-card h2{font-size:1.6rem;font-weight:800;color:var(--text-dark);margin-bottom:4px}
.login-card .sub{font-size:.88rem;color:var(--text-light);margin-bottom:8px}
.login-card .sub2{font-size:.80rem;color:var(--teal-mid);font-weight:600;margin-bottom:28px;background:rgba(26,139,168,.08);padding:8px 14px;border-radius:8px}
.login-field{margin-bottom:18px;text-align:left}
.login-field label{font-size:.82rem;color:var(--text-mid);font-weight:600;display:block;margin-bottom:5px}
.login-field input{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.95rem;font-family:inherit;color:var(--text-dark);transition:.2s;background:#fff}
.login-field input:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(26,139,168,.1)}
.login-error{color:#c94545;font-size:.82rem;text-align:center;margin-bottom:10px;display:none}
.login-loading{text-align:center;margin-bottom:10px;color:var(--teal-mid);display:none}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal-mid),var(--teal-dark));color:#fff;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;cursor:pointer;margin-top:6px;transition:.3s;font-family:inherit}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,139,168,.4)}
.btn-forgot{background:none;border:none;color:var(--teal-mid);font-size:.82rem;cursor:pointer;font-family:inherit;margin-top:12px;text-decoration:underline;width:100%}

.portal-body{max-width:1200px;margin:0 auto;padding:28px 24px}
.portal-welcome{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:14px}
.portal-welcome-text h1{font-size:1.8rem;font-weight:800;color:var(--text-dark)}
.portal-welcome-text h1 span{color:var(--teal-mid)}
.portal-welcome-text p{font-size:.88rem;color:var(--text-light);margin-top:4px}
.portal-actions{display:flex;gap:10px;flex-wrap:wrap}

.btn-portal{padding:10px 20px;border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:inherit;transition:.3s;border:none}
.btn-portal.primary{background:var(--teal-mid);color:#fff}
.btn-portal.primary:hover{background:var(--teal-dark);transform:translateY(-2px)}
.btn-portal.outline{background:transparent;color:var(--text-mid);border:1px solid var(--border)}
.btn-portal.outline:hover{border-color:var(--teal-mid);color:var(--teal-mid)}
.btn-portal.gold{background:var(--gold);color:#fff}
.btn-portal.gold:hover{background:var(--gold-dark)}
.btn-portal.success{background:var(--success);color:#fff}
.btn-portal.success:hover{background:#1f7a52}
.btn-portal.danger{background:var(--danger);color:#fff}
.btn-portal.danger:hover{background:#a83232}
.btn-portal.small{padding:7px 14px;font-size:.80rem}

.portal-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.portal-stat{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--teal-mid);transition:.3s}
.portal-stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.portal-stat small{font-size:.72rem;color:var(--text-light);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.portal-stat strong{font-size:1.6rem;font-weight:800;color:var(--text-dark);display:block}
.portal-stat.gold{border-left-color:var(--gold)}
.portal-stat.green{border-left-color:var(--success)}
.portal-stat.red{border-left-color:var(--danger)}
.portal-stat.blue{border-left-color:var(--info)}

.portal-section{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;position:relative}
.portal-section::before{content:'';position:absolute;left:0;top:20px;bottom:20px;width:4px;background:var(--teal-mid);border-radius:0 4px 4px 0}
.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-left:12px}
.section-title h3{font-size:1.05rem;font-weight:700;color:var(--text-dark);display:flex;align-items:center;gap:8px}
.section-title h3 i{color:var(--teal-mid)}

.entity-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.entity-card{background:var(--bg);border:2px solid var(--border);border-radius:var(--radius);padding:22px;transition:.3s;position:relative;overflow:hidden}
.entity-card:hover{border-color:var(--teal-mid);box-shadow:var(--shadow)}
.entity-card.active{border-color:rgba(46,168,113,.3);background:rgba(46,168,113,.02)}
.entity-card.inactive{border-color:rgba(201,69,69,.3);background:rgba(201,69,69,.02)}
.entity-card-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.entity-avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--teal-mid),var(--teal-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;flex-shrink:0}
.entity-card-name{font-weight:700;font-size:1rem;color:var(--text-dark)}
.entity-card-contact{font-size:.78rem;color:var(--text-light);margin-top:2px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.3px}
.status-pill.active{background:rgba(46,168,113,.12);color:var(--success)}
.status-pill.inactive{background:rgba(201,69,69,.12);color:var(--danger)}
.entity-details-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;padding:12px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.entity-detail{display:flex;flex-direction:column;gap:2px}
.entity-detail-label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.entity-detail-value{font-size:.85rem;color:var(--text-dark);font-weight:600}
.entity-sections{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.section-tag{padding:3px 8px;background:rgba(26,139,168,.08);color:var(--teal-mid);border-radius:6px;font-size:.68rem;font-weight:600}
.entity-card-footer{display:flex;gap:8px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border-light)}
.entity-card-footer button{flex:1;min-width:80px}
.inactive-banner{background:linear-gradient(135deg,rgba(201,69,69,.08),rgba(201,69,69,.04));border:1px solid rgba(201,69,69,.2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.inactive-banner i{color:var(--danger);font-size:1.1rem;flex-shrink:0}
.inactive-banner-text{flex:1}
.inactive-banner-text strong{display:block;font-size:.85rem;color:var(--danger);margin-bottom:2px}
.inactive-banner-text span{font-size:.75rem;color:var(--text-mid)}
.active-banner{background:linear-gradient(135deg,rgba(46,168,113,.08),rgba(46,168,113,.04));border:1px solid rgba(46,168,113,.2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.active-banner i{color:var(--success);font-size:1.1rem;flex-shrink:0}
.active-banner-text strong{display:block;font-size:.85rem;color:var(--success);margin-bottom:2px}
.active-banner-text span{font-size:.75rem;color:var(--text-mid)}

.plan-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.plan-card{padding:18px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:center;transition:.3s;position:relative}
.plan-card:hover{border-color:var(--teal-mid);background:var(--bg)}
.plan-card.selected{border-color:var(--gold);background:rgba(245,158,11,.04)}
.plan-card.popular::before{content:'POPULAR';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;font-size:.6rem;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:.5px}
.plan-card h4{font-size:.9rem;color:var(--text-dark);margin-bottom:6px;font-weight:700}
.plan-card .plan-price{font-size:1.5rem;font-weight:900;color:var(--teal-mid);margin-bottom:4px}
.plan-card .plan-per{font-size:.68rem;color:var(--text-light);margin-bottom:10px}
.plan-card .plan-features{font-size:.72rem;color:var(--text-mid);line-height:1.8;text-align:left}
.plan-card .plan-features li{list-style:none;display:flex;align-items:center;gap:5px}
.plan-card .plan-features li::before{content:'✓';color:var(--success);font-weight:700}

.billing-table{width:100%;border-collapse:collapse}
.billing-table th{padding:10px 14px;text-align:left;font-size:.72rem;font-weight:600;color:var(--text-mid);background:var(--bg);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.billing-table td{padding:11px 14px;font-size:.85rem;color:var(--text-dark);border-bottom:1px solid var(--border-light)}
.billing-table tbody tr:hover{background:var(--bg)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.badge.paid{background:rgba(46,168,113,.12);color:var(--success)}
.badge.pending{background:rgba(212,160,23,.12);color:var(--warning)}
.badge.overdue{background:rgba(201,69,69,.12);color:var(--danger)}

.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.profile-field{display:flex;flex-direction:column;gap:4px}
.profile-field label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.profile-field span{font-size:.9rem;color:var(--text-dark);font-weight:600;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light)}

.modal-overlay{position:fixed;inset:0;background:rgba(13,74,92,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:var(--radius);width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modIn .3s ease}
@keyframes modIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:1.1rem;font-weight:700;color:var(--text-dark);display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--text-mid);font-size:1.1rem;cursor:pointer;padding:8px;border-radius:6px}
.modal-close:hover{background:var(--bg);color:var(--danger)}
.modal-body{padding:22px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:.82rem;color:var(--text-mid);font-weight:600}
.form-field input,.form-field select,.form-field textarea{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dark);font-size:.9rem;font-family:inherit}
.form-field input:focus,.form-field select:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(26,139,168,.1)}

.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
.section-check{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:.2s}
.section-check:hover{border-color:var(--teal-mid)}
.section-check input{accent-color:var(--teal-mid);width:15px;height:15px}
.section-check span{font-size:.82rem;color:var(--text-dark)}

.empty-state{text-align:center;padding:48px 24px}
.empty-state i{font-size:3rem;color:var(--border);margin-bottom:16px;display:block}
.empty-state h3{font-size:1.1rem;color:var(--text-mid);margin-bottom:8px}
.empty-state p{font-size:.85rem;color:var(--text-light);max-width:400px;margin:0 auto 20px}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{background:#fff;padding:12px 18px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:280px;animation:tIn .3s ease;border-left:4px solid var(--teal-mid)}
@keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left-color:var(--success)}.toast.error{border-left-color:var(--danger)}.toast.info{border-left-color:var(--info)}.toast.warning{border-left-color:var(--warning)}
.toast i{font-size:1rem}.toast.success i{color:var(--success)}.toast.error i{color:var(--danger)}.toast.info i{color:var(--info)}.toast.warning i{color:var(--warning)}
.toast span{flex:1;font-size:.88rem;color:var(--text-dark)}
.toast button{background:none;border:none;color:var(--text-muted);cursor:pointer}

@media(max-width:768px){
    .portal-welcome{flex-direction:column}
    .portal-actions{width:100%}
    .portal-actions .btn-portal{flex:1;justify-content:center}
    .entity-cards{grid-template-columns:1fr}
    .plan-cards{grid-template-columns:1fr}
    .profile-grid{grid-template-columns:1fr}
    .portal-stats{grid-template-columns:repeat(2,1fr)}
    .entity-details-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
    .portal-stats{grid-template-columns:1fr}
    .portal-body{padding:16px}
}
</style>
</head>
<body>
<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-screen">
<div class="login-card">
<div class="login-logo"><i class="fas fa-chart-line"></i></div>
<h2>STOCKAI-PRO</h2>
<p class="sub">Owner Portal</p>
<p class="sub2"><i class="fas fa-shield-alt"></i> Manage your entities, billing & account</p>
<form id="login-form" onsubmit="portalLogin(event)">
    <div class="login-field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="owner@email.com" required>
    </div>
    <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="login-loading" id="login-loading"><i class="fas fa-spinner fa-spin"></i> Signing in...</div>
    <button type="submit" class="btn-login">Log In to Portal</button>
    <button type="button" class="btn-forgot" onclick="portalForgotPassword()">Forgot Password?</button>
</form>
<a href="hub.html" style="display:block;text-align:center;margin-top:14px;padding:12px;background:transparent;color:var(--teal-mid);font-size:.85rem;font-weight:600;text-decoration:none;border:1px solid var(--border);border-radius:var(--radius-sm);transition:.3s"><i class="fas fa-arrow-left"></i> Back to Hub</a>
<div style="margin-top:20px;font-size:.78rem;color:var(--text-light)">
    <p>Need an account? Contact your administrator.</p>
    <p style="margin-top:6px"><a href="app.html" style="color:var(--teal-mid);text-decoration:none;font-weight:600"><i class="fas fa-arrow-left"></i> Back to App</a></p>
</div>
</div>
</div>

<!-- ============ PORTAL DASHBOARD ============ -->
<div id="portal-dashboard" class="hidden">

<!-- HEADER -->
<header class="portal-header">
    <a class="portal-logo" href="#">
        <div class="portal-logo-icon"><i class="fas fa-chart-line"></i></div>
        STOCKAI-PRO <span style="font-size:.7rem;font-weight:400;opacity:.7;margin-left:4px">Portal</span>
    </a>
    <div class="header-user">
        <div style="text-align:right;margin-right:10px">
            <div class="header-user-name" id="header-owner-name">Owner</div>
            <div class="header-user-role" id="header-group-name">Group</div>
        </div>
        <button class="btn-header app" onclick="openWebApp()"><i class="fas fa-external-link-alt"></i> Open App</button>
        <button class="btn-header logout" onclick="portalLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<!-- BODY -->
<div class="portal-body">

    <!-- WELCOME -->
    <div class="portal-welcome">
        <div class="portal-welcome-text">
            <h1>Welcome, <span id="welcome-name">Owner</span></h1>
            <p id="welcome-group">Manage your entities, billing, and account settings</p>
        </div>
        <div class="portal-actions">
            <button class="btn-portal primary" onclick="showCreateEntityModal()"><i class="fas fa-plus-circle"></i> Add New Entity</button>
            <button class="btn-portal outline" onclick="showProfileSection()"><i class="fas fa-user-cog"></i> My Profile</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="portal-stats" id="portal-stats"></div>

    <!-- ENTITIES SECTION -->
    <div class="portal-section" id="entities-section">
        <div class="section-title">
            <h3><i class="fas fa-building"></i> Your Entities</h3>
            <button class="btn-portal primary small" onclick="showCreateEntityModal()"><i class="fas fa-plus"></i> Add Entity</button>
        </div>
        <div class="entity-cards" id="entity-cards-container"></div>
    </div>

    <!-- BILLING SECTION -->
    <div class="portal-section" id="billing-section">
        <div class="section-title">
            <h3><i class="fas fa-file-invoice-dollar"></i> Billing & Invoices</h3>
        </div>
        <div id="billing-content"></div>
    </div>

</div>

<script>
// ============ PORTAL STATE ============
var P = {
    user: null,
    owner: null,
    entities: [],
    billing: null,
    accountId: null,
    accountData: null
};

// Master account check
function isMasterPortal() {
    return P.user && P.user.email &&
        P.user.email.toLowerCase() === 'cidraism@gmail.com';
}

function getPortalMaxEntities() {
    if (isMasterPortal()) return 9999;
    var plan = (P.billing || {}).planName || 'Premium';
    if (plan.includes('Exclusive')) return 9999;
    if (plan.includes('Plus'))      return 5;
    return 1;
}
var PLAN_DATA = {
    starter: { name: 'Starter', price: 499, features: ['1 entity', '3 users', 'Basic features', 'Email support'] },
    professional: { name: 'Professional', price: 899, features: ['Up to 3 entities', 'Unlimited users', 'AI features', 'WhatsApp support'] },
    enterprise: { name: 'Enterprise', price: 1499, features: ['Unlimited entities', 'Global View', 'POS + Accounting', 'Phone support'] }
};

var selectedPlan = 'professional';

// ============ LOGIN ============
function portalLogin(e) {
    if (e) e.preventDefault();
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var errorDiv = document.getElementById('login-error');
    var loadingDiv = document.getElementById('login-loading');

    if (errorDiv) errorDiv.style.display = 'none';
    if (!email) { showLoginError('Please enter your email address'); return; }
    if (loadingDiv) loadingDiv.style.display = 'block';

    auth.signInWithEmailAndPassword(email, password)
        .then(function(userCredential) {
            return db.collection('accounts').get()
                .then(function(snapshot) {
                    var found = null;
                    snapshot.forEach(function(doc) {
                        var data = doc.data();
                        if (data.owner && data.owner.email && data.owner.email.toLowerCase() === email.toLowerCase()) {
                            found = { id: doc.id, data: data };
                        }
                    });
                    return found;
                });
        })
        .then(function(result) {
            if (loadingDiv) loadingDiv.style.display = 'none';

            if (!result) {
                showLoginError('No owner account found for this email. Contact your administrator.');
                auth.signOut();
                return;
            }

            P.accountId = result.id;
            P.accountData = result.data;
            P.owner = result.data.owner || {};
            P.entities = result.data.entities || [];
            P.billing = result.data.billing || null;
            P.user = {
                email: email,
                name: P.owner.name || 'Owner',
                uid: auth.currentUser ? auth.currentUser.uid : ''
            };

            if (result.data.accountStatus === 'suspended') {
                showLoginError('Your account has been suspended. Reason: ' + (result.data.suspendedReason || 'Contact support.'));
                auth.signOut();
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('portal-dashboard').classList.remove('hidden');
            renderPortal();
            startPortalSync();
            showToast('success', 'Welcome back, ' + P.user.name + '!');
        })
        .catch(function(error) {
            if (loadingDiv) loadingDiv.style.display = 'none';
            var message = 'Login failed. Please try again.';
            if (error.code === 'auth/user-not-found') message = 'Email address not found.';
            if (error.code === 'auth/wrong-password') message = 'Incorrect password.';
            if (error.code === 'auth/invalid-email') message = 'Invalid email address.';
            if (error.code === 'auth/invalid-credential') message = 'Invalid email or password.';
            if (error.code === 'auth/too-many-requests') message = 'Too many attempts. Try again later.';
            showLoginError(message);
        });
}

function showLoginError(msg) {
    var el = document.getElementById('login-error');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function portalForgotPassword() {
    var email = document.getElementById('login-email').value.trim();
    if (!email) { alert('Please enter your email address first.'); return; }
    auth.sendPasswordResetEmail(email)
        .then(function() { alert('Password reset email sent to ' + email + '. Check your inbox.'); })
        .catch(function(error) { alert('Error: ' + error.message); });
}

function portalLogout() {
    stopPortalSync();
    auth.signOut().then(function() {
        P.user = null; P.owner = null; P.entities = []; P.accountId = null; P.accountData = null;
        document.getElementById('portal-dashboard').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        showToast('info', 'Logged out successfully');
    }).catch(function() {
        document.getElementById('portal-dashboard').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
    });
}

// ============ REAL-TIME SYNC ============
var portalSyncListener = null;

function startPortalSync() {
    if (!P.accountId) return;
    stopPortalSync();
    portalSyncListener = db.collection('accounts').doc(P.accountId)
        .onSnapshot(function(doc) {
            if (!doc.exists) return;
            var data = doc.data();
            P.accountData = data;
            P.owner = data.owner || {};
            P.entities = data.entities || [];
            P.billing = data.billing || null;
            renderPortal();
        }, function(err) {
            console.warn('Portal sync error:', err);
        });
}

function stopPortalSync() {
    if (portalSyncListener) {
        portalSyncListener();
        portalSyncListener = null;
    }
}

// ============ SAVE TO FIREBASE ============
function savePortalData(updateObj) {
    if (!P.accountId) return;
    updateObj.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
    updateObj.lastUpdatedBy = P.user ? P.user.name : 'Portal';
    db.collection('accounts').doc(P.accountId).update(updateObj)
        .then(function() { console.log('☁️ Portal saved'); })
        .catch(function(err) { console.warn('Portal save error:', err); showToast('error', 'Save failed: ' + err.message); });
}

// ============ RENDER PORTAL ============
function renderPortal() {
    renderHeader();
    renderStats();
    renderEntityCards();
    renderBilling();
}

function renderHeader() {
    var nameEl = document.getElementById('header-owner-name');
    var groupEl = document.getElementById('header-group-name');
    var welcomeName = document.getElementById('welcome-name');
    var welcomeGroup = document.getElementById('welcome-group');
    if (nameEl) nameEl.textContent = P.owner.name || 'Owner';
    if (groupEl) groupEl.textContent = P.owner.groupName || 'Owner Portal';
    if (welcomeName) welcomeName.textContent = P.owner.name || 'Owner';
    if (welcomeGroup) welcomeGroup.textContent = P.owner.groupName ?
        P.owner.groupName + ' — ' + P.entities.length + ' entit' + (P.entities.length === 1 ? 'y' : 'ies') :
        'Manage your entities, billing, and account settings';
}

function renderStats() {
    var container = document.getElementById('portal-stats');
    if (!container) return;
    var activeCount = P.entities.filter(function(e) { return e.status !== 'inactive' && e.paymentStatus !== 'unpaid'; }).length;
    var inactiveCount = P.entities.length - activeCount;
    var planPrices = { starter: 499, professional: 899, enterprise: 1499 };
    var monthlyTotal = 0;
    P.entities.forEach(function(ent) {
        if (ent.status !== 'inactive' && ent.paymentStatus !== 'unpaid') {
            monthlyTotal += planPrices[ent.plan] || 899;
        }
    });
    var billingStatus = P.billing ? P.billing.status : 'current';
    var statusColor = billingStatus === 'current' ? 'green' : billingStatus === 'due_soon' ? 'gold' : 'red';
    var statusText = billingStatus === 'current' ? 'Current' : billingStatus === 'due_soon' ? 'Due Soon' : 'Overdue';

        '<div class="portal-stat"><small>Total Entities</small><strong>' + P.entities.length + '</strong></div>' +
        '<div class="portal-stat green"><small>Active</small><strong>' + activeCount + '</strong></div>' +
        '<div class="portal-stat red"><small>Inactive</small><strong>' + inactiveCount + '</strong></div>' +
        '<div class="portal-stat gold"><small>Monthly Total</small><strong>R' + monthlyTotal.toLocaleString() + '</strong></div>' +
        '<div class="portal-stat ' + statusColor + '"><small>Billing Status</small><strong>' + statusText + '</strong></div>';
}

function renderEntityCards() {
    var container = document.getElementById('entity-cards-container');
    if (!container) return;

        var footerButtons = '';

                '<button class="btn-portal outline small" onclick="showChangePlanModal(' + idx + ')"><i class="fas fa-exchange-alt"></i> Change Plan</button>';
        } else {
            footerButtons =
                '<button class="btn-portal success small" onclick="showActivateModal(' + idx + ')"><i class="fas fa-bolt"></i> Activate & Pay</button>' +

        '</div>';

}

// ============================================================
// BILLING — NEW PRICING MODEL
// ============================================================
var PORTAL_PRICING = {
    baseFee:   799,    // incl. VAT
    entityFee: 599,    // incl. VAT per entity
    vatRate:   0.15
};

function calcPortalBilling() {
    var activeEntities = P.entities.filter(function(e) {
        return e.status !== 'inactive';
    });
    var base       = PORTAL_PRICING.baseFee;
    var entities   = activeEntities.length * PORTAL_PRICING.entityFee;
    var totalIncl  = base + entities;
    var totalExcl  = parseFloat((totalIncl / (1 + PORTAL_PRICING.vatRate)).toFixed(2));
    var vat        = parseFloat((totalIncl - totalExcl).toFixed(2));

    return {
        activeCount: activeEntities.length,
        baseFee:     base,
        entityTotal: entities,
        totalIncl:   totalIncl,
        totalExcl:   totalExcl,
        vat:         vat,
        entities:    activeEntities
    };
}

    var billing = calcPortalBilling();

        invoiceNumber:  invNum,
        invoiceDate:    now.toLocaleDateString('en-ZA', { day:'numeric', month:'long', year:'numeric' }),

        companyVat:     P.owner ? (P.owner.groupVat || '') : '',
        entities:       billing.entities,

    });

    w.document.write('<html><head><title>Invoice ' + invNum + '</title>' +
        '<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">' +
        '<style>body{margin:0;padding:20px;background:#f0f7f9}@media print{body{background:#fff;padding:0}}</style></head><body>' +
        '<div style="max-width:700px;margin:0 auto">' + html + '</div>' +

function viewPortalStatement() {

        ownerName:      P.owner ? P.owner.name : 'Customer',

        companyVat:     P.owner ? (P.owner.groupVat || '') : '',

        dateFrom:       new Date(new Date().getFullYear(), 0, 1).toLocaleDateString('en-ZA'),

    });
    w.document.write('<html><head><title>Statement</title>' +

        '<div style="text-align:center;margin-top:20px"><button onclick="window.print()" style="padding:12px 28px;background:#1a8ba8;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:Poppins">Print Statement</button></div>' +
        '</body></html>');
    w.document.close();
}
function renderBilling() {
    var container = document.getElementById('billing-content');
    if (!container) return;

    var planPrices = { starter: 499, professional: 899, enterprise: 1499 };
    var planNames = { starter: 'Starter', professional: 'Professional', enterprise: 'Enterprise' };
    var nextDue = P.billing ? P.billing.nextDueDate : '—';
    var lastPayment = P.billing && P.billing.lastPaymentDate ?
        new Date(P.billing.lastPaymentDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
    var billingStatus = P.billing ? P.billing.status : 'current';
    var activeEntities = P.entities.filter(function(e) { return e.status !== 'inactive' && e.paymentStatus !== 'unpaid'; });

    });

    P.entities.filter(function(e) { return e.status === 'inactive' || e.paymentStatus === 'unpaid'; }).forEach(function(ent) {
        breakdownHtml += '<tr><td style="opacity:.6"><strong>' + ent.name + '</strong></td><td style="opacity:.6">—</td><td style="opacity:.6">R0</td><td><span class="badge pending">Inactive</span></td></tr>';
    });

    var statusBadge = billingStatus === 'current' ? '<span class="badge paid">Current</span>' :
                      billingStatus === 'due_soon' ? '<span class="badge pending">Due Soon</span>' :
                      '<span class="badge overdue">Overdue</span>';

    container.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px">' +

            '<div style="padding:14px;background:var(--bg);border-radius:var(--radius-sm);text-align:center"><span style="font-size:.72rem;color:var(--text-muted);display:block;text-transform:uppercase;font-weight:600">Next Due Date</span><strong style="font-size:1rem;color:var(--text-dark)">' + nextDue + '</strong></div>' +
            '<div style="padding:14px;background:var(--bg);border-radius:var(--radius-sm);text-align:center"><span style="font-size:.72rem;color:var(--text-muted);display:block;text-transform:uppercase;font-weight:600">Status</span><div style="margin-top:4px">' + statusBadge + '</div></div>' +
        '</div>' +
        (monthlyTotal > 0 ? '<div style="margin-bottom:16px"><button class="btn-portal gold" onclick="showPaymentModal()"><i class="fas fa-credit-card"></i> Make Payment — R' + monthlyTotal.toLocaleString() + '</button></div>' : '') +
        '<table class="billing-table"><thead><tr><th>Entity</th><th>Plan</th><th>Amount</th><th>Status</th></tr></thead><tbody>' +
        breakdownHtml +
        '<tr style="font-weight:700;border-top:2px solid var(--teal-mid)"><td>Total</td><td></td><td>R' + monthlyTotal.toLocaleString() + '</td><td></td></tr>' +
        '</tbody></table>' +
        '<div style="margin-top:16px;font-size:.78rem;color:var(--text-light)"><p><i class="fas fa-info-circle"></i> Last payment: ' + lastPayment + '</p><p style="margin-top:4px">Need help? WhatsApp: <a href="https://wa.me/27790440508" target="_blank" style="color:var(--teal-mid);text-decoration:none;font-weight:600">079 044 0508</a></p></div>';
}
</script>
<script>

function processCreateEntity() {
    var name = document.getElementById('ne-name').value.trim();
    var contact = document.getElementById('ne-contact').value.trim();
    if (!name) { showToast('error', 'Please enter an entity name'); return; }
    if (!contact) { showToast('error', 'Please enter a contact person'); return; }

    // Check entity limit (bypass for master)
    if (!isMasterPortal()) {
        var maxEnts = getPortalMaxEntities();
        if (P.entities.length >= maxEnts) {
            showToast('error', 'Your ' + (P.billing ? P.billing.planName : 'current') +
                ' plan allows a maximum of ' + maxEnts + ' entit' + (maxEnts === 1 ? 'y' : 'ies') +
                '. Upgrade to add more.');
            return;
        }
    }

    var sections = [];
    document.querySelectorAll('#modal-container .sections-grid input:checked').forEach(function(cb) { sections.push(cb.value); });
    if (sections.length === 0) { showToast('error', 'Select at least one stock section'); return; }

    var newEntity = {
        id: 'ENT-' + Date.now() + '-' + Math.random().toString(36).substring(2, 6),
        name: name,
        contact: contact,
        phone: document.getElementById('ne-phone').value.trim(),
        email: document.getElementById('ne-email').value.trim(),
        address: document.getElementById('ne-address').value.trim(),
        vat: document.getElementById('ne-vat').value.trim(),
        foodCostTarget: parseFloat(document.getElementById('ne-foodcost').value) || 28,
        sections: sections,
        plan: 'professional',
        status: 'inactive',
        paymentStatus: 'unpaid',
        createdDate: new Date().toISOString(),
        createdBy: P.user ? P.user.name : 'Portal'
    };

    var updatedEntities = P.entities.slice();
    updatedEntities.push(newEntity);

    var accountData = P.accountData || {};
    var inventory = accountData.inventory || {}; inventory[newEntity.id] = [];
    var purchases = accountData.purchases || {}; purchases[newEntity.id] = [];
    var wastage = accountData.wastage || {}; wastage[newEntity.id] = [];
    var suppliers = accountData.suppliers || {}; suppliers[newEntity.id] = [];
    var users = accountData.users || {}; users[newEntity.id] = [{ id: 'usr-' + newEntity.id + '-1', name: contact, role: 'General Manager' }];
    var activities = accountData.activities || {}; activities[newEntity.id] = [];
    var pendingPOs = accountData.pendingPOs || {}; pendingPOs[newEntity.id] = [];
    var userLogs = accountData.userLogs || {};
    userLogs[newEntity.id] = [{
        user: P.user ? P.user.name : 'Portal', role: 'Owner',
        action: 'Entity Created', details: 'New entity "' + name + '" created via Portal (inactive)',
        date: new Date().toLocaleDateString('en-ZA'), time: new Date().toLocaleTimeString('en-ZA')
    }];
    var cashups = accountData.cashups || {}; cashups[newEntity.id] = {};
    var menuItems = accountData.menuItems || {}; menuItems[newEntity.id] = [];
    var invoices = accountData.invoices || {}; invoices[newEntity.id] = [];
    var dayEnds = accountData.dayEnds || {}; dayEnds[newEntity.id] = {};

    var owner = P.owner || {};
    owner.entityCount = String(updatedEntities.length);

    showToast('info', '🔄 Creating entity...');

    savePortalData({
        entities: updatedEntities, inventory: inventory, purchases: purchases,
        wastage: wastage, suppliers: suppliers, users: users, activities: activities,
        pendingPOs: pendingPOs, userLogs: userLogs, cashups: cashups,
        menuItems: menuItems, invoices: invoices, dayEnds: dayEnds, owner: owner
    });

    closeModal();
    P.entities = updatedEntities;
    P.owner = owner;
    renderPortal();
    showToast('success', '✅ Entity "' + name + '" created! Activate it by selecting a plan and making payment.');
}

function selectPlan(el, plan) {
    selectedPlan = plan;
    document.querySelectorAll('.plan-card').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
}

function processActivateEntity(idx) {
    var ent = P.entities[idx];
    if (!ent) return;
    var plan = PLAN_DATA[selectedPlan];
    if (!plan) return;
    var paymentRef = 'PAY-' + Date.now().toString(36).toUpperCase();

    var confirmed = confirm(
        'Activate ' + ent.name + '\n\n' +
        'Plan: ' + plan.name + '\n' +
        'Amount: R' + plan.price + '/month\n' +
        'Reference: ' + paymentRef + '\n\n' +
        'Payment Methods:\n' +
        '1. Card Payment (Paystack) — Coming soon\n' +
        '2. EFT / Bank Transfer\n' +
        '3. WhatsApp: 079 044 0508\n\n' +
        'Click OK to simulate payment (for testing)'
    );

    if (!confirmed) return;

    P.entities[idx].status = 'active';
    P.entities[idx].paymentStatus = 'paid';
    P.entities[idx].plan = selectedPlan;
    P.entities[idx].activatedDate = new Date().toISOString();
    P.entities[idx].activatedPaymentRef = paymentRef;

    if (!P.billing) {
        P.billing = { billingDay: 1, lastPaymentDate: new Date().toISOString(), nextDueDate: getNextBillingDate(), status: 'current', dismissedToday: null };
    } else {
        P.billing.lastPaymentDate = new Date().toISOString();
        P.billing.status = 'current';
    }

    savePortalData({
        entities: P.entities,
        billing: P.billing,
        statusHistory: firebase.firestore.FieldValue.arrayUnion({
            action: 'entity_activated', date: new Date().toISOString(),
            by: P.user ? P.user.name : 'Portal',
            reason: ent.name + ' activated — ' + plan.name + ' plan — Ref: ' + paymentRef
        })
    });

    closeModal();
    renderPortal();
    showToast('success', '🎉 ' + ent.name + ' is now ACTIVE! You can now use it in the web app and mobile app.');
}

function getNextBillingDate() {
    var now = new Date();
    return new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString().split('T')[0];
}

function processChangePlan(idx) {
    var ent = P.entities[idx];

    P.entities[idx].plan = newPlan;
    savePortalData({
        entities: P.entities,
        statusHistory: firebase.firestore.FieldValue.arrayUnion({
            action: 'plan_changed', date: new Date().toISOString(),
            by: P.user ? P.user.name : 'Portal',
            reason: ent.name + ': ' + PLAN_DATA[oldPlan].name + ' → ' + PLAN_DATA[newPlan].name
        })
    });

    closeModal();
    renderPortal();
    showToast('success', '✅ Plan changed to ' + PLAN_DATA[newPlan].name + ' for ' + ent.name);
}

    P.billing.status = 'current';
    P.billing.dismissedToday = null;

    savePortalData({
        billing: P.billing,
        statusHistory: firebase.firestore.FieldValue.arrayUnion({
            action: 'payment_made', date: new Date().toISOString(),
            by: P.user ? P.user.name : 'Portal',
            reason: 'Payment R' + amount.toLocaleString() + ' — Ref: ' + ref
        })
    });

    closeModal();
    renderPortal();
    showToast('success', '✅ Payment of R' + amount.toLocaleString() + ' confirmed! Next due: ' + P.billing.nextDueDate);

                '<div class="profile-field"><label>Number of Entities</label><span>' + P.entities.length + '</span></div>' +
            '</div>' +
            (o.groupAddress ? '<div class="profile-grid" style="margin-top:10px"><div class="profile-field" style="grid-column:1/-1"><label>Head Office Address</label><span>' + o.groupAddress + '</span></div></div>' : '') +
        '</div>' +
        '<div class="modal-footer" style="background:var(--bg);border-radius:0 0 var(--radius) var(--radius)">' +
            '<button class="btn-portal outline" onclick="closeModal()"><i class="fas fa-times"></i> Close</button>' +
            '<button class="btn-portal primary" onclick="closeModal();showEditProfileModal()"><i class="fas fa-edit"></i> Edit Profile</button>' +
        '</div>' +
        '</div></div>';
}

// ============ EDIT PROFILE ============
function showEditProfileModal() {
    var o = P.owner || {};
    document.getElementById('modal-container').innerHTML =
        '<div class="modal-overlay"><div class="modal-box" style="max-width:620px">' +
        '<div class="modal-header" style="background:linear-gradient(135deg,var(--teal-mid),var(--teal-dark));color:#fff;border-radius:var(--radius) var(--radius) 0 0">' +
            '<h2 style="color:#fff"><i class="fas fa-user-edit"></i> Edit Profile</h2>' +
            '<button class="modal-close" onclick="closeModal()" style="color:#fff"><i class="fas fa-times"></i></button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<h4 style="font-size:.92rem;color:var(--text-dark);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--teal-mid)"><i class="fas fa-user" style="color:var(--teal-mid)"></i> Owner Information</h4>' +
            '<div class="form-row"><div class="form-field"><label>Full Name *</label><input type="text" id="ep-name" value="' + (o.name || '') + '"></div><div class="form-field"><label>Email</label><input type="email" id="ep-email" value="' + (o.email || '') + '" disabled style="opacity:.6"></div></div>' +
            '<div class="form-row"><div class="form-field"><label>Phone</label><input type="tel" id="ep-phone" value="' + (o.phone || '') + '"></div><div class="form-field"><label>ID Number</label><input type="text" id="ep-id" value="' + (o.idNumber || '') + '"></div></div>' +
            '<h4 style="font-size:.92rem;color:var(--text-dark);margin:20px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--teal-mid)"><i class="fas fa-building" style="color:var(--teal-mid)"></i> Group Information</h4>' +
            '<div class="form-row"><div class="form-field"><label>Group / Company Name</label><input type="text" id="ep-group" value="' + (o.groupName || '') + '"></div><div class="form-field"><label>Group VAT</label><input type="text" id="ep-groupvat" value="' + (o.groupVat || '') + '"></div></div>' +
            '<div class="form-row"><div class="form-field full"><label>Head Office Address</label><textarea id="ep-groupaddr" rows="2" style="padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.9rem;color:var(--text-dark);resize:vertical;width:100%">' + (o.groupAddress || '') + '</textarea></div></div>' +
            '<div class="form-row"><div class="form-field"><label>Business Type</label><select id="ep-biztype"><option' + (o.bizType === 'Restaurant Group' ? ' selected' : '') + '>Restaurant Group</option><option' + (o.bizType === 'Hotel Group' ? ' selected' : '') + '>Hotel Group</option><option' + (o.bizType === 'Catering Company' ? ' selected' : '') + '>Catering Company</option><option' + (o.bizType === 'Mixed Hospitality' ? ' selected' : '') + '>Mixed Hospitality</option><option' + (o.bizType === 'Other' ? ' selected' : '') + '>Other</option></select></div></div>' +
        '</div>' +
        '<div class="modal-footer" style="background:var(--bg);border-radius:0 0 var(--radius) var(--radius)">' +
            '<button class="btn-portal outline" onclick="closeModal()"><i class="fas fa-times"></i> Cancel</button>' +
            '<button class="btn-portal primary" onclick="processSaveProfile()"><i class="fas fa-save"></i> Save Changes</button>' +
        '</div>' +
        '</div></div>';
}

function processSaveProfile() {
    var name = document.getElementById('ep-name').value.trim();
    if (!name) { showToast('error', 'Name is required'); return; }
    P.owner.name = name;
    P.owner.phone = document.getElementById('ep-phone').value.trim();
    P.owner.idNumber = document.getElementById('ep-id').value.trim();
    P.owner.groupName = document.getElementById('ep-group').value.trim();
    P.owner.groupVat = document.getElementById('ep-groupvat').value.trim();
    P.owner.groupAddress = document.getElementById('ep-groupaddr').value.trim();
    P.owner.bizType = document.getElementById('ep-biztype').value;
    savePortalData({ owner: P.owner });
    closeModal();
    renderPortal();
    showToast('success', '✅ Profile updated! Changes will reflect across all platforms.');
}
</script>
<script>
// ============ UTILITY FUNCTIONS ============
function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
}

function showToast(type, msg) {
    var ic = { success: 'check-circle', error: 'times-circle', warning: 'exclamation-triangle', info: 'info-circle' };
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = '<i class="fas fa-' + ic[type] + '"></i><span>' + msg + '</span><button onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
    document.getElementById('toast-wrap').appendChild(t);
    setTimeout(function() {
        t.style.opacity = '0';
        t.style.transform = 'translateX(100%)';
        setTimeout(function() { t.remove(); }, 300);
    }, 4000);
}

function openWebApp() {
    var currentUrl = window.location.href;
    var appUrl = '';
    if (currentUrl.includes('/portal.html')) {
        appUrl = currentUrl.replace('portal.html', 'app/app.html');
    } else {
        appUrl = window.location.origin + '/app/app.html';
    }
    window.open(appUrl, '_blank');
}

function openWhatsApp() {
    var ownerName = P.owner ? P.owner.name : 'Customer';
    var ownerEmail = P.owner ? P.owner.email : '';
    var entityCount = P.entities ? P.entities.length : 0;
    var message = '🆘 *StockAI-Pro Portal Support*\n\n' +
        '👤 ' + ownerName + '\n' +
        '📧 ' + ownerEmail + '\n' +
        '🏢 ' + entityCount + ' entities\n' +
        '⏰ ' + new Date().toLocaleString('en-ZA') + '\n\n' +
        '*My question:*\n';
    window.open('https://wa.me/27790440508?text=' + encodeURIComponent(message), '_blank');
}

// ============ AUTO SIGN-OUT ON LOAD ============
auth.signOut().catch(function() {});

// ============ SESSION TIMEOUT (30 MINUTES) ============
var portalLastActivity = Date.now();
var PORTAL_TIMEOUT = 30 * 60 * 1000;

['click', 'keypress', 'mousemove', 'scroll', 'touchstart'].forEach(function(evt) {
    document.addEventListener(evt, function() {
        portalLastActivity = Date.now();
    }, { passive: true });
});

setInterval(function() {
    if (!P.user) return;
    var elapsed = Date.now() - portalLastActivity;
    if (elapsed >= PORTAL_TIMEOUT) {
        showToast('warning', '⏰ Session expired due to inactivity');
        setTimeout(function() { portalLogout(); }, 1500);
    }
}, 30000);

// ============ SECURITY ============
document.addEventListener('contextmenu', function(e) {
    if (e.target.closest('.portal-stat') || e.target.closest('.billing-table') || e.target.closest('.entity-details-grid')) {
        e.preventDefault();
        showToast('warning', '🔒 Right-click disabled on sensitive data');
        return false;
    }
});

console.log('✅ StockAI-Pro Portal fully loaded');
console.log('🔥 Firebase connected');
console.log('🔒 Security active');
</script>
</body>
</html>
