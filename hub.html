<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d4a5c">
<meta name="mobile-web-app-capable" content="yes">
<title>StockAI-Pro 2.0 — Hub</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
/* ============================================================
   STOCKAI-PRO 2.0 — MASTER STYLESHEET
   Applied consistently across ALL embedded apps
   ============================================================ */
:root {
    --primary:#1a8ba8;
    --primary-dark:#0d4a5c;
    --primary-light:#4dbdd5;
    --primary-pale:#d4f0f7;
    --bg:#f0f7f9;
    --bg-card:#fff;
    --bg-dark:#0a1a1f;
    --text:#0d4a5c;
    --text-mid:#2a5f70;
    --text-light:#5a8a96;
    --text-muted:#8aabb5;
    --gold:#f59e0b;
    --gold-dark:#d97706;
    --success:#2ea871;
    --danger:#c94545;
    --warning:#d4a017;
    --info:#2b8eb3;
    --border:#c4dde4;
    --border-light:#e0eff3;
    --shadow:0 2px 12px rgba(13,74,92,.08);
    --shadow-lg:0 8px 30px rgba(13,74,92,.15);
    --shadow-xl:0 20px 60px rgba(13,74,92,.25);
    --r:14px;
    --rs:8px;
    --header-h:56px;
    --nav-h:65px;
    --vat:0.15;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:14px;
    user-select:none;
    -webkit-user-select:none;
}
.hidden { display:none !important; }
input, textarea, select { user-select:text; -webkit-user-select:text; }

/* ============================================================
   WELCOME / SPLASH SCREEN — Theatrical Version
   ============================================================ */
#welcome-screen {
    position:fixed;
    inset:0;
    z-index:99999;
    background:linear-gradient(135deg,#020d10 0%,#0d4a5c 30%,#1a8ba8 60%,#0d4a5c 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
}

/* Particle Field */
.w-particle {
    position:absolute;
    border-radius:50%;
    opacity:0;
    pointer-events:none;
    animation:wpFloat var(--dur,8s) ease-in-out infinite var(--delay,0s);
}
@keyframes wpFloat {
    0%   { opacity:0; transform:translateY(100px) scale(0); }
    20%  { opacity:.8; transform:translateY(50px) scale(1); }
    80%  { opacity:.4; transform:translateY(-50px) scale(.8); }
    100% { opacity:0; transform:translateY(-150px) scale(0); }
}

/* Shooting Stars */
.w-star {
    position:absolute;
    width:2px;
    height:80px;
    background:linear-gradient(transparent,#f59e0b,transparent);
    opacity:0;
    animation:wStar var(--dur,3s) ease-in-out infinite var(--delay,0s);
    transform:rotate(45deg);
}
@keyframes wStar {
    0%   { opacity:0; transform:rotate(45deg) translateY(-200px); }
    20%  { opacity:1; }
    80%  { opacity:.5; }
    100% { opacity:0; transform:rotate(45deg) translateY(300px); }
}

/* Pulsing Rings */
.w-ring {
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(77,189,213,.2);
    animation:wRingPulse var(--dur,4s) ease-out infinite var(--delay,0s);
}
@keyframes wRingPulse {
    0%   { transform:scale(.3); opacity:1; }
    100% { transform:scale(2.5); opacity:0; }
}

/* Glowing Orb */
.w-orb {
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    animation:wOrb 6s ease-in-out infinite;
}
@keyframes wOrb {
    0%,100% { transform:translate(0,0) scale(1); opacity:.3; }
    33%     { transform:translate(30px,-20px) scale(1.2); opacity:.5; }
    66%     { transform:translate(-20px,30px) scale(.8); opacity:.2; }
}

/* Logo */
.w-logo-wrap {
    position:relative;
    margin-bottom:32px;
    animation:wLogoEntrance 1.2s cubic-bezier(.175,.885,.32,1.275) .3s both;
}
@keyframes wLogoEntrance {
    0%   { opacity:0; transform:scale(0) rotate(-180deg); }
    60%  { transform:scale(1.2) rotate(15deg); }
    80%  { transform:scale(.9) rotate(-5deg); }
    100% { opacity:1; transform:scale(1) rotate(0); }
}
.w-logo {
    width:120px;
    height:120px;
    background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.85));
    border-radius:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--primary-dark);
    font-size:3.2rem;
    box-shadow:
        0 0 0 2px rgba(77,189,213,.4),
        0 0 30px rgba(26,139,168,.6),
        0 0 80px rgba(26,139,168,.3),
        0 20px 60px rgba(0,0,0,.4);
    animation:wLogoFloat 4s ease-in-out infinite 1.5s;
    position:relative;
    z-index:2;
}
@keyframes wLogoFloat {
    0%,100% { transform:translateY(0) scale(1); box-shadow:0 0 30px rgba(26,139,168,.6),0 20px 60px rgba(0,0,0,.4); }
    50%     { transform:translateY(-12px) scale(1.02); box-shadow:0 0 60px rgba(26,139,168,.8),0 30px 80px rgba(0,0,0,.5); }
}

/* Orbital Rings around logo */
.w-orbital {
    position:absolute;
    top:50%;
    left:50%;
    border-radius:50%;
    border:1px solid transparent;
    animation:wOrbital var(--dur,6s) linear infinite var(--delay,0s);
}
@keyframes wOrbital { from { transform:translate(-50%,-50%) rotate(0deg); } to { transform:translate(-50%,-50%) rotate(360deg); } }
.w-orbital-dot {
    position:absolute;
    border-radius:50%;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
}

/* Text animations */
.w-welcome-text {
    color:rgba(255,255,255,.7);
    font-size:1rem;
    font-weight:400;
    letter-spacing:8px;
    text-transform:uppercase;
    opacity:0;
    animation:wFadeUp .8s ease 1.2s both;
    margin-bottom:8px;
}
.w-brand {
    font-size:3.5rem;
    font-weight:900;
    color:#fff;
    letter-spacing:4px;
    opacity:0;
    animation:wBrandReveal 1.2s cubic-bezier(.175,.885,.32,1.275) 1.8s both;
    position:relative;
    text-shadow:0 0 40px rgba(77,189,213,.6);
}
@keyframes wBrandReveal {
    0%   { opacity:0; transform:scale(0) skewX(20deg); }
    60%  { transform:scale(1.1) skewX(-5deg); }
    80%  { transform:scale(.97) skewX(2deg); }
    100% { opacity:1; transform:scale(1) skewX(0); }
}
.w-brand span { color:var(--gold); text-shadow:0 0 30px rgba(245,158,11,.8); }

.w-tagline {
    color:rgba(255,255,255,.6);
    font-size:.9rem;
    font-style:italic;
    opacity:0;
    animation:wFadeUp .6s ease 2.6s both;
    margin-bottom:40px;
}
@keyframes wFadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
}

/* Feature Pills */
.w-features {
    display:flex;
    gap:10px;
    margin-bottom:48px;
    flex-wrap:wrap;
    justify-content:center;
}
.w-pill {
    padding:8px 18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    color:rgba(255,255,255,.85);
    font-size:.75rem;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:7px;
    opacity:0;
    backdrop-filter:blur(10px);
    animation:wFadeUp .5s ease var(--delay,3s) both;
    transition:all .3s ease;
}
.w-pill:hover {
    background:rgba(255,255,255,.15);
    border-color:var(--gold);
    transform:translateY(-3px);
}
.w-pill i { color:var(--gold); font-size:.8rem; }

/* ENTER Button */
#welcome-enter {
    display:inline-flex;
    align-items:center;
    gap:16px;
    padding:20px 52px;
    background:transparent;
    border:2px solid rgba(255,255,255,.5);
    border-radius:60px;
    color:#fff;
    font-size:1rem;
    font-weight:700;
    letter-spacing:6px;
    cursor:pointer;
    font-family:inherit;
    opacity:0;
    animation:wFadeUp .8s ease 3.5s both;
    position:relative;
    overflow:hidden;
    transition:all .4s ease;
}
#welcome-enter::before {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(26,139,168,.2));
    opacity:0;
    transition:opacity .3s ease;
}
#welcome-enter:hover {
    border-color:var(--gold);
    box-shadow:0 0 40px rgba(245,158,11,.4),0 0 80px rgba(245,158,11,.2);
    transform:scale(1.05);
    letter-spacing:8px;
}
#welcome-enter:hover::before { opacity:1; }
#welcome-enter:active { transform:scale(.97); }
.enter-text { position:relative; z-index:1; }
.enter-arrow {
    width:42px;
    height:42px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:1;
    animation:wArrowBounce 2s ease-in-out infinite 4s;
}
@keyframes wArrowBounce {
    0%,100% { transform:translateX(0); }
    50%     { transform:translateX(8px); }
}

.w-version {
    position:absolute;
    bottom:20px;
    color:rgba(255,255,255,.2);
    font-size:.65rem;
    letter-spacing:3px;
    opacity:0;
    animation:wFadeUp .5s ease 4s both;
}

/* DATA GLITCH effect on logo */
.w-logo::after {
    content:'AI';
    position:absolute;
    font-size:2rem;
    font-weight:900;
    color:var(--gold);
    opacity:0;
    animation:wGlitch 4s ease-in-out infinite 2s;
}
@keyframes wGlitch {
    0%,90%,100% { opacity:0; transform:translate(0); }
    91% { opacity:.8; transform:translate(-3px,2px); clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%); }
    92% { opacity:.6; transform:translate(3px,-2px); clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%); }
    93% { opacity:0; }
}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#login-screen {
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    z-index:9999;
}
.login-card {
    background:#fff;
    border-radius:24px;
    padding:40px 36px;
    width:100%;
    max-width:420px;
    box-shadow:var(--shadow-xl);
    text-align:center;
    position:relative;
    overflow:hidden;
}
.login-card::before {
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:4px;
    background:linear-gradient(90deg,var(--primary-dark),var(--primary),var(--gold),var(--primary));
    background-size:200% 100%;
    animation:loginBar 3s linear infinite;
}
@keyframes loginBar {
    0% { background-position:0% 0%; }
    100% { background-position:200% 0%; }
}
.login-logo {
    width:72px;
    height:72px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:2rem;
    margin:0 auto 20px;
    box-shadow:0 8px 24px rgba(26,139,168,.35);
}
.login-card h1 { font-size:1.8rem; font-weight:900; color:var(--text); letter-spacing:1px; margin-bottom:4px; }
.login-card h2 { font-size:1rem; font-weight:900; color:var(--text); margin-bottom:4px; }
.login-card .sub { font-size:.82rem; color:var(--text-light); margin-bottom:28px; }
.login-field { margin-bottom:16px; text-align:left; }
.login-field label { font-size:.78rem; font-weight:600; color:var(--text-mid); display:block; margin-bottom:5px; }
.login-input {
    width:100%;
    padding:13px 16px;
    border:1.5px solid var(--border);
    border-radius:var(--rs);
    font-size:.92rem;
    font-family:inherit;
    color:var(--text);
    background:var(--bg);
    transition:all .2s ease;
}
.login-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,139,168,.12); }
.login-btn {
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    border:none;
    border-radius:var(--rs);
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:all .3s ease;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}
.login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(26,139,168,.4); }
.login-btn:active { transform:scale(.97); }
.login-btn:disabled { opacity:.6; transform:none; cursor:not-allowed; }
.login-remember {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
    cursor:pointer;
    font-size:.82rem;
    color:var(--text-mid);
    font-weight:500;
}
.login-remember input[type="checkbox"] {
    width:18px;
    height:18px;
    accent-color:var(--primary);
    cursor:pointer;
}
.login-forgot {
    background:none;
    border:none;
    color:var(--primary);
    font-size:.82rem;
    cursor:pointer;
    font-family:inherit;
    font-weight:600;
    text-decoration:none;
    display:block;
    text-align:center;
    margin-bottom:16px;
}
.login-error {
    background:rgba(201,69,69,.08);
    border:1px solid rgba(201,69,69,.2);
    color:var(--danger);
    padding:10px 14px;
    border-radius:var(--rs);
    font-size:.82rem;
    margin-bottom:14px;
    display:none;
}

/* ============================================================
   MAIN HUB APP
   ============================================================ */
#hub-app {
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    background:var(--bg);
}

/* Header */
.hub-header {
    height:var(--header-h);
    background:linear-gradient(90deg,var(--primary-dark),var(--primary));
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:12px;
    flex-shrink:0;
    box-shadow:0 2px 16px rgba(0,0,0,.2);
    z-index:100;
}
.hub-header-logo {
    width:36px;
    height:36px;
    background:rgba(255,255,255,.15);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:1rem;
}
.hub-header-info { flex:1; }
.hub-header-info .hub-user { font-size:.88rem; font-weight:700; color:#fff; }
.hub-header-info .hub-role { font-size:.65rem; color:rgba(255,255,255,.7); }
.hub-header-time { font-size:.7rem; color:rgba(255,255,255,.7); text-align:right; }
.hub-header-time strong { display:block; font-size:.82rem; color:#fff; }
.hub-hbtn {
    width:36px;
    height:36px;
    background:rgba(255,255,255,.15);
    border:none;
    border-radius:var(--rs);
    color:#fff;
    font-size:.9rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:6px;
    transition:.2s;
}
.hub-hbtn:hover { background:rgba(255,255,255,.25); }

/* Dashboard scroll area */
.hub-dashboard {
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-overflow-scrolling:touch;
}

/* Welcome Card */
.hub-welcome {
    width:100%;
    max-width:640px;
    background:var(--bg-card);
    border-radius:var(--r);
    padding:20px;
    box-shadow:var(--shadow);
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:16px;
    border-left:4px solid var(--gold);
}
.hub-avatar {
    width:52px;
    height:52px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:1.3rem;
    font-weight:800;
    flex-shrink:0;
}
.hub-welcome-text h3 { font-size:1rem; font-weight:800; color:var(--text); }
.hub-welcome-text p { font-size:.75rem; color:var(--text-light); margin-top:2px; }
.hub-shift { font-size:.72rem; color:var(--primary); font-weight:600; margin-top:4px; }

/* Section Title */
.hub-section-title {
    width:100%;
    max-width:640px;
    font-size:.72rem;
    font-weight:700;
    color:var(--text-light);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin:8px 0;
    padding-left:4px;
}

/* Apps Grid */
.hub-apps-grid {
    width:100%;
    max-width:640px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:20px;
}
.hub-app-card {
    background:var(--bg-card);
    border-radius:var(--r);
    padding:20px 10px;
    box-shadow:var(--shadow);
    text-align:center;
    cursor:pointer;
    transition:all .3s ease;
    border:2px solid transparent;
    position:relative;
    overflow:hidden;
}
.hub-app-card::before {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(26,139,168,.05),transparent);
    opacity:0;
    transition:opacity .3s;
}
.hub-app-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-6px); border-color:rgba(26,139,168,.2); }
.hub-app-card:hover::before { opacity:1; }
.hub-app-card:active { transform:scale(.95); }
.hub-app-icon {
    width:54px;
    height:54px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    color:#fff;
    margin:0 auto 10px;
    position:relative;
    z-index:1;
}
.hub-app-name { font-size:.78rem; font-weight:700; color:var(--text); position:relative; z-index:1; }
.hub-app-desc { font-size:.62rem; color:var(--text-muted); margin-top:3px; line-height:1.3; position:relative; z-index:1; }
.hub-app-card.disabled { opacity:.3; pointer-events:none; }
.hub-app-card.disabled::after { content:'🔒'; position:absolute; top:6px; right:8px; font-size:.65rem; }

/* Quick Info Bar */
.hub-info-bar {
    width:100%;
    max-width:640px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}
.hub-info-card {
    background:var(--bg-card);
    border-radius:var(--r);
    padding:14px;
    box-shadow:var(--shadow);
    text-align:center;
}
.hub-info-card .label { font-size:.62rem; color:var(--text-light); text-transform:uppercase; font-weight:600; margin-bottom:4px; }
.hub-info-card .value { font-size:1.1rem; font-weight:800; color:var(--text); }

/* ============================================================
   EMBEDDED APP CONTAINER
   ============================================================ */
#app-frame {
    position:fixed;
    inset:0;
    z-index:500;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    animation:appSlideIn .3s ease;
}
@keyframes appSlideIn {
    from { transform:translateX(100%); opacity:0; }
    to   { transform:translateX(0); opacity:1; }
}

/* Return to Hub Button — appears in all embedded apps */
.return-hub-btn {
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    background:rgba(255,255,255,.15);
    border:none;
    border-radius:var(--rs);
    color:#fff;
    font-size:.78rem;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    transition:.2s;
    text-decoration:none;
}
.return-hub-btn:hover { background:rgba(255,255,255,.25); }

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
.hub-toast-wrap {
    position:fixed;
    top:calc(var(--header-h) + 10px);
    right:16px;
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:8px;
    pointer-events:none;
}
.hub-toast {
    padding:12px 16px;
    border-radius:var(--rs);
    box-shadow:var(--shadow-lg);
    display:flex;
    align-items:center;
    gap:10px;
    font-size:.85rem;
    font-weight:500;
    animation:toastIn .3s ease;
    pointer-events:all;
    min-width:260px;
    max-width:340px;
}
@keyframes toastIn {
    from { transform:translateX(100px); opacity:0; }
    to   { transform:translateX(0); opacity:1; }
}
.hub-toast.success { background:#d1fae5; color:#065f46; border-left:3px solid var(--success); }
.hub-toast.error   { background:#fee2e2; color:#991b1b; border-left:3px solid var(--danger); }
.hub-toast.info    { background:#d4f0f7; color:#0d4a5c; border-left:3px solid var(--info); }
.hub-toast.warning { background:#fef3c7; color:#92400e; border-left:3px solid var(--warning); }
.hub-toast button  { background:none; border:none; cursor:pointer; color:inherit; opacity:.6; margin-left:auto; }

/* ============================================================
   MODAL
   ============================================================ */
.hub-modal-overlay {
    position:fixed;
    inset:0;
    background:rgba(13,74,92,.7);
    backdrop-filter:blur(8px);
    z-index:800;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.hub-modal {
    background:var(--bg-card);
    border-radius:20px;
    width:100%;
    max-width:480px;
    max-height:85vh;
    overflow-y:auto;
    box-shadow:var(--shadow-xl);
    animation:modalIn .3s ease;
}
@keyframes modalIn {
    from { opacity:0; transform:scale(.9); }
    to   { opacity:1; transform:scale(1); }
}
.hub-modal-header {
    padding:20px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.hub-modal-header h3 { font-size:1rem; font-weight:700; color:var(--text); }
.hub-modal-close {
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--bg);
    border:none;
    color:var(--text-light);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.hub-modal-body { padding:24px; }
.hub-modal-footer {
    padding:16px 24px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
    justify-content:flex-end;
}

/* ============================================================
   SHARED BUTTONS
   ============================================================ */
.btn { padding:10px 20px; border:none; border-radius:var(--rs); font-size:.88rem; font-weight:600; cursor:pointer; font-family:inherit; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(26,139,168,.4); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger  { background:var(--danger); color:#fff; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text-mid); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-gold { background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#fff; }
.btn-sm { padding:6px 12px; font-size:.78rem; }
.btn-block { width:100%; justify-content:center; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none !important; }

/* ============================================================
   SHARED FORM ELEMENTS
   ============================================================ */
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:.78rem; font-weight:600; color:var(--text-mid); margin-bottom:5px; }
.form-input {
    width:100%;
    padding:11px 14px;
    border:1.5px solid var(--border);
    border-radius:var(--rs);
    font-size:.88rem;
    font-family:inherit;
    color:var(--text);
    background:var(--bg);
    transition:.2s;
}
.form-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,139,168,.1); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-hint { font-size:.7rem; color:var(--text-muted); margin-top:4px; }

/* Toggle Switch */
.toggle-wrap { display:flex; align-items:center; gap:10px; }
.toggle { position:relative; width:46px; height:26px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:26px; cursor:pointer; transition:.3s; }
.toggle-slider::before { content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.3s; box-shadow:0 2px 4px rgba(0,0,0,.2); }
.toggle input:checked + .toggle-slider { background:var(--primary); }
.toggle input:checked + .toggle-slider::before { transform:translateX(20px); }
.toggle-label { font-size:.85rem; color:var(--text); font-weight:500; }

/* Tabs */
.tab-nav { display:flex; gap:4px; background:var(--bg); border-radius:var(--rs); padding:4px; margin-bottom:16px; }
.tab-btn { flex:1; padding:10px; border:none; border-radius:6px; font-size:.82rem; font-weight:600; cursor:pointer; font-family:inherit; color:var(--text-light); background:transparent; transition:.2s; }
.tab-btn.active { background:#fff; color:var(--primary); box-shadow:var(--shadow); }

/* Cards */
.info-card { background:var(--bg-card); border-radius:var(--r); padding:16px; box-shadow:var(--shadow); margin-bottom:12px; }
.info-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.info-card-header h4 { font-size:.9rem; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
.info-card-header h4 i { color:var(--primary); }

/* Status Badges */
.badge { padding:3px 10px; border-radius:12px; font-size:.68rem; font-weight:600; display:inline-block; }
.badge-green  { background:rgba(46,168,113,.12); color:var(--success); }
.badge-orange { background:rgba(245,158,11,.12); color:var(--gold); }
.badge-red    { background:rgba(201,69,69,.12); color:var(--danger); }
.badge-blue   { background:rgba(26,139,168,.12); color:var(--primary); }
.badge-gray   { background:rgba(90,138,150,.12); color:var(--text-light); }

/* Empty State */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-light); }
.empty-state i { font-size:3rem; color:var(--primary); opacity:.25; display:block; margin-bottom:14px; }
.empty-state h3 { font-size:.95rem; color:var(--text); margin-bottom:6px; }
.empty-state p { font-size:.82rem; margin-bottom:16px; }

/* Search Bar */
.search-bar { display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--r); padding:10px 14px; margin-bottom:12px; }
.search-bar i { color:var(--text-muted); }
.search-bar input { flex:1; border:none; outline:none; font-size:.9rem; font-family:inherit; color:var(--text); background:transparent; }

/* Data Table */
.table-wrap { background:var(--bg-card); border-radius:var(--r); overflow-x:auto; box-shadow:var(--shadow); }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { padding:11px 14px; text-align:left; font-size:.72rem; font-weight:700; color:var(--text-light); background:var(--bg); border-bottom:2px solid var(--border); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
.data-table td { padding:10px 14px; font-size:.83rem; color:var(--text); border-bottom:1px solid var(--border-light); }
.data-table tbody tr:hover { background:rgba(26,139,168,.03); }
.row-actions { display:flex; gap:4px; }
.row-btn { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:#fff; color:var(--text-light); cursor:pointer; font-size:.75rem; transition:.2s; display:flex; align-items:center; justify-content:center; }
.row-btn:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
.row-btn.del:hover { background:var(--danger); border-color:var(--danger); }

/* Responsive */
@media(min-width:768px) {

function checkHubAuth() {
    var remembered = localStorage.getItem('stockai_remember');
    var remEmail   = localStorage.getItem('stockai_email');

    if (remembered === 'yes' && remEmail) {
        // Try auto-login with persisted session
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
            .then(function() {
                return new Promise(function(resolve) {
                    var unsubscribe = auth.onAuthStateChanged(function(user) {
                        unsubscribe();
                        resolve(user);
                    });
                });
            })
            .then(function(firebaseUser) {
                if (firebaseUser) {
                    hubToast('info', '🔄 Loading your apps...');
                    findHubAccount(firebaseUser.email, function(found) {
                        if (found) {
                            document.getElementById('login-screen').classList.add('hidden');
                            enterHub();
                        } else {
                            showLoginScreen();
                        }
                    });
                } else {
                    showLoginScreen();
                }
            });
    } else {
        auth.signOut().then(function() {
            showLoginScreen();
        }).catch(function() {
            showLoginScreen();
        });
    }
}

function showLoginScreen() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('hub-app').classList.add('hidden');
}

// ============================================================
// LOGIN
// ============================================================
function hubLogin() {
    var email    = (document.getElementById('hub-email').value    || '').trim().toLowerCase();
    var password = (document.getElementById('hub-password').value || '').trim();
    var remember = document.getElementById('hub-remember').checked;
    var errorDiv = document.getElementById('login-error');

    errorDiv.style.display = 'none';

    if (!email)    { showLoginError('Please enter your email address'); return; }
    if (!password) { showLoginError('Please enter your password'); return; }

    var btn = document.getElementById('hub-login-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

    // Set persistence based on remember me
    var persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

    auth.setPersistence(persistence)
        .then(function() {
            return auth.signInWithEmailAndPassword(email, password);
        })
        .then(function() {
            if (remember) {
                localStorage.setItem('stockai_remember', 'yes');
                localStorage.setItem('stockai_email', email);
            } else {
                localStorage.removeItem('stockai_remember');
                localStorage.removeItem('stockai_email');
            }
            HUB.rememberMe = remember;
            hubToast('info', '🔄 Loading your apps...');
            findHubAccount(email, function(found) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                if (found) {
                    document.getElementById('login-screen').classList.add('hidden');
                    enterHub();
                } else {
                    showLoginError('Account not found. Contact your administrator.');
                    auth.signOut();
                }
            });
        })
        .catch(function(err) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            var msg = 'Login failed. Please try again.';
            if (err.code === 'auth/user-not-found'     ||
                err.code === 'auth/wrong-password'      ||
                err.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
            else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
            else if (err.code === 'auth/network-request-failed') msg = 'No internet connection.';
            showLoginError(msg);
        });
}

function showLoginError(msg) {
    var el = document.getElementById('login-error');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ============================================================
// FIND ACCOUNT IN FIRESTORE
// ============================================================
function findHubAccount(email, callback) {
    // Check if master admin
    if (email === MASTER_EMAIL) {
        HUB.isMaster    = true;
        HUB.accountId   = 'master';
        HUB.user = {
            name:  'StockAI Admin',
            email: email,
            role:  'Master Admin'
        };
        HUB.allowedApps = ALL_APPS.map(function(a) { return a.id; });
        if (callback) callback(true);
        return;
    }

    db.collection('accounts').get()
        .then(function(snap) {
            var found = false;
            snap.forEach(function(doc) {
                if (found) return;
                var data = doc.data();

                // Check owner
                if (data.owner && data.owner.email &&
                    data.owner.email.toLowerCase() === email) {
                    HUB.accountId   = doc.id;
                    HUB.accountData = data;
                    HUB.user = {
                        name:  data.owner.name || email,
                        email: email,
                        role:  'Owner'
                    };
                    HUB.entities = data.entities || [];
                    if (HUB.entities.length > 0) {
                        HUB.entity     = HUB.entities[0];
                        HUB.entityId   = HUB.entities[0].id;
                        HUB.entityName = HUB.entities[0].name;
                    }
                    HUB.allowedApps = data.owner.appAccess ||
                        ROLE_DEFAULTS['Owner'].slice();
                    found = true;
                    return;
                }

                // Check all entity users
                var users = data.users || {};
                Object.keys(users).forEach(function(eid) {
                    if (found) return;
                    (users[eid] || []).forEach(function(u) {
                        if (found) return;
                        if (u.email && u.email.toLowerCase() === email) {
                            HUB.accountId   = doc.id;
                            HUB.accountData = data;
                            HUB.entityId    = eid;
                            HUB.user = {
                                name:  u.name  || email,
                                email: email,
                                role:  u.role  || 'Staff'
                            };
                            var ents = data.entities || [];
                            HUB.entity = ents.find(function(e) {
                                return e.id === eid;
                            }) || ents[0] || null;
                            HUB.entityName  = HUB.entity ? HUB.entity.name : '';
                            HUB.entities    = ents;
                            HUB.allowedApps = u.appAccess ||
                                ROLE_DEFAULTS[u.role || 'Staff'] || ['mobile'];
                            found = true;
                        }
                    });
                });
            });
            if (callback) callback(found);
        })
        .catch(function() {
            if (callback) callback(false);
        });
}

// ============================================================
// LOGOUT
// ============================================================
function hubLogout() {
    if (HUB.syncListener) {
        HUB.syncListener();
        HUB.syncListener = null;
    }
    localStorage.removeItem('stockai_remember');
    localStorage.removeItem('stockai_email');

    auth.signOut().then(function() {
        HUB.user        = null;
        HUB.accountId   = null;
        HUB.allowedApps = [];
        HUB.clockInTime = null;
        HUB.isMaster    = false;

        document.getElementById('hub-app').classList.add('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('app-frame').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');

// ============================================================
// REAL-TIME SYNC
// ============================================================
function startHubSync() {
    if (!HUB.accountId || HUB.isMaster) return;
    if (HUB.syncListener) HUB.syncListener();

    HUB.syncListener = db.collection('accounts').doc(HUB.accountId)
        .onSnapshot(function(doc) {
            if (!doc.exists) return;
            var data = doc.data();
            HUB.accountData = data;
            HUB.entities    = data.entities || [];
        }, function(err) {
            console.warn('Hub sync error:', err);
        });
}

// ============================================================
// CLOCK + SHIFT TIMER
// ============================================================
function startHubClock() {
    setInterval(function() {
        var now = new Date();
        var timeStr = now.toLocaleTimeString('en-ZA', {
            hour:'2-digit', minute:'2-digit', second:'2-digit'
        });
        var dateStr = now.toLocaleDateString('en-ZA', {
            day:'numeric', month:'short', year:'numeric'
        });

        var headerTime = document.getElementById('hub-header-time');
        if (headerTime) {
            headerTime.innerHTML = '<strong>' + timeStr + '</strong><span>' + dateStr + '</span>';
        }

        // Shift timer
        if (HUB.clockInTime) {
            var diff = Date.now() - HUB.clockInTime.getTime();
            var h    = Math.floor(diff / 3600000);
            var m    = Math.floor((diff % 3600000) / 60000);
            var shiftEl = document.getElementById('hub-shift-display');
            if (shiftEl) {
                shiftEl.textContent =
                    ('0' + h).slice(-2) + ':' + ('0' + m).slice(-2);
            }
        }
    }, 1000);
}

// ============================================================
// TOAST
// ============================================================
function hubToast(type, msg) {
    var icons = {
        success:'check-circle', error:'times-circle',
        info:'info-circle', warning:'exclamation-triangle'
    };
    var t = document.createElement('div');
    t.className = 'hub-toast ' + type;
    t.innerHTML =
        '<i class="fas fa-' + (icons[type] || 'info-circle') + '"></i>' +
        '<span>' + msg + '</span>' +
        '<button onclick="this.parentElement.remove()">' +
        '<i class="fas fa-times"></i></button>';
    var wrap = document.getElementById('hub-toast-wrap');
    if (wrap) wrap.appendChild(t);
    setTimeout(function() {
        t.style.opacity    = '0';
        t.style.transition = 'opacity .3s';
        setTimeout(function() { if (t.parentElement) t.remove(); }, 300);
    }, 4000);
}

// ============================================================
// COLOR HELPER
// ============================================================
function adjustHexColor(hex, amount) {
    hex = hex.replace('#', '');
    var r = Math.max(0, Math.min(255, parseInt(hex.substring(0, 2), 16) + amount));
    var g = Math.max(0, Math.min(255, parseInt(hex.substring(2, 4), 16) + amount));
    var b = Math.max(0, Math.min(255, parseInt(hex.substring(4, 6), 16) + amount));
    return '#' +
        ('0' + r.toString(16)).slice(-2) +
        ('0' + g.toString(16)).slice(-2) +
        ('0' + b.toString(16)).slice(-2);
}

function copyHubLink() {
    var link = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link)
            .then(function() { hubToast('success', '✅ Link copied!'); })
            .catch(function() { fallbackCopy(link); });
    } else {
        fallbackCopy(link);
    }
}

function fallbackCopy(text) {
    var input = document.createElement('input');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    hubToast('success', '✅ Link copied!');
}

    html += '<div id="admin-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">';

    if (customers.length === 0) {
        html += '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-users"></i>' +
            '<h3>No Customers Yet</h3><p>Customers will appear here once they sign up.</p></div>';
    } else {
        customers.forEach(function(c) {
            html += renderAdminCard(c);
        });
    }

    html += '</div></div>';
    content.innerHTML = html;
}

function adminStatCard(label, value, color) {
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:18px;' +
        'box-shadow:var(--shadow);border-left:4px solid ' + color + ';text-align:center">' +
        '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;' +
        'font-weight:600;margin-bottom:4px">' + label + '</div>' +
        '<div style="font-size:1.6rem;font-weight:800;color:var(--text)">' + value + '</div></div>';
}

function renderAdminCard(customer) {
    var data     = customer.data;
    var owner    = data.owner || {};
    var entities = data.entities || [];
    var isActive = (data.accountStatus || 'active') === 'active';
    var billing  = data.billing || {};
    var plan     = billing.planName || 'Premium';
    var price    = billing.price || 999;

    var activeCount = entities.filter(function(e) {
        return e.status !== 'inactive';
    }).length;

    return '<div class="info-card" data-name="' +
        (owner.name || '').toLowerCase() + ' ' +
        (owner.email || '').toLowerCase() + '" ' +
        'style="border-left:4px solid ' + (isActive ? 'var(--success)' : 'var(--danger)') + '">' +

        // Header
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">' +
        '<div style="width:44px;height:44px;border-radius:12px;' +
        'background:linear-gradient(135deg,' + (isActive ? 'var(--primary),var(--primary-dark)' : 'var(--danger),#a83232') + ');' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;flex-shrink:0">' +
        (owner.name ? owner.name.charAt(0).toUpperCase() : '?') + '</div>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="font-size:.92rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
        (owner.name || 'Unknown') + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + (owner.email || '') + '</div></div>' +
        '<span class="badge ' + (isActive ? 'badge-green' : 'badge-red') + '">' +
        (isActive ? 'Active' : 'Inactive') + '</span></div>' +

        // Details
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">' +
        '<div style="font-size:.72rem;color:var(--text-light)">Entities: <strong style="color:var(--text)">' +
        entities.length + '</strong> (' + activeCount + ' active)</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">Plan: <strong style="color:var(--text)">' +
        plan + '</strong></div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">Phone: <strong style="color:var(--text)">' +
        (owner.phone || '—') + '</strong></div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">Revenue: <strong style="color:var(--success)">R' +
        price + '/mo</strong></div></div>' +

        // Entity pills
        (entities.length > 0 ?
            '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">' +
            entities.map(function(ent) {
                var entActive = ent.status !== 'inactive';
                return '<span class="badge ' + (entActive ? 'badge-blue' : 'badge-red') + '">' +
                    ent.name + '</span>';
            }).join('') + '</div>' : '') +

        // Actions
        '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-sm btn-outline" onclick="adminViewCustomer(\'' + customer.id + '\')">' +
        '<i class="fas fa-eye"></i> View</button>' +
        '<button class="btn btn-sm ' + (isActive ? 'btn-danger' : 'btn-success') + '" ' +
        'onclick="adminToggleStatus(\'' + customer.id + '\',' + isActive + ')">' +
        '<i class="fas fa-' + (isActive ? 'ban' : 'check') + '"></i> ' +
        (isActive ? 'Deactivate' : 'Activate') + '</button>' +
        '<a href="https://wa.me/27' + ((owner.phone || '').replace(/[^0-9]/g, '').slice(-9)) + '" ' +
        'target="_blank" class="btn btn-sm btn-outline" style="color:#25D366;border-color:#25D366">' +
        '<i class="fab fa-whatsapp"></i></a></div>' +
        '</div>';
}

function filterAdminCards() {
    var q = (document.getElementById('admin-search').value || '').toLowerCase();
    document.querySelectorAll('#admin-cards .info-card').forEach(function(card) {
        var name = card.dataset.name || '';
        card.style.display = name.includes(q) ? '' : 'none';
    });
}

// ============================================================
// ADMIN — VIEW CUSTOMER DETAILS
// ============================================================
function adminViewCustomer(accountId) {
    hubToast('info', '🔄 Loading customer...');

    db.collection('accounts').doc(accountId).get()
        .then(function(doc) {
            if (!doc.exists) { hubToast('error', 'Customer not found'); return; }
            var data     = doc.data();
            var owner    = data.owner || {};
            var entities = data.entities || [];
            var billing  = data.billing || {};

            var entitiesHtml = entities.map(function(ent, idx) {
                var isActive = ent.status !== 'inactive';
                var inv      = (data.inventory || {})[ent.id] || [];
                var stockVal = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);
                var users    = (data.users || {})[ent.id] || [];

                return '<div class="info-card" style="border-left:4px solid ' +
                    (isActive ? 'var(--primary)' : 'var(--danger)') + '">' +
                    '<div class="info-card-header">' +
                    '<h4><i class="fas fa-building"></i> ' + ent.name + '</h4>' +
                    '<span class="badge ' + (isActive ? 'badge-green' : 'badge-red') + '">' +
                    (isActive ? 'Active' : 'Inactive') + '</span></div>' +
                    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px">' +
                    '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:var(--rs)">' +
                    '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600">Stock Items</div>' +
                    '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">' + inv.length + '</div></div>' +
                    '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:var(--rs)">' +
                    '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600">Stock Value</div>' +
                    '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">R' + stockVal.toLocaleString() + '</div></div>' +
                    '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:var(--rs)">' +
                    '<div style="font-size:.65rem;color:var(--text-light);text-transform:uppercase;font-weight:600">Users</div>' +
                    '<div style="font-size:1.1rem;font-weight:800;color:var(--text)">' + users.length + '</div></div></div>' +
                    '<div style="margin-top:12px;display:flex;gap:8px">' +
                    '<button class="btn btn-sm btn-primary" onclick="adminEnterEntity(\'' +
                    accountId + '\',\'' + ent.id + '\')">' +
                    '<i class="fas fa-sign-in-alt"></i> Enter Entity</button>' +
                    '<button class="btn btn-sm ' + (isActive ? 'btn-danger' : 'btn-success') + '" ' +
                    'onclick="adminToggleEntity(\'' + accountId + '\',' + idx + ',' + isActive + ')">' +
                    '<i class="fas fa-' + (isActive ? 'ban' : 'check') + '"></i> ' +
                    (isActive ? 'Deactivate' : 'Activate') + '</button></div></div>';
            }).join('');

            showHubModal(
                '<i class="fas fa-user-circle" style="color:var(--primary)"></i> ' +
                (owner.name || 'Customer'),

                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Name</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--text)">' + (owner.name || '—') + '</div></div>' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Email</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--text)">' + (owner.email || '—') + '</div></div>' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Phone</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--text)">' + (owner.phone || '—') + '</div></div>' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Plan</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--text)">' + (billing.planName || 'Premium') + '</div></div>' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Monthly</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--success)">R' + (billing.price || 999) + '/mo</div></div>' +
                '<div><div style="font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Entities</div>' +
                '<div style="font-size:.92rem;font-weight:600;color:var(--text)">' + entities.length + '</div></div></div>' +
                '<h4 style="font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:12px;' +
                'padding-bottom:8px;border-bottom:2px solid var(--primary)">' +
                '<i class="fas fa-building" style="color:var(--primary)"></i> Entities (' + entities.length + ')</h4>' +
                entitiesHtml,

                '<button class="btn btn-outline" onclick="closeHubModal()">Close</button>'
            );
        })
        .catch(function(err) {
            hubToast('error', 'Error: ' + err.message);
        });
}

// ============================================================
// ADMIN — TOGGLE ACCOUNT STATUS
// ============================================================
function adminToggleStatus(accountId, currentlyActive) {
    var action = currentlyActive ? 'deactivate' : 'activate';
    if (!confirm('Are you sure you want to ' + action + ' this customer account?')) return;

    var newStatus = currentlyActive ? 'suspended' : 'active';
    db.collection('accounts').doc(accountId).update({
        accountStatus: newStatus,
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
        lastUpdatedBy: 'Master Admin'
    })
    .then(function() {
        hubToast('success', '✅ Account ' + (currentlyActive ? 'deactivated' : 'activated'));
        showAdminPanel(); // Refresh
    })
    .catch(function(err) {
        hubToast('error', 'Error: ' + err.message);
    });
}

// ============================================================
// ADMIN — TOGGLE ENTITY STATUS
// ============================================================
function adminToggleEntity(accountId, entityIdx, currentlyActive) {
    var action = currentlyActive ? 'deactivate' : 'activate';
    if (!confirm('Are you sure you want to ' + action + ' this entity?')) return;

    db.collection('accounts').doc(accountId).get()
        .then(function(doc) {
            if (!doc.exists) return;
            var data     = doc.data();
            var entities = data.entities || [];
            if (entities[entityIdx]) {
                entities[entityIdx].status = currentlyActive ? 'inactive' : 'active';
            }
            return db.collection('accounts').doc(accountId).update({
                entities: entities,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                lastUpdatedBy: 'Master Admin'
            });
        })
        .then(function() {
            hubToast('success', '✅ Entity ' + (currentlyActive ? 'deactivated' : 'activated'));
            closeHubModal();
            showAdminPanel();
        })
        .catch(function(err) {
            hubToast('error', 'Error: ' + err.message);
        });
}

// ============================================================
// ADMIN — ENTER CUSTOMER ENTITY (for support)
// ============================================================
function adminEnterEntity(accountId, entityId) {
    hubToast('info', '🔄 Loading entity...');

    db.collection('accounts').doc(accountId).get()
        .then(function(doc) {
            if (!doc.exists) { hubToast('error', 'Account not found'); return; }
            var data = doc.data();

            // Set HUB state to this customer's entity
            HUB.accountId   = accountId;
            HUB.accountData = data;
            HUB.entities    = data.entities || [];
            HUB.entity      = HUB.entities.find(function(e) { return e.id === entityId; });
            HUB.entityId    = entityId;
            HUB.entityName  = HUB.entity ? HUB.entity.name : '';
            HUB.allowedApps = ALL_APPS.map(function(a) { return a.id; });

            closeHubModal();
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('hub-app').classList.remove('hidden');

            document.getElementById('hub-user-name').textContent = 'Admin → ' +
                (data.owner ? data.owner.name : accountId);
            document.getElementById('hub-user-role').textContent = 'Master Admin • ' + HUB.entityName;

            HUB.clockInTime = new Date();
            renderHubDashboard();
            hubToast('success', '✅ Viewing: ' + HUB.entityName);
        })
        .catch(function(err) {
            hubToast('error', 'Error: ' + err.message);
        });
}

console.log('✅ StockAI-Pro 2.0 Hub — Admin Panel loaded');
</script>

<script>
// ============================================================
// EMBEDDED APP: MOBILE AI
// ============================================================
function getMobileAppHTML() {
    return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)">' +

        // Header
        '<header class="hub-header">' +
        '<button class="return-hub-btn" onclick="closeEmbeddedApp()">' +
        '<i class="fas fa-arrow-left"></i> Hub</button>' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;color:#fff">' +
        '<i class="fas fa-mobile-alt"></i>' +
        '<div><div style="font-size:.88rem;font-weight:700">MobileAI</div>' +
        '<div style="font-size:.62rem;color:rgba(255,255,255,.7)">' +
        (HUB.entityName || 'Entity') + '</div></div></div>' +
        '<button class="hub-hbtn" onclick="mobileRefresh()"><i class="fas fa-sync-alt"></i></button>' +
        '</header>' +

        // Content
        '<div id="mobile-content" style="flex:1;overflow-y:auto;padding:16px;' +
        'padding-bottom:80px;-webkit-overflow-scrolling:touch"></div>' +

        // Voice FAB
        '<button id="mobile-voice-fab" onclick="startMobileVoice()" ' +
        'style="position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;' +
        'background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;' +
        'border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 6px 24px rgba(26,139,168,.4);' +
        'z-index:40;display:none;align-items:center;justify-content:center">' +
        '<i class="fas fa-microphone"></i></button>' +

        // Bottom Nav
        '<nav style="height:var(--nav-h);background:var(--bg-card);border-top:1px solid var(--border);' +
        'display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding:0 8px 8px;' +
        'box-shadow:0 -2px 12px rgba(0,0,0,.05);z-index:50">' +
        mobileNavItem('dashboard', 'fa-chart-pie', 'Home', true) +
        mobileNavItem('stock-count', 'fa-clipboard-list', 'Count', false) +
        mobileNavItem('purchases', 'fa-shopping-cart', 'Orders', false) +
        mobileNavItem('inventory', 'fa-box', 'Stock', false) +
        '</nav></div>';
}

function mobileNavItem(page, icon, label, active) {
    return '<div data-mpage="' + page + '" onclick="mobileNavigate(\'' + page + '\')" ' +
        'style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;' +
        'border-radius:var(--rs);cursor:pointer;min-width:56px;' +
        'color:' + (active ? 'var(--primary)' : 'var(--text-light)') + ';' +
        'background:' + (active ? 'rgba(26,139,168,.08)' : 'transparent') + '">' +
        '<i class="fas ' + icon + '" style="font-size:1.2rem"></i>' +
        '<span style="font-size:.62rem;font-weight:600">' + label + '</span></div>';
}

function initMobileApp() {
    mobileNavigate('dashboard');
}

function mobileNavigate(page) {
    // Update nav
    document.querySelectorAll('[data-mpage]').forEach(function(item) {
        var isActive = item.dataset.mpage === page;
        item.style.color = isActive ? 'var(--primary)' : 'var(--text-light)';
        item.style.background = isActive ? 'rgba(26,139,168,.08)' : 'transparent';
    });

    // Voice FAB on stock count only
    var fab = document.getElementById('mobile-voice-fab');
    if (fab) fab.style.display = page === 'stock-count' ? 'flex' : 'none';

    var content = document.getElementById('mobile-content');
    if (!content) return;
    content.scrollTop = 0;

    if      (page === 'dashboard')   content.innerHTML = mobilePageDashboard();
    else if (page === 'stock-count') content.innerHTML = mobilePageStockCount();
    else if (page === 'purchases')   content.innerHTML = mobilePagePurchases();
    else if (page === 'inventory')   content.innerHTML = mobilePageInventory();
}

function mobileRefresh() {
    if (!HUB.accountId || HUB.accountId === 'master') return;
    hubToast('info', '🔄 Refreshing...');
    db.collection('accounts').doc(HUB.accountId).get()
        .then(function(doc) {
            if (doc.exists) {
                HUB.accountData = doc.data();
                mobileNavigate('dashboard');
                hubToast('success', '✅ Refreshed');
            }
        });
}

// ============================================================
// MOBILE — HELPER FUNCTIONS
// ============================================================
function mGetInventory() {
    if (!HUB.accountData || !HUB.entityId) return [];
    return (HUB.accountData.inventory || {})[HUB.entityId] || [];
}

function mGetPurchases() {
    if (!HUB.accountData || !HUB.entityId) return [];
    return (HUB.accountData.purchases || {})[HUB.entityId] || [];
}

function mGetPendingPOs() {
    if (!HUB.accountData || !HUB.entityId) return [];
    return (HUB.accountData.pendingPOs || {})[HUB.entityId] || [];
}

function mGetSuppliers() {
    if (!HUB.accountData || !HUB.entityId) return [];
    return (HUB.accountData.suppliers || {})[HUB.entityId] || [];
}

function mFmt(n) {
    n = n || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toFixed(0);
}

function mStatusText(s) {
    if (!s) return '';
    return s.split('-').map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

// ============================================================
// MOBILE — DASHBOARD PAGE
// ============================================================
function mobilePageDashboard() {
    var inv      = mGetInventory();
    var stockVal = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);
    var lowStock = inv.filter(function(i) {
        return i.status === 'low-stock' || i.status === 'out-of-stock';
    });
    var ent = HUB.entity || {};

    // Live food cost calculation
    var openingStock = ent.openingStockValue || stockVal;
    var totalPurch   = mGetPurchases().reduce(function(s, p) { return s + (p.total || 0); }, 0);
    var closingStock = stockVal;
    var cashups      = (HUB.accountData || {}).cashups || {};
    var entCashups   = cashups[HUB.entityId] || {};
    var totalSales   = 0;
    Object.values(entCashups).forEach(function(cu) { totalSales += (cu.total || 0); });
    // Remove VAT from sales
    var salesExVat = totalSales / (1 + VAT_RATE);
    var purchExVat = totalPurch / (1 + VAT_RATE);
    var foodCostPct = salesExVat > 0
        ? ((openingStock + purchExVat - closingStock) / salesExVat * 100)
        : 0;

    var html = '';

    // Welcome card
    html += '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;' +
        'box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:center;gap:12px;' +
        'border-left:4px solid var(--gold)">' +
        '<div style="width:44px;height:44px;border-radius:12px;' +
        'background:linear-gradient(135deg,var(--gold),var(--gold-dark));' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem">' +
        '<i class="fas fa-user"></i></div>' +
        '<div><div style="font-size:.92rem;font-weight:700;color:var(--text)">Welcome, ' +
        (HUB.user ? HUB.user.name : 'User') + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' +
        (HUB.user ? HUB.user.role : '') + ' • ' + (HUB.entityName || '') + '</div></div></div>';

    // Stats
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">' +
        mobileStatCard('Stock Value', 'R' + mFmt(stockVal), 'var(--primary)') +
        mobileStatCard('Items', inv.length, 'var(--gold)') +
        mobileStatCard('Food Cost %', foodCostPct.toFixed(1) + '%',
            foodCostPct > (ent.foodCostTarget || 28) ? 'var(--danger)' : 'var(--success)') +
        mobileStatCard('Low Stock', lowStock.length, 'var(--danger)') +
        '</div>';

    // Quick Actions
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">';
    html += mobileQuickBtn('fa-clipboard-list', 'Count',  "mobileNavigate('stock-count')");
    html += mobileQuickBtn('fa-shopping-cart',  'Orders', "mobileNavigate('purchases')");
    html += mobileQuickBtn('fa-robot',          'AI',     'showMobileAI()');
    html += mobileQuickBtn('fa-box',            'Stock',  "mobileNavigate('inventory')");
    html += '</div>';

    // Low stock alerts
    if (lowStock.length > 0) {
        html += '<div style="font-size:.78rem;font-weight:700;color:var(--text-light);' +
            'text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">⚠️ Low Stock</div>';
        lowStock.slice(0, 5).forEach(function(item) {
            var badgeClass = item.status === 'out-of-stock' ? 'badge-red' : 'badge-orange';
            html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;' +
                'background:var(--bg-card);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="width:36px;height:36px;border-radius:10px;' +
                'background:rgba(26,139,168,.1);display:flex;align-items:center;justify-content:center;' +
                'color:var(--primary);font-size:.9rem;flex-shrink:0">' +
                '<i class="fas fa-exclamation-triangle"></i></div>' +
                '<div style="flex:1;min-width:0">' +
                '<div style="font-size:.85rem;font-weight:600;color:var(--text)">' + item.name + '</div>' +
                '<div style="font-size:.7rem;color:var(--text-light)">' +
                (item.quantity || 0) + ' ' + item.unit + ' • Reorder: ' + (item.reorder || 0) + '</div></div>' +
                '<span class="badge ' + badgeClass + '">' + mStatusText(item.status) + '</span></div>';
        });
    }

var mVoiceRecog = null;

function startMobileVoice() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        hubToast('warning', 'Voice not supported on this device');
        return;
    }
    hubToast('info', '🎤 Listening — say item name then quantity...');
    var fab = document.getElementById('mobile-voice-fab');
    if (fab) fab.style.background = 'linear-gradient(135deg,var(--danger),#a83232)';

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    mVoiceRecog = new SR();
    mVoiceRecog.continuous     = true;
    mVoiceRecog.interimResults = false;
    mVoiceRecog.lang           = 'en-ZA';

    mVoiceRecog.onresult = function(e) {
        var transcript = e.results[e.results.length - 1][0].transcript
            .toLowerCase().trim();

        if (transcript.includes('stop') || transcript.includes('done') || transcript.includes('finish')) {
            stopMobileVoice();
            hubToast('success', '✅ Voice count completed');
            return;
        }
        processMobileVoiceCount(transcript);
    };

    mVoiceRecog.onerror = function() {};
    mVoiceRecog.onend = function() { stopMobileVoice(); };

    try { mVoiceRecog.start(); } catch(e) {
        hubToast('error', 'Voice error');
    }
}

function stopMobileVoice() {
    if (mVoiceRecog) {
        try { mVoiceRecog.stop(); } catch(e) {}
        mVoiceRecog = null;
    }
    var fab = document.getElementById('mobile-voice-fab');
    if (fab) fab.style.background = 'linear-gradient(135deg,var(--primary),var(--primary-dark))';
}

function processMobileVoiceCount(transcript) {
    var inv = mGetInventory();
    var numberWords = {
        zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,
        eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,
        eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,
        sixty:60,seventy:70,eighty:80,ninety:90,hundred:100,half:0.5
    };

    var words = transcript.split(/\s+/);
    var qty = null, itemName = '';

    for (var len = 3; len >= 1; len--) {
        if (words.length < len + 1) continue;
        var numPhrase = words.slice(-len).join(' ');
        if (len === 2) {
            var parts = numPhrase.split(' ');
            if (numberWords[parts[0]] !== undefined && numberWords[parts[1]] !== undefined) {
                var tens = numberWords[parts[0]], ones = numberWords[parts[1]];
                if (tens >= 20 && ones < 10) { qty = tens + ones; itemName = words.slice(0, -len).join(' '); break; }
            }
        }
        if (numberWords[numPhrase] !== undefined) {
            qty = numberWords[numPhrase]; itemName = words.slice(0, -len).join(' '); break;
        }
    }
    if (qty === null) {
        for (var i = words.length - 1; i >= 0; i--) {
            var n = parseFloat(words[i]);
            if (!isNaN(n)) { qty = n; itemName = words.slice(0, i).join(' '); break; }
            if (numberWords[words[i]] !== undefined) {
                qty = numberWords[words[i]]; itemName = words.slice(0, i).join(' '); break;
            }
        }
    }

    if (qty === null || !itemName.trim()) {
        hubToast('warning', 'Could not understand — try again');
        return;
    }

    itemName = itemName.trim().toLowerCase();
    var found = inv.find(function(it) { return it.name.toLowerCase() === itemName; });
    if (!found) found = inv.find(function(it) { return it.name.toLowerCase().indexOf(itemName) !== -1; });
    if (!found) found = inv.find(function(it) { return itemName.indexOf(it.name.toLowerCase().split(' ')[0]) !== -1; });

    if (found) {
        found.quantity = qty;
        found.value    = qty * (found.cost || 0);
        found.status   = qty === 0 ? 'out-of-stock' : qty <= (found.reorder || 0) ? 'low-stock' : 'in-stock';
        var countInput = document.getElementById('mcount-' + found.id);
        if (countInput) countInput.value = qty;
        hubToast('success', '✓ ' + found.name + ': ' + qty + ' ' + found.unit);
    } else {
        hubToast('warning', '"' + itemName + '" not found');
    }
}

function procureFilterItems() {
    var q = (document.getElementById('proc-search').value || '').toLowerCase();
    document.querySelectorAll('.proc-item-row').forEach(function(el) {
        var name = el.dataset.name || '';
        var cat  = el.dataset.cat  || '';
        el.style.display = (name.includes(q) || cat.includes(q)) ? '' : 'none';
    });
}

function procureFilterCat(cat) {
    document.querySelectorAll('.proc-item-row').forEach(function(el) {
        if (!cat) { el.style.display = ''; return; }
        el.style.display = (el.dataset.cat || '') === cat.toLowerCase() ? '' : 'none';
    });
}

function procureAddToCart(itemId) {
    var inv  = mGetInventory();
    var item = inv.find(function(i) { return i.id === itemId; });
    if (!item) return;
    if (procureCart.find(function(c) { return c.id === itemId; })) {
        hubToast('info', item.name + ' already in order');
        return;
    }
    var suggestedQty = Math.max((item.reorder || 5) * 2, 1);
    procureCart.push({
        id:       item.id,
        name:     item.name,
        unit:     item.unit,
        category: item.category,
        cost:     item.cost || 0,
        qty:      suggestedQty,
        supplier: item.supplier || ''
    });
    hubToast('success', '✅ ' + item.name + ' added');
    procureNavigate('new-order');
}

function procureRemoveFromCart(itemId) {
    procureCart = procureCart.filter(function(c) { return c.id !== itemId; });
    procureNavigate('new-order');
}

function procureUpdateQty(itemId) {
    var input = document.getElementById('pqty-' + itemId);
    if (!input) return;
    var ci = procureCart.find(function(c) { return c.id === itemId; });
    if (ci) ci.qty = parseFloat(input.value) || 0;
}

// ============================================================
// PROCURE — PLACE ORDER (Auto cheapest supplier split)
// ============================================================
function procurePlaceOrder() {
    if (procureCart.length === 0) { hubToast('error', 'Cart is empty'); return; }

    // Read latest quantities
    procureCart.forEach(function(ci) {
        var input = document.getElementById('pqty-' + ci.id);
        if (input) ci.qty = parseFloat(input.value) || ci.qty;
    });

    hubToast('info', '🔄 Generating POs...');

    var suppliers = mGetSuppliers();
    var supplierGroups = {};

    // Auto-assign to cheapest supplier per item
    procureCart.forEach(function(ci) {
        var cheapest = findCheapestSupplier(ci, suppliers);
        var supName  = cheapest ? cheapest.name : (ci.supplier || 'Unknown Supplier');
        var supEmail = cheapest ? (cheapest.email || '') : '';

        if (!supplierGroups[supName]) {
            supplierGroups[supName] = { name: supName, email: supEmail, items: [] };
        }
        supplierGroups[supName].items.push({
            id:    ci.id,
            name:  ci.name,
            qty:   ci.qty,
            unit:  ci.unit,
            cost:  ci.cost,
            total: parseFloat((ci.qty * ci.cost).toFixed(2))
        });
    });

    // Create POs
    var newPOs = [];
    var emailPromises = [];

    Object.keys(supplierGroups).forEach(function(supName) {
        var group   = supplierGroups[supName];
        var poTotal = group.items.reduce(function(s, i) { return s + i.total; }, 0);
        var poId    = 'PO-' + Date.now() + '-' + Math.floor(Math.random() * 1000);

        var po = {
            id:            poId,
            supplier:      supName,
            supplierEmail: group.email,
            items:         group.items,
            total:         parseFloat(poTotal.toFixed(2)),
            status:        'In Transit',
            type:          'Procurement',
            createdBy:     HUB.user ? HUB.user.name : 'ProcureAI',
            createdAt:     new Date().toISOString(),
            entityId:      HUB.entityId,
            entityName:    HUB.entityName
        };
        newPOs.push(po);

        // Email PO to supplier
        if (group.email) {
            emailPromises.push(emailPurchaseOrder({
                poId:          po.id,
                supplierName:  po.supplier,
                supplierEmail: group.email,
                entityName:    HUB.entityName,
                entityAddress: HUB.entity ? (HUB.entity.address || '') : '',
                createdBy:     po.createdBy,
                createdAt:     po.createdAt,
                items:         po.items,
                total:         po.total
            }));
        }
    });

    // Save to Firestore
    var purchases = mGetPurchases();
    var updated   = newPOs.concat(purchases);

    var update = {};
    update['purchases.' + HUB.entityId] = updated;
    update.lastUpdated      = firebase.firestore.FieldValue.serverTimestamp();
    update.lastUpdatedBy    = HUB.user ? HUB.user.name : 'ProcureAI';
    update.lastUpdatedDevice = 'ProcureAI';

    db.collection('accounts').doc(HUB.accountId)
        .set(update, { merge: true })
        .then(function() {
            return Promise.all(emailPromises);
        })
        .then(function() {
            if (HUB.accountData) {
                if (!HUB.accountData.purchases) HUB.accountData.purchases = {};
                HUB.accountData.purchases[HUB.entityId] = updated;
            }
            procureCart = [];
            hubToast('success', '✅ ' + newPOs.length + ' PO(s) created & sent to suppliers!');
            setTimeout(function() { procureNavigate('orders'); }, 1000);
        })
        .catch(function(err) {
            hubToast('error', 'Error: ' + err.message);
        });
}

function findCheapestSupplier(item, suppliers) {
    if (!suppliers || suppliers.length === 0) return null;
    var linked = suppliers.filter(function(sup) {
        return (sup.linkedItems || []).some(function(lid) {
            return lid === item.id || lid === item.name;
        });
    });
    if (linked.length === 1) return linked[0];
    if (linked.length > 1) {
        return linked.reduce(function(cheapest, sup) {
            var supCost  = sup.itemPrices && sup.itemPrices[item.id] ? sup.itemPrices[item.id] : item.cost;
            var cheapCost = cheapest.itemPrices && cheapest.itemPrices[item.id] ? cheapest.itemPrices[item.id] : item.cost;
            return supCost < cheapCost ? sup : cheapest;
        });
    }
    return suppliers.find(function(s) { return s.name === item.supplier; }) || null;
}
