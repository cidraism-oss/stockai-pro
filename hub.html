<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d4a5c">
<meta name="mobile-web-app-capable" content="yes">
<title>StockAI-Pro 2.0 — Hub</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="feature-access.css">

<style>
:root {
    --primary:#1a8ba8;
    --primary-dark:#0d4a5c;
    --primary-light:#4dbdd5;
    --primary-pale:#d4f0f7;
    --bg:#0d3d4f;
    --bg-card:#0f4d62;
    --bg-hover:#1a6070;
    --bg-dark:#0b3344;
    --text:#e0f4f8;
    --text-mid:#a8d8e8;
    --text-light:#7bb8c8;
    --text-muted:#4a8a9a;
    --gold:#f59e0b;
    --gold-dark:#d97706;
    --success:#2ea871;
    --danger:#c94545;
    --warning:#d4a017;
    --info:#2b8eb3;
    --border:#1a5a6e;
    --border-light:#164f62;
    --shadow:0 2px 12px rgba(0,0,0,.3);
    --shadow-lg:0 8px 30px rgba(0,0,0,.4);
    --shadow-xl:0 20px 60px rgba(0,0,0,.5);
    --r:14px;
    --rs:8px;
    --header-h:56px;
    --nav-h:65px;
    --vat:0.15;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:14px;
    user-select:none;
    -webkit-user-select:none;
}
.hidden { display:none !important; }
input, textarea, select { user-select:text; -webkit-user-select:text; }

/* ═══ WELCOME SCREEN ═══ */
#welcome-screen {
    position:fixed; inset:0; z-index:99999;
    background:linear-gradient(135deg,#020d10 0%,#0d4a5c 30%,#1a8ba8 60%,#0d4a5c 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; overflow:hidden;
}
.w-particle {
    position:absolute; border-radius:50%; opacity:0; pointer-events:none;
    animation:wpFloat var(--dur,8s) ease-in-out infinite var(--delay,0s);
}
@keyframes wpFloat {
    0%{opacity:0;transform:translateY(100px) scale(0)}
    20%{opacity:.8;transform:translateY(50px) scale(1)}
    80%{opacity:.4;transform:translateY(-50px) scale(.8)}
    100%{opacity:0;transform:translateY(-150px) scale(0)}
}
.w-star {
    position:absolute; width:2px; background:linear-gradient(transparent,#f59e0b,transparent);
    opacity:0; transform:rotate(35deg);
    animation:wStar var(--dur,4s) ease-in infinite var(--delay,0s);
}
@keyframes wStar {
    0%{opacity:0;transform:rotate(35deg) translateY(-150px)}
    20%{opacity:1}
    100%{opacity:0;transform:rotate(35deg) translateY(400px)}
}
.w-ring {
    position:absolute; border-radius:50%; border:1px solid rgba(77,189,213,.2);
    animation:wRingPulse var(--dur,4s) ease-out infinite var(--delay,0s);
}
@keyframes wRingPulse { 0%{transform:scale(.3);opacity:1} 100%{transform:scale(2.5);opacity:0} }
.w-orb {
    position:absolute; border-radius:50%; filter:blur(60px);
    animation:wOrb 6s ease-in-out infinite;
}
@keyframes wOrb {
    0%,100%{transform:translate(0,0) scale(1);opacity:.3}
    33%{transform:translate(30px,-20px) scale(1.2);opacity:.5}
    66%{transform:translate(-20px,30px) scale(.8);opacity:.2}
}
.w-logo-wrap {
    position:relative; margin-bottom:32px;
    animation:wLogoEntrance 1.2s cubic-bezier(.175,.885,.32,1.275) .3s both;
}
@keyframes wLogoEntrance {
    0%{opacity:0;transform:scale(0) rotate(-180deg)}
    60%{transform:scale(1.2) rotate(15deg)}
    80%{transform:scale(.9) rotate(-5deg)}
    100%{opacity:1;transform:scale(1) rotate(0)}
}
.w-logo {
    width:120px; height:120px;
    background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.85));
    border-radius:28px; display:flex; align-items:center; justify-content:center;
    color:var(--primary-dark); font-size:3.2rem;
    box-shadow:0 0 0 2px rgba(77,189,213,.4),0 0 30px rgba(26,139,168,.6),0 0 80px rgba(26,139,168,.3),0 20px 60px rgba(0,0,0,.4);
    animation:wLogoFloat 4s ease-in-out infinite 1.5s;
    position:relative; z-index:2;
}
@keyframes wLogoFloat {
    0%,100%{transform:translateY(0) scale(1)}
    50%{transform:translateY(-12px) scale(1.02)}
}
.w-orbital {
    position:absolute; top:50%; left:50%; border-radius:50%; border:1px solid transparent;
    animation:wOrbital var(--dur,6s) linear infinite var(--delay,0s);
}
@keyframes wOrbital { from{transform:translate(-50%,-50%) rotate(0)} to{transform:translate(-50%,-50%) rotate(360deg)} }
.w-orbital-dot { position:absolute; border-radius:50%; top:-4px; left:50%; transform:translateX(-50%); }
.w-welcome-text {
    color:rgba(255,255,255,.7); font-size:1rem; font-weight:400;
    letter-spacing:8px; text-transform:uppercase;
    opacity:0; animation:wFadeUp .8s ease 1.2s both; margin-bottom:8px;
}
.w-brand {
    font-size:3.5rem; font-weight:900; color:#fff; letter-spacing:4px;
    opacity:0; animation:wBrandReveal 1.2s cubic-bezier(.175,.885,.32,1.275) 1.8s both;
    text-shadow:0 0 40px rgba(77,189,213,.6);
}
@keyframes wBrandReveal {
    0%{opacity:0;transform:scale(0) skewX(20deg)}
    60%{transform:scale(1.1) skewX(-5deg)}
    80%{transform:scale(.97) skewX(2deg)}
    100%{opacity:1;transform:scale(1) skewX(0)}
}
.w-brand span { color:var(--gold); text-shadow:0 0 30px rgba(245,158,11,.8); }
.w-tagline {
    color:rgba(255,255,255,.6); font-size:.9rem; font-style:italic;
    opacity:0; animation:wFadeUp .6s ease 2.6s both; margin-bottom:40px;
}
@keyframes wFadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.w-features { display:flex; gap:10px; margin-bottom:48px; flex-wrap:wrap; justify-content:center; }
.w-pill {
    padding:8px 18px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
    border-radius:24px; color:rgba(255,255,255,.85); font-size:.75rem; font-weight:600;
    display:flex; align-items:center; gap:7px; opacity:0; backdrop-filter:blur(10px);
    animation:wFadeUp .5s ease var(--delay,3s) both;
}
.w-pill i { color:var(--gold); }
#welcome-enter {
    display:inline-flex; align-items:center; gap:16px; padding:20px 52px;
    background:transparent; border:2px solid rgba(255,255,255,.5);
    border-radius:60px; color:#fff; font-size:1rem; font-weight:700;
    letter-spacing:6px; cursor:pointer; font-family:inherit;
    opacity:0; animation:wFadeUp .8s ease 3.5s both;
    position:relative; overflow:hidden; transition:all .4s ease;
}
#welcome-enter:hover {
    border-color:var(--gold); box-shadow:0 0 40px rgba(245,158,11,.4);
    transform:scale(1.05); letter-spacing:8px;
}
#welcome-enter:active { transform:scale(.97); }
.enter-arrow {
    width:42px; height:42px; background:rgba(255,255,255,.15); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    animation:wArrowBounce 2s ease-in-out infinite 4s;
}
@keyframes wArrowBounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
.w-version {
    position:absolute; bottom:20px; color:rgba(255,255,255,.2);
    font-size:.65rem; letter-spacing:3px; opacity:0; animation:wFadeUp .5s ease 4s both;
}

/* ═══ LOGIN ═══ */
#login-screen {
    position:fixed; inset:0;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    display:flex; align-items:center; justify-content:center; padding:24px; z-index:9999;
}
.login-card {
    background:var(--bg-card); border-radius:24px; padding:40px 36px;
    width:100%; max-width:420px; box-shadow:var(--shadow-xl); text-align:center;
    position:relative; overflow:hidden;
}
.login-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg,var(--primary-dark),var(--primary),var(--gold),var(--primary));
    background-size:200% 100%; animation:loginBar 3s linear infinite;
}
@keyframes loginBar { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }
.login-logo {
    width:72px; height:72px; background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    border-radius:18px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:2rem; margin:0 auto 20px;
    box-shadow:0 8px 24px rgba(26,139,168,.35);
}
.login-card h1 { font-size:1.8rem; font-weight:900; color:var(--text); letter-spacing:1px; margin-bottom:4px; }
.login-card .sub { font-size:.82rem; color:var(--text-light); margin-bottom:28px; }
.login-field { margin-bottom:16px; text-align:left; }
.login-field label { font-size:.78rem; font-weight:600; color:var(--text-mid); display:block; margin-bottom:5px; }
.login-input {
    width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:var(--rs);
    font-size:.92rem; font-family:inherit; color:var(--text); background:var(--bg-dark); transition:.2s;
}
.login-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,139,168,.2); }
.login-btn {
    width:100%; padding:15px; background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff; border:none; border-radius:var(--rs); font-size:1rem; font-weight:700;
    cursor:pointer; font-family:inherit; transition:.3s; margin-bottom:12px;
    display:flex; align-items:center; justify-content:center; gap:10px;
}
.login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(26,139,168,.4); }
.login-btn:disabled { opacity:.6; transform:none; cursor:not-allowed; }
.login-remember {
    display:flex; align-items:center; gap:10px; margin-bottom:16px;
    cursor:pointer; font-size:.82rem; color:var(--text-mid); font-weight:500;
}
.login-remember input[type="checkbox"] { width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
.login-forgot {
    background:none; border:none; color:var(--primary-light); font-size:.82rem;
    cursor:pointer; font-family:inherit; font-weight:600; display:block;
    text-align:center; margin-bottom:16px; text-decoration:none;
}
.login-error {
    background:rgba(201,69,69,.15); border:1px solid rgba(201,69,69,.3);
    color:var(--danger); padding:10px 14px; border-radius:var(--rs);
    font-size:.82rem; margin-bottom:14px; display:none;
}

/* ═══ HUB APP ═══ */
#hub-app { position:fixed; inset:0; display:flex; flex-direction:column; background:var(--bg); }
.hub-header {
    height:var(--header-h); background:linear-gradient(90deg,var(--primary-dark),var(--primary));
    display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0;
    box-shadow:0 2px 16px rgba(0,0,0,.3); z-index:100;
}
.hub-header-logo {
    width:36px; height:36px; background:rgba(255,255,255,.15); border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem;
}
.hub-header-info { flex:1; }
.hub-header-info .hub-user { font-size:.88rem; font-weight:700; color:#fff; }
.hub-header-info .hub-role { font-size:.65rem; color:rgba(255,255,255,.7); }
.hub-header-time { font-size:.7rem; color:rgba(255,255,255,.7); text-align:right; }
.hub-header-time strong { display:block; font-size:.82rem; color:#fff; }
.hub-hbtn {
    width:36px; height:36px; background:rgba(255,255,255,.15); border:none;
    border-radius:var(--rs); color:#fff; font-size:.9rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; margin-left:6px;
}
.hub-hbtn:hover { background:rgba(255,255,255,.25); }
.hub-dashboard {
    flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;
    align-items:center; -webkit-overflow-scrolling:touch;
}

/* ═══ APP CARDS ═══ */
.hub-app-card {
    background:var(--bg-card); border-radius:var(--r); padding:20px 10px;
    box-shadow:var(--shadow); text-align:center; cursor:pointer; transition:.3s;
    border:2px solid transparent; position:relative; overflow:hidden;
}
.hub-app-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-6px); border-color:rgba(26,139,168,.3); }
.hub-app-card:active { transform:scale(.95); }
.hub-app-icon {
    width:54px; height:54px; border-radius:14px; display:flex; align-items:center;
    justify-content:center; font-size:1.4rem; color:#fff; margin:0 auto 10px;
}
.hub-app-name { font-size:.78rem; font-weight:700; color:var(--text); }
.hub-app-desc { font-size:.62rem; color:var(--text-muted); margin-top:3px; line-height:1.3; }
.hub-app-card.disabled { opacity:.3; pointer-events:none; }
.hub-app-card.disabled::after { content:'🔒'; position:absolute; top:6px; right:8px; font-size:.65rem; }

/* ═══ INFO CARD ═══ */
.info-card {
    background:var(--bg-card); border-radius:var(--r); padding:16px;
    box-shadow:var(--shadow); margin-bottom:12px;
}
.info-card-header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
}
.info-card-header h4 {
    font-size:.9rem; font-weight:700; color:var(--text);
    display:flex; align-items:center; gap:8px;
}

/* ═══ TOAST ═══ */
.hub-toast-wrap {
    position:fixed; top:calc(var(--header-h) + 10px); right:16px; z-index:9999;
    display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.hub-toast {
    padding:12px 16px; border-radius:var(--rs); box-shadow:var(--shadow-lg);
    display:flex; align-items:center; gap:10px; font-size:.85rem; font-weight:500;
    animation:toastIn .3s ease; pointer-events:all; min-width:260px; max-width:340px;
}
@keyframes toastIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
.hub-toast.success { background:rgba(46,168,113,.9); color:#fff; border-left:3px solid #1a7a4a; }
.hub-toast.error   { background:rgba(201,69,69,.9);  color:#fff; border-left:3px solid #a83232; }
.hub-toast.info    { background:rgba(26,139,168,.9); color:#fff; border-left:3px solid #0d4a5c; }
.hub-toast.warning { background:rgba(212,160,23,.9); color:#fff; border-left:3px solid #b8860b; }
.hub-toast button  { background:none; border:none; cursor:pointer; color:inherit; opacity:.7; margin-left:auto; }

/* ═══ MODAL ═══ */
.hub-modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px);
    z-index:800; display:flex; align-items:center; justify-content:center; padding:20px;
}
.hub-modal {
    background:var(--bg-card); border-radius:20px; width:100%; max-width:520px;
    max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-xl);
    animation:modalIn .3s ease; border:1px solid var(--border);
}
@keyframes modalIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
.hub-modal-header {
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
}
.hub-modal-header h3 { font-size:1rem; font-weight:700; color:var(--text); }
.hub-modal-close {
    width:32px; height:32px; border-radius:50%; background:var(--bg-dark);
    border:none; color:var(--text-light); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
}
.hub-modal-body   { padding:24px; }
.hub-modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ═══ ADMIN PANEL ═══ */
#admin-panel { position:fixed; inset:0; background:var(--bg); z-index:600; display:flex; flex-direction:column; }

/* ═══ APP FRAME ═══ */
#app-frame {
    position:fixed; inset:0; z-index:500; background:var(--bg);
    display:flex; flex-direction:column; animation:appSlideIn .3s ease;
}
@keyframes appSlideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.return-hub-btn {
    display:flex; align-items:center; gap:8px; padding:8px 14px;
    background:rgba(255,255,255,.15); border:none; border-radius:var(--rs);
    color:#fff; font-size:.78rem; font-weight:600; cursor:pointer; font-family:inherit;
}
.return-hub-btn:hover { background:rgba(255,255,255,.25); }

/* ═══ EMPTY STATE ═══ */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-light); }
.empty-state i { font-size:3rem; color:var(--primary); opacity:.25; display:block; margin-bottom:14px; }
.empty-state h3 { font-size:.95rem; color:var(--text); margin-bottom:6px; }

/* ═══ BUTTONS ═══ */
.btn { padding:10px 20px; border:none; border-radius:var(--rs); font-size:.88rem; font-weight:600; cursor:pointer; font-family:inherit; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(26,139,168,.4); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger  { background:var(--danger);  color:#fff; }
.btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text-mid); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary-light); }
.btn-sm { padding:6px 12px; font-size:.78rem; }

/* ═══ RESPONSIVE ═══ */
@media(min-width:768px) { .hub-dashboard { padding:28px; } }
@media(max-width:380px) {
    .w-brand { font-size:2.5rem; }
    #hub-modal-container .hub-modal { max-width:95vw; }
}
</style>
</head>
<body>
<!-- ═══════════════════════════════════ -->
<!-- WELCOME SCREEN                      -->
<!-- ═══════════════════════════════════ -->
<div id="welcome-screen">
    <div class="w-orb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(26,139,168,.4),transparent);top:-100px;right:-100px"></div>
    <div class="w-orb" style="width:300px;height:300px;background:radial-gradient(circle,rgba(245,158,11,.3),transparent);bottom:-80px;left:-80px;animation-delay:2s"></div>
    <div class="w-orb" style="width:200px;height:200px;background:radial-gradient(circle,rgba(77,189,213,.3),transparent);top:40%;left:10%;animation-delay:4s"></div>

    <div class="w-star" style="height:80px;top:10%;left:15%;--dur:4s;--delay:0s"></div>
    <div class="w-star" style="height:60px;top:30%;left:55%;--dur:3.5s;--delay:1.5s"></div>
    <div class="w-star" style="height:100px;top:60%;left:80%;--dur:5s;--delay:3s"></div>
    <div class="w-star" style="height:70px;top:20%;left:70%;--dur:4.5s;--delay:2s"></div>

    <div class="w-particle" style="width:6px;height:6px;background:#f59e0b;top:15%;left:12%;--dur:7s;--delay:0s"></div>
    <div class="w-particle" style="width:4px;height:4px;background:#4dbdd5;top:25%;right:18%;--dur:8s;--delay:1s"></div>
    <div class="w-particle" style="width:8px;height:8px;background:#f59e0b;bottom:25%;left:8%;--dur:6s;--delay:2s"></div>
    <div class="w-particle" style="width:5px;height:5px;background:#4dbdd5;top:45%;right:12%;--dur:9s;--delay:.5s"></div>
    <div class="w-particle" style="width:3px;height:3px;background:#fff;bottom:18%;right:22%;--dur:7s;--delay:1.5s"></div>
    <div class="w-particle" style="width:7px;height:7px;background:#f59e0b;top:65%;left:22%;--dur:8s;--delay:3s"></div>
    <div class="w-particle" style="width:4px;height:4px;background:#fff;top:80%;right:35%;--dur:6.5s;--delay:2.5s"></div>

    <div class="w-ring" style="width:200px;height:200px;top:50%;left:50%;margin:-100px 0 0 -100px;--dur:3s;--delay:0s"></div>
    <div class="w-ring" style="width:350px;height:350px;top:50%;left:50%;margin:-175px 0 0 -175px;--dur:3.5s;--delay:.8s;border-color:rgba(245,158,11,.15)"></div>
    <div class="w-ring" style="width:500px;height:500px;top:50%;left:50%;margin:-250px 0 0 -250px;--dur:4s;--delay:1.6s;border-color:rgba(255,255,255,.08)"></div>

    <div class="w-logo-wrap">
        <div class="w-orbital" style="width:160px;height:160px;border-color:rgba(77,189,213,.3);--dur:8s">
            <div class="w-orbital-dot" style="width:8px;height:8px;background:#4dbdd5;box-shadow:0 0 10px #4dbdd5"></div>

// ============================================================
// AUTH — CHECK ON LOAD (no re-login after returning from app)
// ============================================================
function checkHubAuth() {
    var remembered = localStorage.getItem('stockai_remember');
    var remEmail   = localStorage.getItem('stockai_email');
    if (remembered === 'yes' && remEmail) {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
            .then(function() {
                return new Promise(function(resolve) {
                    var unsub = auth.onAuthStateChanged(function(user) {
                        unsub();
                        resolve(user);
                    });
                });
            })
            .then(function(firebaseUser) {
                if (firebaseUser) {
                    hubToast('info', '🔄 Loading...');
                    findHubAccount(firebaseUser.email, function(found) {
                        if (found) {
                            document.getElementById('login-screen').classList.add('hidden');
                            routeAfterLogin();
                        } else {
                            showLoginScreen();
                        }
                    });
                } else {
                    showLoginScreen();
                }
            });
    } else {
        auth.signOut().then(showLoginScreen).catch(showLoginScreen);
    }
}
// ============================================================
// SESSION CACHE — Prevents re-login on app return
// ============================================================
function saveSessionCache() {
    try {
        sessionStorage.setItem('hub_session', JSON.stringify({
            user:       HUB.user,
            accountId:  HUB.accountId,
            entityId:   HUB.entityId,
            entityName: HUB.entityName,
            entities:   HUB.entities,
            allowedApps:HUB.allowedApps,
            isMaster:   HUB.isMaster,
            currentView:HUB.currentView,
            entity:     HUB.entity
        }));
    } catch(e) {}
}

function restoreSessionCache() {
    try {
        var raw = sessionStorage.getItem('hub_session');
        if (!raw) return false;
        var s = JSON.parse(raw);
        if (!s || !s.user) return false;
        HUB.user        = s.user;
        HUB.accountId   = s.accountId;
        HUB.entityId    = s.entityId;
        HUB.entityName  = s.entityName;
        HUB.entities    = s.entities   || [];
        HUB.allowedApps = s.allowedApps|| [];
        HUB.isMaster    = s.isMaster   || false;
        HUB.currentView = s.currentView|| null;
        HUB.entity      = s.entity     || null;
        return true;
    } catch(e) { return false; }
}

    document.getElementById('hub-app').classList.add('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('app-frame').classList.add('hidden');
}

function showLoginError(msg) {
    var el = document.getElementById('login-error');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ============================================================
// HUB LOGIN
// ============================================================
function hubLogin() {
    var email    = (document.getElementById('hub-email').value    || '').trim().toLowerCase();
    var password = (document.getElementById('hub-password').value || '').trim();
    var remember = document.getElementById('hub-remember').checked;
    var errorDiv = document.getElementById('login-error');
    errorDiv.style.display = 'none';

    if (!email)    { showLoginError('Please enter your email');    return; }
    if (!password) { showLoginError('Please enter your password'); return; }

    var btn = document.getElementById('hub-login-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

    var persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

    auth.setPersistence(persistence)
        .then(function() { return auth.signInWithEmailAndPassword(email, password); })
        .then(function() {
            if (remember) {
                localStorage.setItem('stockai_remember', 'yes');
                localStorage.setItem('stockai_email', email);
            } else {
                localStorage.removeItem('stockai_remember');
                localStorage.removeItem('stockai_email');
            }
            HUB.rememberMe = remember;
            hubToast('info', '🔄 Loading your workspace...');

            findHubAccount(email, function(found) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                if (found) {
                    document.getElementById('login-screen').classList.add('hidden');
                    saveSessionCache(); // ✅ Save session so return from app works
                    routeAfterLogin();
                } else {
                    showLoginError('Account not found. Please contact support.');
                    auth.signOut();
                }
            });
        })
        .catch(function(err) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            var msg = 'Login failed. Please try again.';
            if (err.code === 'auth/invalid-credential' ||
                err.code === 'auth/wrong-password'     ||
                err.code === 'auth/user-not-found')     msg = 'Incorrect email or password.';
            else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try later.';
            showLoginError(msg);
        });
}

// ============================================================
// FIND HUB ACCOUNT
// ============================================================
function findHubAccount(email, callback) {
    // Master admin shortcut
    if (email.toLowerCase() === MASTER_EMAIL.toLowerCase()) {
        HUB.isMaster    = true;
        HUB.accountId   = email.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
        HUB.user        = { name:'Miguel Cidrais', email:email, role:'Master Admin' };
        HUB.allowedApps = ALL_APPS.map(function(a) { return a.id; });

        db.collection('accounts').doc(HUB.accountId).get()
            .then(function(doc) {
                if (doc.exists) {
                    HUB.accountData = doc.data();
                    HUB.entities    = doc.data().entities || [];
                } else {
                    var masterDoc = {
                        owner:{ name:'Miguel Cidrais', email:MASTER_EMAIL, phone:'0790440508', country:'South Africa' },
                        entities:[], inventory:{}, purchases:{}, wastage:{}, suppliers:{},
                        users:{}, menuItems:{}, cashups:{}, notifs:[], activities:{},
                        pendingPOs:{}, clientInvoices:{}, departments:{}, categories:{},
                        functions:{}, accountStatus:'active', isMasterAccount:true,
                        createdAt:firebase.firestore.FieldValue.serverTimestamp()
                    };
                    db.collection('accounts').doc(HUB.accountId).set(masterDoc);
                    HUB.accountData = masterDoc;
                    HUB.entities    = [];
                }
            }).catch(function() {});

        if (callback) callback(true);
        return;
    }

    // Search all accounts
    db.collection('accounts').get().then(function(snap) {
        var found = false;
        snap.forEach(function(doc) {
            if (found) return;
            var data = doc.data();

            // Check owner
            if (data.owner && data.owner.email &&
                data.owner.email.toLowerCase() === email.toLowerCase()) {
                HUB.accountId   = doc.id;
                HUB.accountData = data;
                HUB.entities    = data.entities || [];
                HUB.user        = { name:data.owner.name||email, email:email, role:'Owner' };
                HUB.allowedApps = data.owner.appAccess || ROLE_DEFAULTS['Owner'].slice();
                found = true;
                return;
            }

            // Check entity users
            var users = data.users || {};
            Object.keys(users).forEach(function(eid) {
                if (found) return;
                (users[eid] || []).forEach(function(u) {
                    if (found) return;
                    if (u.email && u.email.toLowerCase() === email.toLowerCase()) {
                        HUB.accountId   = doc.id;
                        HUB.accountData = data;
                        HUB.entityId    = eid;
                        HUB.entities    = data.entities || [];
                        HUB.user        = { name:u.name||email, email:email, role:u.role||'Staff', assignedEntityId:eid };
                        var ents        = data.entities || [];
                        HUB.entity      = ents.find(function(e) { return e.id === eid; }) || ents[0] || null;
                        HUB.entityName  = HUB.entity ? HUB.entity.name : '';
                        HUB.allowedApps = u.appAccess || ROLE_DEFAULTS[u.role||'Staff'] || ['mobile'];
                        found = true;
                    }
                });
            });
        });

        if (callback) callback(found);
    }).catch(function() { if (callback) callback(false); });
}

// ============================================================
// ROUTE AFTER LOGIN
// ============================================================
function routeAfterLogin() {
    if (HUB.isMaster) {
        showMasterDashboard();
        return;
    }
    if (HUB.user.role === 'Owner' ||
        HUB.user.role === 'Area Manager' ||
        HUB.user.role === 'Operations Manager') {
        showOwnerEntityDashboard();
        return;
    }
    // Staff — go directly to their assigned entity
    if (HUB.user.assignedEntityId) {
        var ent = HUB.entities.find(function(e) { return e.id === HUB.user.assignedEntityId; });
        if (ent) { HUB.entity = ent; HUB.entityId = ent.id; HUB.entityName = ent.name; }
    } else if (HUB.entities.length > 0) {
        HUB.entity     = HUB.entities[0];
        HUB.entityId   = HUB.entities[0].id;
        HUB.entityName = HUB.entities[0].name;
    }
    showEntityHub();
}

function showMasterDashboard() {
    HUB.currentView = 'master-dashboard';
    document.getElementById('hub-app').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-frame').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');

    var content = document.getElementById('admin-content');
    content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
        '<i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--primary)"></i>' +
        '<p style="margin-top:12px">Loading master dashboard...</p></div>';

    db.collection('accounts').get().then(function(snap) {
        var customers = [];
        snap.forEach(function(doc) {
            if (doc.id !== HUB.accountId) customers.push({id:doc.id, data:doc.data()});

    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);border-left:4px solid ' + c + ';text-align:center">' +
        '<div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:4px">' + l + '</div>' +
        '<div style="font-size:1.5rem;font-weight:800;color:var(--text)">' + v + '</div></div>';
}

    var isA = (d.accountStatus||'active') === 'active';
    var ae  = ents.filter(function(e) { return e.status !== 'inactive'; }).length;
    var mrr = ae > 0 ? 799 + (ae * 599) : 0;

    return '<div class="info-card" data-search="' + ((o.name||'') + ' ' + (o.email||'')).toLowerCase() + '" ' +
        'style="border-left:4px solid ' + (isA ? 'var(--success)' : 'var(--danger)') + '">' +
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">' +
        '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,' +

        ');display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;flex-shrink:0">' +
        (o.name ? o.name.charAt(0).toUpperCase() : '?') + '</div>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="font-size:.92rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (o.name||'Unknown') + '</div>' +
        '<div style="font-size:.7rem;color:var(--text-light)">' + (o.email||'') + '</div></div>' +
        '<span style="padding:3px 10px;border-radius:12px;font-size:.68rem;font-weight:600;flex-shrink:0;' +
        'background:' + (isA ? 'rgba(46,168,113,.12)' : 'rgba(201,69,69,.12)') + ';' +
        'color:' + (isA ? 'var(--success)' : 'var(--danger)') + '">' + (isA ? 'Active' : 'Inactive') + '</span></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:var(--rs);font-size:.72rem">' +

        '<div><span style="color:var(--text-muted)">MRR: </span><strong style="color:var(--success)">R' + mrr.toLocaleString() + '</strong></div></div>' +
        '<div style="display:flex;gap:8px">' +

        '<button onclick="adminToggleStatus(\'' + c.id + '\',' + isA + ')" style="flex:1;padding:8px;background:' +

        ';color:#fff;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit">' +
        '<i class="fas fa-' + (isA ? 'ban' : 'check') + '"></i> ' + (isA ? 'Deactivate' : 'Activate') + '</button></div></div>';
}

function filterMasterCards() {
    var q = (document.getElementById('master-search').value || '').toLowerCase();
    document.querySelectorAll('#master-cards .info-card').forEach(function(c) {
        c.style.display = (c.dataset.search || '').includes(q) ? '' : 'none';
    });
}

function saveMasterEntity() {
    var name = (document.getElementById('me-name').value || '').trim();
    if (!name) { hubToast('error', 'Enter entity name'); return; }

    var sections = [];
    document.querySelectorAll('#hub-modal-container input[type="checkbox"]:checked').forEach(function(cb) {
        sections.push(cb.value);
    });
    if (sections.length === 0) sections = ['Walk-in Fridge','Dry Store'];

    var entityId = 'ENT-' + Date.now();
    var newEnt = {
        id:              entityId,
        name:            name,
        businessType:    document.getElementById('me-type').value,
        contact:         (document.getElementById('me-contact').value || '').trim(),
        foodCostTarget:  parseInt(document.getElementById('me-fc').value) || 28,
        sections:        sections,
        status:          'active',
        plan:            'master',
        createdAt:       new Date().toISOString()
    };

    var updated = (HUB.entities || []).slice();
    updated.push(newEnt);

    var upd = { entities:updated, lastUpdated:firebase.firestore.FieldValue.serverTimestamp() };
    upd['inventory.'   + entityId] = [];
    upd['purchases.'   + entityId] = [];
    upd['wastage.'     + entityId] = [];
    upd['suppliers.'   + entityId] = [];
    upd['users.'       + entityId] = [];
    upd['menuItems.'   + entityId] = [];
    upd['cashups.'     + entityId] = {};
    upd['activities.'  + entityId] = [];
    upd['pendingPOs.'  + entityId] = [];
    upd['functions.'   + entityId] = [];

    hubToast('info', '🔄 Creating...');
    db.collection('accounts').doc(HUB.accountId).set(upd, {merge:true}).then(function() {
        HUB.entities   = updated;
        HUB.entity     = newEnt;
        HUB.entityId   = entityId;
        HUB.entityName = name;
        closeHubModal();
        hubToast('success', '✅ "' + name + '" created!');
        saveSessionCache();
        setTimeout(function() { showEntityHub(); }, 500);
    }).catch(function(err) { hubToast('error', 'Error: ' + err.message); });
}

function masterEnterOwnEntity(idx) {
    HUB.entity     = HUB.entities[idx];
    HUB.entityId   = HUB.entities[idx].id;
    HUB.entityName = HUB.entities[idx].name;
    saveSessionCache();
    showEntityHub();
}

function adminViewCustomer(accountId) {
    hubToast('info', '🔄 Loading...');
    db.collection('accounts').doc(accountId).get().then(function(doc) {
        if (!doc.exists) { hubToast('error', 'Not found'); return; }

                '<span style="padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;background:rgba(46,168,113,.12);color:var(--success)">' +
                (ent.status !== 'inactive' ? 'Active' : 'Inactive') + '</span></div>' +
                '<div style="font-size:.72rem;color:var(--text-light)">Items: ' + inv.length + '</div>' +
                '<button onclick="masterEnterCustEntity(\'' + accountId + '\',\'' + ent.id + '\')" ' +

                '<i class="fas fa-sign-in-alt"></i> Enter</button></div>';

            '<div style="font-size:.72rem;color:var(--text-muted)">Email</div>' +

            '<h4 style="font-size:.85rem;margin-bottom:10px;color:var(--text)">' +
            '<i class="fas fa-building" style="color:var(--primary)"></i> Entities (' + ents.length + ')</h4>' + entCards,
            '<button onclick="closeHubModal()" style="flex:1;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:600;color:var(--text-mid)">Close</button>'
        );
    });
}

function masterEnterCustEntity(accountId, entityId) {
    hubToast('info', '🔄 Loading...');
    db.collection('accounts').doc(accountId).get().then(function(doc) {
        if (!doc.exists) return;
        var data        = doc.data();
        HUB.accountId   = accountId;
        HUB.accountData = data;
        HUB.entities    = data.entities || [];
        HUB.entity      = HUB.entities.find(function(e) { return e.id === entityId; });
        HUB.entityId    = entityId;
        HUB.entityName  = HUB.entity ? HUB.entity.name : '';
        HUB.allowedApps = ALL_APPS.map(function(a) { return a.id; });
        closeHubModal();
        document.getElementById('admin-panel').classList.add('hidden');
        saveSessionCache();
        showEntityHub();
    });
}

function adminToggleStatus(accountId, isActive) {
    if (!confirm((isActive ? 'Deactivate' : 'Activate') + ' this account?')) return;
    db.collection('accounts').doc(accountId).update({
        accountStatus: isActive ? 'suspended' : 'active',
        lastUpdated:   firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
        hubToast('success', '✅ Done');
        showMasterDashboard();
    });
}

<script>
// ============================================================
// ENTITY HUB
// ============================================================
function showEntityHub() {
    HUB.currentView = 'entity-hub';
    document.getElementById('hub-app').classList.remove('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('app-frame').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('hub-user-name').textContent = HUB.user ? HUB.user.name : 'User';
    document.getElementById('hub-user-role').textContent = (HUB.user ? HUB.user.role : '') + (HUB.entityName ? ' • ' + HUB.entityName : '');

    if (!HUB.syncListener) startHubSync();
    saveSessionCache();
    renderEntityHub();
    hubToast('success', 'Welcome to ' + (HUB.entityName || '') + ' 👋');
}

function renderEntityHub() {
    var dash    = document.getElementById('hub-dashboard');
    var init    = HUB.user ? HUB.user.name.charAt(0).toUpperCase() : 'U';
    var isOwner = HUB.user && (
        HUB.user.role === 'Owner' ||
        HUB.user.role === 'Area Manager' ||
        HUB.user.role === 'Master Admin' ||
        HUB.isMaster
    );
    var html = '';

    // Back button for owners with multiple entities
    if (isOwner && HUB.entities.length > 1) {
        html += '<div style="width:100%;max-width:640px;margin-bottom:14px">' +
            '<button onclick="goBack()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;' +
            'background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--rs);' +
            'color:var(--text-light);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">' +
            '<i class="fas fa-arrow-left"></i> Back to All Entities</button></div>';
    }

    // Welcome card
    html += '<div style="width:100%;max-width:640px;background:var(--bg-card);border-radius:var(--r);' +
        'padding:20px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;align-items:center;' +
        'gap:16px;border-left:4px solid var(--gold)">' +
        '<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:800;flex-shrink:0">' +
        init + '</div>' +
        '<div><h3 style="font-size:1rem;font-weight:800;color:var(--text)">Welcome, ' +
        (HUB.user ? HUB.user.name : 'User') + '</h3>' +
        '<p style="font-size:.75rem;color:var(--text-light)">' +
        (HUB.user ? HUB.user.role : '') + (HUB.entityName ? ' • ' + HUB.entityName : '') + '</p>' +
        '<div style="font-size:.72rem;color:var(--primary-light);font-weight:600;margin-top:4px">' +
        '<i class="fas fa-clock"></i> On shift: <span id="hub-shift-display">00:00</span></div></div></div>';

    // Apps label
    html += '<div style="width:100%;max-width:640px;font-size:.72rem;font-weight:700;color:var(--text-light);' +
        'text-transform:uppercase;letter-spacing:1.5px;margin:8px 0;padding-left:4px">Your Applications</div>';

    // App cards grid
    html += '<div style="width:100%;max-width:640px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';
    ALL_APPS.forEach(function(app) {
        var allowed = HUB.allowedApps.indexOf(app.id) !== -1;
        html += '<div class="hub-app-card' + (allowed ? '' : ' disabled') + '" ' +
            (allowed ? 'onclick="openHubApp(\'' + app.id + '\')"' : '') + '>' +
            '<div class="hub-app-icon" style="background:linear-gradient(135deg,' +
            app.color + ',' + adjustHexColor(app.color, -30) + ')">' +
            '<i class="fas ' + app.icon + '"></i></div>' +
            '<div class="hub-app-name">' + app.name + '</div>' +
            '<div class="hub-app-desc">' + app.desc + '</div></div>';
    });
    html += '</div>';
    dash.innerHTML = html;
}

function goBack() {
    if (HUB.isMaster) showMasterDashboard();
    else showOwnerEntityDashboard();
}

// ============================================================
// OPEN APP
// ============================================================
function openHubApp(appId) {
    var app = ALL_APPS.find(function(a) { return a.id === appId; });
    if (!app) return;

    if (app.embed) {
        openEmbeddedApp(appId);
    } else {
        // ✅ Save full session before leaving hub so we can restore on return
        saveSessionCache();
        sessionStorage.setItem('hub_account_id',  HUB.accountId   || '');
        sessionStorage.setItem('hub_entity_id',   HUB.entityId    || '');
        sessionStorage.setItem('hub_entity_name', HUB.entityName  || '');
        sessionStorage.setItem('hub_user_name',   HUB.user ? HUB.user.name  : '');
        sessionStorage.setItem('hub_user_email',  HUB.user ? HUB.user.email : '');
        sessionStorage.setItem('hub_user_role',   HUB.user ? HUB.user.role  : '');
        sessionStorage.setItem('hub_return',      'true');
        window.location.href = app.url;
    }
}

function openEmbeddedApp(appId) {
    var frame = document.getElementById('app-frame');
    frame.classList.remove('hidden');
    document.getElementById('hub-app').classList.add('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    frame.innerHTML = '';

    if      (appId === 'mobile')    { frame.innerHTML = getMobileAppHTML();    initMobileApp();      }
    else if (appId === 'procure')   { frame.innerHTML = getProcureAppHTML();   initProcureApp();     }
    else if (appId === 'menumaster'){ frame.innerHTML = getMenuMasterHTML();   initMenuMasterApp();  }
    else if (appId === 'functions') { frame.innerHTML = getFunctionsAppHTML(); initFunctionsApp();   }
}

function closeEmbeddedApp() {
    document.getElementById('app-frame').classList.add('hidden');

    // ✅ Always restore correct view — never go to login
    if (HUB.currentView === 'master-dashboard') {
        showMasterDashboard();
    } else if (HUB.isMaster && HUB.entityId) {
        document.getElementById('hub-app').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        renderEntityHub();
    } else if (HUB.currentView === 'owner-dashboard') {
        showOwnerEntityDashboard();
    } else if (HUB.entityId) {
        document.getElementById('hub-app').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        renderEntityHub();
    } else if (HUB.isMaster) {
        showMasterDashboard();
    } else if (HUB.user && (HUB.user.role === 'Owner' || HUB.user.role === 'Area Manager')) {
        showOwnerEntityDashboard();
    } else {
        document.getElementById('hub-app').classList.remove('hidden');
        renderEntityHub();
    }
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function hubLogout() {
    if (HUB.syncListener) { HUB.syncListener(); HUB.syncListener = null; }
    // Clear all session/local storage
    localStorage.removeItem('stockai_remember');
    localStorage.removeItem('stockai_email');
    sessionStorage.removeItem('hub_session');
    sessionStorage.removeItem('hub_return');
    sessionStorage.removeItem('hub_account_id');
    sessionStorage.removeItem('hub_entity_id');
    sessionStorage.removeItem('hub_entity_name');
    sessionStorage.removeItem('hub_user_name');
    sessionStorage.removeItem('hub_user_email');
    sessionStorage.removeItem('hub_user_role');

    auth.signOut().then(function() {
        // Reset HUB state
        HUB.user        = null;
        HUB.accountId   = null;
        HUB.accountData = null;
        HUB.allowedApps = [];
        HUB.clockInTime = null;
        HUB.isMaster    = false;
        HUB.currentView = null;
        HUB.entity      = null;
        HUB.entityId    = null;
        HUB.entityName  = null;
        HUB.entities    = [];
        HUB.functionsData = [];

        // Hide all screens
        document.getElementById('hub-app').classList.add('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('app-frame').classList.add('hidden');

        // Show login
        document.getElementById('login-screen').classList.remove('hidden');

        // Clear login fields
        var ef = document.getElementById('hub-email');
        var pf = document.getElementById('hub-password');
        var rf = document.getElementById('hub-remember');
        if (ef) ef.value = '';
        if (pf) pf.value = '';
        if (rf) rf.checked = false;

        hubToast('info', 'Logged out successfully');
    });
}

function hubForgotPw() {
    var email = (document.getElementById('hub-email').value || '').trim();
    if (!email) { showLoginError('Enter your email address first'); return; }
    auth.sendPasswordResetEmail(email.toLowerCase())
        .then(function()    { hubToast('success', '📧 Password reset link sent to ' + email); })
        .catch(function(err){ hubToast('error', err.message); });
}

function startHubSync() {
    if (!HUB.accountId) return;
    if (HUB.syncListener) HUB.syncListener();
    HUB.syncListener = db.collection('accounts').doc(HUB.accountId)
        .onSnapshot(function(doc) {
            if (!doc.exists) return;
            HUB.accountData   = doc.data();
            HUB.entities      = doc.data().entities || [];
            HUB.functionsData = (doc.data().functions || {})[HUB.entityId] || [];
        }, function() {});
}

function startHubClock() {
    setInterval(function() {
        var now = new Date();
        var ts  = now.toLocaleTimeString('en-ZA', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        var ds  = now.toLocaleDateString('en-ZA',  {day:'numeric', month:'short',    year:'numeric'});

        var h1 = document.getElementById('hub-header-time');
        if (h1) h1.innerHTML = '<strong>' + ts + '</strong><span>' + ds + '</span>';
        var h2 = document.getElementById('admin-header-time');
        if (h2) h2.innerHTML = '<strong>' + ts + '</strong><span>' + ds + '</span>';

        // Shift timer
        if (HUB.clockInTime) {
            var diff = Date.now() - HUB.clockInTime.getTime();
            var h    = Math.floor(diff / 3600000);
            var m    = Math.floor((diff % 3600000) / 60000);
            var se   = document.getElementById('hub-shift-display');
            if (se) se.textContent = ('0' + h).slice(-2) + ':' + ('0' + m).slice(-2);
        }
    }, 1000);
}

function showHubNotifications() {
    if (!HUB.accountData) { hubToast('info', 'No notifications'); return; }
    var notifs = HUB.accountData.notifs || [];
    showHubModal('Notifications',
        notifs.length === 0
            ? '<div style="text-align:center;padding:30px;color:var(--text-light)">No notifications</div>'
            : notifs.slice(0, 20).map(function(n) {
                return '<div style="display:flex;gap:10px;padding:12px;margin-bottom:6px;background:var(--bg);' +
                    'border-radius:var(--rs);border-left:3px solid var(--primary)">' +
                    '<div style="flex:1">' +
                    '<div style="font-size:.82rem;font-weight:600;color:var(--text)">'   + n.title + '</div>' +
                    '<div style="font-size:.75rem;color:var(--text-light);margin-top:2px">' + n.text  + '</div>' +
                    '</div></div>';
            }).join('')
    );
}

function hubToast(type, msg) {
    var ic = {success:'check-circle', error:'times-circle', info:'info-circle', warning:'exclamation-triangle'};
    var t  = document.createElement('div');
    t.className = 'hub-toast ' + type;
    t.innerHTML = '<i class="fas fa-' + (ic[type] || 'info-circle') + '"></i>' +
        '<span>' + msg + '</span>' +
        '<button onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
    var w = document.getElementById('hub-toast-wrap');
    if (w) w.appendChild(t);
    setTimeout(function() {
        t.style.opacity    = '0';
        t.style.transition = 'opacity .3s';
        setTimeout(function() { if (t.parentElement) t.remove(); }, 300);
    }, 4000);
}

function showHubModal(title, body, footer) {
    var c = document.getElementById('hub-modal-container');
    c.innerHTML = '<div class="hub-modal-overlay" id="hub-modal-overlay">' +
        '<div class="hub-modal">' +
        '<div class="hub-modal-header">' +
        '<h3>' + title + '</h3>' +
        '<button class="hub-modal-close" onclick="closeHubModal()"><i class="fas fa-times"></i></button>' +
        '</div>' +
        '<div class="hub-modal-body">' + body + '</div>' +
        (footer ? '<div class="hub-modal-footer">' + footer + '</div>' : '') +
        '</div></div>';
    document.getElementById('hub-modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeHubModal();
    });
}

function closeHubModal() {
    document.getElementById('hub-modal-container').innerHTML = '';
}

function adjustHexColor(hex, amt) {
    hex = hex.replace('#', '');
    if (hex.length !== 6) return '#' + hex;
    var r = Math.max(0, Math.min(255, parseInt(hex.substring(0,2), 16) + amt));
    var g = Math.max(0, Math.min(255, parseInt(hex.substring(2,4), 16) + amt));
    var b = Math.max(0, Math.min(255, parseInt(hex.substring(4,6), 16) + amt));
    return '#' + ('0' + r.toString(16)).slice(-2) +
                 ('0' + g.toString(16)).slice(-2) +
                 ('0' + b.toString(16)).slice(-2);
}

function showInstallGuide() {
    var ua    = navigator.userAgent || '';

    showHubModal('Install App', steps,
        '<button onclick="closeHubModal()" style="flex:1;padding:10px;background:var(--bg);border:1.5px solid var(--border);' +
        'border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:600;color:var(--text-mid)">Close</button>');
}

function showRecipeScaler(menuItemId) {
    var menu = mmGetMenuItems ? mmGetMenuItems() : [];
    var m    = menu.find(function(x) { return x.id === menuItemId; });
    if (!m) { hubToast('error', 'Recipe not found'); return; }

    showHubModal('<i class="fas fa-calculator" style="color:#8b5cf6"></i> Scale Recipe — ' + m.name,
        '<div style="margin-bottom:14px">' +
        '<label style="font-size:.78rem;font-weight:600;color:var(--text-mid);display:block;margin-bottom:6px">Scale to how many portions?</label>' +
        '<input type="number" id="scale-portions" value="' + (m.yield || 1) + '" min="1" ' +
        'style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--rs);' +
        'color:var(--text);background:var(--bg-dark);font-family:inherit;font-size:1rem;text-align:center">' +
        '</div>' +
        '<div id="scale-result" style="background:var(--bg);border-radius:var(--rs);padding:14px">' +
        (m.ingredients || []).map(function(i) {
            return '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.82rem;border-bottom:1px solid var(--border)">' +
                '<span style="color:var(--text)">' + i.item + '</span>' +
                '<span id="scale-' + (i.itemId||i.item).replace(/[^a-zA-Z0-9]/g,'') + '" style="font-weight:600;color:#8b5cf6">' +
                i.qty + ' ' + i.unit + '</span></div>';
        }).join('') + '</div>',
        '<button onclick="closeHubModal()" style="flex:1;padding:10px;background:var(--bg);border:1.5px solid var(--border);' +
        'border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:600;color:var(--text-mid)">Close</button>'
    );

    // Update on portion change
    var portionInput = document.getElementById('scale-portions');
    if (portionInput) {
        portionInput.addEventListener('input', function() {
            var newPortions = parseFloat(this.value) || 1;
            var factor      = newPortions / (m.yield || 1);
            (m.ingredients || []).forEach(function(i) {
                var el = document.getElementById('scale-' + (i.itemId||i.item).replace(/[^a-zA-Z0-9]/g,''));
                if (el) el.textContent = (i.qty * factor).toFixed(3) + ' ' + i.unit;
            });
        });
    }
}

// ✅ Hub-context stubs for currency section references
function safeRenderAll()  { /* Currency display refresh — handled per-app */ }
function showModal(t,b,f) { showHubModal(t,b,f); }
function closeModal()     { closeHubModal(); }
function toast(type, msg) { hubToast(type, msg); }

function hubChangeLang(lang) {
    localStorage.setItem('stockai_lang', lang);
    hubToast('success', '✅ Language changed');
}

// Global event listeners
window.addEventListener('online',  function() { hubToast('success', '✅ Back online'); });
window.addEventListener('offline', function() { hubToast('warning', '📵 No internet connection'); });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

console.log('✅ StockAI-Pro 2.0 Hub — Entity & Utility functions loaded');
</script>

<!-- EMBEDDED: MOBILE AI                 -->
<!-- ═══════════════════════════════════ -->
<script>
function getMobileAppHTML() {
    return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)">' +
        '<header class="hub-header">' +
        '<button class="return-hub-btn" onclick="closeEmbeddedApp()"><i class="fas fa-arrow-left"></i> Hub</button>' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;color:#fff">' +
        '<i class="fas fa-mobile-alt"></i>' +
        '<div><div style="font-size:.88rem;font-weight:700">MobileAI</div>' +
        '<div style="font-size:.62rem;color:rgba(255,255,255,.7)">' + (HUB.entityName || 'Entity') + '</div></div></div>' +
        '<button class="hub-hbtn" onclick="mobileRefresh()"><i class="fas fa-sync-alt"></i></button></header>' +
        '<div id="mobile-content" style="flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;-webkit-overflow-scrolling:touch"></div>' +
        '<nav style="height:var(--nav-h);background:var(--bg-card);border-top:1px solid var(--border);' +
        'display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding:0 8px 8px;z-index:50">' +
        mNavItem('dashboard',  'fa-chart-pie',      'Home',  true)  +
        mNavItem('stock-count','fa-clipboard-list', 'Count', false) +
        mNavItem('purchases',  'fa-shopping-cart',  'Orders',false) +
        mNavItem('inventory',  'fa-box',            'Stock', false) +
        '</nav></div>';
}

function mNavItem(p, i, l, a) {
    return '<div data-mpage="' + p + '" onclick="mobileNavigate(\'' + p + '\')" ' +
        'style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;' +
        'border-radius:var(--rs);cursor:pointer;min-width:56px;' +
        'color:' + (a ? 'var(--primary)' : 'var(--text-light)') + ';' +
        'background:' + (a ? 'rgba(26,139,168,.08)' : 'transparent') + '">' +
        '<i class="fas ' + i + '" style="font-size:1.2rem"></i>' +
        '<span style="font-size:.62rem;font-weight:600">' + l + '</span></div>';
}

function initMobileApp()    { mobileNavigate('dashboard'); }

function mobileRefresh() {
    hubToast('info', '🔄 Refreshing...');
    if (HUB.accountId) {
        db.collection('accounts').doc(HUB.accountId).get().then(function(d) {
            if (d.exists) {
                HUB.accountData = d.data();
                mobileNavigate('dashboard');
                hubToast('success', '✅ Done');
            }
        });
    }
}

function mobileNavigate(p) {
    document.querySelectorAll('[data-mpage]').forEach(function(i) {
        var a = i.dataset.mpage === p;
        i.style.color      = a ? 'var(--primary)' : 'var(--text-light)';
        i.style.background = a ? 'rgba(26,139,168,.08)' : 'transparent';
    });
    var c = document.getElementById('mobile-content');
    if (!c) return;
    c.scrollTop = 0;
    if      (p === 'dashboard')   c.innerHTML = mDash();
    else if (p === 'stock-count') c.innerHTML = mCount();
    else if (p === 'purchases')   c.innerHTML = mPurch();
    else if (p === 'inventory')   c.innerHTML = mInv();
}

function mGetInv() { return HUB.accountData && HUB.entityId ? (HUB.accountData.inventory||{})[HUB.entityId]||[] : []; }
function mFmt(n)   { n=n||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toFixed(0); }

function mStat(l,v,c) {
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:14px 10px;box-shadow:var(--shadow);' +
        'border-left:3px solid ' + c + ';text-align:center">' +
        '<div style="font-size:.6rem;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-bottom:3px">' + l + '</div>' +
        '<div style="font-size:1.2rem;font-weight:800;color:var(--text)">' + v + '</div></div>';
}

function mDash() {
    var inv = mGetInv();
    var sv  = inv.reduce(function(s,i) { return s + (i.value||0); }, 0);
    var low = inv.filter(function(i) { return i.status==='low-stock'||i.status==='out-of-stock'; });
    return '<div style="background:var(--bg-card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);' +
        'margin-bottom:14px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--gold)">' +
        '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));' +
        'display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem"><i class="fas fa-user"></i></div>' +
        '<div><div style="font-size:.92rem;font-weight:700;color:var(--text)">Welcome, ' + (HUB.user?HUB.user.name:'User') + '</div>' +
        '<div style="font-size:.72rem;color:var(--text-light)">' + (HUB.entityName||'') + '</div></div></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">' +
        mStat('Stock Value', 'R'+mFmt(sv),           'var(--primary)') +
        mStat('Items',       inv.length,              'var(--gold)')    +
        mStat('Low Stock',   low.length,              'var(--danger)')  +
        mStat('In Stock',    inv.length - low.length, 'var(--success)') +
        '</div>';
}

function mCount() {
    var inv = mGetInv();
    return '<div style="background:rgba(26,139,168,.1);border-left:3px solid var(--info);padding:12px;' +
        'border-radius:var(--rs);margin-bottom:12px;font-size:.82rem;color:var(--text)">' +
        '<i class="fas fa-microphone" style="color:var(--info)"></i> Voice counting coming soon</div>' +
        inv.map(function(i) {
            return '<div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg-card);' +
                'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="flex:1"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + i.name + '</div>' +
                '<div style="font-size:.68rem;color:var(--text-light)">Expected: ' + (i.quantity||0) + ' ' + i.unit + '</div></div>' +
                '<input type="number" value="' + (i.quantity||0) + '" ' +
                'style="width:65px;padding:8px;text-align:center;border:2px solid var(--border);border-radius:var(--rs);' +
                'font-size:1rem;font-weight:700;color:var(--text);background:var(--bg-dark)" min="0" step="0.1"></div>';
        }).join('');
}

function mPurch() {
    return '<div style="text-align:center;padding:40px;color:var(--text-light)">' +
        '<i class="fas fa-shopping-cart" style="font-size:2rem;opacity:.3;display:block;margin-bottom:10px"></i>' +
        '<p>Orders from web app appear here</p></div>';
}

function mInv() {
    var inv = mGetInv();
    return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">' +
        mStat('Total', inv.length,                                                              'var(--primary)') +
        mStat('Low',   inv.filter(function(i){return i.status==='low-stock';}).length,          'var(--gold)')    +
        mStat('Out',   inv.filter(function(i){return i.status==='out-of-stock';}).length,       'var(--danger)')  +
        '</div>' +
        inv.map(function(i) {
            var bc = i.status==='in-stock' ? 'var(--success)' : i.status==='low-stock' ? 'var(--gold)' : 'var(--danger)';
            var st = (i.status||'').split('-').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
            return '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-card);' +
                'border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)">' +
                '<div style="flex:1"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' + i.name + '</div>' +
                '<div style="font-size:.7rem;color:var(--text-light)">' + (i.quantity||0) + ' ' + i.unit + '</div></div>' +
                '<span style="padding:3px 10px;border-radius:12px;font-size:.65rem;font-weight:600;' +
                'background:rgba(0,0,0,.2);color:' + bc + '">' + st + '</span></div>';
        }).join('');
}

console.log('✅ MobileAI embedded');
</script>
