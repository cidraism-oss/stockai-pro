<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bill — StockAI-Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
:root{--primary:#1a8ba8;--primary-dark:#0d4a5c;--bg:#f0f7f9;--bg-card:#fff;--text:#0d4a5c;--text-light:#5a8a96;--gold:#f59e0b;--success:#2ea871;--danger:#c94545;--border:#c4dde4;--shadow:0 2px 12px rgba(13,74,92,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
.tb-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));padding:24px;text-align:center;color:#fff}
.tb-header h1{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.tb-header p{font-size:.85rem;opacity:.85}
.tb-table-info{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:.82rem}
.tb-table-info span{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:12px}
.tb-content{max-width:480px;margin:0 auto;padding:16px}
.tb-card{background:var(--bg-card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.tb-card-header{padding:14px 18px;background:var(--bg);border-bottom:1px solid var(--border);font-size:.88rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.tb-item{display:flex;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);font-size:.88rem}
.tb-item:last-child{border-bottom:none}
.tb-item-name{color:var(--text);font-weight:500}
.tb-item-note{font-size:.72rem;color:var(--gold);font-style:italic}
.tb-item-price{font-weight:700;color:var(--primary)}
.tb-total{padding:16px 18px;background:linear-gradient(135deg,rgba(26,139,168,.06),rgba(13,74,92,.03))}
.tb-total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.88rem}
.tb-total-row.grand{font-size:1.2rem;font-weight:900;color:var(--primary);padding:10px 0;border-top:2px solid var(--border);margin-top:8px}
.tb-gratuity{padding:18px;border-top:1px solid var(--border)}
.tb-gratuity h4{font-size:.88rem;font-weight:700;margin-bottom:10px}
.tb-tip-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tb-tip-btn{padding:10px;border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg-card);font-family:inherit}
.tb-tip-btn.selected{border-color:var(--primary);background:rgba(26,139,168,.08)}
.tb-tip-btn strong{display:block;font-size:.95rem;color:var(--text)}
.tb-tip-btn span{font-size:.7rem;color:var(--text-light)}
.tb-tip-custom{margin-top:8px;display:flex;gap:8px}
.tb-tip-custom input{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;color:var(--text);background:var(--bg)}
.tb-pay-section{position:fixed;bottom:0;left:0;right:0;padding:16px;background:var(--bg-card);border-top:2px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.tb-pay-btns{max-width:480px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tb-pay-btn{padding:16px;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.tb-pay-cash{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff}
.tb-pay-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.tb-status{text-align:center;padding:30px;font-size:.92rem;color:var(--text-light)}
.tb-paid{text-align:center;padding:40px}
.tb-paid i{font-size:3rem;color:var(--success);display:block;margin-bottom:16px}
.tb-paid h2{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:8px}
.tb-paid p{font-size:.88rem;color:var(--text-light);margin-bottom:20px}
.tb-email-section{background:var(--bg);border-radius:10px;padding:18px;margin:16px auto;max-width:400px}
.tb-email-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;margin-bottom:10px}
.tb-email-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="tb-loading" class="tb-status"><i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:12px;color:var(--primary)"></i>Loading your bill...</div>
<div id="tb-content" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/email-templates.js"></script>

<script>
var firebaseConfig={apiKey:"AIzaSyBRwGda3Q-ibT8CgAo0tJXNJ4EOzy4gEs0",authDomain:"stockai-pro-b232e.firebaseapp.com",projectId:"stockai-pro-b232e",storageBucket:"stockai-pro-b232e.firebasestorage.app",messagingSenderId:"424200946359",appId:"1:424200946359:web:4c638eccd4e422ccc94332"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();
var PAYSTACK_KEY='pk_test_96a8fd66211568738d566d5da04cd5b0f1873120';

var TB={accountId:null,entityId:null,tableNum:null,order:null,gratuity:0,listener:null};

// Parse URL params
var params=new URLSearchParams(window.location.search);
TB.tableNum=params.get('t');
TB.entityId=params.get('e');
TB.accountId=params.get('a');

if(!TB.tableNum||!TB.entityId||!TB.accountId){
    document.getElementById('tb-loading').innerHTML='<i class="fas fa-exclamation-circle" style="font-size:2rem;color:var(--danger);display:block;margin-bottom:12px"></i>Invalid QR code. Please scan the correct table QR.';
}else{
    startTableSync();
}

function startTableSync(){
    if(TB.listener)TB.listener();
    TB.listener=db.collection('accounts').doc(TB.accountId).onSnapshot(function(doc){
        if(!doc.exists)return;var d=doc.data();
        var orders=(d.posOrders||{})[TB.entityId]||{};
        var tableKey=TB.tableNum==='takeaway'?
            Object.keys(orders).find(function(k){return k.startsWith('takeaway')&&orders[k].status==='open';}):
            'table-'+TB.tableNum;
        TB.order=orders[tableKey]||null;

        var entityName='';(d.entities||[]).forEach(function(e){if(e.id===TB.entityId)entityName=e.name;});

        document.getElementById('tb-loading').style.display='none';
        document.getElementById('tb-content').style.display='block';
        renderTableBill(entityName);
    });
}

function renderTableBill(entityName){
    var el=document.getElementById('tb-content');
    if(!TB.order){
        el.innerHTML='<div class="tb-status"><i class="fas fa-receipt" style="font-size:2rem;display:block;margin-bottom:12px;opacity:.3"></i>'+
            '<h3 style="color:var(--text);margin-bottom:6px">No Active Order</h3>'+
            '<p>Your waiter will open your table shortly.</p></div>';
        return;
    }

    if(TB.order.status==='closed'){
        el.innerHTML='<div class="tb-paid"><i class="fas fa-check-circle"></i>'+
            '<h2>Thank You!</h2><p>Your bill has been settled. We hope you enjoyed your meal!</p>'+
            '<div class="tb-email-section"><h4 style="font-size:.88rem;margin-bottom:10px">Want a receipt?</h4>'+
            '<input type="email" class="tb-email-input" id="receipt-email" placeholder="Enter your email address">'+
            '<button class="tb-email-btn" onclick="sendReceipt()"><i class="fas fa-envelope"></i> Email My Receipt</button></div></div>';
        return;
    }

    var items=(TB.order.items||[]).filter(function(i){return!i.voided;});
    var subtotal=items.reduce(function(s,i){return s+(i.price||0);},0);
    var total=subtotal+TB.gratuity-(TB.order.discount||0);

    var html='<div class="tb-header"><h1>'+entityName+'</h1>'+
        '<p>Your Bill</p>'+
        '<div class="tb-table-info"><span><i class="fas fa-utensils"></i> Table '+(TB.order.tableNumber||'')+'</span>'+
        '<span><i class="fas fa-user"></i> '+(TB.order.pax||1)+' guests</span></div></div>'+
        '<div class="tb-content">';

    html+='<div class="tb-card"><div class="tb-card-header"><span>Items Ordered</span>'+
        '<span>'+items.length+' items</span></div>';
    items.forEach(function(item){
        html+='<div class="tb-item"><div><div class="tb-item-name">'+item.name+'</div>'+
            (item.notes?'<div class="tb-item-note">'+item.notes+'</div>':'')+
            '</div><div class="tb-item-price">R'+item.price.toFixed(2)+'</div></div>';
    });

    html+='<div class="tb-total">'+
        '<div class="tb-total-row"><span>Subtotal</span><strong>R'+subtotal.toFixed(2)+'</strong></div>'+
        (TB.order.discount?'<div class="tb-total-row"><span>Discount</span><strong style="color:var(--danger)">-R'+TB.order.discount.toFixed(2)+'</strong></div>':'')+
        (TB.gratuity>0?'<div class="tb-total-row"><span>Gratuity</span><strong style="color:var(--success)">R'+TB.gratuity.toFixed(2)+'</strong></div>':'')+
        '<div class="tb-total-row grand"><span>TOTAL</span><strong>R'+total.toFixed(2)+'</strong></div></div>';

    // Gratuity
    html+='<div class="tb-gratuity"><h4><i class="fas fa-heart" style="color:var(--danger)"></i> Add a tip for your waiter</h4>'+
        '<div class="tb-tip-options">'+
        [10,15,20].map(function(pct){
            var tipAmt=parseFloat((subtotal*pct/100).toFixed(2));
            return'<div class="tb-tip-btn'+(TB.gratuity===tipAmt?' selected':'')+'" onclick="setTip('+tipAmt+')">'+
                '<strong>'+pct+'%</strong><span>R'+tipAmt.toFixed(0)+'</span></div>';
        }).join('')+
        '<div class="tb-tip-btn" onclick="showCustomTip()"><strong>Custom</strong><span>Amount</span></div></div>'+
        '<div class="tb-tip-custom hidden" id="custom-tip"><input type="number" id="tip-amount" placeholder="Enter amount" min="0">'+
        '<button style="padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer" '+
        'onclick="applyCustomTip()">Apply</button></div></div></div>';

    html+='</div>';

    // Pay buttons
    html+='<div class="tb-pay-section"><div class="tb-pay-btns">'+
        '<button class="tb-pay-btn tb-pay-cash" onclick="payCash()"><i class="fas fa-money-bill-wave"></i> Pay Cash</button>'+
        '<button class="tb-pay-btn tb-pay-card" onclick="payCard()"><i class="fas fa-credit-card"></i> Pay by Card</button></div></div>';

    el.innerHTML=html;
}

function setTip(amount){
    TB.gratuity=amount;
    renderTableBill('');
}

function showCustomTip(){
    document.getElementById('custom-tip').classList.remove('hidden');
}

function applyCustomTip(){
    var amt=parseFloat(document.getElementById('tip-amount').value)||0;
    TB.gratuity=amt;
    renderTableBill('');
}

function payCash(){
    if(!confirm('Pay by cash?\n\nYour waiter will be notified to collect payment at your table.'))return;
    // Update order with cash payment request
    TB.order.paymentRequested='cash';TB.order.gratuity=TB.gratuity;
    var update={};
    var tableKey='table-'+TB.tableNum;
    var orders={};orders[tableKey]=TB.order;
    update['posOrders.'+TB.entityId+'.'+tableKey]=TB.order;
    update.lastUpdated=firebase.firestore.FieldValue.serverTimestamp();
    db.collection('accounts').doc(TB.accountId).set(update,{merge:true}).then(function(){
        document.getElementById('tb-content').innerHTML=
            '<div class="tb-paid" style="padding-top:60px"><i class="fas fa-hand-holding-usd" style="font-size:3rem;color:var(--gold);display:block;margin-bottom:16px"></i>'+
            '<h2>Cash Payment Requested</h2><p>Your waiter has been notified and will be with you shortly to collect payment.</p></div>';
    });
}

function payCard(){
    var items=(TB.order.items||[]).filter(function(i){return!i.voided;});
    var subtotal=items.reduce(function(s,i){return s+(i.price||0);},0);
    var total=subtotal+TB.gratuity-(TB.order.discount||0);

    var handler=PaystackPop.setup({
        key:PAYSTACK_KEY,email:'customer@stockai-pro.co.za',amount:Math.round(total*100),currency:'ZAR',
        ref:'POS-'+Date.now(),
        metadata:{table:TB.tableNum,entity:TB.entityId},
        callback:function(response){
            TB.order.status='closed';TB.order.paymentMethod='card';
            TB.order.gratuity=TB.gratuity;TB.order.total=total;
            TB.order.closedAt=new Date().toISOString();TB.order.paystackRef=response.reference;
            var tableKey='table-'+TB.tableNum;
            var update={};update['posOrders.'+TB.entityId+'.'+tableKey]=TB.order;
            update.lastUpdated=firebase.firestore.FieldValue.serverTimestamp();
            db.collection('accounts').doc(TB.accountId).set(update,{merge:true});
        },
        onClose:function(){}
    });
    handler.openIframe();
}

function sendReceipt(){
    var email=(document.getElementById('receipt-email').value||'').trim();
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert('Please enter a valid email');return;}
    var items=(TB.order.items||[]).filter(function(i){return!i.voided;});
    var total=TB.order.total||items.reduce(function(s,i){return s+(i.price||0);},0);

    var html='<div style="font-family:Poppins,sans-serif;max-width:500px;margin:0 auto">'+
        '<div style="background:linear-gradient(135deg,#0d4a5c,#1a8ba8);padding:24px;text-align:center;border-radius:12px 12px 0 0;color:#fff">'+
        '<h1 style="font-size:1.2rem;margin:0">Thank You!</h1><p style="font-size:.85rem;opacity:.85;margin-top:4px">Here is your receipt</p></div>'+
        '<div style="background:#fff;padding:24px;border:1px solid #e4f1f5;border-radius:0 0 12px 12px">'+
        '<table style="width:100%;border-collapse:collapse">'+
        items.map(function(i){return'<tr><td style="padding:8px 0;border-bottom:1px solid #e4f1f5">'+i.name+
            (i.notes?' <em style="color:#f59e0b;font-size:.78rem">'+i.notes+'</em>':'')+
            '</td><td style="padding:8px 0;text-align:right;font-weight:700;border-bottom:1px solid #e4f1f5">R'+i.price.toFixed(2)+'</td></tr>';}).join('')+
        '<tr><td style="padding:12px 0;font-weight:900;font-size:1.1rem">TOTAL</td>'+
        '<td style="padding:12px 0;text-align:right;font-weight:900;font-size:1.1rem;color:#1a8ba8">R'+total.toFixed(2)+'</td></tr></table>'+
        '<p style="text-align:center;color:#8aabb5;font-size:.78rem;margin-top:16px">Powered by StockAI-Pro</p></div></div>';

    fetch('https://api.resend.com/emails',{method:'POST',headers:{'Authorization':'Bearer re_45Zaif4k_9pYPpesV24GDyYEAfy9Nm1hT','Content-Type':'application/json'},
        body:JSON.stringify({from:'StockAI-Pro <noreply@stockai-pro.co.za>',to:[email],subject:'Your Receipt — Thank You!',html:html})
    }).then(function(){
        document.getElementById('receipt-email').value='';
        alert('✅ Receipt sent to '+email+'!');
    }).catch(function(){alert('Failed to send. Please try again.');});
}
</script>
</body>
</html>
