<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d4a5c">
<link rel="apple-touch-icon" href="apple-icon-180.png">
<title>Sales-Guru — StockAI-Pro</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES
============================================================ */
:root {
    --primary:       #1a8ba8;
    --primary-dark:  #0d4a5c;
    --primary-light: #4dbdd5;
    --accent:        #7c3aed;
    --accent-dark:   #4c1d95;
    --accent-light:  #a78bfa;
    --bg:            #0d3d4f;
    --bg-card:       #0f4d62;
    --bg-hover:      #1a6070;
    --bg-dark:       #0b3344;
    --text:          #e0f4f8;
    --text-mid:      #a8d8e8;
    --text-light:    #7bb8c8;
    --text-muted:    #4a8a9a;
    --gold:          #f59e0b;
    --gold-dark:     #d97706;
    --success:       #2ea871;
    --danger:        #c94545;
    --warning:       #d4a017;
    --info:          #2b8eb3;
    --border:        #1a5a6e;
    --shadow:        0 2px 12px rgba(0,0,0,.3);
    --shadow-lg:     0 8px 30px rgba(0,0,0,.4);
    --shadow-xl:     0 20px 60px rgba(0,0,0,.5);
    --r:             14px;
    --rs:            8px;
    --header-h:      56px;
    --nav-h:         65px;
}

/* ============================================================
   RESET
============================================================ */
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; overflow: hidden; }
body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    user-select: none;
    -webkit-user-select: none;
}
button { font-family: inherit; }
input, textarea, select {
    user-select: text;
    -webkit-user-select: text;
    font-family: inherit;
}
.hidden { display: none !important; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

/* ============================================================
   SPLASH / WELCOME SCREEN
============================================================ */
.sg-splash {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg,
        var(--primary-dark) 0%,
        var(--accent-dark)  50%,
        var(--primary-dark) 100%);
    display: flex; align-items: center;
    justify-content: center; padding: 24px;
    flex-direction: column; gap: 0;
}
.sg-splash-card {
    background: var(--bg-card);
    border-radius: 24px;
    padding: 48px 36px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow-xl);
    text-align: center;
    position: relative; overflow: hidden;
}
.sg-splash-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg,
        var(--primary-dark), var(--accent),
        var(--gold), var(--accent));
    background-size: 200% 100%;
    animation: sgBar 3s linear infinite;
}
@keyframes sgBar {
    0%   { background-position: 0%; }
    100% { background-position: 200%; }
}
.sg-splash-logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 20px;
    display: flex; align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 2rem; color: #fff;
    box-shadow: 0 8px 24px rgba(124,58,237,.4);
    animation: sgLogoPulse 2s ease-in-out infinite;
}
@keyframes sgLogoPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(124,58,237,.4); }
    50%       { transform: scale(1.05); box-shadow: 0 12px 32px rgba(124,58,237,.6); }
}
.sg-splash-card h1 {
    font-size: 1.8rem; font-weight: 900;
    color: var(--text); letter-spacing: 1px;
    margin-bottom: 6px;
}
.sg-splash-card h1 span { color: var(--accent-light); }
.sg-splash-card .sub {
    font-size: .85rem; color: var(--text-light);
    margin-bottom: 32px;
}
.sg-splash-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; border: none;
    border-radius: var(--rs);
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: .3s;
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
    margin-bottom: 12px;
}
.sg-splash-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124,58,237,.4);
}
.sg-splash-back {
    display: flex; align-items: center;
    justify-content: center; gap: 8px;
    padding: 12px;
    background: var(--bg-dark);
    border: 1.5px solid var(--border);
    border-radius: var(--rs);
    color: var(--text-mid); font-size: .82rem;
    font-weight: 600; text-decoration: none;
    width: 100%; transition: .2s;
}
.sg-splash-back:hover { border-color: var(--accent); color: var(--accent-light); }

/* ============================================================
   LOGIN SCREEN
============================================================ */
.sg-login {
    position: fixed; inset: 0; z-index: 9998;
    background: linear-gradient(135deg,
        var(--primary-dark) 0%,
        var(--accent-dark)  50%,
        var(--primary-dark) 100%);
    display: flex; align-items: center;
    justify-content: center; padding: 24px;
}
.sg-login-card {
    background: var(--bg-card);
    border-radius: 24px;
    padding: 40px 36px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow-xl);
    text-align: center;
    position: relative; overflow: hidden;
}
.sg-login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg,
        var(--primary-dark), var(--accent),
        var(--gold), var(--accent));
    background-size: 200% 100%;
    animation: sgBar 3s linear infinite;
}
.sg-login-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 16px;
    display: flex; align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.6rem; color: #fff;
    box-shadow: 0 8px 24px rgba(124,58,237,.4);
}
.sg-login-card h1 {
    font-size: 1.5rem; font-weight: 900;
    color: var(--text); letter-spacing: 1px;
    margin-bottom: 4px;
}
.sg-login-card h1 span { color: var(--accent-light); }
.sg-login-card .sub {
    font-size: .82rem; color: var(--text-light);
    margin-bottom: 24px;
}
.sg-input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--rs);
    font-size: .92rem; color: var(--text);
    background: var(--bg-dark);
    transition: .2s; margin-bottom: 12px;
}
.sg-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,.2);
}
.sg-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; border: none;
    border-radius: var(--rs);
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: .3s;
    margin-bottom: 12px;
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
}
.sg-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124,58,237,.4);
}
.sg-btn:disabled { opacity: .6; transform: none; cursor: not-allowed; }
.sg-login-error {
    background: rgba(201,69,69,.15);
    border: 1px solid rgba(201,69,69,.3);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--rs);
    font-size: .82rem;
    margin-bottom: 14px;
    display: none;
}
/* Remember me checkbox */
.sg-remember {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; text-align: left;
    cursor: pointer;
}
.sg-remember input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer; flex-shrink: 0;
}
.sg-remember span {
    font-size: .82rem; color: var(--text-mid); font-weight: 500;
}

/* ============================================================
   APP SHELL
============================================================ */
.sg-app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: var(--bg);
}

/* ── Header ── */
.sg-header {
    height: var(--header-h);
    background: linear-gradient(90deg,
        var(--primary-dark), var(--accent-dark));
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 16px rgba(0,0,0,.3);
    z-index: 100;
}
.sg-header-logo {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    display: flex; align-items: center;
    justify-content: center;
    color: #fff; font-size: 1rem; flex-shrink: 0;
}
.sg-header-info { flex: 1; }
.sg-header-info .sg-user {
    font-size: .88rem; font-weight: 700; color: #fff;
}
.sg-header-info .sg-role {
    font-size: .65rem; color: rgba(255,255,255,.7);
}
.sg-header-time {
    font-size: .7rem;
    color: rgba(255,255,255,.7);
    text-align: right;
}
.sg-header-time strong { display: block; font-size: .82rem; color: #fff; }
.sg-hbtn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.15);
    border: none; border-radius: var(--rs);
    color: #fff; font-size: .9rem;
    cursor: pointer;
    display: flex; align-items: center;
    justify-content: center;
    margin-left: 4px; flex-shrink: 0;
    transition: .2s; position: relative;
}
.sg-hbtn:hover { background: rgba(255,255,255,.25); }
.notice-badge {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--danger); border-radius: 50%;
    font-size: .6rem; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center;
}

/* ── Content ── */
.sg-content {
    flex: 1; overflow-y: auto; padding: 20px;
    -webkit-overflow-scrolling: touch;
}

/* ── Bottom Nav ── */
.sg-nav {
    height: var(--nav-h);
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    padding: 0 8px 8px;
    z-index: 50;
}
.sg-nav-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    padding: 6px 10px;
    border-radius: var(--rs);
    cursor: pointer; min-width: 52px;
    color: var(--text-light);
    transition: .2s; position: relative;
}
.sg-nav-item.active {
    color: var(--accent-light);
    background: rgba(124,58,237,.1);
}
.sg-nav-item i { font-size: 1.1rem; }
.sg-nav-item span { font-size: .58rem; font-weight: 600; }

/* ============================================================
   CARDS & STATS
============================================================ */
.sg-card {
    background: var(--bg-card);
    border-radius: var(--r);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
}
.sg-card-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
}
.sg-card-header h3 {
    font-size: .95rem; font-weight: 700;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
}
.sg-stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px; margin-bottom: 14px;
}
.sg-stat-grid.three { grid-template-columns: repeat(3, 1fr); }
.sg-stat-grid.four  { grid-template-columns: repeat(4, 1fr); }
.sg-stat {
    background: var(--bg-dark);
    border-radius: var(--r); padding: 14px;
    box-shadow: var(--shadow); text-align: center;
    border-left: 3px solid var(--accent);
}
.sg-stat small {
    font-size: .6rem; color: var(--text-light);
    text-transform: uppercase; font-weight: 600;
    display: block; margin-bottom: 4px; letter-spacing: .5px;
}
.sg-stat strong {
    font-size: 1.3rem; font-weight: 800;
    color: var(--text); display: block;
}
.sg-stat.gold  { border-left-color: var(--gold); }
.sg-stat.green { border-left-color: var(--success); }
.sg-stat.red   { border-left-color: var(--danger); }
.sg-stat.blue  { border-left-color: var(--info); }

/* ── Progress Bar ── */
.sg-progress-wrap {
    background: var(--bg-dark);
    border-radius: var(--r); padding: 16px;
    margin-bottom: 14px;
}
.sg-progress-label {
    display: flex; justify-content: space-between;
    font-size: .82rem; margin-bottom: 8px;
    color: var(--text-mid);
}
.sg-progress-label strong { color: var(--text); }
.sg-progress-bar {
    height: 10px; background: var(--bg);
    border-radius: 5px; overflow: hidden;
}
.sg-progress-fill {
    height: 100%; border-radius: 5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    transition: width .6s ease;
}
.sg-progress-fill.danger  { background: linear-gradient(90deg, var(--danger), #e05555); }
.sg-progress-fill.warning { background: linear-gradient(90deg, var(--warning), #e8b820); }
.sg-progress-fill.success { background: linear-gradient(90deg, var(--success), #3ecc8a); }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
    padding: 10px 20px; border: none;
    border-radius: var(--rs); font-size: .88rem;
    font-weight: 600; cursor: pointer; transition: .2s;
    display: inline-flex; align-items: center; gap: 8px;
}
.btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
}
.btn-accent:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(124,58,237,.4);
}
.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(26,139,168,.4);
}
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #1a7a4a; }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-danger:hover  { background: #a83232; }
.btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #fff;
}
.btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-mid);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent-light); }
.btn-sm  { padding: 6px 12px; font-size: .78rem; }
.btn-block { width: 100%; justify-content: center; }

/* ============================================================
   FORM ELEMENTS
============================================================ */
.sg-form-group { margin-bottom: 14px; }
.sg-form-group label {
    display: block; font-size: .78rem;
    font-weight: 600; color: var(--text-mid);
    margin-bottom: 5px;
}
.sg-form-input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--rs);
    font-size: .88rem; color: var(--text);
    background: var(--bg-dark); transition: .2s;
}
.sg-form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,.15);
}
.sg-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sg-form-hint { font-size: .72rem; color: var(--text-muted); margin-top: 4px; }

/* ============================================================
   CLIENT / PROSPECT CARDS
============================================================ */
.sg-client-card {
    background: var(--bg-dark);
    border-radius: var(--r); padding: 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--accent);
    cursor: pointer; transition: .2s; position: relative;
}
.sg-client-card:hover { background: var(--bg-hover); transform: translateX(4px); }
.sg-client-card.prospect { border-left-color: var(--gold); }
.sg-client-card.inactive { border-left-color: var(--text-muted); opacity: .7; }
.sg-client-name { font-size: .92rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.sg-client-meta { font-size: .72rem; color: var(--text-light); line-height: 1.6; }
.sg-client-badge {
    position: absolute; top: 12px; right: 12px;
    padding: 3px 10px; border-radius: 12px;
    font-size: .62rem; font-weight: 700;
}
.sg-client-badge.active      { background: rgba(46,168,113,.12);  color: var(--success); }
.sg-client-badge.inactive    { background: rgba(74,138,154,.12);  color: var(--text-muted); }
.sg-client-badge.prospect    { background: rgba(245,158,11,.12);  color: var(--gold); }
.sg-client-badge.pending-order { background: rgba(43,142,179,.12); color: var(--info); }
.sg-client-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* ============================================================
   ORDER TABLE
============================================================ */
.sg-order-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.sg-order-table th {
    padding: 8px 10px; text-align: left;
    font-size: .7rem; font-weight: 700; color: var(--text-light);
    text-transform: uppercase; letter-spacing: .5px;
    background: var(--bg-dark); border-bottom: 2px solid var(--border);
}
.sg-order-table td {
    padding: 10px; font-size: .82rem; color: var(--text);
    border-bottom: 1px solid var(--border); vertical-align: middle;
}
.sg-order-table tr:last-child td { border-bottom: none; }
.sg-order-table tr:hover td { background: var(--bg-hover); }

/* ============================================================
   NOTICE CARDS
============================================================ */
.sg-notice-card {
    background: var(--bg-dark); border-radius: var(--r);
    padding: 16px; margin-bottom: 10px;
    border-left: 4px solid var(--danger);
    animation: sgNoticeIn .4s ease;
}
@keyframes sgNoticeIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
}
.sg-notice-card.info    { border-left-color: var(--info); }
.sg-notice-card.success { border-left-color: var(--success); }
.sg-notice-unread {
    display: inline-block; width: 8px; height: 8px;
    background: var(--danger); border-radius: 50%;
    margin-right: 6px; flex-shrink: 0;
}

/* ============================================================
   MODAL
============================================================ */
.sg-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(8px);
    z-index: 800;
    display: flex; align-items: center;
    justify-content: center; padding: 20px;
}
.sg-modal {
    background: var(--bg-card); border-radius: 20px;
    width: 100%; max-width: 520px; max-height: 88vh;
    overflow-y: auto; box-shadow: var(--shadow-xl);
    animation: sgModalIn .3s ease; border: 1px solid var(--border);
}
@keyframes sgModalIn {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: scale(1); }
}
.sg-modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; background: var(--bg-card); z-index: 1;
}
.sg-modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--text); }
.sg-modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-dark); border: none;
    color: var(--text-light); cursor: pointer;
    display: flex; align-items: center;
    justify-content: center; transition: .2s;
}
.sg-modal-close:hover { background: var(--danger); color: #fff; }
.sg-modal-body { padding: 24px; }
.sg-modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
    position: sticky; bottom: 0; background: var(--bg-card);
}

/* ============================================================
   LEADS
============================================================ */
.sg-lead-card {
    background: var(--bg-dark); border-radius: var(--rs);
    padding: 14px; margin-bottom: 8px;
    transition: .2s; border: 1px solid var(--border);
}
.sg-lead-card:hover { border-color: var(--accent); background: var(--bg-hover); }
.sg-lead-name  { font-size: .88rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.sg-lead-meta  { font-size: .72rem; color: var(--text-light); line-height: 1.6; }

/* ============================================================
   REP CARDS (Manager)
============================================================ */
.sg-rep-card {
    background: var(--bg-dark); border-radius: var(--r);
    padding: 20px; margin-bottom: 14px;
    border-top: 3px solid var(--accent); box-shadow: var(--shadow);
}
.sg-rep-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
}
.sg-rep-name { font-size: .95rem; font-weight: 700; color: var(--text); }
.sg-rep-role { font-size: .72rem; color: var(--text-light); margin-top: 2px; }

/* ============================================================
   SEARCH BAR
============================================================ */
.sg-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: var(--r); padding: 10px 14px; margin-bottom: 14px;

/* ============================================================

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   FIREBASE INIT
============================================================ */
var firebaseConfig = {
    apiKey:            'AIzaSyBRwGda3Q-ibT8CgAo0tJXNJ4EOzy4gEs0',
    authDomain:        'stockai-pro-b232e.firebaseapp.com',
    projectId:         'stockai-pro-b232e',
    storageBucket:     'stockai-pro-b232e.firebasestorage.app',
    messagingSenderId: '424200946359',
    appId:             '1:424200946359:web:4c638eccd4e422ccc94332'
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db   = firebase.firestore();

/* ============================================================
   APP STATE
============================================================ */
var SG = {
    user:          null,
    accountId:     null,
    entityId:      null,
    entityName:    null,
    entity:        null,
    accountData:   null,
    isManager:     false,
    _dataLoaded:   false,
    _firstSnapDone:false,
    _setupPending:  false,
    _loggingOut:   false,   /* NEW — prevents re-entry on logout */
    _authReady:    false,   /* NEW — prevents acting before auth resolves */
    inventory:     [],
    clients:       [],
    prospects:     [],
    orders:        [],
    notices:       [],
    targets:       {},
    leads:         [],
    repProfile:    null,
    currentShift:  null,
    kmRecords:     [],
    shiftHistory:  [],
    monthCycle:    { startDay: 1, endDay: 0 },
    currentPage:   null,
    syncListener:  null,
    clockInterval: null,
    shiftInterval: null,
    dispatchEmail: null
};

var SG_MANAGER_ROLES = [
    'Owner', 'General Manager', 'Area Manager',
    'Operations Manager', 'Sales Manager'
];
var SG_WORKER_URL = 'https://bold-dust-c51b.cidraism.workers.dev';

/* ============================================================
   UI STATE MACHINE
   Only ONE screen is ever visible at a time.
   sgShow('loading')  — spinner while Firebase resolves
   sgShow('splash')   — welcome screen (after logout)
   sgShow('login')    — sign-in form
   sgShow('app')      — main app shell
============================================================ */
function sgShow(screen) {
    var ids = ['sg-loading', 'sg-splash', 'sg-login', 'sg-app'];
    ids.forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        if (id === 'sg-' + screen) {
            el.classList.remove('hidden');
        } else {
            el.classList.add('hidden');
        }
    });
}

/* ============================================================
   SSO — READ HUB SESSION
============================================================ */
(function () {
    try {
        var raw = sessionStorage.getItem('sso_session');
        if (!raw) return;
        var s = JSON.parse(raw);
        if (s && s.valid && s.accountId)
            localStorage.setItem('sg_account_id', s.accountId);
    } catch (e) {}
})();

/* ============================================================
   AUTH — single source of truth
============================================================ */
/* Start with loading spinner */
sgShow('loading');

/* Set persistence based on remember-me preference.
   We read the stored preference BEFORE onAuthStateChanged fires. */
var sgRemembered = localStorage.getItem('sg_remember') !== 'false';
var sgPersistence = sgRemembered
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

auth.setPersistence(sgPersistence).then(function () {

    auth.onAuthStateChanged(function (firebaseUser) {
        /* Ignore all auth events while logging out */
        if (SG._loggingOut) return;

        SG._authReady = true;

        if (firebaseUser) {
            /* User is signed in — find their account */
            sgFindAccount(firebaseUser.email, function (found) {
                if (SG._loggingOut) return; /* guard again */
                if (found) {
                    sgEnterApp();
                } else {
                    /* Signed into Firebase but no Sales-Guru account */
                    auth.signOut();
                    sgShow('login');
                    sgShowLoginError(
                        'No Sales-Guru access found for this account.');
                }
            });
        } else {
            /* Not signed in */
            var wasLoggedIn = localStorage.getItem('sg_was_logged_in');
            if (wasLoggedIn === 'true') {
                /* Previously logged in — show splash */
                sgShow('splash');
            } else {
                /* First visit or cleared storage — show login */
                sgShow('login');
            }
        }
    });
});

/* ============================================================
   LOGIN FORM
============================================================ */
document.addEventListener('DOMContentLoaded', function () {
    var form = document.getElementById('sg-login-form');
    if (form) {
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            sgLogin();
        });
    }
});

function sgLogin() {
    var email = (document.getElementById('sg-email').value || '')
                    .trim().toLowerCase();
    var pw    = (document.getElementById('sg-password').value || '')
                    .trim();
    var rememberEl = document.getElementById('sg-remember-me');
    var remember   = rememberEl ? rememberEl.checked : true;

    sgClearLoginError();

    if (!email || !pw) {
        sgShowLoginError('Please enter email and password.');
        return;
    }

    var btn = document.getElementById('sg-login-btn');
    if (btn) {
        btn.disabled  = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    }

    /* Store remember preference */
    localStorage.setItem('sg_remember', remember ? 'true' : 'false');

    /* Set persistence then sign in */
    var persistence = remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

    auth.setPersistence(persistence)
        .then(function () {
            return auth.signInWithEmailAndPassword(email, pw);
        })
        .then(function () {
            /* onAuthStateChanged will handle the rest */
            if (btn) {
                btn.disabled  = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        })
        .catch(function (err) {
            if (btn) {
                btn.disabled  = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
            var msg = 'Login failed. Please try again.';
            if (err.code === 'auth/wrong-password' ||
                err.code === 'auth/invalid-credential')
                msg = 'Incorrect password.';
            if (err.code === 'auth/user-not-found')
                msg = 'Email not found.';
            if (err.code === 'auth/invalid-email')
                msg = 'Invalid email address.';
            if (err.code === 'auth/too-many-requests')
                msg = 'Too many attempts. Try again later.';
            sgShowLoginError(msg);
        });
}

function sgShowLoginError(msg) {
    var errEl = document.getElementById('sg-login-error');
    if (errEl) {
        errEl.textContent   = msg;
        errEl.style.display = 'block';
    }
}

function sgClearLoginError() {
    var errEl = document.getElementById('sg-login-error');
    if (errEl) errEl.style.display = 'none';
}

function sgForgotPw() {
    var email = (document.getElementById('sg-email').value || '').trim();
    if (!email) {
        sgShowLoginError('Enter your email address first.');
        return;
    }
    auth.sendPasswordResetEmail(email.toLowerCase())
        .then(function () { sgToast('success', 'Reset link sent to ' + email); })
        .catch(function (err) { sgToast('error', err.message); });
}

/* ============================================================
   SPLASH SCREEN — Enter button
============================================================ */
function sgSplashEnter() {
    var btn = document.getElementById('sg-splash-enter');
    if (btn) {
        btn.disabled  = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
    }

    /* If user is already authenticated (remembered), go straight to app */
    var currentUser = auth.currentUser;
    if (currentUser) {
        sgFindAccount(currentUser.email, function (found) {
            if (found) {
                sgEnterApp();
            } else {
                sgShow('login');
            }
            if (btn) {
                btn.disabled  = false;
                btn.innerHTML = '<i class="fas fa-arrow-right"></i> Enter Sales-Guru';
            }
        });
    } else {
        /* Not authenticated — go to login */
        sgShow('login');
        if (btn) {
            btn.disabled  = false;
            btn.innerHTML = '<i class="fas fa-arrow-right"></i> Enter Sales-Guru';
        }
    }
}

/* ============================================================
   FIND ACCOUNT
============================================================ */
function sgFindAccount(email, cb) {
    var cachedId = localStorage.getItem('sg_account_id');
    if (cachedId) {
        db.collection('accounts').doc(cachedId).get()
            .then(function (doc) {
                if (doc.exists && sgMatchAccount(doc, email)) {
                    if (cb) cb(true);
                } else {
                    localStorage.removeItem('sg_account_id');
                    sgScanAccounts(email, cb);
                }
            })
            .catch(function () { sgScanAccounts(email, cb); });
    } else {
        sgScanAccounts(email, cb);
    }
}

function sgScanAccounts(email, cb) {
    db.collection('accounts').get()
        .then(function (snap) {
            var found = false;
            snap.forEach(function (doc) {
                if (found) return;
                if (sgMatchAccount(doc, email)) found = true;
            });
            if (cb) cb(found);
        })
        .catch(function () { if (cb) cb(false); });
}

function sgMatchAccount(doc, email) {
    var data = doc.data();

    if (data.owner && data.owner.email &&
        data.owner.email.toLowerCase() === email.toLowerCase()) {
        sgSetAccount(doc.id, data, email, 'owner', null, null);
        return true;
    }

    var users = data.users || {};
    var found  = false;
    Object.keys(users).forEach(function (eid) {
        if (found) return;
        (users[eid] || []).forEach(function (u) {
            if (found) return;
            if (u.email &&
                u.email.toLowerCase() === email.toLowerCase()) {
                sgSetAccount(doc.id, data, email, 'user', eid, u);
                found = true;
            }
        });
    });
    return found;
}

function sgSetAccount(docId, data, email, type, eid, userObj) {
    localStorage.setItem('sg_account_id', docId);
    SG.accountId   = docId;
    SG.accountData = data;
    var ents = data.entities || [];

    if (type === 'owner') {
        SG.user = {
            name:  data.owner.name || email,
            email: email,
            role:  'Owner',
            uid:   auth.currentUser ? auth.currentUser.uid : '',
            pin:   data.owner.pin || null
        };
        SG.isManager   = true;
        SG.entity      = ents[0] || null;
        SG.entityId    = SG.entity ? SG.entity.id   : null;
        SG.entityName  = SG.entity ? SG.entity.name : '';
    } else {
        SG.user = {
            name:  userObj.name || email,
            email: email,
            role:  userObj.role || 'Sales Rep',
            uid:   auth.currentUser ? auth.currentUser.uid : '',
            pin:   userObj.pin || null
        };
        SG.isManager = SG_MANAGER_ROLES.indexOf(userObj.role) !== -1;
        SG.entityId  = eid;
        SG.entity    = ents.find(function (e) {
            return e.id === eid;
        }) || ents[0] || null;
        SG.entityName = SG.entity ? SG.entity.name : '';
    }

    if (SG.entity && SG.entity.monthCycleStart) {
        SG.monthCycle = {
            startDay: parseInt(SG.entity.monthCycleStart) || 1,
            endDay:   parseInt(SG.entity.monthCycleEnd)   || 0
        };
    }

    var entityUsers = (data.users || {})[SG.entityId] || [];
    var dispatch = entityUsers.find(function (u) {
        return (u.role || '').toLowerCase().includes('dispatch');
    });
    SG.dispatchEmail = dispatch
        ? dispatch.email
        : (data.owner ? data.owner.email : null);
}

/* ============================================================
   LOGOUT
============================================================ */
function sgLogout() {
    /* Set flag FIRST to block any snapshot/auth callbacks */
    SG._loggingOut = true;

    /* Stop all timers and listeners immediately */
    sgStopAll();

    /* Mark as was-logged-in so splash shows next time */
    localStorage.setItem('sg_was_logged_in', 'true');

    /* Show splash immediately — don't wait for signOut */
    sgShow('splash');

    /* Reset all state */
    SG.user          = null;
    SG.accountId     = null;
    SG._dataLoaded   = false;
    SG.clients       = [];
    SG.prospects     = [];
    SG.orders        = [];
    SG.notices       = [];
    SG.leads         = [];
    SG.currentPage   = null;
    SG.repProfile    = null;
    SG.currentShift  = null;
    SG.kmRecords     = [];
    SG.shiftHistory  = [];
    SG.accountData   = null;

    /* Clear content so it doesn't flash on next login */
    var content = document.getElementById('sg-content');
    if (content) content.innerHTML = '';

    /* Sign out from Firebase */
    auth.signOut().then(function () {
        /* Re-enable auth callbacks after a short delay
           to prevent the signOut event from triggering
           the splash→login redirect */
        setTimeout(function () {
            SG._loggingOut = false;
        }, 500);
    }).catch(function () {
        setTimeout(function () {
            SG._loggingOut = false;
        }, 500);
    });
}

/* ============================================================
   ENTER APP
============================================================ */
function sgEnterApp() {
    /* Mark as logged in for splash-screen logic */
    localStorage.setItem('sg_was_logged_in', 'true');

    /* Update header */
    var nameEl = document.getElementById('sg-user-name');
    var roleEl = document.getElementById('sg-user-role');
    if (nameEl) nameEl.textContent = SG.user ? SG.user.name : 'User';
    if (roleEl) roleEl.textContent =
        (SG.user ? SG.user.role : '') +
        (SG.entityName ? ' — ' + SG.entityName : '');

    /* Show correct nav */
    if (SG.isManager) {
        document.getElementById('sg-nav-rep').classList.add('hidden');
        document.getElementById('sg-nav-mgr').classList.remove('hidden');
    } else {
        document.getElementById('sg-nav-rep').classList.remove('hidden');
        document.getElementById('sg-nav-mgr').classList.add('hidden');
    }

    /* Show app shell */
    sgShow('app');

    /* Start clock */
    sgTickClock();
    sgStartClock();

    /* ONE call — sgLoadData now handles both
       initial fetch AND real-time sync via onSnapshot */
    sgLoadData();
}

/* ============================================================
   DATA LOADING + SYNC — FINAL FIX
============================================================ */
function sgLoadData() {
    if (!SG.accountId) return;

    if (SG.syncListener) {
        SG.syncListener();
        SG.syncListener = null;
    }

    SG._dataLoaded     = false;
    SG._firstSnapDone  = false;
    SG._setupPending   = false; /* NEW — cancellable setup flag */

    SG.syncListener = db.collection('accounts').doc(SG.accountId)
        .onSnapshot(function (doc) {
            if (SG._loggingOut) return;
            if (!doc.exists) {
                if (!SG._firstSnapDone) {
                    SG._firstSnapDone = true;
                    SG._dataLoaded    = true;
                    sgNav(SG.isManager ? 'mgr-dashboard' : 'dashboard');
                }
                return;
            }
            sgApplyData(doc.data());
        }, function (err) {
            if (SG._loggingOut) return;
            console.warn('SG sync error:', err);
        });
}

function sgStartSync() {
    /* Intentionally empty — sgLoadData() handles everything */
}

function sgApplyData(data) {
    if (SG._loggingOut) return;

    /* ── Assign all data ── */
    SG.accountData  = data;
    SG.inventory    = (data.inventory         || {})[SG.entityId] || [];
    SG.clients      = (data.salesClients      || {})[SG.entityId] || [];
    SG.prospects    = (data.salesProspects    || {})[SG.entityId] || [];
    SG.orders       = (data.salesOrders       || {})[SG.entityId] || [];
    SG.targets      = (data.salesTargets      || {})[SG.entityId] || {};
    SG.leads        = (data.salesLeads        || {})[SG.entityId] || [];
    SG.kmRecords    = (data.salesKmRecords    || {})[SG.entityId] || [];
    SG.shiftHistory = (data.salesShiftHistory || {})[SG.entityId] || [];

    var uid         = SG.user ? SG.user.uid : '';
    var allNotices  = (data.salesNotices      || {})[SG.entityId] || {};
    SG.notices      = allNotices[uid] || [];
    sgUpdateNoticeBadge();

    var profiles    = (data.salesProfiles     || {})[SG.entityId] || {};
    SG.repProfile   = profiles[uid] || null;

    var shifts      = (data.salesShifts       || {})[SG.entityId] || {};
    SG.currentShift = shifts[uid] || null;

    var entityUsers = (data.users || {})[SG.entityId] || [];
    var dispatch    = entityUsers.find(function (u) {
        return (u.role || '').toLowerCase().includes('dispatch');
    });
    SG.dispatchEmail = dispatch
        ? dispatch.email
        : (data.owner ? data.owner.email : null);

    /* ── Read setupComplete ONCE clearly ── */
    var isSetupComplete = !!(SG.repProfile &&
                             SG.repProfile.setupComplete === true);

    /* ══════════════════════════════════════════════════
       FIRST SNAPSHOT
    ══════════════════════════════════════════════════ */
    if (!SG._firstSnapDone) {
        SG._firstSnapDone = true;
        SG._dataLoaded    = true;

        if (isSetupComplete) {
            /* Profile complete — go straight to dashboard */
            SG._setupPending = false;
            sgNav(SG.isManager ? 'mgr-dashboard' : 'dashboard');

        } else {
            /* Profile NOT complete.
               We delay showing setup by 800ms.
               This window allows a second snapshot (which
               sometimes fires within milliseconds carrying
               the SAME complete data) to cancel it via
               the _setupPending flag. */
            SG._setupPending = true;

            setTimeout(function () {
                if (SG._loggingOut)    return;
                if (!SG._setupPending) return; /* cancelled */

                /* Double-check profile is still incomplete */
                if (SG.repProfile && SG.repProfile.setupComplete) {
                    SG._setupPending = false;
                    sgNav(SG.isManager ? 'mgr-dashboard' : 'dashboard');
                    return;
                }

                SG._setupPending   = false;
                SG.currentPage     = 'setup';
                sgShowSetupForm(SG.repProfile || {});
            }, 800);
        }

        return; /* Always return after first snap */
    }

    /* ══════════════════════════════════════════════════
       SUBSEQUENT SNAPSHOTS (real-time updates)
    ══════════════════════════════════════════════════ */

    /* If setup is pending and profile is now complete — cancel setup */
    if (SG._setupPending && isSetupComplete) {
        SG._setupPending = false;
        sgNav(SG.isManager ? 'mgr-dashboard' : 'dashboard');
        return;
    }

    /* If currently on setup page */
    if (SG.currentPage === 'setup') {
        if (isSetupComplete) {
            /* Profile just got saved — leave setup */
            sgNav(SG.isManager ? 'mgr-dashboard' : 'dashboard');
        }
        /* Otherwise stay on setup — don't re-render the form */
        return;
    }

    /* On any other page — refresh current page content */
    if (SG.currentPage) {
        sgRenderCurrentPage();
    }
}

function sgStopAll() {
    if (SG.syncListener) {
        SG.syncListener();
        SG.syncListener  = null;
    }
    if (SG.clockInterval) {
        clearInterval(SG.clockInterval);
        SG.clockInterval = null;
    }
    if (SG.shiftInterval) {
        clearInterval(SG.shiftInterval);
        SG.shiftInterval = null;
    }
    SG._dataLoaded    = false;
    SG._firstSnapDone = false;
    SG._setupPending  = false;
}

function sgSave(fields) {
    if (!SG.accountId) return Promise.resolve();
    var data = {
        lastUpdated:
            firebase.firestore.FieldValue.serverTimestamp(),
        lastUpdatedBy:     SG.user ? SG.user.name : 'Sales-Guru',
        lastUpdatedDevice: 'Sales-Guru'
    };
    Object.keys(fields).forEach(function (k) { data[k] = fields[k]; });
    return db.collection('accounts').doc(SG.accountId)
        .set(data, { merge: true })
        .catch(function (err) {
            console.warn('SG save error:', err);
            sgToast('error', 'Failed to save. Please try again.');
        });
}

/* ============================================================
   CLOCK
============================================================ */
function sgTickClock() {
    var now = new Date();
    var ts  = now.toLocaleTimeString('en-ZA', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    var ds  = now.toLocaleDateString('en-ZA', {
        day: 'numeric', month: 'short', year: 'numeric'
    });
    var el  = document.getElementById('sg-header-time');
    if (el) el.innerHTML =
        '<strong>' + ts + '</strong><span>' + ds + '</span>';
}

function sgStartClock() {
    if (SG.clockInterval) clearInterval(SG.clockInterval);
    SG.clockInterval = setInterval(sgTickClock, 1000);
}

/* ============================================================
   NAVIGATION
============================================================ */
function sgNav(page) {

    document.querySelectorAll('#' + navId + ' .sg-nav-item')

}

                break;

/* ============================================================
   NOTICE BADGE
============================================================ */
function sgUpdateNoticeBadge() {
    var unread = SG.notices.filter(function (n) {
        return !n.read;

    if (badge) {
        if (unread > 0) {
            badge.textContent = unread;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }
}

/* ============================================================
   MONTH CYCLE HELPERS
============================================================ */
function sgGetCurrentCycleStart() {
    var now      = new Date();
    var startDay = SG.monthCycle.startDay || 1;
    var year     = now.getFullYear();
    var month    = now.getMonth();
    if (now.getDate() < startDay) {
        month--;
        if (month < 0) { month = 11; year--; }
    }
    return new Date(year, month, startDay);
}

function sgGetCurrentCycleEnd() {
    var start    = sgGetCurrentCycleStart();
    var endDay   = SG.monthCycle.endDay;
    var year     = start.getFullYear();
    var month    = start.getMonth();
    if (endDay && endDay > 0) {
        month++;
        if (month > 11) { month = 0; year++; }
        return new Date(year, month, endDay, 23, 59, 59);
    } else {
        month++;
        if (month > 11) { month = 0; year++; }
        var sd = SG.monthCycle.startDay || 1;
        return new Date(year, month, sd - 1, 23, 59, 59);
    }
}

function sgIsInCurrentCycle(dateStr) {
    if (!dateStr) return false;
    var d = new Date(dateStr);
    return d >= sgGetCurrentCycleStart() && d <= sgGetCurrentCycleEnd();
}

/* ============================================================
   SALES + CLIENTS HELPERS
============================================================ */
function sgGetRepCycleSales(repUid) {
    var uid = repUid || (SG.user ? SG.user.uid : '');
    return SG.orders
        .filter(function (o) {
            return o.repId === uid &&
                   o.status !== 'cancelled' &&
                   sgIsInCurrentCycle(o.createdAt);
        })
        .reduce(function (s, o) { return s + (o.total || 0); }, 0);
}

function sgGetRepActiveClients(repUid) {
    var uid        = repUid || (SG.user ? SG.user.uid : '');
    var cycleStart = sgGetCurrentCycleStart().toISOString();
    var repClients = SG.clients.filter(function (c) {
        return c.repId === uid;
    });
    var activeCount = repClients.filter(function (c) {
        return SG.orders.some(function (o) {
            return o.clientId   === c.id &&
                   o.status     !== 'cancelled' &&
                   o.createdAt  >= cycleStart;
        });
    }).length;
    return { active: activeCount, total: repClients.length };
}

function sgGetRepTarget(repUid) {
    var uid = repUid || (SG.user ? SG.user.uid : '');
    return SG.targets[uid] || 0;
}

/* ============================================================
   TOAST
============================================================ */
function sgToast(type, msg) {
    var icons = {
        success: 'check-circle',
        error:   'times-circle',
        info:    'info-circle',
        warning: 'exclamation-triangle'
    };
    var t = document.createElement('div');
    t.className = 'sg-toast ' + type;
    t.innerHTML =
        '<i class="fas fa-' + (icons[type] || 'info-circle') + '"></i>' +
        '<span>' + sgEsc(String(msg)) + '</span>';
    var wrap = document.getElementById('sg-toast-wrap');
    if (wrap) wrap.appendChild(t);
    setTimeout(function () {
        if (t.parentElement) {
            t.style.opacity    = '0';
            t.style.transition = 'opacity .3s';
            setTimeout(function () {
                if (t.parentElement) t.remove();
            }, 300);
        }
    }, 4000);
}

/* ============================================================
   MODAL
============================================================ */
function sgShowModal(title, body, footer) {
    var c = document.getElementById('sg-modal-container');
    if (!c) return;
    c.innerHTML =
        '<div class="sg-modal-overlay" id="sg-modal-overlay">' +
        '<div class="sg-modal">' +
        '<div class="sg-modal-header">' +
        '<h3>' + title + '</h3>' +
        '<button class="sg-modal-close" onclick="sgCloseModal()">' +
        '<i class="fas fa-times"></i></button>' +
        '</div>' +
        '<div class="sg-modal-body">' + body + '</div>' +
        (footer
            ? '<div class="sg-modal-footer">' + footer + '</div>'
            : '') +
        '</div></div>';

    var ov = document.getElementById('sg-modal-overlay');
    if (ov) {
        ov.addEventListener('click', function (e) {
            if (e.target === this) sgCloseModal();
        });
    }
}

function sgCloseModal() {
    var c = document.getElementById('sg-modal-container');
    if (c) c.innerHTML = '';
}

/* ============================================================
   UTILITY HELPERS
============================================================ */
function sgEsc(str) {
    return String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
}

function sgFmtDate(d) {
    if (!d) return '—';
    try {
        return new Date(d).toLocaleDateString('en-ZA', {
            day: 'numeric', month: 'short', year: 'numeric'
        });
    } catch (e) { return '—'; }
}

function sgFmtCurrency(n) {
    n = n || 0;
    return 'R' + n.toFixed(2)
        .replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function sgFmtShort(n) {
    n = n || 0;
    if (n >= 1e6) return 'R' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return 'R' + (n / 1e3).toFixed(1) + 'K';
    return 'R' + n.toFixed(0);
}

function sgDetailField(label, value) {
    return '<div style="padding:10px;background:var(--bg-dark);' +
        'border-radius:var(--rs)">' +
        '<div style="font-size:.62rem;color:var(--text-muted);' +

        label + '</div>' +
        '<div style="font-size:.88rem;font-weight:600;color:var(--text)">' +
        sgEsc(String(value)) + '</div></div>';
}

function sgCancelBtn() {
    return '<button onclick="sgCloseModal()" ' +
        'style="flex:1;padding:11px;background:var(--bg);' +
        'border:1.5px solid var(--border);border-radius:var(--rs);' +
        'cursor:pointer;font-family:inherit;font-weight:600;' +
        'color:var(--text-mid)">Cancel</button>';
}

/* ============================================================
   SERVICE WORKER
============================================================ */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
            .catch(function () {});
    });

    navigator.serviceWorker.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'SYNC') {
            if (SG.accountId && !SG._loggingOut) sgStartSync();

/* ============================================================
   ONLINE / OFFLINE
============================================================ */
window.addEventListener('online', function () {
    sgToast('success', '✅ Back online');
    if (SG.accountId && !SG.syncListener && !SG._loggingOut)
        sgStartSync();
});
window.addEventListener('offline', function () {
    sgToast('warning', '📵 No internet connection');
});

/* Prevent right click */
document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
});

console.log('✅ Sales-Guru Core loaded');

/* ── Logo Preview ── */
function sgPreviewLogo(input) {
    var file = input.files[0];
    if (!file) return;
    if (file.size > 500 * 1024) {
        sgToast('error', 'Logo file too large. Maximum 500KB.');
        return;
    }
    var reader = new FileReader();
    reader.onload = function (e) {
        var preview = document.getElementById('sp-logo-preview');
        if (preview) {
            preview.innerHTML =
                '<img src="' + e.target.result + '" ' +
                'style="max-width:100%;max-height:100%;object-fit:contain">';
        }
        var urlInput = document.getElementById('sp-logo-url');
        if (urlInput) urlInput.value = e.target.result;
    };
    reader.readAsDataURL(file);
}

/* ── Test Email ── */
function sgTestEmail() {
    var email    = (document.getElementById('sp-email')
        ? document.getElementById('sp-email').value : '').trim();
    var smtpHost = (document.getElementById('sp-smtp-host')
        ? document.getElementById('sp-smtp-host').value : '').trim();
    var smtpPort = document.getElementById('sp-smtp-port')
        ? document.getElementById('sp-smtp-port').value : '587';
    var smtpPass = (document.getElementById('sp-smtp-pass')
        ? document.getElementById('sp-smtp-pass').value : '').trim();
    var smtpSec  = document.getElementById('sp-smtp-secure')
        ? document.getElementById('sp-smtp-secure').value : 'tls';
    var name     = (document.getElementById('sp-name')
        ? document.getElementById('sp-name').value : '').trim();

    if (!email || !smtpHost) {
        sgToast('error', 'Fill in email and SMTP server first');
        return;
    }
    if (!smtpPass || smtpPass === '••••••••') {
        var ex = SG.repProfile || {};
        if (ex.smtpPass) {
            smtpPass = ex.smtpPass;
        } else {
            sgToast('error', 'Enter your SMTP password first');
            return;
        }
    }

    sgToast('info', 'Sending test email to ' + email + '...');

    fetch(SG_WORKER_URL + '/smtp-test', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            smtpHost:   smtpHost,
            smtpPort:   parseInt(smtpPort) || 587,
            smtpUser:   email,
            smtpPass:   smtpPass,
            smtpSecure: smtpSec,
            fromName:   name || 'Sales-Guru Test',
            fromEmail:  email,
            toEmail:    email,
            subject:    'Sales-Guru — Email Test',
            html:
                '<div style="font-family:Arial,sans-serif;' +
                'max-width:500px;margin:0 auto;padding:32px;' +
                'text-align:center">' +
                '<div style="width:60px;height:60px;border-radius:50%;' +
                'background:linear-gradient(135deg,#7c3aed,#4c1d95);' +
                'display:flex;align-items:center;justify-content:center;' +
                'color:#fff;font-size:1.5rem;margin:0 auto 16px">' +
                '<i class="fas fa-check"></i></div>' +
                '<h2 style="color:#7c3aed;font-size:1.2rem;margin-bottom:8px">' +
                'Email Test Successful!</h2>' +
                '<p style="color:#374151;font-size:.92rem;line-height:1.7">' +
                'Your Sales-Guru email configuration is working correctly. ' +
                'Pricelists and brochures will be sent from this address.</p>' +
                '<div style="margin-top:24px;padding-top:16px;' +
                'border-top:1px solid #e5e7eb">' +
                '<p style="color:#9ca3af;font-size:.75rem">' +
                'Powered by StockAI-Pro</p></div></div>'
        })
    })
    .then(function (r) {

function sgSaveProfile() {
    var name     = (document.getElementById('sp-name')
        ? document.getElementById('sp-name').value : '').trim();
    var phone    = (document.getElementById('sp-phone')
        ? document.getElementById('sp-phone').value : '').trim();
    var title    = (document.getElementById('sp-title')
        ? document.getElementById('sp-title').value : '').trim();
    var email    = (document.getElementById('sp-email')
        ? document.getElementById('sp-email').value : '').trim();
    var smtpHost = (document.getElementById('sp-smtp-host')
        ? document.getElementById('sp-smtp-host').value : '').trim();
    var smtpPort = document.getElementById('sp-smtp-port')
        ? document.getElementById('sp-smtp-port').value : '587';
    var smtpPass = (document.getElementById('sp-smtp-pass')
        ? document.getElementById('sp-smtp-pass').value : '').trim();
    var smtpSec  = document.getElementById('sp-smtp-secure')
        ? document.getElementById('sp-smtp-secure').value : 'tls';
    var logoUrl  = (document.getElementById('sp-logo-url')
        ? document.getElementById('sp-logo-url').value : '').trim();
    var whatsapp = (document.getElementById('sp-whatsapp')
        ? document.getElementById('sp-whatsapp').value : '').trim();

    /* Validation */
    if (!name)     { sgToast('error', 'Enter your full name');       return; }
    if (!phone)    { sgToast('error', 'Enter your contact number');  return; }
    if (!email)    { sgToast('error', 'Enter your email address');   return; }
    if (!smtpHost) { sgToast('error', 'Enter your SMTP server');     return; }
    if (!whatsapp) { sgToast('error', 'Enter your WhatsApp number'); return; }

    /* Handle existing password */
    if (!smtpPass || smtpPass === '••••••••') {
        var existing = SG.repProfile || {};
        if (existing.smtpPass) {
            smtpPass = existing.smtpPass;
        } else {
            sgToast('error', 'Enter your email password');
            return;
        }
    }

    /* Clean WhatsApp number */
    var cleanWA = whatsapp.replace(/[\s\-\(\)]/g, '');
    if (cleanWA.startsWith('0')) cleanWA = cleanWA.substring(1);

    var uid = SG.user ? SG.user.uid : '';
    var profile = {
        name:          name,
        phone:         phone,
        title:         title,
        email:         email,
        smtpHost:      smtpHost,
        smtpPort:      parseInt(smtpPort) || 587,
        smtpPass:      smtpPass,
        smtpSecure:    smtpSec,
        logoUrl:       logoUrl,
        whatsapp:      cleanWA,
        whatsappFull:  '27' + cleanWA,
        setupComplete: true,
        updatedAt:     new Date().toISOString()
    };

    /* Preserve pricelist if it exists */
    if (SG.repProfile && SG.repProfile.pricelistUrl) {
        profile.pricelistUrl       = SG.repProfile.pricelistUrl;
        profile.pricelistUpdatedAt = SG.repProfile.pricelistUpdatedAt;
    }

    sgToast('info', 'Saving profile...');

    var update = {};
    update['salesProfiles.' + SG.entityId + '.' + uid] = profile;

    sgSave(update).then(function () {
    SG.repProfile      = profile;
    SG._setupPending   = false; /* cancel any pending setup */
    SG.currentPage     = SG.isManager ? 'mgr-dashboard' : 'dashboard';
    sgToast('success', '✅ Profile saved! Welcome to Sales-Guru.');

/* ============================================================
   SHIFT MANAGEMENT
============================================================ */
function sgStartShift() {
    var uid = SG.user ? SG.user.uid : '';
    var now = new Date().toISOString();

    SG.currentShift = {
        uid:       uid,
        repName:   SG.user ? SG.user.name : '',
        clockIn:   now,
        clockOut:  null,
        status:    'active',
        date:      now.split('T')[0]
    };

    var update = {};
    update['salesShifts.' + SG.entityId + '.' + uid] = SG.currentShift;

    sgSave(update).then(function () {
        sgStartShiftTimer();
        sgToast('success', '✅ Shift started — clock running');
        sgRenderCurrentPage();
    });
}

function sgEndShift() {
    if (!SG.currentShift || SG.currentShift.status !== 'active') {
        sgToast('error', 'No active shift to end');
        return;
    }
    if (!confirm('End your shift now?')) return;

    var uid = SG.user ? SG.user.uid : '';
    var now = new Date().toISOString();

    SG.currentShift.clockOut = now;
    SG.currentShift.status   = 'completed';

    /* Calculate hours worked */
    var clockIn  = new Date(SG.currentShift.clockIn);
    var clockOut = new Date(now);
    var diffMs   = clockOut - clockIn;
    var hours    = Math.floor(diffMs / 3600000);
    var mins     = Math.floor((diffMs % 3600000) / 60000);
    SG.currentShift.hoursWorked  =
        parseFloat((diffMs / 3600000).toFixed(2));
    SG.currentShift.hoursDisplay =
        ('0' + hours).slice(-2) + ':' + ('0' + mins).slice(-2);

    /* Save completed shift to history and clear active */
    var update = {};
    update['salesShifts.' + SG.entityId + '.' + uid] = null;
    update['salesShiftHistory.' + SG.entityId] =
        firebase.firestore.FieldValue.arrayUnion(SG.currentShift);

    sgSave(update).then(function () {
        sgToast('success',
            '✅ Shift ended — ' + SG.currentShift.hoursDisplay +
            ' hours worked');
        if (SG.shiftInterval) {
            clearInterval(SG.shiftInterval);
            SG.shiftInterval = null;
        }
        SG.currentShift = null;
        sgRenderCurrentPage();
    });
}

function sgGetShiftTime() {
    if (!SG.currentShift || !SG.currentShift.clockIn ||
        SG.currentShift.status !== 'active') {
        return 'Not clocked in';
    }
    var start = new Date(SG.currentShift.clockIn);
    var diff  = Date.now() - start.getTime();
    var h = Math.floor(diff / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    return ('0'+h).slice(-2) + ':' +
           ('0'+m).slice(-2) + ':' +
           ('0'+s).slice(-2);
}

function sgStartShiftTimer() {
    if (SG.shiftInterval) clearInterval(SG.shiftInterval);
    SG.shiftInterval = setInterval(function () {
        var el = document.getElementById('sg-shift-display');
        if (el) el.textContent = sgGetShiftTime();
    }, 1000);
}

function sgCalcKm() {
    var startEl = document.getElementById('km-start');
    var endEl   = document.getElementById('km-end');
    var totalEl = document.getElementById('km-total');
    if (!startEl || !endEl || !totalEl) return;

    var start = parseFloat(startEl.value) || 0;
    var end   = parseFloat(endEl.value)   || 0;

    if (start > 0 && end > 0 && end >= start) {
        totalEl.textContent = (end - start) + ' km';
        totalEl.style.color = 'var(--success)';
    } else if (start > 0 && end === 0) {
        totalEl.textContent = 'Enter end KM';
        totalEl.style.color = 'var(--text-muted)';
    } else {
        totalEl.textContent = '—';
        totalEl.style.color = 'var(--accent)';
    }
}

function sgSaveKm() {
    var date    = document.getElementById('km-date')
        ? document.getElementById('km-date').value : '';
    var startKm = parseFloat(document.getElementById('km-start')
        ? document.getElementById('km-start').value : 0) || 0;
    var endKm   = parseFloat(document.getElementById('km-end')
        ? document.getElementById('km-end').value : 0) || 0;

    if (!date)       { sgToast('error', 'Select a date');    return; }
    if (startKm <= 0) { sgToast('error', 'Enter start KM'); return; }

    var uid     = SG.user ? SG.user.uid : '';
    var totalKm = endKm > 0 && endKm >= startKm
        ? endKm - startKm : 0;

    var record = {
        repId:    uid,
        repName:  SG.user ? SG.user.name : '',
        date:     date,
        startKm:  startKm,
        endKm:    endKm || null,
        totalKm:  totalKm,
        savedAt:  new Date().toISOString()
    };

    /* Update or add record */
    var records = SG.kmRecords.slice();
    var existingIdx = records.findIndex(function (r) {
        return r.date === date && r.repId === uid;
    });
    if (existingIdx > -1) {
        records[existingIdx] = record;
    } else {
        records.push(record);
    }

    var update = {};
    update['salesKmRecords.' + SG.entityId] = records;

    sgSave(update).then(function () {
        SG.kmRecords = records;
        sgCloseModal();
        sgToast('success',
            '✅ KM saved' +
            (totalKm > 0 ? ' — ' + totalKm + ' km travelled' : ''));
    });
}

function sgRefreshKmReport(repUid) {
    var startDate = document.getElementById('kmr-start')
        ? document.getElementById('kmr-start').value : '';
    var endDate   = document.getElementById('kmr-end')
        ? document.getElementById('kmr-end').value : '';
    var el = document.getElementById('kmr-results');
    if (!el) return;

    var records = SG.kmRecords.filter(function (r) {
        return r.repId === repUid &&
               r.date  >= startDate &&
               r.date  <= endDate;
    }).sort(function (a, b) {
        return a.date.localeCompare(b.date);
    });

    var totalKm = records.reduce(function (s, r) {
        return s + (r.totalKm || 0);
    }, 0);

    if (records.length === 0) {
        el.innerHTML =
            '<div style="text-align:center;padding:20px;' +
            'color:var(--text-muted);font-size:.82rem">' +
            'No KM records for this period</div>';
        return;
    }

    el.innerHTML =
        /* Summary */
        '<div style="background:var(--bg-dark);border-radius:var(--rs);' +
        'padding:14px;margin-bottom:14px;text-align:center">' +
        '<div style="font-size:.72rem;color:var(--text-muted);' +
        'text-transform:uppercase;font-weight:600;margin-bottom:4px">' +
        'Total KM Travelled</div>' +
        '<div style="font-size:1.5rem;font-weight:900;' +
        'color:var(--accent)">' + totalKm + ' km</div>' +
        '<div style="font-size:.72rem;color:var(--text-muted)">' +
        records.length + ' day(s)</div>' +
        '</div>' +

        /* Daily rows */
        records.map(function (r) {
            var day = new Date(r.date + 'T00:00:00').toLocaleDateString(
                'en-ZA', {
                    weekday: 'short',
                    day: 'numeric',
                    month: 'short'
                });
            return '<div style="display:flex;align-items:center;' +
                'gap:12px;padding:10px 0;' +
                'border-bottom:1px solid var(--border);' +
                'font-size:.82rem">' +
                '<div style="min-width:90px;color:var(--text-light);' +
                'font-weight:600">' + day + '</div>' +
                '<div style="flex:1;color:var(--text-muted)">' +
                'Start: ' + (r.startKm || '—') +
                ' | End: ' + (r.endKm || '—') + '</div>' +
                '<div style="font-weight:700;color:' +
                (r.totalKm > 0
                    ? 'var(--accent)' : 'var(--text-muted)') + '">' +
                (r.totalKm > 0 ? r.totalKm + ' km' : '—') +
                '</div></div>';
        }).join('');
}

    } else {
        clients.forEach(function (client) {
            html += sgClientCard(client);
        });
    }

    html += '</div>';

}

function sgClientCard(client) {
    var pendingOrder = SG.orders.find(function (o) {
        return o.clientId === client.id && o.status === 'pending';
    });
    var cycleStart = sgGetCurrentCycleStart().toISOString();
    var isActive = SG.orders.some(function (o) {
        return o.clientId === client.id &&
               o.status !== 'cancelled' &&
               o.createdAt >= cycleStart;
    });
    var cyclePurchases = SG.orders
        .filter(function (o) {
            return o.clientId === client.id &&
                   o.status !== 'cancelled' &&
                   sgIsInCurrentCycle(o.createdAt);
        })
        .reduce(function (s, o) { return s + (o.total || 0); }, 0);

    return '<div class="sg-client-card' +
        (!isActive ? ' inactive' : '') + '" ' +
        'data-client-name="' +
        (client.storeName || '').toLowerCase() + '" ' +
        'data-client-contact="' +
        (client.contactName || '').toLowerCase() + '" ' +
        'onclick="sgViewClient(\'' + client.id + '\')">' +

        '<span class="sg-client-badge ' +
        (pendingOrder ? 'pending-order'
            : isActive ? 'active' : 'inactive') + '">' +
        (pendingOrder ? '📦 Order Pending'
            : isActive ? '✅ Active' : '💤 Inactive') +
        '</span>' +

        '<div class="sg-client-name">' +
        sgEsc(client.storeName || 'Unnamed') + '</div>' +
        '<div class="sg-client-meta">' +
        '<i class="fas fa-user" style="width:14px"></i> ' +
        sgEsc(client.contactName || '') + '<br>' +
        '<i class="fas fa-phone" style="width:14px"></i> ' +
        sgEsc(client.contactNumber || '') + '<br>' +
        '<i class="fas fa-map-marker-alt" style="width:14px"></i> ' +
        sgEsc(client.address || '') +
        '</div>' +

        (cyclePurchases > 0
            ? '<div style="margin-top:8px;font-size:.78rem;' +
              'color:var(--success);font-weight:600">' +
              '<i class="fas fa-chart-line"></i> ' +
              sgFmtCurrency(cyclePurchases) + ' this cycle</div>'
            : '') +

        '<div class="sg-client-actions" ' +
        'onclick="event.stopPropagation()">' +
        '<button onclick="sgEditClient(\'' + client.id + '\')" ' +
        'class="btn btn-outline btn-sm">' +
        '<i class="fas fa-edit"></i> Edit</button>' +
        '<button onclick="sgSendPricelist(\'' + client.id + '\')" ' +
        'class="btn btn-sm" ' +
        'style="background:linear-gradient(135deg,#0d9488,#0d4a5c);' +
        'color:#fff">' +
        '<i class="fas fa-file-invoice-dollar"></i> Pricelist</button>' +
        '<button onclick="sgPlaceOrderForClient(\'' + client.id + '\')" ' +
        'class="btn btn-accent btn-sm">' +
        '<i class="fas fa-shopping-cart"></i> Order</button>' +
        '</div></div>';
}

function sgFilterClients() {
    var q = (document.getElementById('sg-client-search')
        ? document.getElementById('sg-client-search').value : '')
        .toLowerCase().trim();
    document.querySelectorAll('#sg-clients-list .sg-client-card')
        .forEach(function (card) {
            var name    = (card.dataset.clientName    || '');
            var contact = (card.dataset.clientContact || '');
            card.style.display =
                (!q || name.includes(q) || contact.includes(q))
                    ? '' : 'none';
        });
}

/* ============================================================
   VIEW CLIENT DETAIL
============================================================ */
function sgViewClient(clientId) {
    var client = SG.clients.find(function (c) {
        return c.id === clientId;
    });
    if (!client) return;

    var clientOrders = SG.orders
        .filter(function (o) { return o.clientId === clientId; })
        .sort(function (a, b) {
            return new Date(b.createdAt) - new Date(a.createdAt);
        })
        .slice(0, 5);

    var totalAllTime = SG.orders
        .filter(function (o) {
            return o.clientId === clientId &&
                   o.status !== 'cancelled';
        })
        .reduce(function (s, o) { return s + (o.total || 0); }, 0);

    var totalCycle = SG.orders
        .filter(function (o) {
            return o.clientId === clientId &&
                   o.status !== 'cancelled' &&
                   sgIsInCurrentCycle(o.createdAt);
        })
        .reduce(function (s, o) { return s + (o.total || 0); }, 0);

    var orderRows = clientOrders.length === 0
        ? '<div style="text-align:center;padding:20px;' +
          'color:var(--text-muted);font-size:.82rem">' +
          'No orders yet</div>'
        : clientOrders.map(function (order) {
              var statusColor =
                  order.status === 'delivered' ? 'var(--success)' :
                  order.status === 'cancelled' ? 'var(--danger)' :
                  order.status === 'invoiced'  ? 'var(--info)' :
                  'var(--gold)';
              return '<div style="display:flex;align-items:center;' +
                  'gap:12px;padding:10px 0;' +
                  'border-bottom:1px solid var(--border)">' +
                  '<div style="flex:1">' +
                  '<div style="font-size:.85rem;font-weight:600;' +

function sgSaveClient(clientId) {
    var store    = (document.getElementById('cc-store')   ? document.getElementById('cc-store').value   : '').trim();
    var contact  = (document.getElementById('cc-contact') ? document.getElementById('cc-contact').value : '').trim();
    var phone    = (document.getElementById('cc-phone')   ? document.getElementById('cc-phone').value   : '').trim();
    var email    = (document.getElementById('cc-email')   ? document.getElementById('cc-email').value   : '').trim();
    var address  = (document.getElementById('cc-address') ? document.getElementById('cc-address').value : '').trim();
    var noteText = (document.getElementById('cc-notes')   ? document.getElementById('cc-notes').value   : '').trim();

    var itemsSel    = document.getElementById('cc-items');
    var linkedItems = [];
    if (itemsSel) {
        Array.from(itemsSel.selectedOptions).forEach(function (opt) {
            if (opt.value) linkedItems.push(opt.value);
        });
    }

    if (!store)   { sgToast('error', 'Please enter the store name');   return; }
    if (!contact) { sgToast('error', 'Please enter a contact person'); return; }
    if (!phone)   { sgToast('error', 'Please enter a contact number'); return; }

    var now      = new Date().toISOString();
    var isEdit   = !!clientId;
    var existing = isEdit
        ? SG.clients.find(function (c) { return c.id === clientId; })
        : null;

    var notes = existing ? (existing.notes || []).slice() : [];
    if (noteText) {
        notes.push({
            text: noteText,
            date: now,
            by:   SG.user ? SG.user.name : 'Rep'
        });
    }

    var client = {
        id:            isEdit ? clientId : 'CLT-' + Date.now(),
        storeName:     store,
        contactName:   contact,
        contactNumber: phone,
        email:         email,
        address:       address,
        linkedItems:   linkedItems,
        notes:         notes,
        repId:         SG.user ? SG.user.uid  : '',
        repName:       SG.user ? SG.user.name : '',
        entityId:      SG.entityId,
        status:        'client',
        createdAt:     existing ? existing.createdAt : now,
        updatedAt:     now
    };

    var clients = SG.clients.slice();
    if (isEdit) {
        clients = clients.map(function (c) {
            return c.id === clientId ? client : c;
        });
    } else {
        clients.push(client);
    }

    sgToast('info', 'Saving...');

    var update = {};
    update['salesClients.' + SG.entityId] = clients;

    sgSave(update).then(function () {
        SG.clients = clients;
        sgCloseModal();
        sgToast('success',
            (isEdit ? '✅ Client updated' : '✅ Client added') +
            ' — ' + store);
        sgNav('clients');
    });
}

        '<button onclick="sgCloseModal();' +
        'sgConvertToClient(\'' + prospectId + '\')" ' +
        'class="btn btn-success btn-sm" style="padding:10px 16px">' +

function sgSaveProspectNote(prospectId) {
    var note = (document.getElementById('pv-note')
        ? document.getElementById('pv-note').value : '').trim();
    if (!note) { sgToast('error', 'Enter a note first'); return; }

    var prospects = SG.prospects.map(function (p) {
        if (p.id !== prospectId) return p;
        var notes = (p.notes || []).slice();
        notes.push({
            text: note,
            date: new Date().toISOString(),
            by:   SG.user ? SG.user.name : 'Rep'
        });
        return Object.assign({}, p, {
            notes:     notes,
            updatedAt: new Date().toISOString()
        });
    });

    var update = {};
    update['salesProspects.' + SG.entityId] = prospects;

    sgSave(update).then(function () {
        SG.prospects = prospects;
        sgCloseModal();
        sgToast('success', 'Note saved');
        sgViewProspect(prospectId);
    });
}

function sgAddProspectNote(prospectId) {
    sgViewProspect(prospectId);
}

function sgMarkProspectContacted(prospectId) {
    var prospects = SG.prospects.map(function (p) {
        if (p.id !== prospectId) return p;
        return Object.assign({}, p, {
            contacted: !p.contacted,
            updatedAt: new Date().toISOString()
        });
    });

    var update = {};
    update['salesProspects.' + SG.entityId] = prospects;

    sgSave(update).then(function () {
        SG.prospects = prospects;
        sgNav('prospects');
        sgToast('success', 'Status updated');
    });
}

function sgConvertToClient(prospectId) {
    var prospect = SG.prospects.find(function (p) {
        return p.id === prospectId;
    });
    if (!prospect) return;
    if (!confirm('Convert "' + prospect.storeName +
                 '" from Prospect to Client?')) return;

    var now = new Date().toISOString();

    var newClient = {
        id:            'CLT-' + Date.now(),
        storeName:     prospect.storeName,
        contactName:   prospect.contactName,
        contactNumber: prospect.contactNumber,
        email:         prospect.email,
        address:       prospect.address,
        linkedItems:   [],
        notes: (prospect.notes || []).concat([{
            text: 'Converted from prospect',
            date: now,
            by:   SG.user ? SG.user.name : 'Rep'
        }]),
        repId:         prospect.repId,
        repName:       prospect.repName,
        entityId:      SG.entityId,
        status:        'client',
        convertedFrom: prospectId,
        createdAt:     prospect.createdAt,
        convertedAt:   now,
        updatedAt:     now
    };

    var prospects = SG.prospects.filter(function (p) {
        return p.id !== prospectId;
    });
    var clients = SG.clients.slice();
    clients.push(newClient);

    sgToast('info', 'Converting...');

    var update = {};
    update['salesProspects.' + SG.entityId] = prospects;
    update['salesClients.'   + SG.entityId] = clients;

    sgSave(update).then(function () {
        SG.prospects = prospects;
        SG.clients   = clients;
        sgCloseModal();
        sgToast('success',
            '✅ ' + prospect.storeName + ' converted to client!');
        sgNav('clients');
    });
}

function sgUpdateOrderRow(input) {
    var row       = input.closest('.po-item-row');
    if (!row) return;
    var basePrice = parseFloat(row.dataset.basePrice) || 0;
    var discount  = Math.max(0, Math.min(100,
        parseFloat(input.value) || 0));
    var finalPrice = basePrice * (1 - discount / 100);
    var priceEl    = row.querySelector('.po-final-price');
    if (priceEl) {
        priceEl.textContent = 'R' + finalPrice.toFixed(2);
        priceEl.style.color = discount > 0
            ? 'var(--success)' : 'var(--accent)';
    }
    sgCalcOrderTotal();
}

function sgCalcOrderTotal() {
    var total = 0;
    document.querySelectorAll('.po-item-row')
        .forEach(function (row) {
            var basePrice = parseFloat(row.dataset.basePrice) || 0;
            var discInput = row.querySelector('.po-discount');
            var qtyInput  = row.querySelector('.po-qty');
            var discount  = discInput
                ? parseFloat(discInput.value) || 0 : 0;
            var qty = qtyInput
                ? parseFloat(qtyInput.value) || 0 : 0;
            var finalPrice = basePrice * (1 - discount / 100);
            total += finalPrice * qty;
        });
    var totalEl = document.getElementById('po-total');
    if (totalEl) totalEl.textContent = sgFmtCurrency(total);
}
