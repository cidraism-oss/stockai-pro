                '<i class="fas fa-times"></i> Reject</button></div></div>';
        }).join('');

function approvePO(poId) {
    var pending = getPending();
    var po = pending.find(function(p) { return p.id === poId; });
    if (!po) return;

    var ps = getPurch();
    ps.unshift({
        id: po.id, supplier: po.supplier,
        items: po.items ? po.items.length : 0,
        total: po.total || 0,
        createdAt: new Date().toISOString(),
        date: new Date().toISOString(),
        status: 'In Transit', type: 'AI-PO',
        lineItems: po.items
    });
    S.purchases[eid()] = ps;
    S.pendingPOs[eid()] = pending.filter(function(p) { return p.id !== poId; });

    // Email supplier
    var sups = getSups();
    var sup = sups.find(function(s) { return s.name === po.supplier; });
    if (sup && sup.email) {
        emailPurchaseOrder({
            poId: po.id,
            supplierName: po.supplier,
            supplierEmail: sup.email,
            entityName: S.entities[S.activeEntity] ? S.entities[S.activeEntity].name : '',
            entityAddress: S.entities[S.activeEntity] ? (S.entities[S.activeEntity].address || '') : '',
            createdBy: S.user ? S.user.name : 'System',
            createdAt: new Date().toISOString(),
            items: po.items || [],
            total: po.total || 0
        });
    }

    logAction('PO Approved', poId + ' → ' + po.supplier);
    debouncedSave();
    renderPurchasesTable();
    toast('success', '✅ PO approved & sent to ' + po.supplier);
}

function rejectPO(poId) {
    S.pendingPOs[eid()] = getPending().filter(function(p) { return p.id !== poId; });
    logAction('PO Rejected', poId);
    debouncedSave();
    renderPurchasesTable();
    toast('info', 'PO rejected');
}

function loadSupplierItems() {
    var supSel = document.getElementById('mpo-sup');
    var container = document.getElementById('mpo-items');
    if (!supSel || supSel.selectedIndex < 1) {
        container.innerHTML = '<p style="color:var(--text-light);font-size:.82rem">Select a supplier</p>';
        return;
    }

    var supId = supSel.value;
    var sup = getSups().find(function(s) { return s.id === supId; });
    if (!sup) return;

    // Only show items linked to this supplier
    var inv = getInv();
    var linkedItems = inv.filter(function(i) {
        return (i.linkedSuppliers || []).indexOf(supId) !== -1 || i.supplier === sup.name;
    });

    if (linkedItems.length === 0) {
        container.innerHTML = '<p style="color:var(--text-light);font-size:.82rem">' +
            'No items linked to ' + sup.name + '. Link items in Inventory first.</p>';
        return;
    }

    container.innerHTML = linkedItems.map(function(item) {
        return '<div style="display:flex;align-items:center;gap:10px;padding:10px;' +
            'background:var(--bg-card);border-radius:var(--rs);margin-bottom:6px">' +
            '<input type="checkbox" class="mpo-check" value="' + item.id + '" ' +
            'data-name="' + item.name + '" data-cost="' + (item.cost || 0) + '" ' +
            'data-unit="' + item.unit + '" style="width:18px;height:18px;accent-color:var(--accent)" ' +
            'onchange="calcManualPO()">' +
            '<div style="flex:1"><div style="font-size:.85rem;font-weight:600;color:var(--text)">' +
            item.name + '</div>' +
            '<div style="font-size:.68rem;color:var(--text-light)">' +
            (item.quantity || 0) + ' ' + item.unit + ' in stock • R' +
            (item.cost || 0).toFixed(2) + '/' + item.unit + '</div></div>' +
            '<input type="number" class="mpo-qty" data-id="' + item.id + '" ' +
            'placeholder="Qty" step="0.1" min="0" ' +
            'style="width:70px;padding:6px;border:1px solid var(--border);border-radius:var(--rs);' +
            'text-align:center;font-family:inherit;font-size:.85rem" oninput="calcManualPO()"></div>';
    }).join('');
}

function calcManualPO() {
    var total = 0;
    document.querySelectorAll('.mpo-check:checked').forEach(function(cb) {
        var qty = 0;
        var qtyInput = document.querySelector('.mpo-qty[data-id="' + cb.value + '"]');
        if (qtyInput) qty = parseFloat(qtyInput.value) || 0;
        var cost = parseFloat(cb.dataset.cost) || 0;
        total += qty * cost;
    });
    var el = document.getElementById('mpo-total');
    if (el) el.textContent = 'R ' + total.toFixed(2);
}

function saveManualPO() {
    var supSel = document.getElementById('mpo-sup');
    if (!supSel || supSel.selectedIndex < 1) { toast('error', 'Select a supplier'); return; }
    var supId = supSel.value;
    var sup = getSups().find(function(s) { return s.id === supId; });
    var supName = sup ? sup.name : 'Unknown';
    var supEmail = sup ? (sup.email || '') : '';
    var expected = document.getElementById('mpo-date').value;

    var items = [];
    var total = 0;
    document.querySelectorAll('.mpo-check:checked').forEach(function(cb) {
        var qtyInput = document.querySelector('.mpo-qty[data-id="' + cb.value + '"]');
        var qty = qtyInput ? parseFloat(qtyInput.value) || 0 : 0;
        if (qty <= 0) return;
        var cost = parseFloat(cb.dataset.cost) || 0;
        var lineTotal = qty * cost;
        total += lineTotal;
        items.push({
            id: cb.value,
            name: cb.dataset.name,
            qty: qty,
            unit: cb.dataset.unit,
            cost: cost,
            total: parseFloat(lineTotal.toFixed(2))
        });
    });

    if (items.length === 0) { toast('error', 'Select items and enter quantities'); return; }

    var poId = 'MPO-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    var ps = getPurch();
    ps.unshift({
        id: poId, supplier: supName, supplierEmail: supEmail,
        items: items.length, total: parseFloat(total.toFixed(2)),
        lineItems: items,
        createdAt: new Date().toISOString(),
        date: new Date().toISOString(),
        expected: expected,
        status: 'In Transit', type: 'Manual PO',
        paymentTerms: sup ? (sup.paymentTerms || 'COD') : 'COD'
    });
    S.purchases[eid()] = ps;

    // Email to supplier
    if (supEmail) {
        emailPurchaseOrder({
            poId: poId, supplierName: supName, supplierEmail: supEmail,
            entityName: S.entities[S.activeEntity] ? S.entities[S.activeEntity].name : '',
            entityAddress: S.entities[S.activeEntity] ? (S.entities[S.activeEntity].address || '') : '',
            createdBy: S.user ? S.user.name : 'System',
            createdAt: new Date().toISOString(),
            items: items, total: total
        });
    }

    logAction('Manual PO', poId + ' → ' + supName + ' (R' + total.toFixed(2) + ')');
    debouncedSave();
    closeModal();
    renderPurchasesTable();
    toast('success', '✅ PO ' + poId + ' created' + (supEmail ? ' & emailed to ' + supName : ''));
}

    renderPurchasesTable();
}

function renderGRVSection() {
    var container = document.getElementById('grv-container');
    if (!container) return;

    var ps = getPurch();
    var grvReady = ps.filter(function(p) {
        return (p.status === 'Received' || p.status === 'Delivered') && !p.grvCompleted;
    });
    var grvDone = ps.filter(function(p) { return p.grvCompleted; });

    var html = '';

    // Awaiting GRV
    html += '<div class="form-card" style="border-left-color:var(--gold);margin-bottom:18px">' +
        '<h3 class="block-title"><i class="fas fa-clipboard-check" style="color:var(--gold)"></i> ' +
        'Awaiting GRV (' + grvReady.length + ')</h3>';

function grvLineRow(name, poQty, cost) {
    return '<div class="grv-row" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;margin-bottom:6px;align-items:center">' +
        '<input type="text" class="grv-item-name form-input" value="' + name + '" placeholder="Item name" style="padding:8px;font-size:.82rem">' +
        '<input type="number" class="grv-po-qty form-input" value="' + poQty + '" placeholder="PO Qty" readonly style="padding:8px;font-size:.82rem;background:var(--bg)">' +
        '<input type="number" class="grv-rec-qty form-input" placeholder="Recv" step="0.001" oninput="calcGRVTotal()" style="padding:8px;font-size:.82rem">' +
        '<input type="number" class="grv-cost form-input" placeholder="Cost" step="0.01" oninput="calcGRVTotal()" style="padding:8px;font-size:.82rem">' +
        '</div>';
}

function addGRVLine() {
    var container = document.getElementById('grv-lines');
    if (container) container.insertAdjacentHTML('beforeend', grvLineRow('', '', ''));
}

function calcGRVTotal() {
    var total = 0;
    document.querySelectorAll('.grv-row').forEach(function(row) {
        var qty  = parseFloat(row.querySelector('.grv-rec-qty').value) || 0;
        var cost = parseFloat(row.querySelector('.grv-cost').value) || 0;
        total += qty * cost;
    });
    var el = document.getElementById('grv-total');
    if (el) el.textContent = 'R ' + total.toFixed(2);
}

function completeGRV(poId) {
    var po = getPurch().find(function(p) { return p.id === poId; });
    if (!po) return;

    var grvLines = [];
    var grvTotal = 0;
    var hasItems = false;

    document.querySelectorAll('.grv-row').forEach(function(row) {
        var name    = row.querySelector('.grv-item-name').value.trim();
        var recQty  = parseFloat(row.querySelector('.grv-rec-qty').value) || 0;
        var cost    = parseFloat(row.querySelector('.grv-cost').value) || 0;

        if (name && recQty > 0 && cost > 0) {
            hasItems = true;
            var lineTotal = recQty * cost;
            grvTotal += lineTotal;
            grvLines.push({ name: name, receivedQty: recQty, unitCost: cost, lineTotal: lineTotal });

            // Update stock — find matching inventory item
            var inv = getInv();
            var invItem = inv.find(function(i) { return i.name.toLowerCase() === name.toLowerCase(); });
            if (invItem) {
                invItem.quantity += recQty;
                invItem.lastCost = invItem.cost;
                invItem.cost = cost;  // Update cost from GRV (the ONLY way cost updates)
                invItem.value = invItem.quantity * invItem.cost;
                invItem.status = invItem.quantity === 0 ? 'out-of-stock' :
                    invItem.quantity <= (invItem.parLevel || invItem.reorder || 0) ? 'low-stock' : 'in-stock';
            }
        }
    });

    if (!hasItems) { toast('error', 'Enter at least one item with qty and cost'); return; }

    var grvDate = document.getElementById('grv-date').value;
    var grvNotes = (document.getElementById('grv-notes').value || '').trim();
    var invNum = (document.getElementById('grv-invnum').value || '').trim();

    // Calculate payment due date based on supplier terms
    var paymentTerms = po.paymentTerms || 'COD';
    var paymentDueDate = calcPaymentDue(paymentTerms, grvDate);

    // Update PO
    po.grvCompleted   = true;
    po.grvDate        = grvDate;
    po.grvBy          = S.user ? S.user.name : 'Unknown';
    po.grvTotal       = parseFloat(grvTotal.toFixed(2));
    po.grvLines       = grvLines;
    po.grvNotes       = grvNotes;
    po.invoiceNumber  = invNum;
    po.paymentStatus  = paymentTerms === 'COD' ? 'Paid' : 'Unpaid';
    po.paymentTerms   = paymentTerms;
    po.paymentDueDate = paymentDueDate;

    S.purchases[eid()] = getPurch();
    S.inventory[eid()] = getInv();

    logAction('GRV Completed', poId + ' — R' + grvTotal.toFixed(2) + ' — ' + grvLines.length + ' items updated');
    addNotif('success', 'GRV Completed', poId + ' — Stock & costs updated');
    debouncedSave();
    closeModal();
    renderGRVSection();
    renderPurchasesTable();
    renderInventory();
    toast('success', '✅ GRV completed! Stock levels and costs updated.');
}

function calcPaymentDue(terms, fromDate) {
    var date = new Date(fromDate);
    switch (terms) {
        case 'COD': return fromDate;
        case '7 Days':  date.setDate(date.getDate() + 7); break;
        case '14 Days': date.setDate(date.getDate() + 14); break;
        case '30 Days': date.setDate(date.getDate() + 30); break;
        case 'Month End':
            date = new Date(date.getFullYear(), date.getMonth() + 1, 0); break;
        case '30 Days from Statement':
            date.setDate(date.getDate() + 30); break;
        default: return fromDate;
    }
    return date.toISOString().split('T')[0];
}

function downloadSupplierPriceList(supId) {
    var sup = getSups().find(function(s) { return s.id === supId; });
    if (!sup) return;

    var inv = getInv();
    // Get items linked to this supplier
    var linked = inv.filter(function(i) {
        return (i.linkedSuppliers || []).indexOf(supId) !== -1 || i.supplier === sup.name;
    });

    if (linked.length === 0) {
        // If no linked items, show all items grouped by category
        linked = inv;
    }

    // Group by category
    var byCategory = {};
    linked.forEach(function(i) {
        var cat = i.category || 'Uncategorized';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(i);
    });

    var rows = '';
    Object.keys(byCategory).sort().forEach(function(cat) {
        rows += '<tr style="background:#1a8ba8;color:#fff"><td colspan="5" style="padding:10px;font-weight:700">' + cat + '</td></tr>';
        byCategory[cat].forEach(function(i) {
            rows += '<tr><td>' + i.name + '</td><td>' + (i.packSize || '—') + '</td><td>' + i.unit + '</td>' +
                '<td></td><td></td></tr>';

    });

        '<style>body{font-family:Arial;padding:30px;color:#0d4a5c}' +

        'th{background:#0d4a5c;color:#fff}</style></head><body>' +

function renderWastageTable() {
    var ws = getWastage();
    var tb = document.getElementById('wastage-body');
    if (!tb) return;

    // Update stats
    var today     = new Date().toISOString().split('T')[0];
    var weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    var monthStart = new Date(); monthStart.setDate(1);

    var todayTotal = 0, weekTotal = 0, monthTotal = 0;
    ws.forEach(function(w) {
        var wDate = new Date(w.date);
        if (fmtDate(w.date) === fmtDate(today)) todayTotal += w.value || 0;
        if (wDate >= weekStart) weekTotal += w.value || 0;
        if (wDate >= monthStart) monthTotal += w.value || 0;
    });

    var el;
    el = document.getElementById('waste-today'); if (el) el.textContent = 'R' + fmtNum(todayTotal);
    el = document.getElementById('waste-week');  if (el) el.textContent = 'R' + fmtNum(weekTotal);
    el = document.getElementById('waste-month'); if (el) el.textContent = 'R' + fmtNum(monthTotal);

    // Calculate as % of sales
    var cashups = S.cashups[eid()] || {};
    var monthSales = 0;
    Object.keys(cashups).forEach(function(date) {
        var d = new Date(date);
        if (d >= monthStart) monthSales += (cashups[date].total || 0);
    });
    el = document.getElementById('waste-pct');
    if (el) el.textContent = monthSales > 0 ? ((monthTotal / monthSales) * 100).toFixed(1) + '%' : '0%';

    // Table
    if (ws.length === 0) {
        tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-light)">' +
            '<i class="fas fa-trash-alt" style="font-size:2rem;display:block;margin-bottom:10px;opacity:.3"></i>' +
            'No wastage logged yet</td></tr>';
        return;
    }

    tb.innerHTML = ws.slice(0, 50).map(function(w) {
        return '<tr><td>' + fmtDate(w.date) + '</td>' +
            '<td><strong>' + w.item + '</strong></td>' +
            '<td>' + w.qty + ' ' + w.unit + '</td>' +
            '<td style="color:var(--danger);font-weight:600">R' + (w.value || 0).toFixed(2) + '</td>' +
            '<td>' + w.reason + '</td>' +
            '<td>' + w.by + '</td></tr>';
    }).join('');
}

function showLogWastage() {
    var inv = getInv();
    if (inv.length === 0) { toast('warning', 'No stock items yet'); return; }

    var itemOpts = inv.map(function(i) {
        return '<option value="' + i.id + '" data-name="' + i.name + '" ' +
            'data-unit="' + i.unit + '" data-cost="' + (i.cost || 0) + '">' +
            i.name + ' (' + (i.quantity || 0) + ' ' + i.unit + ')</option>';
    }).join('');

    showModal('<i class="fas fa-trash-alt" style="color:var(--danger)"></i> Log Wastage',
        '<div class="form-row">' +
        '<div class="form-field"><label>Item *</label>' +
        '<select class="form-input" id="wst-item"><option value="">Select item</option>' + itemOpts + '</select></div>' +
        '<div class="form-field"><label>Quantity *</label>' +
        '<input type="number" class="form-input" id="wst-qty" step="0.001" placeholder="0"></div></div>' +
        '<div class="form-row">' +
        '<div class="form-field"><label>Reason *</label>' +
        '<select class="form-input" id="wst-reason">' +
        '<option>Expired</option><option>Spoiled</option><option>Damaged</option>' +
        '<option>Over-production</option><option>Prep waste</option><option>Other</option></select></div></div>',
        '<button class="btn-outline" onclick="closeModal()">Cancel</button>' +
        '<button class="btn-danger" onclick="saveWastage()"><i class="fas fa-trash"></i> Log Wastage</button>'
    );
}

function saveWastage() {
    var itemSel = document.getElementById('wst-item');
    var qty = parseFloat(document.getElementById('wst-qty').value) || 0;
    var reason = document.getElementById('wst-reason').value;

    if (!itemSel || itemSel.selectedIndex < 1) { toast('error', 'Select an item'); return; }
    if (qty <= 0) { toast('error', 'Enter a valid quantity'); return; }

    var opt = itemSel.options[itemSel.selectedIndex];
    var itemId   = opt.value;
    var itemName = opt.dataset.name;
    var unit     = opt.dataset.unit;
    var cost     = parseFloat(opt.dataset.cost) || 0;
    var value    = qty * cost;

    // Deduct from inventory
    var inv = getInv();
    var item = inv.find(function(i) { return i.id === itemId; });
    if (item) {
        item.quantity = Math.max(0, item.quantity - qty);
        item.value = item.quantity * item.cost;
        item.status = item.quantity === 0 ? 'out-of-stock' :
            item.quantity <= (item.parLevel || item.reorder || 0) ? 'low-stock' : 'in-stock';
    }
    S.inventory[eid()] = inv;

    var ws = getWastage();
    ws.unshift({
        date: new Date().toISOString(),
        item: itemName,
        itemId: itemId,
        category: item ? item.category : '',
        unit: unit,
        qty: qty,
        value: value,
        reason: reason,
        by: S.user ? S.user.name : 'Unknown'
    });
    S.wastage[eid()] = ws;

    logAction('Wastage', itemName + ': ' + qty + ' ' + unit + ' (R' + value.toFixed(2) + ') — ' + reason);
    debouncedSave();
    closeModal();
    renderWastageTable();
    renderInventory();
    toast('success', '🗑️ Wastage logged: ' + itemName);
}

function viewReport(type) {
    var fromDate = document.getElementById('rep-from') ? document.getElementById('rep-from').value : '';
    var toDate   = document.getElementById('rep-to')   ? document.getElementById('rep-to').value   : S.selectedDate;
    var ent      = S.entities[S.activeEntity] || {};

    var title = '', body = '';

    if (type === 'stock-summary') {
        var inv = getInv();
        title = '📦 Stock Summary — ' + ent.name;
        body = '<div class="table-wrap"><table class="data-table"><thead><tr>' +
            '<th>Item</th><th>Dept</th><th>Qty</th><th>Unit</th><th>Cost</th><th>Value</th><th>Status</th></tr></thead><tbody>' +
            inv.map(function(i) {
                return '<tr><td><strong>' + i.name + '</strong></td><td>' + (i.department || '—') + '</td>' +
                    '<td>' + (i.quantity || 0) + '</td><td>' + i.unit + '</td>' +
                    '<td>R' + (i.cost || 0).toFixed(2) + '</td><td>R' + fmtNum(i.value || 0) + '</td>' +
                    '<td><span class="status-badge ' + i.status + '">' + statusText(i.status) + '</span></td></tr>';
            }).join('') +
            '</tbody></table></div>' +
            '<div style="margin-top:14px;font-weight:700;font-size:1rem;color:var(--accent);text-align:right">' +
            'Total Stock Value: R' + fmtNum(inv.reduce(function(s, i) { return s + (i.value || 0); }, 0)) + '</div>';

    } else if (type === 'wastage') {
        var ws = getWastage().filter(function(w) {
            if (!fromDate || !toDate) return true;
            var d = new Date(w.date).toISOString().split('T')[0];
            return d >= fromDate && d <= toDate;
        });
        var totalWaste = ws.reduce(function(s, w) { return s + (w.value || 0); }, 0);
        title = '🗑️ Wastage Report';

function startMonthEndGRV() {
    var grvPending = getPurch().filter(function(p) {
        return (p.status === 'Received' || p.status === 'Delivered') && !p.grvCompleted;
    });

    if (grvPending.length > 0) {
        toast('warning', grvPending.length + ' outstanding GRV(s) — complete them first');
        navigate('grv');
        return;
    }

    // All GRVs done
    if (!S.monthEndState) S.monthEndState = {};
    if (!S.monthEndState[eid()]) S.monthEndState[eid()] = {};
    S.monthEndState[eid()].grvDone = true;
    S.monthEndState[eid()].grvDoneAt = new Date().toISOString();
    S.monthEndState[eid()].grvDoneBy = S.user ? S.user.name : 'Unknown';

    debouncedSave();
    renderPages();
    navigate('month-end');
    toast('success', '✅ GRV step completed! Now do the closing stock take.');
}

function startMonthEndStockTake() {
    navigate('stock-take');
    toast('info', '📋 Complete the closing stock take, then return to Month End to submit.');

    // After stock take submission, mark as done
    // This is handled by a check in the stock take submit
    if (!S.monthEndState) S.monthEndState = {};
    if (!S.monthEndState[eid()]) S.monthEndState[eid()] = {};
    S.monthEndState[eid()].stockTakeDone = true;
    S.monthEndState[eid()].stockTakeDoneAt = new Date().toISOString();
    S.monthEndState[eid()].stockTakeDoneBy = S.user ? S.user.name : 'Unknown';
    debouncedSave();
}

function executeMonthEnd() {
    if (!confirm('Submit Month End?\n\nThis will:\n• Calculate final food cost\n• Set closing stock\n• Reset live data for new month\n• Set opening stock for next month\n\nThis cannot be undone.')) return;

    var ent = S.entities[S.activeEntity];
    if (!ent) return;

    var inv = getInv();
    var closingStockValue = inv.reduce(function(s, i) { return s + (i.value || 0); }, 0);

    // Calculate month's food cost
    var openingStock = ent.openingStockValue || closingStockValue;
    var totalPurch = getPurch().filter(function(p) { return p.grvCompleted; })
        .reduce(function(s, p) { return s + (p.grvTotal || 0); }, 0) / (1 + VAT_RATE);
    var cashups = S.cashups[eid()] || {};
    var totalSales = 0;
    Object.values(cashups).forEach(function(cu) { totalSales += (cu.total || 0); });
    var salesExVat = totalSales / (1 + VAT_RATE);
    var foodCostPct = salesExVat > 0
        ? ((openingStock + totalPurch - closingStockValue) / salesExVat * 100) : 0;

    var now = new Date();
    var monthName = now.toLocaleString('en-ZA', { month: 'long' });
    var year = now.getFullYear();

    // Save month end report
    if (!S.monthEndReports) S.monthEndReports = {};
    if (!S.monthEndReports[eid()]) S.monthEndReports[eid()] = [];
    S.monthEndReports[eid()].push({
        month: monthName,
        year: year,
        openingStock: openingStock,
        totalPurchases: totalPurch,
        closingStock: closingStockValue,
        totalSales: salesExVat,
        totalWastage: getWastage().reduce(function(s, w) { return s + (w.value || 0); }, 0),
        foodCostPercent: parseFloat(foodCostPct.toFixed(2)),
        foodCostTarget: ent.foodCostTarget || 28,
        closedBy: S.user ? S.user.name : 'Unknown',
        closedAt: now.toISOString()
    });

    // Set opening stock for new month
    ent.openingStockValue = closingStockValue;

    // Reset live data for new month
    S.cashups[eid()] = {};
    S.wastage[eid()] = [];
    S.activities[eid()] = [];

    // Keep purchases but mark as historical
    // Keep inventory values (carried over)

    // Reset month end state
    S.monthEndState[eid()] = { grvDone: false, stockTakeDone: false };

    // Email month end report
    emailMonthEndReport({
        entityName: ent.name,
        month: monthName,
        year: year,
        openingStock: openingStock,
        totalPurchases: totalPurch,
        closingStock: closingStockValue,
        totalSales: salesExVat,
        totalWastage: getWastage().reduce(function(s, w) { return s + (w.value || 0); }, 0),
        foodCostPercent: foodCostPct,
        foodCostTarget: ent.foodCostTarget || 28,
        recipients: S.owner ? [S.owner.email] : []
    });

    logAction('Month End', monthName + ' ' + year + ' — FC: ' + foodCostPct.toFixed(1) + '%');
    addNotif('success', 'Month End Complete', monthName + ' closed — FC: ' + foodCostPct.toFixed(1) + '%');
    saveToCloud();

    renderPages();
    navigate('month-end');
    toast('success', '🎉 Month End completed! FC: ' + foodCostPct.toFixed(1) + '% • New month started.');
}

function aiReply(q) {
    var ql = q.toLowerCase();
    var inv = getInv();
    var ent = S.entities[S.activeEntity] || {};
    var entName = ent.name || 'your entity';

    if (ql.includes('low') || ql.includes('stock alert')) {
        var low = inv.filter(function(i) { return i.status === 'low-stock' || i.status === 'out-of-stock'; });
        if (low.length === 0) return '<p>✅ All stock levels are good at ' + entName + '!</p>';
        return '<p>📊 <strong>' + low.length + ' items need attention:</strong></p>' +
            '<ul>' + low.slice(0, 8).map(function(i) {
                return '<li>' + i.name + ' — ' + (i.quantity || 0) + ' ' + i.unit + '</li>';
            }).join('') + '</ul>';
    }
    if (ql.includes('food cost') || ql.includes('fc')) {
        var fc = calcLiveFoodCost();
        var target = ent.foodCostTarget || 28;
        return '<p>📊 <strong>Food Cost Analysis — ' + entName + '</strong></p>' +
            '<p>Live FC: <strong style="color:' + (fc > target ? 'var(--danger)' : 'var(--success)') + '">' + fc.toFixed(1) + '%</strong></p>' +
            '<p>Target: <strong>' + target + '%</strong></p>' +
            '<p>Formula: (Opening + Purchases - Closing) / Sales</p>';
    }
    if (ql.includes('reorder') || ql.includes('order')) {
        var needs = inv.filter(function(i) { return i.status === 'low-stock' || i.status === 'out-of-stock'; });
        if (needs.length === 0) return '<p>✅ No reorders needed!</p>';
        return '<p>🛒 <strong>' + needs.length + ' items to reorder:</strong></p>' +
            '<ul>' + needs.slice(0, 8).map(function(i) {
                return '<li>' + i.name + ' — order ' + ((i.parLevel || 5) * 3) + ' ' + i.unit + '</li>';
            }).join('') + '</ul>';
    }
    if (ql.includes('help')) {
        return '<p>🤖 I can help with:</p><ul>' +
            '<li><strong>Low stock</strong> — items needing reorder</li>' +
            '<li><strong>Food cost</strong> — live FC analysis</li>' +
            '<li><strong>Reorder</strong> — what to order</li>' +
            '<li><strong>Wastage</strong> — wastage summary</li>' +
            '<li><strong>Unpaid</strong> — outstanding invoices</li></ul>';
    }
    if (ql.includes('unpaid') || ql.includes('overdue')) {
        var unpaid = getPurch().filter(function(p) { return p.grvCompleted && p.paymentStatus !== 'Paid'; });
        return '<p>💳 <strong>' + unpaid.length + ' unpaid invoice(s)</strong> at ' + entName + '</p>';
    }
    if (ql.includes('wastage') || ql.includes('waste')) {
        var ws = getWastage();
        var total = ws.reduce(function(s, w) { return s + (w.value || 0); }, 0);
        return '<p>🗑️ Wastage: <strong>R' + total.toFixed(2) + '</strong> (' + ws.length + ' entries)</p>';
    }
    return '<p>🤔 Try asking about: "low stock", "food cost", "reorder", "unpaid", "wastage", or "help"</p>';
}

// ============================================================
var voiceRecog = null;

function startVoiceCmd() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        toast('warning', 'Voice not supported');
        return;
    }
    document.getElementById('voice-overlay').classList.remove('hidden');
    document.getElementById('voice-title').textContent = 'Voice Command';
    document.getElementById('voice-text').textContent = 'Say a command...';
    document.getElementById('voice-help').innerHTML =
        '<strong>Commands:</strong> dashboard, inventory, purchases, suppliers, stock take, GRV, wastage, reports, month end, POS builder';

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    voiceRecog = new SR();
    voiceRecog.continuous = false;
    voiceRecog.interimResults = false;
    voiceRecog.lang = 'en-ZA';

    voiceRecog.onresult = function(e) {
        var text = e.results[0][0].transcript.toLowerCase().trim();
        document.getElementById('voice-text').textContent = 'Heard: "' + text + '"';
        processVoiceCommand(text);
    };
    voiceRecog.onerror = function() { stopVoice(); };
    voiceRecog.onend = function() { stopVoice(); };
    try { voiceRecog.start(); } catch(e) { toast('error', 'Voice error'); }
}

function stopVoice() {
    document.getElementById('voice-overlay').classList.add('hidden');
    if (voiceRecog) { try { voiceRecog.stop(); } catch(e) {} voiceRecog = null; }
}

function processVoiceCommand(cmd) {
    stopVoice();
    if (cmd.includes('dashboard'))   navigate('dashboard');
    else if (cmd.includes('inventory'))  navigate('inventory');
    else if (cmd.includes('purchase'))   navigate('purchases');
    else if (cmd.includes('supplier'))   navigate('suppliers');
    else if (cmd.includes('stock take')) navigate('stock-take');
    else if (cmd.includes('grv'))        navigate('grv');
    else if (cmd.includes('wastage'))    navigate('wastage');
    else if (cmd.includes('report'))     navigate('reports');
    else if (cmd.includes('cash'))       navigate('cashup');
    else if (cmd.includes('day end'))    navigate('day-end');
    else if (cmd.includes('month end'))  navigate('month-end');
    else if (cmd.includes('menu'))       navigate('menu-creation');
    else if (cmd.includes('user'))       navigate('users');
    else if (cmd.includes('pos') || cmd.includes('builder')) navigate('pos-builder');
    else if (cmd.includes('invoice') || cmd.includes('billing')) navigate('invoicing');
    else if (cmd.includes('setting'))    navigate('settings');
    else { toggleAI(); sendAI(cmd); }
}

    var totalOutstanding = unpaid.reduce(function(s, i) { return s + (i.totalIncl || 0); }, 0);
    var totalPaid = paid.reduce(function(s, i) { return s + (i.totalIncl || 0); }, 0);

    // This month
    var now = new Date();
    var thisMonthPaid = paid.filter(function(i) {
        var d = new Date(i.paidDate || i.createdAt);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).reduce(function(s, i) { return s + (i.totalIncl || 0); }, 0);

    return '<div class="page-watermark">STOCKAI-PRO</div>' +
        '<h1 class="page-heading"><i class="fas fa-file-invoice-dollar" style="color:var(--accent)"></i> Invoicing</h1>' +

        // Stats
        '<div class="stats-row">' +
        statCard('Total Invoices', savedInvoices.length, '') +
        statCard('Outstanding', 'R' + fmtNum(totalOutstanding), totalOutstanding > 0 ? 'red' : 'green') +
        statCard('Paid This Month', 'R' + fmtNum(thisMonthPaid), 'green') +
        statCard('Total Revenue', 'R' + fmtNum(totalPaid), 'gold') +
        '</div>' +

        // Actions
        '<div class="action-bar">' +
        '<button class="btn-primary" onclick="showCreateInvoiceForm()">' +
        '<i class="fas fa-plus"></i> Create Invoice</button>' +
        '<button class="btn-outline" onclick="viewInvoiceReport()">' +
        '<i class="fas fa-file-alt"></i> Invoice Report</button>' +
        '<div class="search-mini" style="margin-left:auto"><i class="fas fa-search"></i>' +
        '<input type="text" id="client-inv-search" placeholder="Search invoices..." oninput="filterClientInvoices()"></div></div>' +

        // PENDING / UNPAID SECTION
        '<div class="form-card" style="border-left-color:var(--warning);margin-bottom:18px">' +
        '<h3 class="block-title"><i class="fas fa-clock" style="color:var(--warning)"></i> ' +
        'Pending / Unpaid Invoices (' + unpaid.length + ')' +
        (totalOutstanding > 0 ? ' — <span style="color:var(--danger)">R' + fmtNum(totalOutstanding) + ' outstanding</span>' : '') +
        '</h3>' +
        '<div class="table-wrap"><table class="data-table">' +
        '<thead><tr><th>Invoice #</th><th>Client</th><th>Date</th>' +
        '<th>Total (incl.)</th><th>Actions</th></tr></thead>' +
        '<tbody id="client-inv-unpaid"></tbody></table></div></div>' +

        // PAID SECTION
        '<div class="form-card" style="border-left-color:var(--success)">' +
        '<h3 class="block-title"><i class="fas fa-check-circle" style="color:var(--success)"></i> ' +
        'Paid Invoices (' + paid.length + ')' +
        (totalPaid > 0 ? ' — <span style="color:var(--success)">R' + fmtNum(totalPaid) + ' received</span>' : '') +
        '</h3>' +
        '<div class="table-wrap"><table class="data-table">' +
        '<thead><tr><th>Invoice #</th><th>Client</th><th>Paid Date</th>' +
        '<th>Total (incl.)</th><th>Paid By</th><th>Actions</th></tr></thead>' +
        '<tbody id="client-inv-paid"></tbody></table></div></div>';
}

function getClientInvoices() {
    if (!eid()) return [];
    if (!S.clientInvoices) S.clientInvoices = {};
    return S.clientInvoices[eid()] || [];
}

function renderClientInvoices() {
    var invoices = getClientInvoices();
    var searchVal = document.getElementById('client-inv-search');
    var q = searchVal ? searchVal.value.toLowerCase() : '';

    var filtered = invoices;
    if (q) {
        filtered = invoices.filter(function(i) {
            return (i.invoiceNumber || '').toLowerCase().includes(q) ||
                   (i.clientName || '').toLowerCase().includes(q) ||
                   (i.clientCompany || '').toLowerCase().includes(q);
        });
    }

    var unpaid = filtered.filter(function(i) { return i.status !== 'paid'; });
    var paid   = filtered.filter(function(i) { return i.status === 'paid'; });

    // Render unpaid table
    var tbUnpaid = document.getElementById('client-inv-unpaid');
    if (tbUnpaid) {
        if (unpaid.length === 0) {
            tbUnpaid.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--success)">' +
                '<i class="fas fa-check-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>' +
                'No outstanding invoices — all paid up! 🎉</td></tr>';
        } else {
            tbUnpaid.innerHTML = unpaid.map(function(inv) {
                // Check if overdue (older than 30 days)
                var daysSince = Math.floor((new Date() - new Date(inv.createdAt)) / 86400000);
                var isOverdue = daysSince > 30;
                var rowStyle = isOverdue ? 'background:rgba(201,69,69,.04)' : '';

                return '<tr style="' + rowStyle + '">' +
                    '<td><strong>' + inv.invoiceNumber + '</strong>' +
                    (isOverdue ? '<br><span style="font-size:.6rem;color:var(--danger);font-weight:700">OVERDUE — ' + daysSince + ' days</span>' : '') +
                    '</td>' +
                    '<td>' + (inv.clientCompany || inv.clientName || '—') +
                    (inv.contactPerson ? '<br><span style="font-size:.68rem;color:var(--text-light)">' + inv.contactPerson + '</span>' : '') + '</td>' +
                    '<td>' + fmtDate(inv.createdAt) + '</td>' +
                    '<td style="font-weight:700;color:var(--danger)">R' + (inv.totalIncl || 0).toFixed(2) + '</td>' +
                    '<td><div class="row-actions">' +
                    '<button class="row-btn" onclick="viewClientInvoice(\'' + inv.id + '\')" title="View"><i class="fas fa-eye"></i></button>' +
                    '<button class="row-btn" onclick="printClientInvoice(\'' + inv.id + '\')" title="Print"><i class="fas fa-print"></i></button>' +
                    '<button class="row-btn" onclick="emailClientInvoice(\'' + inv.id + '\')" title="Email"><i class="fas fa-envelope"></i></button>' +
                    '<button class="row-btn" onclick="markClientInvPaid(\'' + inv.id + '\')" title="Mark Paid" ' +
                    'style="background:var(--success);color:#fff;border-color:var(--success)"><i class="fas fa-check"></i></button>' +
                    '<button class="row-btn del" onclick="deleteClientInvoice(\'' + inv.id + '\')" title="Delete"><i class="fas fa-trash"></i></button>' +
                    '</div></td></tr>';
            }).join('');
        }
    }

    // Render paid table
    var tbPaid = document.getElementById('client-inv-paid');
    if (tbPaid) {
        if (paid.length === 0) {
            tbPaid.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-light)">' +
                'No paid invoices yet</td></tr>';
        } else {
            tbPaid.innerHTML = paid.map(function(inv) {
                return '<tr>' +
                    '<td><strong>' + inv.invoiceNumber + '</strong></td>' +
                    '<td>' + (inv.clientCompany || inv.clientName || '—') + '</td>' +
                    '<td>' + (inv.paidDate ? fmtDate(inv.paidDate) : '—') + '</td>' +
                    '<td style="font-weight:700;color:var(--success)">R' + (inv.totalIncl || 0).toFixed(2) + '</td>' +
                    '<td>' + (inv.paidBy || '—') + '</td>' +
                    '<td><div class="row-actions">' +
                    '<button class="row-btn" onclick="viewClientInvoice(\'' + inv.id + '\')" title="View"><i class="fas fa-eye"></i></button>' +
                    '<button class="row-btn" onclick="printClientInvoice(\'' + inv.id + '\')" title="Print"><i class="fas fa-print"></i></button>' +
                    '<button class="row-btn" onclick="emailClientInvoice(\'' + inv.id + '\')" title="Email"><i class="fas fa-envelope"></i></button>' +
                    '</div></td></tr>';
            }).join('');
        }
    }
}

    var menu = getMenu();

    row.innerHTML =

        '<input type="number" class="form-input ci-qty" value="1" min="0.01" step="0.01" oninput="calcCITotals()" style="padding:8px;font-size:.82rem;text-align:center">' +
        '<input type="number" class="form-input ci-price" placeholder="0.00" step="0.01" oninput="calcCITotals()" style="padding:8px;font-size:.82rem;text-align:right">' +
        '<div class="ci-line-total" style="font-weight:700;color:var(--accent);text-align:right;font-size:.85rem;padding-right:4px">R0.00</div>' +
        '<button onclick="this.parentElement.remove();calcCITotals()" class="row-btn del" style="width:28px;height:28px"><i class="fas fa-times"></i></button>';

    container.appendChild(row);
}

function ciItemSelected(selectEl) {
    var row     = selectEl.closest('.ci-line-row');
    var descEl  = row.querySelector('.ci-desc');
    var priceEl = row.querySelector('.ci-price');

    if (selectEl.value === 'custom') {
        descEl.value = '';
        descEl.placeholder = 'Enter description';
        priceEl.value = '';
        descEl.focus();
    } else if (selectEl.selectedIndex > 0) {
        var opt = selectEl.options[selectEl.selectedIndex];
        descEl.value  = opt.dataset.name || '';
        priceEl.value = opt.dataset.price || '';
        calcCITotals();
    }
}

function calcCITotals() {
    var subtotal = 0;
    document.querySelectorAll('.ci-line-row').forEach(function(row) {
        var qty   = parseFloat(row.querySelector('.ci-qty').value) || 0;
        var price = parseFloat(row.querySelector('.ci-price').value) || 0;
        var lineTotal = qty * price;
        row.querySelector('.ci-line-total').textContent = 'R' + lineTotal.toFixed(2);
        subtotal += lineTotal;
    });

    var vat   = parseFloat((subtotal * 0.15).toFixed(2));
    var total = parseFloat((subtotal + vat).toFixed(2));

    var el;
    el = document.getElementById('ci-subtotal');    if (el) el.textContent = 'R' + subtotal.toFixed(2);
    el = document.getElementById('ci-vat-amount');  if (el) el.textContent = 'R' + vat.toFixed(2);
    el = document.getElementById('ci-total');        if (el) el.textContent = 'R' + total.toFixed(2);
}

function buildInvoiceData() {
    var invNum     = (document.getElementById('ci-invnum').value || '').trim();
    var invDate    = document.getElementById('ci-date').value;
    var clientName = (document.getElementById('ci-client-name').value || '').trim();
    var contact    = (document.getElementById('ci-contact').value || '').trim();
    var email      = (document.getElementById('ci-email').value || '').trim();
    var phone      = (document.getElementById('ci-phone').value || '').trim();
    var address    = (document.getElementById('ci-address').value || '').trim();
    var clientVat  = (document.getElementById('ci-vat').value || '').trim();
    var notes      = (document.getElementById('ci-notes').value || '').trim();

    if (!clientName) { toast('error', 'Enter client/company name'); return null; }

    var items    = [];
    var subtotal = 0;

    document.querySelectorAll('.ci-line-row').forEach(function(row) {
        var desc  = (row.querySelector('.ci-desc').value || '').trim();
        var qty   = parseFloat(row.querySelector('.ci-qty').value) || 0;
        var price = parseFloat(row.querySelector('.ci-price').value) || 0;
        if (desc && qty > 0 && price > 0) {
            var lineTotal = qty * price;
            subtotal += lineTotal;
            items.push({
                description: desc,
                quantity:    qty,
                unitPrice:   price,
                total:       parseFloat(lineTotal.toFixed(2))
            });
        }
    });

    if (items.length === 0) { toast('error', 'Add at least one line item'); return null; }

    var vat      = parseFloat((subtotal * 0.15).toFixed(2));
    var totalIncl = parseFloat((subtotal + vat).toFixed(2));

    return {
        id:             'CINV-' + Date.now(),
        invoiceNumber:  invNum || 'CI-' + Date.now(),
        invoiceDate:    invDate,
        clientName:     clientName,
        clientCompany:  clientName,
        contactPerson:  contact,
        clientEmail:    email,
        clientPhone:    phone,
        clientAddress:  address,
        clientVat:      clientVat,
        items:          items,
        subtotal:       subtotal,
        vat:            vat,
        totalIncl:      totalIncl,
        notes:          notes,
        status:         'unpaid',
        createdAt:      new Date().toISOString(),
        createdBy:      S.user ? S.user.name : 'Unknown'
    };
}

function saveClientInvoice() {
    var data = buildInvoiceData();
    if (!data) return;

    if (!S.clientInvoices) S.clientInvoices = {};
    if (!S.clientInvoices[eid()]) S.clientInvoices[eid()] = [];
    S.clientInvoices[eid()].unshift(data);

    logAction('Invoice Created', data.invoiceNumber + ' — ' + data.clientName + ' — R' + data.totalIncl.toFixed(2));
    debouncedSave();
    closeModal();
    renderPages();
    navigate('invoicing');
    renderClientInvoices();
    toast('success', '✅ Invoice ' + data.invoiceNumber + ' created');
    return data;
}

function saveAndEmailClientInvoice() {
    var data = buildInvoiceData();
    if (!data) return;
    if (!data.clientEmail) {
        toast('error', 'Enter client email address to send invoice');
        return;
    }

    if (!S.clientInvoices) S.clientInvoices = {};
    if (!S.clientInvoices[eid()]) S.clientInvoices[eid()] = [];
    S.clientInvoices[eid()].unshift(data);

    // Send email
    var html = generateClientInvoiceHTML(data);
    sendEmail(data.clientEmail,
        'Invoice ' + data.invoiceNumber + ' — ' + (S.entities[S.activeEntity] ? S.entities[S.activeEntity].name : 'StockAI-Pro'),
        html
    );

    logAction('Invoice Emailed', data.invoiceNumber + ' → ' + data.clientEmail);
    debouncedSave();
    closeModal();
    renderPages();
    navigate('invoicing');
    renderClientInvoices();
    toast('success', '✅ Invoice ' + data.invoiceNumber + ' created & emailed to ' + data.clientEmail);
}

// ============================================================
// VIEW / PRINT / EMAIL / MARK PAID / DELETE
// ============================================================
function viewClientInvoice(invId) {
    var inv = getClientInvoices().find(function(i) { return i.id === invId; });
    if (!inv) return;
    var html = generateClientInvoiceHTML(inv);
    showModal('Invoice ' + inv.invoiceNumber,
        '<div style="max-height:70vh;overflow-y:auto">' + html + '</div>',
        '<button class="btn-outline" onclick="closeModal()">Close</button>' +
        '<button class="btn-outline" onclick="printClientInvoice(\'' + invId + '\')"><i class="fas fa-print"></i> Print</button>' +
        (inv.clientEmail ? '<button class="btn-primary" onclick="emailClientInvoice(\'' + invId + '\')"><i class="fas fa-envelope"></i> Email</button>' : '')
    );
}

function printClientInvoice(invId) {
    var inv = getClientInvoices().find(function(i) { return i.id === invId; });
    if (!inv) return;
    var html = generateClientInvoiceHTML(inv);
    var w = window.open('', '_blank');
    w.document.write('<html><head><title>Invoice ' + inv.invoiceNumber + '</title>' +
        '<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">' +
        '<style>body{margin:0;padding:20px;background:#f0f7f9}@media print{body{background:#fff;padding:0}}</style></head><body>' +
        '<div style="max-width:700px;margin:0 auto">' + html + '</div></body></html>');
    w.document.close();
    setTimeout(function() { w.print(); }, 500);
}

function emailClientInvoice(invId) {
    var inv = getClientInvoices().find(function(i) { return i.id === invId; });
    if (!inv || !inv.clientEmail) {
        toast('error', 'No client email address');
        return;
    }
    var html = generateClientInvoiceHTML(inv);
    var ent  = S.entities[S.activeEntity] || {};
    sendEmail(inv.clientEmail,
        'Invoice ' + inv.invoiceNumber + ' — ' + (ent.name || 'StockAI-Pro'),
        html
    );
    logAction('Invoice Emailed', inv.invoiceNumber + ' → ' + inv.clientEmail);
    toast('success', '📧 Invoice emailed to ' + inv.clientEmail);
}

function markClientInvPaid(invId) {
    var invoices = getClientInvoices();
    var inv = invoices.find(function(i) { return i.id === invId; });
    if (!inv) return;

    if (!confirm('Mark invoice ' + inv.invoiceNumber + ' as paid?\n\nR' +
        (inv.totalIncl || 0).toFixed(2) + ' will be added to today\'s sales.')) return;

    inv.status   = 'paid';
    inv.paidDate = new Date().toISOString();
    inv.paidBy   = S.user ? S.user.name : 'Unknown';
    S.clientInvoices[eid()] = invoices;

    // Add to today's cashup/sales (excl. VAT)
    var today = new Date().toISOString().split('T')[0];
    if (!S.cashups[eid()]) S.cashups[eid()] = {};
    if (!S.cashups[eid()][today]) {
        S.cashups[eid()][today] = { cash:0, cards:0, vouchers:0, float:0, total:0, invoiceSales:0 };
    }
    var salesExVat = (inv.totalIncl || 0) / (1 + 0.15); // Remove VAT
    if (!S.cashups[eid()][today].invoiceSales) S.cashups[eid()][today].invoiceSales = 0;
    S.cashups[eid()][today].invoiceSales += salesExVat;
    S.cashups[eid()][today].total += salesExVat;

    logAction('Invoice Paid', inv.invoiceNumber + ' — R' + (inv.totalIncl || 0).toFixed(2) +
        ' → R' + salesExVat.toFixed(2) + ' (excl. VAT) added to sales');
    addNotif('success', 'Invoice Paid',
        inv.invoiceNumber + ' — R' + salesExVat.toFixed(2) + ' added to today\'s sales');
    debouncedSave();
    renderPages();
    navigate('invoicing');
    renderClientInvoices();
    toast('success', '✅ Invoice ' + inv.invoiceNumber + ' paid — R' +
        salesExVat.toFixed(2) + ' added to sales');
}
// ============================================================
// INVOICE REPORT
// ============================================================
function viewInvoiceReport() {
    var invoices = getClientInvoices();
    var unpaid   = invoices.filter(function(i) { return i.status !== 'paid'; });
    var paid     = invoices.filter(function(i) { return i.status === 'paid'; });
    var totalOutstanding = unpaid.reduce(function(s, i) { return s + (i.totalIncl || 0); }, 0);
    var totalPaid        = paid.reduce(function(s, i) { return s + (i.totalIncl || 0); }, 0);
    var ent = S.entities[S.activeEntity] || {};

    var unpaidRows = unpaid.map(function(inv) {
        var daysSince = Math.floor((new Date() - new Date(inv.createdAt)) / 86400000);
        return '<tr style="' + (daysSince > 30 ? 'background:rgba(201,69,69,.04)' : '') + '">' +
            '<td><strong>' + inv.invoiceNumber + '</strong></td>' +
            '<td>' + (inv.clientCompany || inv.clientName) + '</td>' +
            '<td>' + fmtDate(inv.createdAt) + '</td>' +
            '<td style="font-weight:700;color:var(--danger)">R' + (inv.totalIncl || 0).toFixed(2) + '</td>' +
            '<td>' + daysSince + ' days</td>' +
            '<td>' + (daysSince > 30 ? '<span style="color:var(--danger);font-weight:700">OVERDUE</span>' : 'Due') + '</td></tr>';
    }).join('');

    var paidRows = paid.map(function(inv) {
        return '<tr>' +
            '<td><strong>' + inv.invoiceNumber + '</strong></td>' +
            '<td>' + (inv.clientCompany || inv.clientName) + '</td>' +
            '<td>' + fmtDate(inv.createdAt) + '</td>' +
            '<td>' + (inv.paidDate ? fmtDate(inv.paidDate) : '—') + '</td>' +
            '<td style="font-weight:700;color:var(--success)">R' + (inv.totalIncl || 0).toFixed(2) + '</td>' +
            '<td>' + (inv.paidBy || '—') + '</td></tr>';
    }).join('');

    showModal(
        '<i class="fas fa-file-alt" style="color:var(--accent)"></i> Invoice Report — ' + ent.name,

        // Summary
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px">' +
        '<div style="padding:16px;background:var(--bg);border-radius:var(--rs);text-align:center;border-left:3px solid var(--accent)">' +
        '<div style="font-size:.62rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Total Invoiced</div>' +
        '<div style="font-size:1.2rem;font-weight:800;color:var(--text)">R' + fmtNum(totalOutstanding + totalPaid) + '</div></div>' +
        '<div style="padding:16px;background:var(--bg);border-radius:var(--rs);text-align:center;border-left:3px solid var(--danger)">' +
        '<div style="font-size:.62rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Outstanding</div>' +
        '<div style="font-size:1.2rem;font-weight:800;color:var(--danger)">R' + fmtNum(totalOutstanding) + '</div></div>' +
        '<div style="padding:16px;background:var(--bg);border-radius:var(--rs);text-align:center;border-left:3px solid var(--success)">' +
        '<div style="font-size:.62rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">Received</div>' +
        '<div style="font-size:1.2rem;font-weight:800;color:var(--success)">R' + fmtNum(totalPaid) + '</div></div></div>' +

        // Outstanding section
        '<h4 style="font-size:.88rem;font-weight:700;color:var(--danger);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--danger)">' +
        '<i class="fas fa-exclamation-circle"></i> Outstanding Invoices (' + unpaid.length + ')</h4>' +
        (unpaid.length === 0
            ? '<p style="color:var(--success);padding:14px;font-size:.85rem"><i class="fas fa-check-circle"></i> No outstanding invoices</p>'
            : '<div class="table-wrap" style="margin-bottom:20px"><table class="data-table"><thead><tr>' +
              '<th>Invoice #</th><th>Client</th><th>Date</th><th>Amount</th><th>Age</th><th>Status</th></tr></thead><tbody>' +
              unpaidRows + '</tbody></table></div>') +

        // Paid section
        '<h4 style="font-size:.88rem;font-weight:700;color:var(--success);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--success)">' +
        '<i class="fas fa-check-circle"></i> Paid Invoices (' + paid.length + ')</h4>' +
        (paid.length === 0
            ? '<p style="color:var(--text-light);padding:14px;font-size:.85rem">No paid invoices yet</p>'
            : '<div class="table-wrap"><table class="data-table"><thead><tr>' +
              '<th>Invoice #</th><th>Client</th><th>Invoice Date</th><th>Paid Date</th><th>Amount</th><th>Paid By</th></tr></thead><tbody>' +
              paidRows + '</tbody></table></div>'),

        // Footer buttons
        '<button class="btn-outline" onclick="closeModal()">Close</button>' +
        '<button class="btn-outline" onclick="printInvoiceReport()"><i class="fas fa-print"></i> Print</button>' +
        '<button class="btn-primary" onclick="emailInvoiceReport()"><i class="fas fa-envelope"></i> Email</button>'
    );
}

function printInvoiceReport() {
    window.print();
    logAction('Print', 'Invoice Report printed');
}

function emailInvoiceReport() {
    var ent = S.entities[S.activeEntity] || {};
    var email = S.owner ? S.owner.email : '';
    window.location.href = 'mailto:' + email + '?subject=' +
        encodeURIComponent('Invoice Report — ' + ent.name + ' — ' + new Date().toLocaleDateString('en-ZA')) +
        '&body=' + encodeURIComponent('Please find the invoice report for ' + ent.name + '.\n\nGenerated by StockAI-Pro');
    toast('info', '📧 Opening email...');
    logAction('Email', 'Invoice Report emailed');
}
function deleteClientInvoice(invId) {
    if (!confirm('Delete this invoice? This cannot be undone.')) return;
    S.clientInvoices[eid()] = getClientInvoices().filter(function(i) { return i.id !== invId; });
    debouncedSave();
    renderClientInvoices();
    toast('info', 'Invoice deleted');
}

    to { opacity:1; transform:translateY(0) scale(1); }
}
.mig-chat-header {
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    padding:14px 18px; display:flex; align-items:center;
    gap:10px; color:#fff;
}
.mig-chat-avatar {
    width:36px; height:36px; background:rgba(255,255,255,.2);
    border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:.9rem;
}
.mig-chat-header h4 { font-size:.85rem; font-weight:700; flex:1; }
.mig-chat-close {
    background:rgba(255,255,255,.2); border:none; color:#fff;
    width:28px; height:28px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:.8rem;
}
.mig-chat-messages {
    height:280px; overflow-y:auto; padding:14px;
    display:flex; flex-direction:column; gap:10px;
    background:#f5f5ff;
}
.mig-msg {
    max-width:85%; padding:10px 14px; border-radius:12px;
    font-size:.8rem; line-height:1.5;
}
.mig-msg.bot {
    align-self:flex-start; background:#fff; color:#0d4a5c;
    border-bottom-left-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,.06);
    border-left:3px solid #6366f1;
}
.mig-msg.user {
    align-self:flex-end; background:#6366f1; color:#fff;
    border-bottom-right-radius:4px;
}
.mig-faq-btns { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.mig-faq-btn {
    padding:5px 10px; background:#f0f0ff; border:1px solid #d0d0f0;
    border-radius:14px; font-size:.7rem; color:#4f46e5;
    cursor:pointer; font-family:inherit; transition:.2s;
}
.mig-faq-btn:hover { background:#6366f1; color:#fff; border-color:#6366f1; }

/* ── RESPONSIVE ── */
@media(max-width:768px) {
    #mig-chat { width:calc(100vw - 30px); right:15px; }
    #mig-speech { max-width:260px; right:15px; }
}
</style>

</div>

<script>
// ============================================================
// MIGLATRON — THE WEB APP ASSISTANT
// ============================================================
var MIG = {
    state: 'sleeping',    // sleeping, waking, standing, touring, idle, chatting
    tourDone: false,
    tourStep: 0,
    speechTimer: null,
    unknownQuestions: []
};

// Tour explanations for each sidebar tab
var MIG_TOUR = [
    { page:'dashboard',     text:'📊 <strong>Dashboard</strong> — Your command center! See live food cost, stock values, sales, AI insights, and alerts all in one view.' },
    { page:'inventory',     text:'📦 <strong>Inventory</strong> — All your stock items live here. Add items, create departments & categories, link to suppliers. Costs are locked — only updated through GRV.' },
    { page:'menu-creation', text:'🍽️ <strong>Menu Creation</strong> — Build recipes by linking ingredients. Prices are pulled from your latest invoices automatically. See your food cost per dish instantly.' },
    { page:'stock-take',    text:'📋 <strong>Stock Take</strong> — Count your stock manually or use voice counting! Just say the item name and quantity. Print count sheets by section.' },
    { page:'cashup',        text:'💰 <strong>Cash-up</strong> — Record daily sales. Waiter cash-ups from POS appear here for manager review before submission.' },
    { page:'day-end',       text:'🌙 <strong>Day End</strong> — Close out the day. See top sellers, sales breakdown, wastage. All cash-ups must be reviewed before Day End can run.' },
    { page:'purchases',     text:'🛒 <strong>Purchases</strong> — Manage all POs. AI generates orders automatically! Track from ordering → delivery → GRV → payment.' },
    { page:'grv',           text:'✅ <strong>GRV</strong> — Process received deliveries here. Enter actual quantities and costs from invoices. This is the ONLY way stock levels and costs update.' },
    { page:'suppliers',     text:'🚚 <strong>Suppliers</strong> — Manage supplier info, delivery days, payment terms. Download blank price lists to send to them.' },
    { page:'wastage',       text:'🗑️ <strong>Wastage</strong> — Log all waste with reasons. Track monthly totals. AI helps identify wastage patterns over time.' },
    { page:'reports',       text:'📊 <strong>Reports</strong> — Date range reports with print & email. Food cost, stock summary, wastage, user logs, and more.' },
    { page:'users',         text:'👥 <strong>Users</strong> — Add team members, create custom roles with specific permissions. Users get email invites to set up their accounts.' },
    { page:'pos-builder',   text:'📺 <strong>POS Menu Builder</strong> — Build your front-of-house selling screen. Create color-coded departments, add selling buttons, link to menu items for auto stock deduction.' },
    { page:'settings',      text:'⚙️ <strong>Settings</strong> — View and manage your entity details.' },
    { page:'month-end',     text:'📅 <strong>Month End</strong> — Guided month-end process. Complete GRVs first, then closing stock take. System calculates food cost and resets for the new month.' }
];

// FAQ answers
var MIG_FAQ = {
    'food-cost':    '📊 <strong>Live Food Cost</strong> is calculated as:<br><br>(Opening Stock + Purchases - Closing Stock) ÷ Sales × 100<br><br>All values are excl. VAT (15%). This updates in real-time on your Dashboard!',
    'add-stock':    '📦 To add stock items:<br>1. Go to <strong>Inventory</strong> tab<br>2. Click <strong>"Add Item"</strong><br>3. Fill in item details in Tab 1<br>4. Link suppliers in Tab 2<br>5. Click Save!<br><br>Note: Costs only update through GRV — not manually.',
    'voice-count':  '🎤 To voice count:<br>1. Go to <strong>Stock Take</strong><br>2. Click the <strong>Voice Count</strong> button<br>3. Say: "<em>Chicken breast twenty five</em>"<br>4. The system updates automatically!<br>5. Say "stop" when done.',
    'create-po':    '🛒 To create a Purchase Order:<br>1. Go to <strong>Purchases</strong><br>2. Click <strong>"Create Manual PO"</strong><br>3. Select a supplier<br>4. Only items linked to that supplier appear<br>5. Enter quantities and submit<br><br>The PO gets emailed to the supplier automatically!',
    'grv-process':  '✅ The GRV process:<br>1. Order arrives → mark as <strong>Delivered</strong> in Purchases<br>2. Go to <strong>GRV</strong> tab<br>3. Click <strong>"Process GRV"</strong><br>4. Enter actual qty & cost from invoice<br>5. Submit → stock & costs update!',
    'month-end':    '📅 Month End has 2 steps:<br>1. <strong>Complete all GRVs</strong> — process outstanding invoices<br>2. <strong>Closing Stock Take</strong> — count all stock<br><br>Then click Submit. The system calculates food cost, resets data for the new month, and carries stock values over.',
    'add-supplier': '🚚 To add a supplier:<br>1. Go to <strong>Suppliers</strong><br>2. Click <strong>"Add Supplier"</strong><br>3. Fill in name, contact, delivery days, payment terms<br>4. Save!<br><br>You can also download blank price lists to send to suppliers.',
    'add-user':     '👥 To add a team member:<br>1. Go to <strong>Users</strong><br>2. Click <strong>"Create User"</strong><br>3. Enter their name, email, phone<br>4. Select their role & app access<br>5. Submit — they get an email invite!',
    'pos-builder':  '📺 To build your POS screen:<br>1. Go to <strong>POS Menu Builder</strong><br>2. Create color-coded departments<br>3. Add selling items with prices<br>4. Link to menu items for stock deduction<br>5. Click <strong>"Submit to POS"</strong>',
    'wastage':      '🗑️ To log wastage:<br>1. Go to <strong>Wastage</strong><br>2. Click <strong>"Log Wastage"</strong><br>3. Select the item and enter qty<br>4. Choose a reason<br>5. Submit — stock is automatically deducted',
    'help':         '🤖 I can help you with:<br>• Food cost calculation<br>• Adding stock items<br>• Voice counting<br>• Creating purchase orders<br>• GRV process<br>• Month end<br>• Adding suppliers<br>• Adding users<br>• POS builder<br>• Logging wastage<br><br>Just click any question!'
};

var MIG_FAQ_BUTTONS = [
    { key:'food-cost',   label:'Food Cost?' },
    { key:'add-stock',   label:'Add Stock?' },
    { key:'voice-count', label:'Voice Count?' },
    { key:'create-po',   label:'Create PO?' },
    { key:'grv-process', label:'GRV Process?' },
    { key:'month-end',   label:'Month End?' },
    { key:'add-supplier',label:'Add Supplier?' },
    { key:'add-user',    label:'Add User?' },
    { key:'pos-builder', label:'POS Builder?' },
    { key:'wastage',     label:'Log Wastage?' },
    { key:'help',        label:'What can you do?' }
];

// ============================================================
// CHECK IF FIRST TIME — Show Tour
// ============================================================
function checkMiglatronTour() {
    var tourKey = 'miglatron_tour_' + (S._accountId || 'unknown') + '_' + (eid() || 'unknown');
    if (localStorage.getItem(tourKey)) {
        MIG.tourDone = true;
        MIG.state = 'sleeping';
        showMigZzz(true);
        return;
    }

    // First time! Start the tour
    setTimeout(function() {
        startMiglatronIntro();
    }, 2000);

    localStorage.setItem(tourKey, 'done');
}

// Call this after enterApp()
var _origEnterApp = enterApp;
enterApp = function() {
    _origEnterApp();
    setTimeout(checkMiglatronTour, 1500);
};

// ============================================================
// INTRO SEQUENCE
// ============================================================
function startMiglatronIntro() {
    MIG.state = 'intro';
    showMigZzz(false);

    // Wake up
    var bot = document.getElementById('miglatron');
    bot.className = 'waking';

    setTimeout(function() {
        bot.className = 'standing';
        migSpeak('👋 Hi there! My name is <strong>Miglatron</strong>!', 3000);
    }, 1500);

    // "I'm your friendly neighbourhood..."
    setTimeout(function() {
        migSpeak('I\'m your friendly neighbourhood...', 2000);
    }, 5000);

    // Spider-Man web attempt
    setTimeout(function() {
        bot.classList.add('webshoot');
        migSpeak('💧 *tries to shoot webs*... 😅', 1500);
        spawnOilDrops();
    }, 7500);

    // "...Robot!"
    setTimeout(function() {
        bot.classList.remove('webshoot');
        migSpeak('...🤖 <strong>Robot!</strong> Haha, wrong franchise!', 2500);
    }, 9500);

    // Start tour
    setTimeout(function() {
        migSpeak('I\'m here as your <strong>navigation guide</strong> to get you started! Let me show you around...', 3000);
    }, 12500);

    setTimeout(function() {
        startMiglatronTour();
    }, 16000);
}

// ============================================================
// OIL DROPS — Spider-Man Fail
// ============================================================
function spawnOilDrops() {
    var container = document.getElementById('miglatron-container');
    for (var i = 0; i < 5; i++) {
        var drop = document.createElement('div');
        drop.className = 'mig-oil-drop';
        drop.style.cssText = 'position:fixed;bottom:' + (70 + Math.random() * 20) + 'px;' +
            'right:' + (30 + Math.random() * 30) + 'px;' +
            'animation:migOilDrip ' + (0.8 + Math.random() * 0.5) + 's ease ' +
            (i * 0.15) + 's forwards;';
        container.appendChild(drop);
        (function(d) {
            setTimeout(function() { if (d.parentElement) d.remove(); }, 2000);
        })(drop);
    }
}

// ============================================================
// SIDEBAR TOUR
// ============================================================
function startMiglatronTour() {
    MIG.state = 'touring';
    MIG.tourStep = 0;
    tourNextStep();
}

function tourNextStep() {
    if (MIG.tourStep >= MIG_TOUR.length) {
        finishTour();
        return;
    }

    var step = MIG_TOUR[MIG.tourStep];

    // Find the sidebar link for this page
    var navLinks = document.querySelectorAll('.nav-link');
    var found = false;

    navLinks.forEach(function(link) {
        link.classList.remove('mig-highlight');
        if (link.dataset.page === step.page) {
            link.classList.add('mig-highlight');
            // Scroll sidebar to show this link
            link.scrollIntoView({ behavior:'smooth', block:'nearest' });
            found = true;
        }
    });

    if (!found) {
        // Skip this step if tab doesn't exist for this user
        MIG.tourStep++;
        tourNextStep();
        return;
    }

    migSpeak(step.text, 8000);

    MIG.tourStep++;
    setTimeout(function() {
        // Remove highlight
        navLinks.forEach(function(l) { l.classList.remove('mig-highlight'); });
        tourNextStep();
    }, 10000);
}

function finishTour() {
    MIG.state = 'idle';
    MIG.tourDone = true;

    // Remove any highlights
    document.querySelectorAll('.nav-link').forEach(function(l) {
        l.classList.remove('mig-highlight');
    });

    migSpeak('🎉 That\'s the tour! Click me anytime you need help. I\'m going to take a nap now... 😴', 4000);

    setTimeout(function() {
        goToSleep();
    }, 5000);
}

// ============================================================
// SLEEP / WAKE
// ============================================================
function goToSleep() {
    MIG.state = 'sleeping';
    var bot = document.getElementById('miglatron');
    bot.className = 'sleeping';
    showMigZzz(true);
    hideMigSpeech();
}

function wakeUp() {
    MIG.state = 'waking';
    showMigZzz(false);
    var bot = document.getElementById('miglatron');
    bot.className = 'waking';

    setTimeout(function() {
        bot.className = 'standing';
        MIG.state = 'idle';
    }, 1500);
}

function showMigZzz(show) {
    for (var i = 1; i <= 3; i++) {
        var z = document.getElementById('mig-zzz-' + i);
        if (z) z.style.display = show ? 'block' : 'none';
    }
}

// ============================================================
// SPEECH BUBBLE
// ============================================================
function migSpeak(text, duration) {
    var speech = document.getElementById('mig-speech');
    var textEl = document.getElementById('mig-speech-text');
    var mouth  = document.getElementById('mig-mouth');

    textEl.innerHTML = text;
    speech.style.display = 'block';
    if (mouth) mouth.classList.add('talking');

    clearTimeout(MIG.speechTimer);
    MIG.speechTimer = setTimeout(function() {
        hideMigSpeech();
    }, duration || 4000);
}

function hideMigSpeech() {
    var speech = document.getElementById('mig-speech');
    var mouth  = document.getElementById('mig-mouth');
    if (speech) speech.style.display = 'none';
    if (mouth) mouth.classList.remove('talking');
}

// ============================================================
// INTERACTION — Click to wake/chat
// ============================================================
function miglatronInteract() {
    if (MIG.state === 'touring' || MIG.state === 'intro') return; // Don't interrupt tour

    if (MIG.state === 'sleeping') {
        wakeUp();
        setTimeout(function() {
            openMigChat();
        }, 1600);
    } else {
        openMigChat();
    }
}

// ============================================================
// CHAT PANEL
// ============================================================
function openMigChat() {
    MIG.state = 'chatting';
    hideMigSpeech();
    document.getElementById('mig-chat').style.display = 'block';

    // Populate FAQ buttons
    var faqContainer = document.getElementById('mig-faq-default');
    if (faqContainer && faqContainer.innerHTML === '') {
        faqContainer.innerHTML = MIG_FAQ_BUTTONS.map(function(btn) {
            return '<button class="mig-faq-btn" onclick="migAnswer(\'' + btn.key + '\')">' + btn.label + '</button>';
        }).join('');
    }
}

function closeMigChat() {
    document.getElementById('mig-chat').style.display = 'none';
    MIG.state = 'idle';

    // Go back to sleep after 10 seconds of no interaction
    setTimeout(function() {
        if (MIG.state === 'idle') goToSleep();
    }, 10000);
}

// ============================================================
// FAQ ANSWERS
// ============================================================
function migAnswer(key) {
    var answer = MIG_FAQ[key];
    var messages = document.getElementById('mig-messages');

    // Find label
    var label = key;
    MIG_FAQ_BUTTONS.forEach(function(btn) {
        if (btn.key === key) label = btn.label;
    });

    // User message
    var userMsg = document.createElement('div');
    userMsg.className = 'mig-msg user';
    userMsg.innerHTML = '<p>' + label + '</p>';
    messages.appendChild(userMsg);

    // Bot reply
    setTimeout(function() {
        var botMsg = document.createElement('div');
        botMsg.className = 'mig-msg bot';

        if (answer) {
            botMsg.innerHTML = '<p>' + answer + '</p>' +
                '<div class="mig-faq-btns" style="margin-top:8px">' +
                '<button class="mig-faq-btn" onclick="migAnswer(\'help\')">More help</button>' +
                '</div>';
        } else {
            // Unknown question — store it
            storeUnknownQuestion(label);
            botMsg.innerHTML = '<p>🤔 Hmm, I don\'t have an answer for that yet! ' +
                'I\'ve noted your question and my team will add it soon.<br><br>' +
                'In the meantime, try WhatsApp: <a href="https://wa.me/27790440508" style="color:#6366f1;font-weight:600">079 044 0508</a></p>';
        }

        messages.appendChild(botMsg);
        messages.scrollTop = messages.scrollHeight;
    }, 500);

    messages.scrollTop = messages.scrollHeight;
}

// ============================================================
// STORE UNKNOWN QUESTIONS — Firebase
// ============================================================
function storeUnknownQuestion(question) {
    if (!S._accountId) return;

    var questionData = {
        question: question,
        askedAt:  new Date().toISOString(),
        askedBy:  S.user ? S.user.email : 'unknown',
        entity:   S.entities[S.activeEntity] ? S.entities[S.activeEntity].name : 'unknown',
        userName: S.user ? S.user.name : 'unknown'
    };

    // Store in Firebase under a global collection
    db.collection('miglatron_questions').add(questionData)
        .then(function() { console.log('📝 Unknown question stored'); })
        .catch(function(err) { console.warn('Question store error:', err); });
}

// ============================================================
// WEEKLY FAQ EMAIL — Check on login
// ============================================================
function checkWeeklyMigReport() {
    var lastReport = localStorage.getItem('mig_last_report');
    var now = new Date();
    var daysSince = lastReport
        ? Math.floor((now - new Date(lastReport)) / 86400000)
        : 999;

    if (daysSince >= 7 && S.user && S.user.email === 'cidraism@gmail.com') {
        // Fetch and send report
        db.collection('miglatron_questions')
            .orderBy('askedAt', 'desc')
            .limit(50)
            .get()
            .then(function(snap) {
                if (snap.empty) return;

                var questions = {};
                snap.forEach(function(doc) {
                    var d = doc.data();
                    var q = d.question;
                    if (!questions[q]) questions[q] = { count:0, lastAsked:'', entity:'' };
                    questions[q].count++;
                    questions[q].lastAsked = d.askedAt;
                    questions[q].entity = d.entity;
                });

                var sorted = Object.entries(questions)
                    .sort(function(a, b) { return b[1].count - a[1].count; })
                    .slice(0, 10);

                var html = '<div style="font-family:Poppins,Arial,sans-serif;max-width:600px;margin:0 auto">' +
                    '<div style="background:linear-gradient(135deg,#6366f1,#4f46e5);padding:28px;text-align:center;border-radius:12px 12px 0 0;color:#fff">' +
                    '<h1 style="font-size:1.3rem;margin:0">🤖 Miglatron Weekly FAQ Report</h1></div>' +
                    '<div style="background:#fff;padding:24px;border:1px solid #e0e0f0;border-radius:0 0 12px 12px">' +
                    '<p style="color:#0d4a5c;margin-bottom:16px">Top unanswered questions this week:</p>' +
                    '<table style="width:100%;border-collapse:collapse">' +
                    sorted.map(function(entry, i) {
                        return '<tr style="border-bottom:1px solid #f0f0ff">' +
                            '<td style="padding:10px;font-weight:700;color:#6366f1">#' + (i + 1) + '</td>' +
                            '<td style="padding:10px;color:#0d4a5c">' + entry[0] + '</td>' +
                            '<td style="padding:10px;color:#5a8a96;text-align:center">' + entry[1].count + 'x</td></tr>';
                    }).join('') +
                    '</table></div></div>';

                sendEmail('cidraism@gmail.com', '🤖 Miglatron Weekly FAQ Report — ' +
                    now.toLocaleDateString('en-ZA'), html);

                localStorage.setItem('mig_last_report', now.toISOString());
            })
            .catch(function(err) { console.warn('FAQ report error:', err); });
    }
}

// Check on load (for admin only)
setTimeout(function() {
    if (S.user && S.user.email === 'cidraism@gmail.com') {
        checkWeeklyMigReport();
    }
}, 5000);

// ============================================================
// ANALYTICS — Track user behavior
// ============================================================
var _origNavigate = navigate;
navigate = function(page) {
    _origNavigate(page);

    // Log navigation for analytics
    if (S._accountId && S.user) {
        var analyticsData = {
            action:    'navigate',
            page:      page,
            userId:    S.user.email || 'unknown',
            userName:  S.user.name || 'unknown',
            role:      S.user.role || 'unknown',
            entityId:  eid() || 'unknown',
            entityName: S.entities[S.activeEntity] ? S.entities[S.activeEntity].name : 'unknown',
            timestamp: new Date().toISOString(),
            device:    navigator.platform || 'unknown'
        };

        // Store in Firebase (fire and forget)
        db.collection('analytics').add(analyticsData).catch(function() {});
    }
};

console.log('✅ Miglatron — Fully Loaded');
console.log('🤖 Tour system ready');
console.log('💬 FAQ system ready');
console.log('📊 Analytics tracking active');
console.log('📧 Weekly FAQ report system active');
</script>
