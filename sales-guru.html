   SUBMIT ORDER
============================================================ */
function sgSubmitOrder() {
    var clientId = document.getElementById('po-client')
        ? document.getElementById('po-client').value : '';
    var notes    = document.getElementById('po-notes')
        ? document.getElementById('po-notes').value.trim() : '';

    if (!clientId) { sgToast('error', 'Please select a client'); return; }

    var client = SG.clients.find(function (c) {
        return c.id === clientId;
    });
    if (!client) { sgToast('error', 'Client not found'); return; }

    /* Collect order items */
    var orderItems = [];
    var orderTotal = 0;

    document.querySelectorAll('.po-item-row').forEach(function (row) {
        var qtyInput = row.querySelector('.po-qty');
        var qty = qtyInput ? parseFloat(qtyInput.value) || 0 : 0;
        if (qty <= 0) return;

        var basePrice = parseFloat(row.dataset.basePrice) || 0;
        var discInput = row.querySelector('.po-discount');
        var discount  = discInput
            ? parseFloat(discInput.value) || 0 : 0;
        var unitPrice = parseFloat(
            (basePrice * (1 - discount / 100)).toFixed(2));
        var lineTotal = parseFloat((unitPrice * qty).toFixed(2));

        orderItems.push({
            itemId:    row.dataset.itemId,
            name:      row.dataset.itemName,
            unit:      row.dataset.itemUnit,
            qty:       qty,
            basePrice: basePrice,
            discount:  discount,
            unitPrice: unitPrice,
            lineTotal: lineTotal
        });
        orderTotal += lineTotal;
    });

    if (orderItems.length === 0) {
        sgToast('error', 'Add at least one item with a quantity');
        return;
    }

    var now       = new Date().toISOString();
    var orderId   = 'SGO-' + Date.now();
    var invoiceNo = 'INV-' +
        new Date().getFullYear() +
        ('0' + (new Date().getMonth() + 1)).slice(-2) +
        '-' + Math.floor(Math.random() * 10000);

    /* Check stock levels */
    var outOfStock = [];
    orderItems.forEach(function (oi) {
        var invItem = SG.inventory.find(function (i) {
            return i.id === oi.itemId;
        });
        if (invItem && (invItem.quantity || 0) < oi.qty) {
            outOfStock.push({
                itemId:    oi.itemId,
                name:      oi.name,
                needed:    oi.qty,
                available: invItem.quantity || 0
            });
        }
    });

    var order = {
        id:              orderId,
        invoiceNo:       invoiceNo,
        clientId:        clientId,
        clientName:      client.storeName,
        clientEmail:     client.email         || '',
        clientPhone:     client.contactNumber || '',
        clientAddress:   client.address       || '',
        repId:           SG.user ? SG.user.uid  : '',
        repName:         SG.user ? SG.user.name : '',
        entityId:        SG.entityId,
        entityName:      SG.entityName || '',
        items:           orderItems,
        total:           parseFloat(orderTotal.toFixed(2)),
        notes:           notes,
        status:          'pending',
        dispatchEmail:   SG.dispatchEmail || '',
        outOfStockItems: outOfStock,
        hasStockIssues:  outOfStock.length > 0,
        createdAt:       now,
        updatedAt:       now
    };

    sgToast('info', 'Processing order...');

    var orders = SG.orders.slice();
    orders.unshift(order);

    var update = {};
    update['salesOrders.' + SG.entityId] = orders;
    /* Also write to posOrders so web app BOH can see it */
    update['posOrders.' + SG.entityId + '.' + orderId] = {
        id:         orderId,
        source:     'Sales-Guru',
        clientName: client.storeName,
        clientEmail:client.email || '',
        repName:    SG.user ? SG.user.name : '',
        items:      orderItems,
        total:      order.total,
        status:     'sales-order',
        invoiceNo:  invoiceNo,
        createdAt:  now
    };

    sgSave(update).then(function () {
        SG.orders = orders;

        /* Send invoice email to dispatch */
        sgSendInvoiceEmail(order, client);

        /* Handle out of stock */
        if (outOfStock.length > 0) {
            sgHandleOutOfStock(order, client, outOfStock);
        }

        sgCloseModal();
        sgToast('success',
            '✅ Order ' + invoiceNo + ' placed!' +
            (outOfStock.length > 0
                ? ' ⚠️ ' + outOfStock.length +
                  ' item(s) out of stock — client notified.'
                : ' Invoice sent to dispatch.'));
        sgNav('orders');
    });
}

============================================================ */
function sgHandleOutOfStock(order, client, outOfStock) {
    var now = new Date().toISOString();
    var uid = SG.user ? SG.user.uid : '';

    /* ── 1. Save notice for rep ── */
    var notice = {
        id:         'NOT-' + Date.now(),
        type:       'out_of_stock',
        orderId:    order.id,
        invoiceNo:  order.invoiceNo,
        clientId:   order.clientId,
        clientName: order.clientName,
        items:      outOfStock,
        message:    'Out of stock alert for order ' +
                    order.invoiceNo + ' — ' +
                    order.clientName + '. Items: ' +
                    outOfStock.map(function (i) {
                        return i.name;
                    }).join(', '),
        read:       false,
        date:       now,
        repId:      uid
    };

    SG.notices.unshift(notice);
    sgUpdateNoticeBadge();

    var noticeUpdate = {};
    noticeUpdate['salesNotices.' + SG.entityId + '.' + uid] =

        '</head><body style="margin:0;padding:0;' +
        'background:#f3f4f6;font-family:Segoe UI,Arial,sans-serif">' +

        'background:#fff;border-radius:0 0 16px 16px;' +

    var html =
        '<div style="display:flex;justify-content:space-between;' +
        'align-items:center;margin-bottom:16px">' +

              'class="btn btn-outline btn-sm">' +
              '<i class="fas fa-check-double"></i> ' +
              'Mark All Read</button>'

    }

    notices.forEach(function (notice, idx) {
        var typeColor = notice.type === 'out_of_stock'
            ? 'var(--danger)' : 'var(--accent)';
        var typeIcon = notice.type === 'out_of_stock'
            ? 'fa-exclamation-triangle' : 'fa-bell';
        var typeBgRgb = notice.type === 'out_of_stock'
            ? '201,69,69' : '124,58,237';

        html +=
            '<div class="sg-notice-card' +
            (notice.type !== 'out_of_stock' ? ' info' : '') + '" ' +
            'onclick="sgMarkNoticeRead(' + idx + ')">' +

            '<div style="display:flex;align-items:flex-start;' +
            'gap:12px">' +
            '<div style="width:36px;height:36px;border-radius:50%;' +
            'background:rgba(' + typeBgRgb + ',.15);display:flex;' +
            'align-items:center;justify-content:center;flex-shrink:0">' +
            '<i class="fas ' + typeIcon + '" ' +
            'style="color:' + typeColor + '"></i></div>' +

            '<div style="flex:1">' +
            (!notice.read
                ? '<span class="sg-notice-unread"></span>'
                : '') +
            '<div style="font-size:.88rem;font-weight:' +
            (notice.read ? '500' : '700') + ';color:var(--text);' +
            'margin-bottom:4px">' +
            sgEsc(notice.message || '') + '</div>' +

            (notice.items && notice.items.length > 0
                ? '<div style="font-size:.75rem;' +
                  'color:var(--danger);margin-bottom:4px">' +
                  notice.items.map(function (i) {
                      return sgEsc(i.name);
                  }).join(', ') + '</div>'
                : '') +

            '<div style="font-size:.7rem;color:var(--text-muted)">' +
            sgFmtDate(notice.date) + ' — ' +
            sgEsc(notice.clientName || '') +
            '</div></div></div></div>';
    });

    return html;
}

function sgMarkNoticeRead(idx) {
    if (!SG.notices[idx]) return;
    SG.notices[idx].read = true;
    sgUpdateNoticeBadge();
    var uid    = SG.user ? SG.user.uid : '';
    var update = {};
    update['salesNotices.' + SG.entityId + '.' + uid] = SG.notices;
    sgSave(update).catch(function () {});
    sgRenderCurrentPage();
}

function sgMarkAllNoticesRead() {
    SG.notices.forEach(function (n) { n.read = true; });
    sgUpdateNoticeBadge();
    var uid    = SG.user ? SG.user.uid : '';
    var update = {};
    update['salesNotices.' + SG.entityId + '.' + uid] = SG.notices;
    sgSave(update).then(function () {
        sgToast('success', 'All notices marked as read');
        sgRenderCurrentPage();
    });
}

function sgUploadPricelist(input) {
    var file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
        sgToast('error', 'File too large. Maximum 2MB.');
        return;
    }
    sgToast('info', 'Processing pricelist...');
    var reader = new FileReader();
    reader.onload = function (e) {
        sgSavePricelistData(e.target.result);
    };
    reader.readAsDataURL(file);
}

function sgSavePricelistData(urlOrData) {

    var uid = SG.user ? SG.user.uid : '';

        '.pricelistUrl'] = urlOrData;

function sgSendPricelist(clientId) {

    });

    var linkedItems = (client.linkedItems || []).map(function (itemId) {
        return SG.inventory.find(function (i) {
            return i.id === itemId;
        });
    }).filter(function (i) { return !!i; });

    if (linkedItems.length === 0) {
        sgToast('warning',
            'No items linked to this client. ' +
            'Edit the client to link inventory items first.');
        return;
    }

    var itemRows = linkedItems.map(function (item) {
        return '<div class="sg-price-row" ' +
            'data-item-id="' + item.id + '" ' +
            'data-base-price="' + (item.cost || 0) + '">' +

            (item.unit || 'each') + '</span></div>' +

            (item.cost || 0).toFixed(2) + '</div>' +
            '<div><input type="number" class="discount-input" ' +
            'placeholder="0" min="0" max="100" step="1" ' +
            'oninput="sgUpdatePriceRow(this)" ' +
            'style="width:60px">' +

            'color:var(--text-muted)"> %</span></div>' +
            '<div class="sg-discounted-price" ' +
            'style="font-size:.85rem;font-weight:700;' +
            'color:var(--accent)">R' +
            (item.cost || 0).toFixed(2) + '</div>' +
            '<div style="font-size:.72rem;' +
            'color:var(--text-muted)">' +
            (item.unit || 'each') + '</div></div>';

    sgShowModal(

        'border-left:3px solid var(--success);padding:12px;' +
        'border-radius:var(--rs);margin-bottom:16px;' +
        'font-size:.82rem;color:var(--text-mid)">' +
        '<i class="fas fa-info-circle" ' +
        'style="color:var(--success)"></i> ' +
        'Prices are from the web app inventory. ' +
        'Add a discount % per item if needed — ' +
        'the discounted price will show on the pricelist.</div>' +

        '<div class="sg-price-row header">' +

        '<label>Send to Email *</label>' +

        'placeholder="client@email.com"></div>' +

        '<label>Personal Message (optional)</label>' +

function sgUpdatePriceRow(input) {
    var row       = input.closest('.sg-price-row');
    if (!row) return;
    var basePrice = parseFloat(row.dataset.basePrice) || 0;
    var discount  = parseFloat(input.value) || 0;
    discount      = Math.max(0, Math.min(100, discount));
    var finalPrice = basePrice * (1 - discount / 100);
    var priceEl    = row.querySelector('.sg-discounted-price');
    if (priceEl) {
        priceEl.textContent = 'R' + finalPrice.toFixed(2);
        priceEl.style.color = discount > 0
            ? 'var(--success)' : 'var(--accent)';
    }
}

function sgSubmitPricelist(clientId) {
    var client = SG.clients.find(function (c) {
        return c.id === clientId;
    });
    if (!client) return;

    var toEmail = (document.getElementById('pl-email')
        ? document.getElementById('pl-email').value : '').trim();
    var message = (document.getElementById('pl-message')
        ? document.getElementById('pl-message').value : '').trim();

    if (!toEmail || toEmail.indexOf('@') === -1) {
        sgToast('error', 'Please enter a valid email address');

    /* Collect items and discounts */

        .forEach(function (row) {

            var discInput = row.querySelector('.discount-input');
            var discount  = discInput
                ? parseFloat(discInput.value) || 0 : 0;
            var finalPrice = basePrice * (1 - discount / 100);
            var item = SG.inventory.find(function (i) {
                return i.id === itemId;
            });
            if (item) {
                priceItems.push({
                    name:       item.name,
                    unit:       item.unit || 'each',

                  'text-align:right">—</td>') +

            'border-bottom:1px solid #e4f1f5;font-size:13px;' +

        sgEsc(client.contactName || client.storeName) + ',</p>' +

            ? '<p style="font-size:15px;color:#374151;' +
              'line-height:1.8;margin:0 0 20px">' +

            : '<p style="font-size:15px;color:#374151;' +
              'line-height:1.8;margin:0 0 20px">' +

        '<div style="overflow-x:auto;margin-bottom:24px">' +
        '<table style="width:100%;border-collapse:collapse">' +
        '<thead><tr>' +
        '<th style="padding:10px 14px;background:#0d4a5c;' +

function sgLeadTab(tab) {
    var gp = document.getElementById('sg-lead-google');
    var cp = document.getElementById('sg-lead-csv');
    var gb = document.getElementById('sg-lt-google');
    var cb = document.getElementById('sg-lt-csv');

/* ── Google Search ── */
function sgLeadSearch() {
    var area   = (document.getElementById('sg-lead-area')
        ? document.getElementById('sg-lead-area').value : '').trim();
    var sector = document.getElementById('sg-lead-sector')
        ? document.getElementById('sg-lead-sector').value : '';
    var radius = document.getElementById('sg-lead-radius')
        ? document.getElementById('sg-lead-radius').value : '5000';

    if (!area) { sgToast('error', 'Enter an area to search'); return; }

    var btn = document.getElementById('sg-lead-btn');
    if (btn) {
        btn.disabled  = true;
        btn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Searching...';
    }

    var resultsEl = document.getElementById('sg-lead-results');
    if (resultsEl) {
        resultsEl.innerHTML =
            '<div style="text-align:center;padding:40px;' +
            'color:var(--text-muted)">' +
            '<i class="fas fa-spinner fa-spin" ' +
            'style="font-size:2rem;color:var(--info);' +
            'display:block;margin-bottom:14px"></i>' +
            '<p>"' + sgEsc(sector) + ' in ' +
            sgEsc(area) + '"</p></div>';
    }

    fetch(SG_WORKER_URL + '/places', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            query:  sector + ' in ' + area + ' South Africa',
            radius: parseInt(radius)
        })
    })
    .then(function (r) {
        if (!r.ok) throw new Error('Search failed: ' + r.status);
        return r.json();
    })
    .then(function (data) {
        if (btn) {
            btn.disabled  = false;
            btn.innerHTML = '<i class="fab fa-google"></i> Search';
        }

        if (data.results && data.results.length > 0) {
            SG_LEADS.list = data.results.map(function (p) {
                return {
                    name:    p.name              || '',
                    address: p.formatted_address ||
                             p.vicinity          || '',
                    phone:   p.formatted_phone_number || '',
                    rating:  p.rating            || '',
                    website: p.website           || '',
                    email:   '',
                    type:    sector,
                    area:    area,
                    source:  'Google',
                    contacted: false
                };
            });
            SG_LEADS.filtered = SG_LEADS.list.slice();
            SG_LEADS.source   = 'google';
            sgLeadRender();

            sgToast('success',
                '✅ Found ' + SG_LEADS.list.length + ' businesses');

            /* Log search */
            sgSave({
                ['salesActivities.' + SG.entityId]:
                    firebase.firestore.FieldValue.arrayUnion({
                        type:    'lead_search',
                        area:    area,
                        sector:  sector,
                        results: SG_LEADS.list.length,
                        by:      SG.user ? SG.user.name : '',
                        date:    new Date().toISOString(),
                        cost:    'R0.35'
                    })
            }).catch(function () {});

        } else {
            if (resultsEl) {
                resultsEl.innerHTML =
                    '<div style="text-align:center;padding:40px;' +
                    'color:var(--text-muted)">' +
                    '<p>No results found for "' +
                    sgEsc(sector) + ' in ' + sgEsc(area) +
                    '"</p></div>';
            }
        }
    })
    .catch(function (err) {
        if (btn) {
            btn.disabled  = false;
            btn.innerHTML = '<i class="fab fa-google"></i> Search';
        }
        if (resultsEl) {
            resultsEl.innerHTML =
                '<div style="background:rgba(201,69,69,.1);' +
                'border-left:3px solid var(--danger);padding:20px;' +
                'border-radius:var(--rs);margin-top:16px">' +
                '<div style="font-size:.88rem;font-weight:700;' +
                'color:var(--danger);margin-bottom:8px">' +
                '<i class="fas fa-exclamation-circle"></i> ' +
                'Google Places API not configured</div>' +
                '<div style="font-size:.82rem;' +
                'color:var(--text-mid);line-height:1.7">' +
                'Use the <strong>CSV Import</strong> tab ' +
                'while the API is being set up.</div></div>';
        }
        console.warn('Places API error:', err);
    });
}

/* ── CSV Import ── */
function sgLeadImportCSV(input) {
    var file = input.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function (e) {
        var text  = e.target.result;
        var lines = text.split('\n').filter(function (l) {
            return l.trim();
        });
        var startIdx = 0;
        if (lines[0] &&
            (lines[0].toLowerCase().includes('name') ||
             lines[0].toLowerCase().includes('business'))) {
            startIdx = 1;
        }

        SG_LEADS.list = [];
        for (var i = startIdx; i < lines.length; i++) {
            var cols = lines[i].split(',').map(function (c) {
                return c.trim().replace(/^"|"$/g, '');
            });
            if (cols[0]) {
                SG_LEADS.list.push({
                    name:      cols[0] || '',
                    phone:     cols[1] || '',
                    address:   cols[2] || '',
                    email:     cols[3] || '',
                    website:   cols[4] || '',
                    type:      cols[5] || '',
                    area:      cols[6] || '',
                    source:    'CSV',
                    contacted: false
                });
            }
        }

        SG_LEADS.filtered = SG_LEADS.list.slice();
        SG_LEADS.source   = 'csv';
        sgLeadRender();

        sgToast('success',
            '✅ Imported ' + SG_LEADS.list.length + ' businesses');
    };
    reader.readAsText(file);
}

function sgLeadFilterCSV() {
    var areaQ   = (document.getElementById('sg-csv-area')
        ? document.getElementById('sg-csv-area').value : '')
        .toLowerCase().trim();
    var sectorQ = (document.getElementById('sg-csv-sector')
        ? document.getElementById('sg-csv-sector').value : '')
        .toLowerCase().trim();

    SG_LEADS.filtered = SG_LEADS.list.filter(function (lead) {
        var areaOk   = !areaQ ||
            (lead.area    || '').toLowerCase().includes(areaQ) ||
            (lead.address || '').toLowerCase().includes(areaQ);
        var sectorOk = !sectorQ ||
            (lead.type || '').toLowerCase().includes(sectorQ) ||
            (lead.name || '').toLowerCase().includes(sectorQ);
        return areaOk && sectorOk;
    });
    sgLeadRender();
}

        '<div style="font-size:.88rem;font-weight:700;' +
        'color:var(--text)">' +
        '<i class="fas fa-list" style="color:var(--info)"></i> ' +
        leads.length + ' businesses found' +
        (SG_LEADS.list.length !== leads.length
            ? ' (' + SG_LEADS.list.length + ' total)' : '') +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
        '<input type="text" id="sg-lead-filter" ' +

        'oninput="sgLeadFilterResults()" ' +
        'class="sg-form-input" ' +
        'style="padding:6px 10px;font-size:.82rem;width:150px">' +
        '<button onclick="sgLeadPrint()" ' +

        '<i class="fas fa-print"></i></button>' +
        '<button onclick="sgLeadExportCSV()" ' +
        'class="btn btn-outline btn-sm">' +
        '<i class="fas fa-download"></i></button>' +
        '</div></div>';

    leads.forEach(function (lead, idx) {
        html +=
            '<div class="sg-lead-card">' +
            '<div style="display:flex;justify-content:space-between;' +
            'align-items:flex-start;margin-bottom:6px">' +
            '<div>' +
            '<div class="sg-lead-name">' +
            sgEsc(lead.name) + '</div>' +
            '<div class="sg-lead-meta">' +
            (lead.address
                ? '<i class="fas fa-map-marker-alt" ' +
                  'style="width:14px;color:var(--text-muted)"></i> ' +
                  sgEsc(lead.address) + '<br>' : '') +
            (lead.phone
                ? '<i class="fas fa-phone" ' +
                  'style="width:14px;color:var(--text-muted)"></i> ' +
                  '<a href="tel:' + sgEsc(lead.phone) + '" ' +
                  'style="color:var(--text-light);' +
                  'text-decoration:none">' +
                  sgEsc(lead.phone) + '</a><br>' : '') +
            (lead.website
                ? '<i class="fas fa-globe" ' +
                  'style="width:14px;color:var(--text-muted)"></i> ' +
                  '<a href="' + sgEsc(lead.website) + '" ' +
                  'target="_blank" ' +
                  'style="color:var(--primary);' +
                  'text-decoration:none;font-size:.72rem">' +
                  'Website</a>' : '') +
            '</div></div>' +
            (lead.rating
                ? '<span style="font-size:.82rem;font-weight:700;' +
                  'color:var(--gold)">★ ' + lead.rating + '</span>'
                : '') +
            '</div>' +

            '<div style="display:flex;gap:6px;flex-wrap:wrap;' +
            'margin-top:8px">' +

            '<button onclick="sgLeadToProspect(' + idx + ')" ' +
            'class="btn btn-accent btn-sm">' +
            '<i class="fas fa-user-plus"></i> Prospect</button>' +

            (lead.email
                ? '<button onclick="sgLeadSendEmail(' + idx + ')" ' +
                  'class="btn btn-sm" ' +
                  'style="background:linear-gradient(135deg,' +
                  '#0d9488,#0d4a5c);color:#fff">' +
                  '<i class="fas fa-envelope"></i> Email</button>'
                : '') +

            (lead.phone
                ? '<button onclick="sgLeadWA(' + idx + ')" ' +
                  'class="btn btn-sm" ' +
                  'style="background:#25D366;color:#fff">' +
                  '<i class="fab fa-whatsapp"></i></button>'

                ? 'background:rgba(46,168,113,.15);' +

                  'border:1px solid rgba(46,168,113,.3)'

                ? '<i class="fas fa-check"></i> Done'

    el.innerHTML = html;

function sgLeadFilterResults() {
    var q = (document.getElementById('sg-lead-filter')
        ? document.getElementById('sg-lead-filter').value : '')
        .toLowerCase();
    document.querySelectorAll('.sg-lead-card').forEach(function (c) {
        c.style.display =
            (c.textContent || '').toLowerCase().includes(q)
                ? '' : 'none';
    });
}

function sgLeadMark(idx, btn) {
    if (!SG_LEADS.filtered[idx]) return;
    SG_LEADS.filtered[idx].contacted =
        !SG_LEADS.filtered[idx].contacted;
    var lead = SG_LEADS.filtered[idx];
    /* Update original list too */
    var orig = SG_LEADS.list.find(function (l) {
        return l.name === lead.name;
    });
    if (orig) orig.contacted = lead.contacted;

    if (btn) {
        btn.style.background = lead.contacted
            ? 'rgba(46,168,113,.15)' : 'var(--bg)';
        btn.style.color = lead.contacted
            ? 'var(--success)' : 'var(--text-mid)';
        btn.style.border = lead.contacted
            ? '1px solid rgba(46,168,113,.3)'
            : '1.5px solid var(--border)';
        btn.innerHTML = lead.contacted
            ? '<i class="fas fa-check"></i> Done'
            : 'Contacted';
    }
}

function sgLeadToProspect(idx) {
    var lead = SG_LEADS.filtered[idx];
    if (!lead) return;
    sgShowCreateProspect();
    setTimeout(function () {
        var s = document.getElementById('cp-store');
        var c = document.getElementById('cp-contact');
        var p = document.getElementById('cp-phone');
        var e = document.getElementById('cp-email');
        var a = document.getElementById('cp-address');
        if (s) s.value = lead.name    || '';
        if (c) c.value = '';
        if (p) p.value = lead.phone   || '';
        if (e) e.value = lead.email   || '';
        if (a) a.value = lead.address || '';
    }, 400);
}

function sgLeadSendEmail(idx) {
    var lead = SG_LEADS.filtered[idx];
    if (!lead || !lead.email) return;
    sgShowCreateClient({
        storeName:     lead.name,
        email:         lead.email,
        contactNumber: lead.phone,
        address:       lead.address
    });
}

function sgLeadWA(idx) {
    var lead = SG_LEADS.filtered[idx];
    if (!lead || !lead.phone) return;
    var clean = lead.phone.replace(/[\s\-\(\)\+]/g, '');
    if (clean.startsWith('0'))  clean = clean.substring(1);
    if (!clean.startsWith('27')) clean = '27' + clean;
    var profile = SG.repProfile || {};
    var msg =
        'Hi, my name is ' +
        (profile.name || (SG.user ? SG.user.name : '')) +
        ' from ' + (SG.entityName || 'StockAI-Pro') + '. ' +
        'I wanted to reach out about our products and services. ' +
        'Would you have a few minutes to chat?';
    window.open('https://wa.me/' + clean +
        '?text=' + encodeURIComponent(msg), '_blank');
}

/* ── Export CSV ── */
function sgLeadExportCSV() {
    if (!SG_LEADS.filtered || SG_LEADS.filtered.length === 0) {
        sgToast('info', 'No leads to export');
        return;
    }

    var header =
        'Business Name,Phone,Address,Email,Website,Rating,Contacted\n';
    var rows = SG_LEADS.filtered.map(function (l) {
        var esc = function (v) {
            return '"' + String(v || '').replace(/"/g, '""') + '"';
        };
        return [
            esc(l.name), esc(l.phone), esc(l.address),
            esc(l.email), esc(l.website), esc(l.rating),
            esc(l.contacted ? 'Yes' : 'No')
        ].join(',');
    }).join('\n');

    var csv  = header + rows;
    var blob = new Blob([csv], { type: 'text/csv' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'leads-' +
        new Date().toISOString().split('T')[0] + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    sgToast('success', 'CSV exported — ' +
        SG_LEADS.filtered.length + ' leads');
}

function sgRefreshTTPreview(repUid, repName) {
    var sd = document.getElementById('ttr-start')
        ? document.getElementById('ttr-start').value : '';
    var ed = document.getElementById('ttr-end')
        ? document.getElementById('ttr-end').value : '';
    var el = document.getElementById('ttr-preview');
    if (!el) return;

    var merged = sgMergeTimeTravel(repUid, sd, ed);

    if (merged.dates.length === 0) {
        el.innerHTML =
            '<div style="text-align:center;padding:20px;' +
            'color:var(--text-muted);font-size:.82rem">' +
            'No data for this period</div>';
        return;
    }

    el.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;' +
        'gap:10px;margin-bottom:14px">' +
        '<div style="background:var(--bg-dark);border-radius:var(--rs);' +

                    month: 'short' });
            var ci = data.clockIn
                ? new Date(data.clockIn).toLocaleTimeString('en-ZA',
                    { hour: '2-digit', minute: '2-digit' }) : '—';
            var co = data.clockOut
                ? new Date(data.clockOut).toLocaleTimeString('en-ZA',

                (data.totalKm > 0 ? data.totalKm + 'km' : '—') +

        }).join('');
}

function sgMergeTimeTravel(repUid, sd, ed) {
    var shiftHistory = SG.shiftHistory || [];
    var shifts = shiftHistory.filter(function (s) {
        return s.uid === repUid &&
               s.date >= sd && s.date <= ed;
    });
    var kms = SG.kmRecords.filter(function (r) {
        return r.repId === repUid &&
               r.date >= sd && r.date <= ed;
    });

    var allDates = {};
    shifts.forEach(function (s) {
        if (!allDates[s.date]) allDates[s.date] = {};
        allDates[s.date].clockIn  = s.clockIn;
        allDates[s.date].clockOut = s.clockOut;
        allDates[s.date].hours    = s.hoursDisplay || '—';
        allDates[s.date].hoursNum = s.hoursWorked  || 0;
    });
    kms.forEach(function (r) {
        if (!allDates[r.date]) allDates[r.date] = {};
        allDates[r.date].startKm = r.startKm;
        allDates[r.date].endKm   = r.endKm;
        allDates[r.date].totalKm = r.totalKm || 0;
    });

    var dates  = Object.keys(allDates).sort();
    var totalH = dates.reduce(function (s, d) {
        return s + (allDates[d].hoursNum || 0);
    }, 0);
    var totalK = dates.reduce(function (s, d) {
        return s + (allDates[d].totalKm || 0);
    }, 0);

    return {
        allDates: allDates,
        dates:    dates,
        totalH:   totalH,
        totalK:   totalK
    };
}
